<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASCII Camera</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #00ff41; font-family: monospace, ui-monospace, "Cascadia Code", "Courier New", monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 12px; }
  /* 设计稿 Frame 48091624：顶栏双按钮与底部四控件同宽、同间距 */
  #camera-shell {
    --cam-action-btn-w: 12.5rem;
    --cam-action-gap: 12px;
    /** 主内容列宽：顶栏双按钮行总宽，全页仅此一处定宽 */
    --cam-actions-row-w: calc(var(--cam-action-btn-w) * 2 + var(--cam-action-gap));
    /** 纯画幅区高度（3:4 竖幅基准）；不含其下进度条占位 */
    --ascii-vf-slot-h: calc(var(--cam-actions-row-w) * 4 / 3);
    /** 活动槽总高 = 画幅区 + 距画幅 10px + 条高 6px（进度条在槽内跟画幅走） */
    --ascii-vf-active-slot-total-h: calc(var(--ascii-vf-slot-h) + var(--ascii-vf-progress-band));
    /** 宽比例时活动列距外层取景器左右内边距 */
    --ascii-vf-side-inset: 16px;
    /** 与底栏 `select` 统一高度，供 Photo/Video 分段与下拉对齐 */
    --cam-ctl-select-h: 32px;
    /** 进度条区：距活动画幅 10px + 条高 6px */
    --ascii-vf-progress-band: 16px;
    /** `#ascii-wrap` 内垂直内边距（与下面 `padding: 12px` 一致） */
    --ascii-vf-wrap-pad-y: 12px;
    /**
     * 活动画幅与 overlay 下沿的间距 = 画幅下沿至取景器内底（进度占位 + 底 padding），
     * 使 3:4 等比例下上下留白对称。
     */
    --ascii-vf-active-balance-gap: calc(var(--ascii-vf-progress-band) + var(--ascii-vf-wrap-pad-y));
    /** Overlay 顶距取景器内顶（略下移） */
    --ascii-vf-overlay-top: 10px;
    --ascii-vf-overlay-row-h: var(--cam-ctl-select-h);
    /** Overlay 底距活动槽顶 = 与画幅下方至内底等长 */
    --ascii-vf-overlay-bottom-gap: var(--ascii-vf-active-balance-gap);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: calc(100vh - 48px);
    position: relative;
    z-index: 0;
  }
  /**
   * 主内容列：顶栏双钮 + 状态 + 底部四控件（与活动画幅同宽对齐）；不含外层取景器。
   */
  .camera-content {
    width: 100%;
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    box-sizing: border-box;
  }
  /**
   * 外层取景器（蓝框）：可宽于主列，承载 overlay；宽度不绑 `--cam-actions-row-w`。
   */
  .viewfinder-shell {
    width: 100%;
    max-width: min(560px, 100%);
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 4px;
    box-sizing: border-box;
    position: relative;
  }
  h1 { font-size: 14px; letter-spacing: normal; text-transform: uppercase; margin-bottom: 20px; opacity: 0.6; text-align: center; align-self: center; width: 100%; }
  h1 .cam-title-prefix { letter-spacing: 0.06em; }
  h1 .cam-title-name { letter-spacing: 4px; }
  .cam-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: var(--cam-action-gap);
    width: 100%;
    margin-bottom: 14px;
  }
  .cam-actions button {
    width: var(--cam-action-btn-w);
    max-width: 100%;
    box-sizing: border-box;
    text-align: center;
    min-height: 36px;
    height: 36px;
    padding: 0 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  /** 状态行：占满 `.camera-content` 宽 */
  .cam-status-below-actions {
    width: 100%;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    box-sizing: border-box;
  }
  /** Video 下禁用下拉：强不可交互样式（非仅半透明） */
  select.select-strong-disabled:disabled {
    opacity: 1;
    cursor: not-allowed;
    pointer-events: none;
    background: #070707;
    color: rgba(0, 255, 65, 0.28);
    border-color: rgba(0, 255, 65, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  .ctl-stack.select-locked .ctl-label {
    opacity: 0.35;
  }
  /* 自定义 Flash：与 #2AFD4F 一致；Overlay 在活动列内时右缘对齐活动画幅 */
  .flash-switch {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #2afd4f;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .flash-switch input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    margin: 0;
  }
  .flash-switch-box {
    display: inline-block;
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    border: 1px solid rgba(42, 253, 79, 0.55);
    border-radius: 1px;
    background: transparent;
    box-sizing: border-box;
  }
  .flash-switch input:checked + .flash-switch-box {
    background: #2afd4f;
    border-color: #2afd4f;
    box-shadow: inset 0 0 0 2px #0a0a0a;
  }
  .flash-switch input:focus-visible + .flash-switch-box {
    outline: 1px solid #2afd4f;
    outline-offset: 2px;
  }
  .flash-switch-label { line-height: 1; }
  .ctl-stack { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .ctl-stack .ctl-label { font-size: 11px; opacity: 0.5; letter-spacing: 1px; text-align: left; width: 100%; }
  .ctl-stack select { width: 100%; min-width: 0; }
  /* 底部 2×2：左列与 Stop Camera 同宽，右列与 Take Photo 同宽，与顶栏对齐居中（Frame 48091624） */
  .cam-controls-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--cam-action-gap);
    row-gap: 12px;
    width: 100%;
    margin-left: 0;
    margin-right: 0;
    margin-bottom: 0;
    margin-top: 12px;
    padding-top: 0;
    align-items: start;
    flex-shrink: 0;
    box-sizing: border-box;
    justify-items: stretch;
    position: relative;
    z-index: 40;
  }
  .cam-controls-grid > .ctl-stack {
    width: 100%;
    min-width: 0;
    max-width: 100%;
    align-items: stretch;
  }
  /**
   * 与顶栏 Start/Stop 同高、全宽 = 双主按钮 + 间距（`--cam-actions-row-w`）。
   * 与最后一行下拉间距 = 2×下拉高度（`--cam-ctl-select-h`）。
   */
  #submitGalleryBtn.cam-submit-gallery-btn {
    width: 100%;
    max-width: 100%;
    min-height: 36px;
    height: 36px;
    margin-top: calc(2 * var(--cam-ctl-select-h));
    padding: 0 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    line-height: 1;
    background: transparent;
    border: 1px solid #00ff41;
    color: #00ff41;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  #submitGalleryBtn.cam-submit-gallery-btn:hover:not(:disabled) {
    background: rgba(0, 255, 65, 0.1);
  }
  #submitGalleryBtn.cam-submit-gallery-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  button { background: transparent; border: 1px solid #00ff41; color: #00ff41; font-family: monospace, ui-monospace, "Courier New", monospace; font-size: 11px; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: background 0.2s; }
  button:hover { background: rgba(0,255,65,0.1); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  #snapBtn { border-color: #ffd700; color: #ffd700; text-transform: none; letter-spacing: 1px; }
  #snapBtn:hover:not(:disabled) { background: rgba(255,215,0,0.1); }
  /* 保存中：保持 disabled；与 SAVED 同色便于状态一致 */
  #snapBtn.snap-saving:disabled { opacity: 0.85; cursor: not-allowed; color: #ffd700; border-color: #ffd700; }
  select {
    background: #111;
    border: 1px solid rgba(0,255,65,0.3);
    color: #00ff41;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
    min-height: var(--cam-ctl-select-h);
    box-sizing: border-box;
  }
  /** 仅取景框外闪白；叠在壳内多数内容下、`#ascii-viewer-stack` 下 */
  #flash-outside-root {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }
  .flash-strip {
    position: fixed;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s ease-out;
  }
  #flash-outside-root.on .flash-strip { opacity: 1; }
  #ascii-viewer-stack {
    position: relative;
    z-index: 60;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  /** 与主列同宽，避免在加宽的外层取景器里显得过宽 */
  #ascii-viewer-stack #saved-msg {
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
  }
  #status { font-size: 11px; letter-spacing: 2px; opacity: 0.5; min-height: 22px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; pointer-events: none; text-align: center; color: inherit; }
  #status.live { color: #00ff41; opacity: 1; }
  .status-live-suffix { display: none; align-items: center; flex-shrink: 0; }
  #status.live .status-live-suffix { display: inline-flex; }
  #status .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff41; box-shadow: 0 0 8px rgba(0,255,65,0.85); flex-shrink: 0; }
  /**
   * 外层取景器：固定总高，OFF/ON 一致；内层仅缩放，不撑高外壳。
   * 高度 = 上下 padding + overlay 带 + 活动槽总高（画幅 + 进度条带，同列内）。
   */
  #ascii-wrap {
    width: 100%;
    max-width: none;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    background: #000;
    border: 1px solid rgba(0,255,65,0.2);
    border-radius: 4px;
    padding: var(--ascii-vf-wrap-pad-y);
    box-sizing: border-box;
    height: calc(
      (2 * var(--ascii-vf-wrap-pad-y))
      + var(--ascii-vf-overlay-top)
      + var(--ascii-vf-overlay-row-h)
      + var(--ascii-vf-overlay-bottom-gap)
      + var(--ascii-vf-active-slot-total-h)
    );
    min-height: 0;
    margin-bottom: 4px;
    position: relative;
    overflow: hidden;
  }
  /**
   * Overlay：位于 `.ascii-active-column` 内，宽随活动列；Flash 与活动画幅右缘对齐。
   */
  .ascii-viewfinder-overlay {
    flex: 0 0 auto;
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: var(--ascii-vf-overlay-top);
    margin-bottom: var(--ascii-vf-overlay-bottom-gap);
    pointer-events: none;
  }
  .ascii-viewfinder-overlay * {
    pointer-events: auto;
  }
  .ascii-overlay-inner {
    width: 100%;
    min-height: var(--ascii-vf-overlay-row-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    box-sizing: border-box;
  }
  .ascii-overlay-side {
    min-width: 0;
  }
  .ascii-overlay-tabs {
    grid-column: 2;
    justify-self: center;
    max-width: 100%;
  }
  .ascii-overlay-flash {
    grid-column: 3;
    justify-self: end;
    min-width: 0;
  }
  /** Photo / Video：分段控件（共用外框、段间无空隙） */
  .cam-mode-tabs-wrap {
    display: inline-block;
    max-width: 100%;
  }
  .cam-mode-tabs {
    display: inline-flex;
    align-items: stretch;
    border: 1px solid rgba(42, 253, 79, 0.5);
    border-radius: 0;
    overflow: hidden;
    background: transparent;
    vertical-align: top;
    height: var(--cam-ctl-select-h);
    box-sizing: border-box;
  }
  .cam-mode-tab {
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 10px;
    height: 100%;
    min-height: 0;
    box-sizing: border-box;
    margin: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-right: 1px solid rgba(42, 253, 79, 0.5);
    border-radius: 0;
    background: transparent;
    color: rgba(42, 253, 79, 0.5);
    cursor: pointer;
    flex: 0 0 auto;
  }
  .cam-mode-tab:last-child {
    border-right: none;
  }
  .cam-mode-tab:hover:not(:disabled) {
    color: #2afd4f;
  }
  .cam-mode-tab.active {
    background: rgba(42, 253, 79, 0.5);
    color: #2afd4f;
    border-right-color: rgba(42, 253, 79, 0.5);
    box-shadow: none;
  }
  .cam-mode-tab.active:last-child {
    border-right: none;
  }
  .cam-mode-tab:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  /**
   * 取景器内容区：占满 `#ascii-wrap` 扣除 padding 后的高度。
   */
  .ascii-frame-body {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
  }
  /**
   * 活动列：默认与主按钮/底控件同宽；16:9、4:3 时加宽（仍留边距）。
   */
  .ascii-active-column {
    width: min(100%, var(--cam-actions-row-w));
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    flex: 1 1 auto;
    min-height: 0;
    box-sizing: border-box;
  }
  .ascii-active-column--wide {
    width: calc(100% - 2 * var(--ascii-vf-side-inset));
    max-width: 100%;
  }
  /**
   * 活动槽：含画幅 + 其下 10px + 6px 进度条；外层取景器总高不变。
   */
  .ascii-active-slot {
    width: 100%;
    height: var(--ascii-vf-active-slot-total-h);
    flex: 0 0 var(--ascii-vf-active-slot-total-h);
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    min-height: 0;
  }
  /**
   * 开屏 code-rain：仅 `.ascii-active-frame` 内（`overflow:hidden` 裁剪）；Start Camera 后淡出。
   * 与隐藏采样 canvas 区分：`video, canvas:not(.ascii-request-rain-canvas)`。
   */
  .ascii-request-rain-canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    z-index: 4;
    pointer-events: none;
    display: none;
    opacity: 0;
    transition: opacity 0.65s ease-out;
  }
  .ascii-request-rain-canvas.ascii-request-rain-canvas--mounted {
    display: block;
  }
  .ascii-request-rain-canvas.ascii-request-rain-canvas--visible {
    opacity: 1;
  }
  .ascii-slot-inner {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    height: 100%;
    min-height: 0;
  }
  /** Video 锁定的分辨率/比例行（底部网格内整行横跨） */
  .cam-mode-lock-strip {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--cam-action-gap);
    row-gap: 12px;
  }
  .ascii-inner {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  /** 画幅与进度条同宽、进度条距画幅底 10px，随画幅在槽内居中 */
  .ascii-frame-progress-stack {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    max-width: 100%;
    flex: 0 1 auto;
    min-height: 0;
  }
  /**
   * 活动画幅：宽 100% 贴齐 `.ascii-active-column`，高度随所选画面比例；分辨率只改密度。
   */
  .ascii-active-frame {
    width: 100%;
    max-width: 100%;
    position: relative;
    overflow: hidden;
    display: block;
    box-sizing: border-box;
  }
  /** 固定字格渲染后整体 `scale` 入画幅，不改变 `#ascii-out` 字号（保证采样与 `getAsciiCellMetrics` 一致） */
  .ascii-out-scale-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    z-index: 1;
  }
  .ascii-frame-progress-stack .video-progress-root {
    flex: 0 0 6px;
    width: 100%;
    margin-top: 10px;
    padding-top: 0;
    height: 6px;
    box-sizing: border-box;
  }
  /** 不占布局的隐藏会顶动底栏；用 visibility 保留占位 */
  .video-progress-root.video-progress-root--inactive .video-progress-track {
    visibility: hidden;
    pointer-events: none;
  }
  /** 全宽轨道；实心条从左对齐、宽度 100%→0% 表示从右向左缩短；颜色由 JS 绑 `colorPicker` */
  .video-progress-track {
    position: relative;
    width: 100%;
    height: 6px;
    background: transparent;
    border-radius: 0;
  }
  .video-progress-bar {
    height: 100%;
    width: 100%;
    background: transparent;
    pointer-events: none;
  }
  /* 等宽字宽≠行高：行高与字号一致便于测量为「准方格」比例 */
  #ascii-out { font-family: monospace, ui-monospace, "Courier New", monospace; font-size: 6px; line-height: 6px; letter-spacing: 0; white-space: pre; display: inline-block; }
  /**
   * Camera OFF：提示文案相对 `#ascii-wrap` 整框垂直水平居中（非活动槽 / 非画幅）。
   * `pointer-events: none` 不挡 Photo/Video、Flash 点击。
   */
  .ascii-off-helper {
    display: none;
  }
  #ascii-wrap.ascii-wrap--offline .ascii-off-helper {
    display: flex;
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    bottom: 0;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding-left: 10px;
    padding-right: 10px;
    pointer-events: none;
    z-index: 25;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    line-height: 1.45;
    letter-spacing: 1px;
    color: inherit;
    opacity: 0.5;
    text-align: center;
    white-space: normal;
    overflow-wrap: break-word;
  }
  /** 已点 Start Camera、等待权限/流就绪：立即隐藏 helper，雨效仍显示至摄像头就绪后再淡出 */
  #ascii-wrap.ascii-wrap--offline.ascii-wrap--startup-hide-helper .ascii-off-helper {
    display: none !important;
  }
  /** 文案仍写入 `#ascii-out` 供逻辑一致；可视由 `.ascii-off-helper` 承担，此处移出视口不占槽内居中 */
  #ascii-wrap.ascii-wrap--offline .ascii-out-scale-wrap {
    position: absolute;
    left: -9999px;
    top: 0;
    width: 1px;
    height: 1px;
    margin: 0;
    overflow: hidden;
    clip-path: inset(50%);
    transform: none;
  }
  #ascii-wrap.ascii-wrap--offline .ascii-active-frame {
    position: relative;
    width: 100%;
    height: auto;
    min-height: 0;
    flex: 0 0 auto;
    aspect-ratio: unset;
  }
  #ascii-wrap.ascii-wrap--offline #ascii-out {
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 0;
    white-space: pre;
  }
  /** 与实时取景 `#ascii-out` 同字格比例，专供 `getAsciiCellMetrics`，避免 OFF 态大字号撑歪最小高度 */
  .ascii-cell-probe {
    position: absolute;
    left: -9999px;
    top: 0;
    margin: 0;
    padding: 0;
    border: 0;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 0;
    white-space: pre;
    pointer-events: none;
    visibility: hidden;
  }
  #saved-msg { margin: 4px 0 0; font-size: 12px; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; color: #ffd700; min-height: 20px; text-align: center; width: 100%; }
  #saved-msg.show { opacity: 1; }
  video, canvas:not(.ascii-request-rain-canvas) { display: none; }
  /* Notion 等 iframe 嵌入时提示：摄像头需在独立标签页使用 */
  .iframe-hint {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: var(--cam-actions-row-w);
    margin: -8px auto 14px;
    padding: 10px 12px;
    border: 1px solid rgba(255, 215, 0, 0.45);
    color: #ffd700;
    font-size: 11px;
    letter-spacing: 1px;
    line-height: 1.45;
    text-align: center;
    box-sizing: border-box;
  }
  .iframe-hint[hidden] { display: none !important; }
  .iframe-hint-link {
    color: #00ff41;
    border: 1px solid rgba(0, 255, 65, 0.5);
    padding: 4px 12px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 10px;
    font-family: monospace, ui-monospace, "Courier New", monospace;
  }
  .iframe-hint-link:hover { background: rgba(0, 255, 65, 0.1); }
</style>
</head>
<body>
<div id="camera-shell">
<h1><span class="cam-title-prefix">[◉”]</span> <span class="cam-title-name">ASCII CAMERA</span></h1>
<div id="iframe-hint" class="iframe-hint" hidden role="note">
  <span class="iframe-hint-text">Embedded preview blocks camera — use a full browser tab.</span>
  <a id="iframe-open-tab" class="iframe-hint-link" href="#">Open in new tab</a>
</div>
<div class="camera-content">
<div class="cam-actions">
  <button id="startBtn" type="button">Start Camera</button>
  <button id="snapBtn" type="button" disabled>📷 Take Photo</button>
</div>
<div class="cam-status-below-actions">
  <div id="status">
    <span class="status-text">CAMERA OFF</span>
    <span class="status-live-suffix" aria-hidden="true">
      <span class="status-dot"></span>
    </span>
  </div>
</div>
</div>
<div class="viewfinder-shell">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="flash-outside-root" aria-hidden="true">
  <div id="flash-strip-top" class="flash-strip"></div>
  <div id="flash-strip-left" class="flash-strip"></div>
  <div id="flash-strip-right" class="flash-strip"></div>
  <div id="flash-strip-bottom" class="flash-strip"></div>
</div>
<div id="ascii-viewer-stack">
<div id="ascii-wrap" class="ascii-wrap--offline">
  <pre id="ascii-cell-probe" class="ascii-cell-probe" aria-hidden="true">0</pre>
  <div class="ascii-frame-body">
    <div class="ascii-active-column" id="asciiActiveColumn">
      <div class="ascii-viewfinder-overlay" aria-hidden="false">
        <div class="ascii-overlay-inner">
          <div class="ascii-overlay-side" aria-hidden="true"></div>
          <div class="ascii-overlay-tabs">
            <div class="cam-mode-tabs-wrap" id="camModeTabsWrap">
              <div class="cam-mode-tabs" role="tablist" aria-label="Capture mode">
                <button type="button" class="cam-mode-tab active" role="tab" id="camTabPhoto" aria-selected="true">Photo</button>
                <button type="button" class="cam-mode-tab" role="tab" id="camTabVideo" aria-selected="false">Video</button>
              </div>
            </div>
          </div>
          <div class="ascii-overlay-flash">
            <label class="flash-switch">
              <input type="checkbox" id="flashToggle" />
              <span class="flash-switch-box" aria-hidden="true"></span>
              <span class="flash-switch-label">Flash</span>
            </label>
          </div>
        </div>
      </div>
      <div class="ascii-active-slot">
        <div class="ascii-slot-inner">
          <div class="ascii-inner">
            <div class="ascii-frame-progress-stack">
              <div class="ascii-active-frame" id="asciiActiveFrame">
                <div class="ascii-out-scale-wrap" id="asciiOutScaleWrap">
                  <pre id="ascii-out" aria-hidden="true">Click &quot;START CAMERA&quot; to begin</pre>
                </div>
                <canvas id="requestRainCanvas" class="ascii-request-rain-canvas" width="1" height="1" aria-hidden="true"></canvas>
              </div>
              <div id="video-progress-root" class="video-progress-root video-progress-root--inactive" aria-hidden="true">
                <div class="video-progress-track">
                  <div id="video-progress-bar" class="video-progress-bar"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="asciiOffHelper" class="ascii-off-helper" role="note" aria-live="polite">Click &quot;START CAMERA&quot; to begin</div>
</div>
<div id="saved-msg" aria-live="polite"></div>
</div>
</div>
<div class="camera-content">
<div class="cam-controls-grid">
  <label class="ctl-stack cc-left">
    <span class="ctl-label">Style</span>
    <select id="densityPicker">
      <option value="detailed">Detailed</option>
      <option value="simple">Simple</option>
      <option value="blocks">Blocks</option>
      <option value="binary">Binary</option>
    </select>
  </label>
  <label class="ctl-stack cc-left">
    <span class="ctl-label">Color</span>
    <select id="colorPicker">
      <option value="#00ff41">Green</option>
      <option value="#ffffff">White</option>
      <option value="#ffd700">Amber</option>
      <option value="#00cfff">Cyan</option>
      <option value="#ff6b6b">Red</option>
      <option value="#cc99ff">Purple</option>
    </select>
  </label>
  <div class="cam-mode-lock-strip" id="camModeLockStrip">
  <label class="ctl-stack cc-left" id="resPickerStack">
    <span class="ctl-label">Resolution</span>
    <select id="resPicker">
      <option value="32">32 (Mini)</option>
      <option value="60">60 (Video)</option>
      <option value="80">80 (Low)</option>
      <option value="100" selected>100 (Medium)</option>
      <option value="120">120 (High)</option>
    </select>
  </label>
  <label class="ctl-stack cc-left" id="aspectPickerStack">
    <span class="ctl-label">Aspect</span>
    <select id="aspectPicker">
      <option value="1:1" selected>1:1</option>
      <option value="16:9">16:9</option>
      <option value="4:3">4:3</option>
      <option value="3:4">3:4 (Portrait)</option>
    </select>
  </label>
  </div>
</div>
<button type="button" id="submitGalleryBtn" class="cam-submit-gallery-btn" disabled aria-label="Submit to gallery">Submit to Gallery</button>
</div>
</div>

<script>
(function () {
  var src =
    typeof location !== 'undefined' && location.protocol === 'file:'
      ? 'config.local.js'
      : '/config.local.js';
  document.write('<script src="' + src + '"><\/script>');
})();
</script>
<script src="gallery-storage.js"></script>
<script src="gallery-cloud-sync.js"></script>
<script>
/** 由 `gallery-storage.js` 挂载 */
var AsciiCameraGalleryStorage = window.AsciiCameraGalleryStorage;

/** 测量失败时的字宽/行高比回退值 */
const CELL_ASPECT_FALLBACK = 0.55;
/** 分辨率列数上限（仅影响采样密度，不改变 `.camera-content` 定宽画幅）。 */
const MAX_RES_COLS = 120;
/** @type {{ cellAspect: number, lineHeightPx: number } | null} */
let asciiCellMetricsCache = null;
/** 使用块符与点阵，减轻笔画字符宽高差带来的形变 */
const CHAR_SETS = {
  detailed: '\u2588\u2593\u2592\u2591\u00B7 ',
  simple:   '\u2588\u2592\u00B7 ',
  blocks:   '\u2588\u2593\u2592\u2591 ',
  binary:   '\u2588\u2591 '
};
let stream = null, animId = null;
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d', { willReadFrequently: true });
const out      = document.getElementById('ascii-out');
const asciiOffHelper = document.getElementById('asciiOffHelper');
const asciiCellProbe = document.getElementById('ascii-cell-probe');
const asciiWrap = document.getElementById('ascii-wrap');
const startBtn = document.getElementById('startBtn');
const snapBtn  = document.getElementById('snapBtn');
const submitGalleryBtn = document.getElementById('submitGalleryBtn');
const statusEl = document.getElementById('status');
const savedMsg = document.getElementById('saved-msg');
const colorPicker    = document.getElementById('colorPicker');
const densityPicker  = document.getElementById('densityPicker');
const resPicker      = document.getElementById('resPicker');
const aspectPicker   = document.getElementById('aspectPicker');
const flashOutsideRoot = document.getElementById('flash-outside-root');
const flashStripTop = document.getElementById('flash-strip-top');
const flashStripLeft = document.getElementById('flash-strip-left');
const flashStripRight = document.getElementById('flash-strip-right');
const flashStripBottom = document.getElementById('flash-strip-bottom');
const flashToggle    = document.getElementById('flashToggle');
const cameraShell    = document.getElementById('camera-shell');
const camTabPhoto    = document.getElementById('camTabPhoto');
const camTabVideo    = document.getElementById('camTabVideo');
const videoProgressRoot = document.getElementById('video-progress-root');
const videoProgressBar = document.getElementById('video-progress-bar');
const resPickerStack = document.getElementById('resPickerStack');
const aspectPickerStack = document.getElementById('aspectPickerStack');
const asciiActiveFrame = document.getElementById('asciiActiveFrame');
const asciiActiveColumn = document.getElementById('asciiActiveColumn');
const asciiOutScaleWrap = document.getElementById('asciiOutScaleWrap');
const requestRainCanvas = document.getElementById('requestRainCanvas');
/** @type {CanvasRenderingContext2D | null} */
const requestRainCtx = requestRainCanvas ? requestRainCanvas.getContext('2d') : null;
const iframeHint     = document.getElementById('iframe-hint');
const iframeOpenTab  = document.getElementById('iframe-open-tab');

/** 拍照按钮就绪文案（与 HTML 初始一致） */
const SNAP_LABEL_READY = '📷 Take Photo';
/** Video 模式就绪文案 */
const SNAP_LABEL_VIDEO = '🎥 Record';
/** 写入存储过程中按钮文案 */
const SNAP_LABEL_SAVING = 'Saving...';
/** 预览态主按钮：重拍 */
const SNAP_LABEL_RETAKE_PHOTO = '📷 Retake';
const SNAP_LABEL_RETAKE_VIDEO = '🎥 Retake';
/** 动画录制：列数、帧率、时长与 Supabase 约定一致 */
const VIDEO_COLS = 60;
const VIDEO_FRAME_COUNT = 12;
const VIDEO_FPS = 6;
const VIDEO_DURATION_MS = 2000;
/** Video：冻结帧上展示黄色「SAVED」的最短时长（ms） */
const VIDEO_POST_RECORD_FREEZE_MS = 1000;

/** @type {boolean} */
let videoMode = false;
/** Photo 模式下切到 Video 前记住的分辨率 / 比例 */
let savedPhotoResValue = '';
let savedPhotoAspectValue = '';

/** @type {boolean} 已拍未提交：预览态（本地循环 / 静帧，不上传） */
let previewCaptureActive = false;
/**
 * @type {string | { isPhotoPreview: true, ascii: string, luma: Float32Array, cols: number, rows: number } | { isAnimated: true, ascii: string, frames: string[], frameLumas?: Float32Array[], previewCols?: number, previewRows?: number, frameCount?: number, fps?: number, durationMs?: number } | null}
 */
let pendingGalleryPayload = null;
/** @type {ReturnType<typeof setInterval> | null} 预览态 GIF 本地循环 */
let previewAnimTimer = null;

/**
 * 停止预览动画循环。
 * @returns {void}
 */
function clearPreviewAnimLoop() {
  if (previewAnimTimer != null) {
    clearInterval(previewAnimTimer);
    previewAnimTimer = null;
  }
}

/**
 * 预览态：本地循环播放已录制的 ASCII 帧。
 * @param {string[]} frames
 * @returns {void}
 */
function startPreviewAnimLoop(frames) {
  clearPreviewAnimLoop();
  if (!frames || !frames.length) return;
  var idx = 0;
  out.textContent = frames[0];
  previewAnimTimer = setInterval(function () {
    idx = (idx + 1) % frames.length;
    out.textContent = frames[idx];
  }, Math.round(1000 / VIDEO_FPS));
}

/**
 * 进入预览：展示静帧或循环帧；不调用云端。
 * @param {string | { isPhotoPreview?: true, ascii?: string, luma?: Float32Array, cols?: number, rows?: number } | { isAnimated: true, ascii: string, frames: string[], frameLumas?: Float32Array[], previewCols?: number, previewRows?: number, frameCount?: number, fps?: number, durationMs?: number }} payload
 * @returns {void}
 */
function enterPreviewState(payload) {
  previewCaptureActive = true;
  pendingGalleryPayload = payload;
  if (cameraShell) cameraShell.classList.add('cam-preview-capture');
  clearPreviewAnimLoop();
  if (animId != null) {
    cancelAnimationFrame(animId);
    animId = null;
  }
  out.removeAttribute('aria-hidden');
  if (typeof payload === 'string') {
    out.textContent = payload;
  } else if (payload && payload.isPhotoPreview === true) {
    out.textContent = payload.ascii || '';
  } else if (payload && payload.isAnimated && payload.frames && payload.frames.length) {
    out.textContent = payload.frames[0] || '';
    startPreviewAnimLoop(payload.frames);
  }
  out.style.color = colorPicker.value;
  if (asciiWrap && stream) asciiWrap.classList.remove('ascii-wrap--offline');
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
  if (submitGalleryBtn) submitGalleryBtn.disabled = false;
  snapBtn.textContent = videoMode ? SNAP_LABEL_RETAKE_VIDEO : SNAP_LABEL_RETAKE_PHOTO;
  snapBtn.disabled = false;
  syncVideoProgressBarForMode();
  applyCaptureModeUi();
  requestAnimationFrame(function () {
    requestAnimationFrame(syncAsciiLayout);
  });
}

/**
 * 重拍：丢弃预览，恢复实时取景。
 * @returns {void}
 */
function retakeFromPreview() {
  clearPreviewAnimLoop();
  previewCaptureActive = false;
  pendingGalleryPayload = null;
  if (cameraShell) cameraShell.classList.remove('cam-preview-capture');
  if (submitGalleryBtn) submitGalleryBtn.disabled = true;
  if (camTabPhoto) camTabPhoto.disabled = false;
  if (camTabVideo) camTabVideo.disabled = false;
  invalidateAsciiCellMetrics();
  restartLiveAsciiPreview();
  snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
  snapBtn.disabled = !stream;
  applyCaptureModeUi();
}

/**
 * 提交成功后退出预览并恢复实时取景。
 * @returns {void}
 */
function exitPreviewAfterSuccessfulSubmit() {
  clearPreviewAnimLoop();
  previewCaptureActive = false;
  pendingGalleryPayload = null;
  if (cameraShell) cameraShell.classList.remove('cam-preview-capture');
  if (submitGalleryBtn) submitGalleryBtn.disabled = true;
  if (camTabPhoto) camTabPhoto.disabled = false;
  if (camTabVideo) camTabVideo.disabled = false;
  invalidateAsciiCellMetrics();
  restartLiveAsciiPreview();
  snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
  snapBtn.disabled = !stream;
  applyCaptureModeUi();
}

/**
 * 按 `#ascii-wrap` 在视口中的矩形，布置四块闪白条带（不覆盖取景内容）。
 * @returns {void}
 */
function layoutFlashOutsideStrips() {
  if (!flashStripTop || !asciiWrap) return;
  var r = asciiWrap.getBoundingClientRect();
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var topH = Math.max(0, r.top);
  var leftW = Math.max(0, r.left);
  var rightW = Math.max(0, vw - r.right);
  var bottomH = Math.max(0, vh - r.bottom);
  flashStripTop.style.left = '0px';
  flashStripTop.style.top = '0px';
  flashStripTop.style.width = vw + 'px';
  flashStripTop.style.height = topH + 'px';
  flashStripLeft.style.left = '0px';
  flashStripLeft.style.top = r.top + 'px';
  flashStripLeft.style.width = leftW + 'px';
  flashStripLeft.style.height = Math.max(0, r.height) + 'px';
  flashStripRight.style.left = r.right + 'px';
  flashStripRight.style.top = r.top + 'px';
  flashStripRight.style.width = rightW + 'px';
  flashStripRight.style.height = Math.max(0, r.height) + 'px';
  flashStripBottom.style.left = '0px';
  flashStripBottom.style.top = r.bottom + 'px';
  flashStripBottom.style.width = vw + 'px';
  flashStripBottom.style.height = bottomH + 'px';
}

/**
 * 同步 Photo / Video 标签高亮状态。
 * @returns {void}
 */
function updateModeTabsUi() {
  if (camTabPhoto && camTabVideo) {
    camTabPhoto.classList.toggle('active', !videoMode);
    camTabPhoto.setAttribute('aria-selected', videoMode ? 'false' : 'true');
    camTabVideo.classList.toggle('active', videoMode);
    camTabVideo.setAttribute('aria-selected', videoMode ? 'true' : 'false');
  }
}

/**
 * Photo：隐藏 `60 (Video)`；Video：仅显示 60。须在写入 `resPicker.value` 之后调用。
 * @returns {void}
 */
function syncResPickerOptionsVisibility() {
  if (!resPicker) return;
  var opts = resPicker.querySelectorAll('option');
  var i;
  for (i = 0; i < opts.length; i++) {
    var o = opts[i];
    var v = o.value;
    if (videoMode) {
      o.hidden = v !== '60';
    } else {
      o.hidden = v === '60';
    }
  }
  if (!videoMode && resPicker.value === '60') {
    var fb = '100';
    if (
      savedPhotoResValue &&
      savedPhotoResValue !== '60' &&
      resPicker.querySelector('option[value="' + savedPhotoResValue + '"]')
    ) {
      fb = savedPhotoResValue;
    }
    resPicker.value = fb;
  }
}

/**
 * 根据当前模式更新 Video 锁定的分辨率 / 比例与按钮文案。
 * @returns {void}
 */
function applyCaptureModeUi() {
  if (cameraShell) cameraShell.classList.toggle('cam-video-mode', videoMode);
  /**
   * 未开摄像头：Style 禁用；Photo 下 Aspect/Resolution 可调；Video 下与已开摄像头时一致（60 + 1:1 且锁定）。
   * 预览态：仅确认画面，不可改比例/分辨率。
   * 实时取景：Video 下锁定 Aspect / Resolution。
   */
  if (!stream) {
    if (densityPicker) densityPicker.disabled = true;
    if (colorPicker) colorPicker.disabled = false;
    if (videoMode) {
      if (resPicker) {
        resPicker.value = String(VIDEO_COLS);
        resPicker.disabled = true;
        resPicker.classList.add('select-strong-disabled');
      }
      if (aspectPicker) {
        aspectPicker.value = '1:1';
        aspectPicker.disabled = true;
        aspectPicker.classList.add('select-strong-disabled');
      }
      if (resPickerStack) resPickerStack.classList.add('select-locked');
      if (aspectPickerStack) aspectPickerStack.classList.add('select-locked');
    } else {
      if (aspectPicker) {
        aspectPicker.disabled = false;
        aspectPicker.classList.remove('select-strong-disabled');
      }
      if (resPicker) {
        resPicker.disabled = false;
        resPicker.classList.remove('select-strong-disabled');
      }
      if (resPickerStack) resPickerStack.classList.remove('select-locked');
      if (aspectPickerStack) aspectPickerStack.classList.remove('select-locked');
      if (
        savedPhotoResValue &&
        savedPhotoResValue !== '60' &&
        resPicker.querySelector('option[value="' + savedPhotoResValue + '"]')
      ) {
        resPicker.value = savedPhotoResValue;
      }
      if (savedPhotoAspectValue) aspectPicker.value = savedPhotoAspectValue;
    }
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
  } else if (previewCaptureActive) {
    if (densityPicker) densityPicker.disabled = false;
    if (colorPicker) colorPicker.disabled = false;
    aspectPicker.disabled = true;
    resPicker.disabled = true;
    aspectPicker.classList.add('select-strong-disabled');
    resPicker.classList.add('select-strong-disabled');
    if (resPickerStack) resPickerStack.classList.add('select-locked');
    if (aspectPickerStack) aspectPickerStack.classList.add('select-locked');
  } else {
    if (densityPicker) densityPicker.disabled = false;
    if (colorPicker) colorPicker.disabled = false;
    aspectPicker.disabled = videoMode;
    resPicker.disabled = videoMode;
    resPicker.classList.toggle('select-strong-disabled', videoMode);
    aspectPicker.classList.toggle('select-strong-disabled', videoMode);
    if (resPickerStack) resPickerStack.classList.toggle('select-locked', videoMode);
    if (aspectPickerStack) aspectPickerStack.classList.toggle('select-locked', videoMode);
    if (videoMode) {
      resPicker.value = String(VIDEO_COLS);
      aspectPicker.value = '1:1';
      snapBtn.textContent = SNAP_LABEL_VIDEO;
    } else {
      if (
        savedPhotoResValue &&
        savedPhotoResValue !== '60' &&
        resPicker.querySelector('option[value="' + savedPhotoResValue + '"]')
      ) {
        resPicker.value = savedPhotoResValue;
      }
      if (savedPhotoAspectValue) aspectPicker.value = savedPhotoAspectValue;
      snapBtn.textContent = SNAP_LABEL_READY;
    }
  }
  syncResPickerOptionsVisibility();
  updateModeTabsUi();
  syncVideoProgressBarForMode();
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
  if (!stream) syncIntroRequestRain();
  if (stream && animId == null && !previewCaptureActive) render();
}

/**
 * Video 且摄像头开时显示进度条；否则隐藏条但保留占位，避免顶动布局。
 * @returns {void}
 */
function syncVideoProgressBarForMode() {
  if (!videoProgressRoot || !videoProgressBar) return;
  /** 预览态不显示录制/倒计时进度条（含 Video 动图循环预览） */
  if (previewCaptureActive) {
    videoProgressRoot.classList.add('video-progress-root--inactive');
    videoProgressRoot.setAttribute('aria-hidden', 'true');
    videoProgressBar.style.width = '100%';
    return;
  }
  if (videoMode && stream) {
    videoProgressRoot.classList.remove('video-progress-root--inactive');
    videoProgressRoot.setAttribute('aria-hidden', 'false');
    videoProgressBar.style.width = '100%';
  } else {
    videoProgressRoot.classList.add('video-progress-root--inactive');
    videoProgressRoot.setAttribute('aria-hidden', 'true');
    videoProgressBar.style.width = '100%';
  }
}

/**
 * 视频进度条填充色与当前「Color」下拉及 `#ascii-out` 一致。
 * @returns {void}
 */
function syncVideoProgressBarColor() {
  if (!videoProgressBar || !colorPicker) return;
  videoProgressBar.style.backgroundColor = colorPicker.value;
}

/**
 * @param {boolean} nextVideo 是否进入 Video
 * @returns {void}
 */
function setCaptureVideoMode(nextVideo) {
  if (previewCaptureActive) return;
  if (nextVideo && !videoMode) {
    savedPhotoResValue = resPicker.value;
    savedPhotoAspectValue = aspectPicker.value;
  }
  videoMode = !!nextVideo;
  applyCaptureModeUi();
}

updateModeTabsUi();
syncVideoProgressBarForMode();
window.addEventListener('resize', function () {
  layoutFlashOutsideStrips();
});

/**
 * 是否在第三方 iframe 中（如 Notion embed）；跨域访问 `window.top` 会抛错，视为已嵌入。
 * @returns {boolean}
 */
function isEmbeddedInFrame() {
  try {
    return window.self !== window.top;
  } catch (e) {
    return true;
  }
}

/**
 * 在新标签页打开当前相机页，绕过嵌入页的摄像头限制（需在用户点击等手势中调用）。
 * @returns {Window | null}
 */
function openCameraInNewTab() {
  var name = AsciiCameraGalleryStorage.CAMERA_POPUP_WINDOW_NAME || 'ascii_camera_notion_embed';
  return window.open(window.location.href, name);
}

if (iframeHint && iframeOpenTab && isEmbeddedInFrame()) {

/** @type {boolean} */
let snapCountdownActive = false;

if (camTabPhoto) {

if (camTabVideo) {

/**
 * 测量 `#ascii-out` 实际单格宽高比（字宽÷行高），使采样列×行与屏幕像素块对齐；1:1 时画面呈正方形。
 * @returns {{ cellAspect: number, lineHeightPx: number }}
 */
function getAsciiCellMetrics() {
  if (asciiCellMetricsCache) return asciiCellMetricsCache;
  const probeEl = asciiCellProbe && asciiCellProbe.isConnected ? asciiCellProbe : out;
  const m = measureMonospaceCellFromElement(probeEl);
  asciiCellMetricsCache = m;
  return m;
}

/**
 * @param {HTMLElement} el 与 ASCII 输出使用相同样式的元素（如 `#ascii-out`）
 * @returns {{ cellAspect: number, lineHeightPx: number }}
 */
function measureMonospaceCellFromElement(el) {
  const cs = getComputedStyle(el);
  const fontSize = parseFloat(cs.fontSize) || 6;
  let lineHeightPx = parseFloat(cs.lineHeight);
  if (!Number.isFinite(lineHeightPx) || cs.lineHeight === 'normal' || String(cs.lineHeight).endsWith('%')) {
    lineHeightPx = fontSize;
  }
  const fontShorthand = cs.font && cs.font.length > 2 ? cs.font : [cs.fontStyle, cs.fontWeight, cs.fontSize, cs.fontFamily].filter(Boolean).join(' ');
  let charW = 0;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  if (ctx) {
    ctx.font = fontShorthand;
    charW = ctx.measureText('0').width;
  }
  if (!charW || charW <= 0) {
    const probe = document.createElement('span');
    probe.setAttribute('style', [
      'position:absolute', 'left:-9999px', 'visibility:hidden', 'white-space:pre',
      'font:' + fontShorthand, 'font-family:' + cs.fontFamily, 'font-size:' + cs.fontSize,
      'font-weight:' + cs.fontWeight, 'line-height:' + cs.lineHeight, 'letter-spacing:' + cs.letterSpacing
    ].join(';'));
    probe.textContent = '0';
    document.body.appendChild(probe);
    charW = probe.offsetWidth;
    document.body.removeChild(probe);
  }
  const cellAspect = charW > 0 && lineHeightPx > 0 ? charW / lineHeightPx : CELL_ASPECT_FALLBACK;
  return { cellAspect, lineHeightPx };
}

function invalidateAsciiCellMetrics() {
  asciiCellMetricsCache = null;
}

/** @type {number} */
let asciiScaleRaf = 0;

/**
 * 按当前 Photo/Video 与 Aspect 设置活动画幅的 `aspect-ratio`（宽恒为内容列 100%，高随比例）。
 * @returns {void}
 */
function syncAsciiActiveFrameAspect() {
  if (!asciiActiveFrame || !asciiWrap) return;
  /** 含 Camera OFF：开屏雨与 live 共用同一活动画幅比例 */
  var ar = videoMode ? 1 : getAspectRatio();
  asciiActiveFrame.style.aspectRatio = ar + ' / 1';
}

/**
 * 在固定字格下测量 `#ascii-out` 占位，整体 `scale` 以填入 `.ascii-active-frame`（contain，居中）。
 * Camera OFF（`.ascii-wrap--offline`）时清除内联 `left` / `top` / `transform`；可视提示由 `#ascii-wrap` 上的 `.ascii-off-helper` 负责。
 * @returns {void}
 */
function updateAsciiOutScale() {
  if (!asciiOutScaleWrap || !out || !asciiActiveFrame || !asciiWrap) return;
  if (asciiWrap.classList.contains('ascii-wrap--offline')) {
    asciiOutScaleWrap.style.transform = '';
    asciiOutScaleWrap.style.left = '';
    asciiOutScaleWrap.style.top = '';
    return;
  }
  var cw = asciiActiveFrame.clientWidth;
  var ch = asciiActiveFrame.clientHeight;
  if (cw < 2 || ch < 2) return;
  asciiOutScaleWrap.style.transform = 'translate(-50%, -50%)';
  void out.offsetWidth;
  var wi = out.offsetWidth;
  var hi = out.offsetHeight;
  if (wi < 1 || hi < 1) return;
  var s = Math.min(cw / wi, ch / hi);
  asciiOutScaleWrap.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
}

/**
 * 合并宽高比与缩放更新，下一帧执行缩放以避免与刚写入的 DOM 不同步。
 * @returns {void}
 */
function scheduleAsciiScale() {
  if (asciiScaleRaf) cancelAnimationFrame(asciiScaleRaf);
  asciiScaleRaf = requestAnimationFrame(function () {
    asciiScaleRaf = 0;
    updateAsciiOutScale();
  });
}

/**
 * 16:9 / 4:3 时加宽活动列；1:1、3:4、Video 保持与主按钮列同宽。
 * @returns {void}
 */
function syncAsciiActiveColumnWidthClass() {
  if (!asciiActiveColumn || !aspectPicker) return;
  var ap = aspectPicker.value;
  var wide = !videoMode && (ap === '16:9' || ap === '4:3');
  asciiActiveColumn.classList.toggle('ascii-active-column--wide', wide);
}

/**
 * 取景器内活动区布局同步：列宽、比例、缩放。
 * @returns {void}
 */
function syncAsciiLayout() {
  syncAsciiActiveColumnWidthClass();
  syncAsciiActiveFrameAspect();
  scheduleAsciiScale();
}

/**
 * @returns {number} 当前选取的列数，限制在 1 … MAX_RES_COLS（Video 模式固定 60）
 */
function getCols() {
  if (videoMode) return VIDEO_COLS;
  const n = parseInt(resPicker.value, 10);
  if (!Number.isFinite(n)) return 100;
  return Math.min(MAX_RES_COLS, Math.max(1, n));
}

colorPicker.addEventListener('change', function () {

resPicker.addEventListener('change', function () {

window.addEventListener('resize', function () {

if (document.fonts && document.fonts.ready) {

}
if (typeof ResizeObserver !== 'undefined') {

}

/**
 * @param {number} ms
 * @returns {Promise<void>}
 */
function sleep(ms) {
  return new Promise(function (resolve) { setTimeout(resolve, ms); });
}

function getChars() {
  return CHAR_SETS[densityPicker.value] || CHAR_SETS.detailed;
}

/** @type {number | null} */
let requestRainRaf = null;
/** 与 `stopRequestRainEffectFade` 的 transition 回调代数对齐，避免 abort 后误卸画布 */
let requestRainFadeGen = 0;
/**
 * @typedef {{ x: number, headY: number, speed: number, trailLen: number, glyphs: string[], alphaMul: number }} RequestRainColumn
 */
/** @type {RequestRainColumn[]} */
let requestRainColumns = [];
/** @type {number} */
let requestRainCssW = 0;
/** @type {number} */
let requestRainCssH = 0;
/** @type {number} */
let requestRainLineHeight = 11;
/** @type {string} */
let requestRainFontSpec = '';
/** 尾迹长度随机区间（随 intro 分辨率档更新，强化颗粒感差异） */
let requestRainTrailMin = 18;
/** @type {number} */
let requestRainTrailSpan = 15;

/** 离散档 intro 雨基准字号（px，再乘画幅系数） */
const INTRO_RAIN_FONT_BASE = {
  32: 20.5,
  60: 15.8,
  80: 12.8,
  100: 10.2,
  120: 8.4
};
/** 列距乘子：低分辨率更疏、高分辨率更密 */
const INTRO_RAIN_SPACING_MUL = {
  32: 1.52,
  60: 1.26,
  80: 1.12,
  100: 1.0,
  120: 0.88
};
/** 行高 = fontPx × mul，低分辨率略松、高分辨率略紧 */
const INTRO_RAIN_LH_MUL = {
  32: 1.36,
  60: 1.3,
  80: 1.25,
  100: 1.2,
  120: 1.15
};

/**
 * 字母（仅 ASCIICAMERA）+ 数字 + 符号 + 全项目 `CHAR_SETS` 块符并集。
 * @returns {string}
 */
function buildMatrixIntroCharPool() {
  var letterSet = new Set('ASCIICAMERA'.split(''));
  var letters = Array.from(letterSet).join('');
  var digits = '0123456789';
  var syms = '+-/:._\\';
  var blockSeen = new Set();
  var block = '';
  Object.keys(CHAR_SETS).forEach(function (key) {
    var str = CHAR_SETS[key];
    for (var i = 0; i < str.length; i++) {
      var ch = str[i];
      if (ch === '\n' || ch === '\r') continue;
      if (!blockSeen.has(ch)) {
        blockSeen.add(ch);
        block += ch;
      }
    }
  });
  return letters + digits + syms + block;
}

/** @type {string | null} */
let matrixIntroPoolCache = null;

/**
 * Matrix 开屏雨字符池（缓存；`CHAR_SETS` 为常量）。
 * @returns {string}
 */
function getMatrixIntroCharPool() {
  if (matrixIntroPoolCache == null) {
    matrixIntroPoolCache = buildMatrixIntroCharPool();
  }
  return matrixIntroPoolCache;
}

/**
 * @param {string} pool
 * @returns {string}
 */
function pickMatrixIntroChar(pool) {
  if (!pool || pool.length < 1) return '\u00B7';
  return pool.charAt(Math.floor(Math.random() * pool.length));
}

/**
 * @param {number} x
 * @param {number} h
 * @param {number} lh
 * @param {string} pool
 * @param {number} alphaMul
 * @returns {RequestRainColumn}
 */
function createRequestRainColumn(x, h, lh, pool, alphaMul) {
  var trailLen =
    requestRainTrailMin + Math.floor(Math.random() * (requestRainTrailSpan + 1));
  var glyphs = [];
  for (var i = 0; i < trailLen; i++) {
    glyphs.push(pickMatrixIntroChar(pool));
  }
  return {
    x: x,
    headY: Math.random() * (h + trailLen * lh) - trailLen * lh,
    speed: 2.2 + Math.random() * 4.2,
    trailLen: trailLen,
    glyphs: glyphs,
    alphaMul: alphaMul
  };
}

/**
 * @param {RequestRainColumn} col
 * @param {number} h
 * @param {number} lh
 * @param {string} pool
 * @returns {void}
 */
function stepRequestRainColumn(col, h, lh, pool) {
  col.headY += col.speed;
  var resetAt = h + col.trailLen * lh + 30;
  if (col.headY > resetAt) {
    col.headY = -Math.random() * h * 0.9 - col.trailLen * lh;
    col.speed = 2.2 + Math.random() * 4.2;
    col.trailLen =
      requestRainTrailMin + Math.floor(Math.random() * (requestRainTrailSpan + 1));
    col.glyphs.length = col.trailLen;
    for (var r = 0; r < col.trailLen; r++) {
      col.glyphs[r] = pickMatrixIntroChar(pool);
    }
    return;
  }
  col.glyphs.unshift(pickMatrixIntroChar(pool));
  if (col.glyphs.length > col.trailLen) {
    col.glyphs.length = col.trailLen;
  }
  var n = col.glyphs.length;
  for (var j = 1; j < n; j++) {
    if (Math.random() < 0.052) {
      col.glyphs[j] = pickMatrixIntroChar(pool);
    }
  }
}

/**
 * 开屏雨用分辨率列数（与 Resolution 下拉一致）。
 * @returns {number}
 */
function getRainResolutionCols() {
  var n = parseInt(resPicker.value, 10);
  if (!Number.isFinite(n)) return 100;
  return Math.min(MAX_RES_COLS, Math.max(1, n));
}

/**
 * 将任意列数映射到五档表（32/60/80/100/120）的最近档，用于查表。
 * @param {number} resCols
 * @returns {number}
 */
function snapIntroRainResTier(resCols) {
  var tiers = [32, 60, 80, 100, 120];
  var r = Math.min(MAX_RES_COLS, Math.max(1, resCols));
  var best = tiers[0];
  var d;
  var i;
  for (i = 0; i < tiers.length; i++) {
    d = Math.abs(r - tiers[i]);
    if (d < Math.abs(r - best)) best = tiers[i];
  }
  return best;
}

/**
 * Intro code-rain：按离散分辨率档查表 + 画幅缩放，档与档之间明显可分。
 * @param {number} resCols
 * @param {number} frameW
 * @returns {number}
 */
function getIntroRainFontPx(resCols, frameW) {
  var tier = snapIntroRainResTier(resCols);
  var base = INTRO_RAIN_FONT_BASE[tier];
  if (base == null) {
    base = 10;
  }
  var frameScale = Math.max(0.76, Math.min(1.12, frameW / 380));
  var fontPx = base * frameScale;
  return Math.max(6.5, Math.min(23, fontPx));
}

/**
 * @param {number} resCols
 * @returns {number}
 */
function getIntroRainColumnSpacingMul(resCols) {
  var tier = snapIntroRainResTier(resCols);
  var m = INTRO_RAIN_SPACING_MUL[tier];
  return m != null ? m : 1;
}

/**
 * @param {number} resCols
 * @returns {number}
 */
function getIntroRainLineHeightMul(resCols) {
  var tier = snapIntroRainResTier(resCols);
  var m = INTRO_RAIN_LH_MUL[tier];
  return m != null ? m : 1.2;
}

/**
 * 尾迹长度区间：低分辨率更长尾（更「松」），高分辨率更短（更「密」）。
 * @param {number} resCols
 * @returns {{ min: number, max: number }}
 */
function getIntroRainTrailBounds(resCols) {
  var tier = snapIntroRainResTier(resCols);
  switch (tier) {
    case 32:
      return { min: 24, max: 42 };
    case 60:
      return { min: 20, max: 38 };
    case 80:
      return { min: 17, max: 33 };
    case 100:
      return { min: 14, max: 28 };
    case 120:
      return { min: 12, max: 24 };
    default:
      return { min: 16, max: 30 };
  }
}

/**
 * @param {string} hex
 * @returns {{ r: number, g: number, b: number }}
 */
function hexToRgbForRain(hex) {
  var v = String(hex || '').trim();
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    return {
      r: parseInt(v.slice(1, 3), 16),
      g: parseInt(v.slice(3, 5), 16),
      b: parseInt(v.slice(5, 7), 16)
    };
  }
  return { r: 0, g: 255, b: 65 };
}

/**
 * 摄像头未开时：分辨率/比例/颜色变更后重算雨效。
 * @returns {void}
 */
function syncIntroRequestRain() {
  if (stream) return;
  if (!requestRainCanvas || !requestRainCanvas.classList.contains('ascii-request-rain-canvas--visible')) return;
  resizeRequestRainCanvas();
  if (requestRainRaf == null) {
    requestRainRaf = requestAnimationFrame(requestRainTick);
  }
}

/**
 * 按 `#asciiActiveFrame` 与当前 Resolution 设置雨效画布（字号/列距由 `getIntroRainFontPx` 等映射，避免 60/100 被压成同档）。
 * @returns {void}
 */
function resizeRequestRainCanvas() {
  if (!requestRainCanvas || !requestRainCtx || !asciiActiveFrame) return;
  var rect = asciiActiveFrame.getBoundingClientRect();
  var w = Math.max(1, Math.floor(rect.width));
  var h = Math.max(1, Math.floor(rect.height));
  if (w < 2 || h < 2) return;
  requestRainCssW = w;
  requestRainCssH = h;
  var dpr = window.devicePixelRatio || 1;
  requestRainCanvas.width = Math.max(1, Math.floor(w * dpr));
  requestRainCanvas.height = Math.max(1, Math.floor(h * dpr));
  requestRainCanvas.style.width = w + 'px';
  requestRainCanvas.style.height = h + 'px';
  requestRainCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var resCols = getRainResolutionCols();
  var fontPx = getIntroRainFontPx(resCols, w);
  requestRainLineHeight = fontPx * getIntroRainLineHeightMul(resCols);
  requestRainFontSpec =
    fontPx +
    'px monospace, ui-monospace, "Cascadia Code", "Courier New", monospace';
  requestRainCtx.font = requestRainFontSpec;
  var rawCell = Math.max(
    7,
    Math.ceil(requestRainCtx.measureText('M').width || fontPx * 0.62)
  );
  var cellW = Math.ceil(rawCell * getIntroRainColumnSpacingMul(resCols));
  var trailB = getIntroRainTrailBounds(resCols);
  requestRainTrailMin = trailB.min;
  requestRainTrailSpan = Math.max(1, trailB.max - trailB.min);
  initRequestRainColumns(w, h, cellW, requestRainLineHeight);
}

/**
 * 高密度：等宽列栅格 + 三层错开叠化。
 * @param {number} w
 * @param {number} h
 * @param {number} cellW
 * @param {number} lh
 * @returns {void}
 */
function initRequestRainColumns(w, h, cellW, lh) {
  var pool = getMatrixIntroCharPool();
  var colCount = Math.ceil(w / cellW) + 2;
  requestRainColumns = [];
  var layerConfigs = [
    { xOff: cellW * 0.5, alpha: 1 },
    { xOff: cellW * 1.0, alpha: 0.52 },
    { xOff: cellW * 1.5, alpha: 0.3 }
  ];
  for (var L = 0; L < layerConfigs.length; L++) {
    var cfg = layerConfigs[L];
    for (var i = 0; i < colCount + 4; i++) {
      var x = i * cellW + cfg.xOff;
      requestRainColumns.push(
        createRequestRainColumn(x, h, lh, pool, cfg.alpha)
      );
    }
  }
}

/**
 * 等宽列绘制：绿分层透明度 + 白头；字符每帧流变 + 随机突变。
 * @param {number} w
 * @param {number} h
 * @returns {void}
 */
function drawRequestRainFrame(w, h) {
  if (!requestRainCtx) return;
  requestRainCtx.clearRect(0, 0, w, h);
  requestRainCtx.font = requestRainFontSpec;
  requestRainCtx.textAlign = 'center';
  requestRainCtx.textBaseline = 'top';
  var pool = getMatrixIntroCharPool();
  var lh = requestRainLineHeight;
  var rgb = hexToRgbForRain(colorPicker.value);
  var c;
  for (c = 0; c < requestRainColumns.length; c++) {
    stepRequestRainColumn(requestRainColumns[c], h, lh, pool);
  }
  for (c = 0; c < requestRainColumns.length; c++) {
    var col = requestRainColumns[c];
    var tlen = col.trailLen;
    for (var t = 0; t < col.glyphs.length; t++) {
      var yy = col.headY - t * lh;
      if (yy < -lh * 2 || yy > h + lh) continue;
      var ch = col.glyphs[t];
      if (!ch) ch = pickMatrixIntroChar(pool);
      var mul = col.alphaMul;
      var jitter = 0.78 + (((c * 17 + t * 13) % 7) / 28);
      if (t === 0) {
        if (Math.random() < 0.14) {
          requestRainCtx.fillStyle = 'rgba(255,255,255,0.92)';
        } else {
          requestRainCtx.fillStyle =
            'rgba(' +
            rgb.r +
            ',' +
            rgb.g +
            ',' +
            rgb.b +
            ',' +
            (0.78 * mul).toFixed(3) +
            ')';
        }
      } else {
        var fade = 1 - t / Math.max(1, tlen - 1);
        var base = 0.05 + fade * 0.4;
        var a = Math.min(0.9, base * jitter * mul);
        requestRainCtx.fillStyle =
          'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + a.toFixed(3) + ')';
      }
      requestRainCtx.fillText(ch, col.x, yy);
    }
  }
}

/**
 * rAF：仅 `--visible` 时继续。
 * @returns {void}
 */
function requestRainTick() {
  if (!requestRainCanvas || !requestRainCanvas.classList.contains('ascii-request-rain-canvas--visible')) {
    requestRainRaf = null;
    return;
  }
  if (!asciiActiveFrame) {
    requestRainRaf = null;
    return;
  }
  var rect = asciiActiveFrame.getBoundingClientRect();
  var w = Math.max(1, Math.floor(rect.width));
  var h = Math.max(1, Math.floor(rect.height));
  if (w < 2 || h < 2) {
    requestRainRaf = requestAnimationFrame(requestRainTick);
    return;
  }
  if (Math.abs(w - requestRainCssW) > 2 || Math.abs(h - requestRainCssH) > 2) {
    resizeRequestRainCanvas();
    w = requestRainCssW;
    h = requestRainCssH;
  }
  drawRequestRainFrame(w, h);
  requestRainRaf = requestAnimationFrame(requestRainTick);
}

/**
 * 页面开屏 / Stop Camera 后：无 `stream` 时在 `#asciiActiveFrame` 内启动 code-rain。
 * @returns {void}
 */
function startRequestRainEffect() {
  if (!requestRainCanvas || !requestRainCtx) return;
  if (stream) return;
  resizeRequestRainCanvas();
  requestRainCanvas.classList.add('ascii-request-rain-canvas--mounted');
  requestRainCanvas.classList.add('ascii-request-rain-canvas--visible');
  if (requestRainRaf != null) cancelAnimationFrame(requestRainRaf);
  requestRainRaf = requestAnimationFrame(requestRainTick);
}

/**
 * Start Camera 点击：淡出开屏层（可与 getUserMedia 并行）。
 * @returns {void}
 */
function stopRequestRainEffectFade() {
  if (!requestRainCanvas) return;
  var gen = ++requestRainFadeGen;
  if (requestRainRaf != null) {
    cancelAnimationFrame(requestRainRaf);
    requestRainRaf = null;
  }
  requestRainCanvas.classList.remove('ascii-request-rain-canvas--visible');
  if (!requestRainCanvas.classList.contains('ascii-request-rain-canvas--mounted')) return;
  var settled = false;
  /**
   * @param {{ propertyName?: string } | TransitionEvent} ev
   * @returns {void}
   */
  function onFadeEnd(ev) {
    if (gen !== requestRainFadeGen) return;
    if (settled) return;
    if (ev && 'propertyName' in ev && ev.propertyName && ev.propertyName !== 'opacity') return;
    settled = true;
    requestRainCanvas.removeEventListener('transitionend', onFadeEnd);
    requestRainCanvas.classList.remove('ascii-request-rain-canvas--mounted');
    if (requestRainCtx && requestRainCanvas.width > 0) {
      requestRainCtx.save();
      requestRainCtx.setTransform(1, 0, 0, 1, 0, 0);
      requestRainCtx.clearRect(0, 0, requestRainCanvas.width, requestRainCanvas.height);
      requestRainCtx.restore();
    }
  }
  requestRainCanvas.addEventListener('transitionend', onFadeEnd);
  setTimeout(function () {
    onFadeEnd({ propertyName: 'opacity' });
  }, 800);
}

/**
 * 立即关闭雨效（无 transition 等待）。
 * @returns {void}
 */
function abortRequestRainEffect() {
  requestRainFadeGen++;
  if (!requestRainCanvas) return;
  if (requestRainRaf != null) {
    cancelAnimationFrame(requestRainRaf);
    requestRainRaf = null;
  }
  requestRainCanvas.classList.remove(
    'ascii-request-rain-canvas--visible',
    'ascii-request-rain-canvas--mounted'
  );
  if (requestRainCtx && requestRainCanvas.width > 0) {
    requestRainCtx.save();
    requestRainCtx.setTransform(1, 0, 0, 1, 0, 0);
    requestRainCtx.clearRect(0, 0, requestRainCanvas.width, requestRainCanvas.height);
    requestRainCtx.restore();
  }
}

/**
 * 由每格亮度（0…1，与 `toAscii` 采样一致）与当前字符集生成 ASCII。
 * @param {Float32Array} luma 行优先，长度 `cols * rows`
 * @param {number} cols
 * @param {number} rows
 * @param {string} chars
 * @returns {string}
 */
function luminanceToAscii(luma, cols, rows, chars) {
  const n = Math.max(1, chars.length - 1);
  let result = '';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const b = luma[y * cols + x];
      result += chars[Math.max(0, Math.min(Math.floor((1 - b) * n), n))];
    }
    result += '\n';
  }
  return result;
}

/**
 * 采样当前视频帧为亮度格 + ASCII（用于预览态按 Style 重算，不重新访问摄像头像素逻辑外路径）。
 * @param {number} cols
 * @param {number | null | undefined} aspectOverride
 * @returns {{ ascii: string, luma: Float32Array, cols: number, rows: number }}
 */
function toAsciiWithLuminance(cols, aspectOverride) {
  if (!video.videoWidth || !video.videoHeight) {
    return { ascii: '', luma: new Float32Array(0), cols: 0, rows: 0 };
  }
  const chars = getChars();
  const { cellAspect } = getAsciiCellMetrics();
  const forcedAspect =
    aspectOverride != null && Number.isFinite(aspectOverride) ? aspectOverride : getAspectRatio();
  const nativeAspect = video.videoWidth / video.videoHeight;
  const aspect = forcedAspect || nativeAspect;
  const rows = Math.max(1, Math.round((cols * cellAspect) / aspect));
  canvas.width = cols;
  canvas.height = rows;
  ctx.save();
  ctx.translate(cols, 0);
  ctx.scale(-1, 1);
  if (forcedAspect) {
    let sx = 0,
      sy = 0,
      sw = video.videoWidth,
      sh = video.videoHeight;
    if (nativeAspect > forcedAspect) {
      sw = Math.round(video.videoHeight * forcedAspect);
      sx = Math.round((video.videoWidth - sw) / 2);
    } else {
      sh = Math.round(video.videoWidth / forcedAspect);
      sy = Math.round((video.videoHeight - sh) / 2);
    }
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cols, rows);
  } else {
    ctx.drawImage(video, 0, 0, cols, rows);
  }
  ctx.restore();
  const pixels = ctx.getImageData(0, 0, cols, rows).data;
  const luma = new Float32Array(cols * rows);
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * cols + x) * 4;
      const b = (0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2]) / 255;
      luma[y * cols + x] = b;
    }
  }
  const ascii = luminanceToAscii(luma, cols, rows, chars);
  return { ascii, luma, cols, rows };
}

/**
 * 预览态下切换 Style：按已保存的亮度格重算 ASCII/GIF，并写回 `pendingGalleryPayload`（提交时即最新样式）。
 * @returns {void}
 */
function applyPreviewStyleFromDensity() {
  if (!previewCaptureActive || !pendingGalleryPayload) return;
  var chars = getChars();
  var p = pendingGalleryPayload;
  if (p && typeof p === 'object' && p.isPhotoPreview === true && p.luma && p.cols && p.rows) {
    var ascii = luminanceToAscii(p.luma, p.cols, p.rows, chars);
    p.ascii = ascii;
    out.textContent = ascii;
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    return;
  }
  if (p && p.isAnimated === true && Array.isArray(p.frameLumas) && p.previewCols && p.previewRows) {
    var framesOut = [];
    for (var i = 0; i < p.frameLumas.length; i++) {
      framesOut.push(luminanceToAscii(p.frameLumas[i], p.previewCols, p.previewRows, chars));
    }
    p.frames = framesOut;
    p.ascii = framesOut[0] || '';
    out.textContent = framesOut[0] || '';
    clearPreviewAnimLoop();
    startPreviewAnimLoop(framesOut);
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
  }
}

function getAspectRatio() {
  const v = aspectPicker.value;
  if (v === '16:9') return 16 / 9;
  if (v === '4:3') return 4 / 3;
  if (v === '3:4') return 3 / 4;
  if (v === '1:1') return 1;
  return 1;
}

/**
 * 将当前视频帧转为 ASCII。行数 = cols×(字宽/行高)÷画面宽高比，使像素块与等宽字格对齐。
 * @param {number} cols 列数
 * @param {number | null | undefined} aspectOverride 指定画面宽高比（如 Video 1:1）；省略时用下拉框
 * @returns {string} ASCII 文本
 */
function toAscii(cols, aspectOverride) {
  return toAsciiWithLuminance(cols, aspectOverride).ascii;
}

function render() {
  out.textContent = toAscii(getCols());
  animId = requestAnimationFrame(render);
}

/**
 * 保存成功后不关闭本窗口：由 Gallery 用固定 `window.open` 名打开的相机页可反复使用；仅尝试把焦点还给嵌入里的 Gallery。
 * @returns {void}
 */
function focusOpenerGalleryAfterSave() {
  try {
    var o = window.opener;
    if (o && o !== window && !o.closed) {
      try {
        o.focus();
      } catch (e) {
        /* 跨域或策略限制 */
      }
    }
  } catch (e2) {}
}

/**
 * 录制多帧 ASCII（6 FPS × 2s = 12 帧）及每帧亮度格，供预览态换 Style 重算；不停止实时取景 RAF。
 * @returns {Promise<{ frames: string[], frameLumas: Float32Array[], cols: number, rows: number }>}
 */
async function captureVideoAsciiFrames() {
  var frames = [];
  var frameLumas = [];
  var cols = 0;
  var rows = 0;
  var t0 = performance.now();
  for (var i = 0; i < VIDEO_FRAME_COUNT; i++) {
    var targetMs = (i / VIDEO_FPS) * 1000;
    var now;
    for (;;) {
      now = performance.now() - t0;
      if (now >= targetMs - 0.5) break;
      var wait = Math.min(32, targetMs - now);
      if (wait > 1) await sleep(wait);
    }
    var pack = toAsciiWithLuminance(VIDEO_COLS, 1);
    frames.push(pack.ascii);
    frameLumas.push(pack.luma);
    cols = pack.cols;
    rows = pack.rows;
  }
  return { frames: frames, frameLumas: frameLumas, cols: cols, rows: rows };
}

/**
 * 将静态一帧或动画作品写入本机存储并同步 opener / 云端。
 * @param {string | { isPhotoPreview?: true, ascii?: string, isAnimated?: true, frames?: string[], frameCount?: number, fps?: number, durationMs?: number }} payload 静态时为 ascii 字符串或带 `isPhotoPreview` 的对象
 * @returns {Promise<boolean>} 持久化成功时为 true
 */
async function persistPhotoToGallery(payload) {
  try {
    var isAnim =
      payload &&
      typeof payload === 'object' &&
      payload.isAnimated === true &&
      Array.isArray(payload.frames) &&
      payload.frames.length > 0;
    var asciiStr = '';
    if (isAnim) {
      asciiStr = String(payload.ascii || payload.frames[0] || '');
    } else if (payload && typeof payload === 'object' && payload.isPhotoPreview === true) {
      asciiStr = String(payload.ascii || '');
    } else {
      asciiStr = String(payload || '');
    }
    /** @type {{ ascii: string, color: string, time: number, isAnimated?: boolean, frameCount?: number, fps?: number, durationMs?: number }} */
    var photoPayload = {
      ascii: asciiStr,
      color: colorPicker.value,
      time: Date.now()
    };
    if (isAnim) {
      photoPayload.isAnimated = true;
      photoPayload.frameCount =
        typeof payload.frameCount === 'number' ? payload.frameCount : VIDEO_FRAME_COUNT;
      photoPayload.fps = typeof payload.fps === 'number' ? payload.fps : VIDEO_FPS;
      photoPayload.durationMs =
        typeof payload.durationMs === 'number' ? payload.durationMs : VIDEO_DURATION_MS;
    }
    AsciiCameraGalleryStorage.prependUserPhoto(photoPayload);
    var savedRow = AsciiCameraGalleryStorage.loadUserPhotos()[0];
    try {
      var o = window.opener;
      if (o && o !== window && !o.closed && AsciiCameraGalleryStorage.galleryOpenerNeedsPostMessage(o)) {
        var msgPhoto = {
          ascii: savedRow ? savedRow.ascii : photoPayload.ascii,
          color: savedRow ? savedRow.color : photoPayload.color,
          time: savedRow ? savedRow.time : photoPayload.time
        };
        if (savedRow && typeof savedRow.id === 'string' && savedRow.id) msgPhoto.id = savedRow.id;
        if (isAnim) {
          msgPhoto.isAnimated = true;
          msgPhoto.frameCount = photoPayload.frameCount;
          msgPhoto.fps = photoPayload.fps;
          msgPhoto.durationMs = photoPayload.durationMs;
          if (Array.isArray(payload.frames)) msgPhoto.frames = payload.frames;
        }
        o.postMessage(
          {
            type: AsciiCameraGalleryStorage.GALLERY_PREPEND_MESSAGE_TYPE,
            photo: msgPhoto
          },
          window.location.origin
        );
      }
    } catch (eOpener) { /* 跨域或策略限制 */ }
    if (window.AsciiCameraGalleryCloudSync && AsciiCameraGalleryCloudSync.isEnabled()) {
      var syncCam = AsciiCameraGalleryCloudSync;
      if (syncCam.getProvider() === 'supabase' && typeof syncCam.insertPhotoRow === 'function') {
        /** @type {{ ascii: string, color?: string, time?: number, id?: string, isAnimated?: boolean, frames?: string[], frameCount?: number, fps?: number, durationMs?: number }} */
        var insertPayload = Object.assign({}, savedRow || photoPayload);
        if (isAnim && payload.frames) insertPayload.frames = payload.frames;
        var camIns = await syncCam.insertPhotoRow(insertPayload);
        if (!camIns) {
          AsciiCameraGalleryStorage.deleteUserPhotoAt(0);
        }
      } else {
        syncCam.pushFromLocal().catch(function () {});
      }
    }
    return true;
  } catch (e) {
    console.error(e);
    return false;
  }
}

/**
 * 恢复实时取景 RAF（冻结结束后调用；避免重复循环）。
 * @returns {void}
 */
function restartLiveAsciiPreview() {
  if (!stream) return;
  if (animId != null) cancelAnimationFrame(animId);
  animId = null;
  out.style.color = colorPicker.value;
  syncVideoProgressBarColor();
  render();
}

function setStatusOffline() {
  statusEl.classList.remove('live');
  statusEl.querySelector('.status-text').textContent = 'CAMERA OFF';
}

function setStatusLive() {
  statusEl.classList.add('live');
  statusEl.querySelector('.status-text').textContent = 'CAMERA ON';
}

startBtn.addEventListener('click', async () => {
  if (stream) {
    abortRequestRainEffect();
    clearPreviewAnimLoop();
    previewCaptureActive = false;
    pendingGalleryPayload = null;
    if (cameraShell) cameraShell.classList.remove('cam-preview-capture');
    if (submitGalleryBtn) submitGalleryBtn.disabled = true;
    if (camTabPhoto) camTabPhoto.disabled = false;
    if (camTabVideo) camTabVideo.disabled = false;
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    if (animId != null) cancelAnimationFrame(animId);
    animId = null;
    startBtn.textContent = 'Start Camera';
    snapBtn.disabled = true;
    snapCountdownActive = false;
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
    setStatusOffline();
    if (asciiWrap) {
      asciiWrap.classList.add('ascii-wrap--offline');
      asciiWrap.classList.remove('ascii-wrap--startup-hide-helper');
    }
    out.textContent = 'Click "START CAMERA" to begin';
    if (asciiOffHelper) asciiOffHelper.textContent = 'Click "START CAMERA" to begin';
    out.setAttribute('aria-hidden', 'true');
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    syncVideoProgressBarForMode();
    applyCaptureModeUi();
    startRequestRainEffect();
    return;
  }
  if (isEmbeddedInFrame()) {
    const opened = openCameraInNewTab();
    statusEl.querySelector('.status-text').textContent = opened
      ? 'Opened in new tab'
      : 'Allow pop-ups or use “Open in new tab” above';
    return;
  }
  try {
    startBtn.disabled = true;
    if (asciiWrap) asciiWrap.classList.add('ascii-wrap--startup-hide-helper');
    statusEl.querySelector('.status-text').textContent = 'Requesting…';
    statusEl.classList.remove('live');
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
    video.srcObject = stream; await video.play();
    startBtn.textContent = 'Stop Camera';
    snapBtn.disabled = false;
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
    if (submitGalleryBtn) submitGalleryBtn.disabled = true;
    setStatusLive();
    if (asciiWrap) asciiWrap.classList.remove('ascii-wrap--offline', 'ascii-wrap--startup-hide-helper');
    out.removeAttribute('aria-hidden');
    out.style.color = colorPicker.value;
    syncVideoProgressBarColor();
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    syncVideoProgressBarForMode();
    render();
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        syncAsciiLayout();
        stopRequestRainEffectFade();
      });
    });
  } catch (e) {
    setStatusOffline();
    statusEl.querySelector('.status-text').textContent = 'Access denied';
    out.textContent = 'Camera access denied';
    if (asciiOffHelper) asciiOffHelper.textContent = out.textContent;
    if (asciiWrap) {
      asciiWrap.classList.add('ascii-wrap--offline');
      asciiWrap.classList.remove('ascii-wrap--startup-hide-helper');
    }
    out.setAttribute('aria-hidden', 'true');
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    abortRequestRainEffect();
    startRequestRainEffect();
  } finally {
    startBtn.disabled = false;
  }
});

/**
 * 3s 倒计时（按钮 3→2→1）；完成后进入本地预览，不自动上传。
 * Photo：最后一秒开闪，该秒结束后关闪再抓拍（行为不变）。
 * Video：最后一秒开始时开闪（比录制早 1s，作同步缓冲），常亮共 3s（1s 倒计时末 + 2s 录制），录制结束关闪。
 */
snapBtn.addEventListener('click', async () => {
  if (!stream || snapCountdownActive) return;
  if (previewCaptureActive) {
    retakeFromPreview();
    return;
  }
  const cols = getCols();
  const ctl = [densityPicker, colorPicker, resPicker, aspectPicker, camTabPhoto, camTabVideo];
  snapCountdownActive = true;
  snapBtn.disabled = true;
  startBtn.disabled = true;
  if (submitGalleryBtn) submitGalleryBtn.disabled = true;
  ctl.forEach(function (el) {
    if (el) el.disabled = true;
  });
  const useFlash = flashToggle.checked;
  try {
    for (let n = 3; n >= 1; n--) {
      snapBtn.textContent = String(n);
      if (useFlash && n === 1) {
        layoutFlashOutsideStrips();
        if (flashOutsideRoot) flashOutsideRoot.classList.add('on');
      }
      await sleep(1000);
      if (useFlash && n === 1 && flashOutsideRoot && !videoMode) {
        flashOutsideRoot.classList.remove('on');
      }
    }

    var persistArg;
    if (!videoMode) {
      if (animId != null) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      var photoPack = toAsciiWithLuminance(cols);
      persistArg = {
        isPhotoPreview: true,
        ascii: photoPack.ascii,
        luma: photoPack.luma,
        cols: photoPack.cols,
        rows: photoPack.rows
      };
    } else {
      if (videoProgressBar) videoProgressBar.style.width = '100%';
      var recRaf = 0;
      var tRec = performance.now();
      /**
       * 按 2s 墙钟缩短实心白条宽度（左对齐，从右侧收回）。
       * @returns {void}
       */
      function tickRecProgress() {
        var p = Math.min(1, (performance.now() - tRec) / VIDEO_DURATION_MS);
        if (videoProgressBar) videoProgressBar.style.width = (1 - p) * 100 + '%';
        if (p < 1) recRaf = requestAnimationFrame(tickRecProgress);
      }
      recRaf = requestAnimationFrame(tickRecProgress);
      var vf;
      try {
        vf = await captureVideoAsciiFrames();
      } finally {
        cancelAnimationFrame(recRaf);
        if (videoProgressBar) videoProgressBar.style.width = '0%';
        if (useFlash && flashOutsideRoot) flashOutsideRoot.classList.remove('on');
      }
      if (animId != null) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      persistArg = {
        isAnimated: true,
        ascii: vf && vf.frames && vf.frames.length ? vf.frames[0] || '' : '',
        frames: vf && vf.frames ? vf.frames : [],
        frameLumas: vf && vf.frameLumas ? vf.frameLumas : [],
        previewCols: vf.cols,
        previewRows: vf.rows,
        frameCount: VIDEO_FRAME_COUNT,
        fps: VIDEO_FPS,
        durationMs: VIDEO_DURATION_MS
      };
    }

    enterPreviewState(persistArg);
  } catch (err) {
    console.error(err);
    savedMsg.textContent = 'Capture failed: something went wrong.';
    savedMsg.style.color = '#ff4444';
    savedMsg.classList.add('show');
    await sleep(2500);
    savedMsg.classList.remove('show');
  } finally {
    if (flashOutsideRoot) flashOutsideRoot.classList.remove('on');
    snapCountdownActive = false;
    startBtn.disabled = false;
    ctl.forEach(function (el) {
      if (!el) return;
      if (previewCaptureActive) {
        if (el === camTabPhoto || el === camTabVideo) el.disabled = true;
        else if (el === resPicker || el === aspectPicker) el.disabled = true;
        else el.disabled = false;
      } else {
        if (el === camTabPhoto || el === camTabVideo) el.disabled = false;
        else if (el === resPicker || el === aspectPicker) {
          el.disabled = videoMode;
        } else el.disabled = false;
      }
    });
    if (previewCaptureActive) {
      syncVideoProgressBarForMode();
      syncAsciiLayout();
      snapBtn.textContent = videoMode ? SNAP_LABEL_RETAKE_VIDEO : SNAP_LABEL_RETAKE_PHOTO;
      snapBtn.disabled = false;
    } else {
      restartLiveAsciiPreview();
      syncVideoProgressBarForMode();
      syncAsciiLayout();
      snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
      snapBtn.disabled = !stream;
    }
  }
});

/**
 * 将当前预览作品提交至本机画廊 / 云端（与原先 `persistPhotoToGallery` 流程一致）。
 * @returns {Promise<void>}
 */
async function submitPreviewToGallery() {
  if (!previewCaptureActive || pendingGalleryPayload == null || !stream) return;
  var payload = pendingGalleryPayload;
  if (submitGalleryBtn) submitGalleryBtn.disabled = true;
  snapBtn.disabled = true;
  snapBtn.textContent = SNAP_LABEL_SAVING;
  snapBtn.classList.add('snap-saving');
  snapBtn.setAttribute('aria-busy', 'true');
  var isVideoCapture =
    payload && typeof payload === 'object' && payload.isAnimated === true;
  if (!isVideoCapture) {
    savedMsg.textContent = SNAP_LABEL_SAVING;
    savedMsg.style.color = '#ffd700';
    savedMsg.classList.add('show');
  }
  try {
    var ok = await persistPhotoToGallery(payload);
    if (ok) {
      if (isVideoCapture) {
        savedMsg.textContent = 'SAVED';
        savedMsg.style.color = '#ffd700';
        savedMsg.classList.add('show');
        await sleep(VIDEO_POST_RECORD_FREEZE_MS);
        savedMsg.classList.remove('show');
        await sleep(400);
        focusOpenerGalleryAfterSave();
        await sleep(1800);
      } else {
        savedMsg.classList.remove('show');
        savedMsg.textContent = 'SAVED';
        savedMsg.style.color = '#ffd700';
        savedMsg.classList.add('show');
        await sleep(400);
        focusOpenerGalleryAfterSave();
        await sleep(1800);
        savedMsg.classList.remove('show');
      }
      exitPreviewAfterSuccessfulSubmit();
    } else {
      savedMsg.classList.remove('show');
      savedMsg.textContent = 'Save failed: storage full, unavailable, or disabled.';
      savedMsg.style.color = '#ff4444';
      savedMsg.classList.add('show');
      await sleep(2500);
      savedMsg.classList.remove('show');
      if (submitGalleryBtn) submitGalleryBtn.disabled = false;
      snapBtn.disabled = false;
    }
  } catch (e) {
    console.error(e);
    savedMsg.textContent = 'Save failed: something went wrong.';
    savedMsg.style.color = '#ff4444';
    savedMsg.classList.add('show');
    await sleep(2500);
    savedMsg.classList.remove('show');
    if (submitGalleryBtn) submitGalleryBtn.disabled = false;
    snapBtn.disabled = false;
  } finally {
    snapBtn.classList.remove('snap-saving');
    snapBtn.removeAttribute('aria-busy');
    if (previewCaptureActive) {
      snapBtn.textContent = videoMode ? SNAP_LABEL_RETAKE_VIDEO : SNAP_LABEL_RETAKE_PHOTO;
    }
  }
}

if (submitGalleryBtn) {
  submitGalleryBtn.addEventListener('click', function () {
    void submitPreviewToGallery();
  });
}

requestAnimationFrame(function () {
  applyCaptureModeUi();
  if (!stream) startRequestRainEffect();
});
</script>
