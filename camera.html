  }
}

/**
 * 恢复实时取景 RAF（冻结结束后调用；避免重复循环）。
 * @returns {void}
 */
function restartLiveAsciiPreview() {
  if (!stream) return;
  if (animId != null) cancelAnimationFrame(animId);
  animId = null;
  out.style.color = colorPicker.value;
  AsciiCameraUi.syncVideoProgressBarColor();
  render();
}

AsciiCameraLoop.bindLoopCapture({
  sleep: sleep,
  toAsciiWithLuminance: toAsciiWithLuminance,
  getCols: getCols,
  VIDEO_DEFAULT_COLS: VIDEO_DEFAULT_COLS
});

AsciiCameraPreview.bindCore({
  get videoMode() {
    return videoMode;
  },
  get stream() {
    return stream;
  },
  get animId() {
    return animId;
  },
  setAnimId: function (v) {
    animId = v;
  },
  getChars: getChars,
  luminanceToAscii: luminanceToAscii,
  applyCaptureModeUi: applyCaptureModeUi,
  restartLiveAsciiPreview: restartLiveAsciiPreview,
  invalidateAsciiCellMetrics: invalidateAsciiCellMetrics,
  syncAsciiLayout: syncAsciiLayout,
  render: render,
  VIDEO_FPS: AsciiCameraLoop.VIDEO_FPS,
  SNAP_LABEL_RETAKE_PHOTO: SNAP_LABEL_RETAKE_PHOTO,
  SNAP_LABEL_RETAKE_VIDEO: SNAP_LABEL_RETAKE_VIDEO,
  SNAP_LABEL_READY: SNAP_LABEL_READY,
  SNAP_LABEL_VIDEO: SNAP_LABEL_VIDEO,
  syncVideoProgressBarForMode: function () {
    AsciiCameraUi.syncVideoProgressBarForMode();
  },
  out: out,
  colorPicker: colorPicker,
  cameraShell: cameraShell,
  submitGalleryBtn: submitGalleryBtn,
  snapBtn: snapBtn,
  camTabPhoto: camTabPhoto,
  camTabVideo: camTabVideo,
  asciiWrap: asciiWrap,
  loopCoverUi: loopCoverUi,
  loopCoverSlider: loopCoverSlider,
  loopCoverLabel: loopCoverLabel,
  camSubmitStatusSlot: camSubmitStatusSlot
});

startBtn.addEventListener('click', async () => {
  if (stream) {
    abortRequestRainEffect();
    AsciiCameraPreview.clearPreviewAnimLoop();
    AsciiCameraPreview.previewCaptureActive = false;
    AsciiCameraPreview.pendingGalleryPayload = null;
    if (cameraShell) cameraShell.classList.remove('cam-preview-capture');
    if (submitGalleryBtn) submitGalleryBtn.disabled = true;
    if (camTabPhoto) camTabPhoto.disabled = false;
    if (camTabVideo) camTabVideo.disabled = false;
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    if (animId != null) cancelAnimationFrame(animId);
    animId = null;
    startBtn.textContent = 'Start Camera';
    snapBtn.disabled = true;
    snapCountdownActive = false;
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
    AsciiCameraUi.setStatusOffline();
    if (asciiWrap) {
      asciiWrap.classList.add('ascii-wrap--offline');
      asciiWrap.classList.remove('ascii-wrap--startup-hide-helper');
    }
    out.textContent = 'Click "START CAMERA" to begin';
    if (asciiOffHelper) asciiOffHelper.textContent = 'Click "START CAMERA" to begin';
    if (asciiOffHelper) asciiOffHelper.style.color = colorPicker.value;
    out.setAttribute('aria-hidden', 'true');
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    AsciiCameraUi.syncVideoProgressBarForMode();
    applyCaptureModeUi();
    startRequestRainEffect();
    return;
  }
  if (isEmbeddedInFrame()) {
    const opened = openCameraInNewTab();
    statusEl.querySelector('.status-text').textContent = opened
      ? 'Opened in new tab'
      : 'Allow pop-ups or use “Open in new tab” above';
    return;
  }
  try {
    startBtn.disabled = true;
    if (asciiWrap) asciiWrap.classList.add('ascii-wrap--startup-hide-helper');
    statusEl.querySelector('.status-text').textContent = 'Requesting…';
    statusEl.classList.remove('live');
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
    video.srcObject = stream; await video.play();
    startBtn.textContent = 'Stop Camera';
    snapBtn.disabled = false;
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
    if (submitGalleryBtn) submitGalleryBtn.disabled = true;
    AsciiCameraUi.setStatusLive();
    if (asciiWrap) asciiWrap.classList.remove('ascii-wrap--offline', 'ascii-wrap--startup-hide-helper');
    out.removeAttribute('aria-hidden');
    // 摄像头已开启：同步控件可用态（Photo 下 Style 应恢复可用）
    applyCaptureModeUi();
    out.style.color = colorPicker.value;
    AsciiCameraUi.syncVideoProgressBarColor();
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    AsciiCameraUi.syncVideoProgressBarForMode();
    if (animId == null && !AsciiCameraPreview.previewCaptureActive) render();
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        syncAsciiLayout();
        stopRequestRainEffectFade();
      });
    });
  } catch (e) {
    AsciiCameraUi.setStatusOffline();
    statusEl.querySelector('.status-text').textContent = 'Access denied';
    out.textContent = 'Camera access denied';
    if (asciiOffHelper) asciiOffHelper.textContent = out.textContent;
    if (asciiOffHelper) asciiOffHelper.style.color = colorPicker.value;
    if (asciiWrap) {
      asciiWrap.classList.add('ascii-wrap--offline');
      asciiWrap.classList.remove('ascii-wrap--startup-hide-helper');
    }
    out.setAttribute('aria-hidden', 'true');
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    abortRequestRainEffect();
    startRequestRainEffect();
  } finally {
    startBtn.disabled = false;
  }
});

/**
 * 3s 倒计时（按钮 3→2→1）；完成后进入本地预览，不自动上传。
 * Photo：最后一秒开闪，该秒结束后关闪再抓拍（行为不变）。
 * Video：最后一秒开始时开闪（比录制早 1s，作同步缓冲），常亮共 3s（1s 倒计时末 + 2s 录制），录制结束关闪。
 */
snapBtn.addEventListener('click', async () => {
  if (!stream || snapCountdownActive) return;
  /** Retake：先退出预览恢复实时取景，再与同一次点击走同一套倒计时与拍摄（不再要求用户再点一次主按钮）。 */
  if (AsciiCameraPreview.previewCaptureActive) {
    AsciiCameraPreview.retakeFromPreview();
  }
  const cols = getCols();
  const ctl = [densityPicker, colorPicker, resPicker, aspectPicker, camTabPhoto, camTabVideo];
  snapCountdownActive = true;
  snapBtn.disabled = true;
  startBtn.disabled = true;
  if (submitGalleryBtn) submitGalleryBtn.disabled = true;
  ctl.forEach(function (el) {
    if (el) el.disabled = true;
  });
  const useFlash = flashToggle.checked;
  if (!videoMode) primePhotoShutterAudioInUserGesture();
  else primeVideoRecordAudioInUserGesture();
  try {
    for (let n = 3; n >= 1; n--) {
      snapBtn.textContent = String(n);
      if (useFlash && n === 1) {
        AsciiCameraUi.layoutFlashOutsideStrips();
        if (flashOutsideRoot) flashOutsideRoot.classList.add('on');
      }
      await sleep(1000);
      if (useFlash && n === 1 && flashOutsideRoot && !videoMode) {
        flashOutsideRoot.classList.remove('on');
      }
    }

    var persistArg;
    if (!videoMode) {
      if (animId != null) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      playPhotoShutterSound();
      var photoPack = toAsciiWithLuminance(cols);
      persistArg = {
        isPhotoPreview: true,
        ascii: photoPack.ascii,
        luma: photoPack.luma,
        cols: photoPack.cols,
        rows: photoPack.rows
      };
    } else {
      if (videoProgressBar) videoProgressBar.style.width = '100%';
      var recRaf = 0;
      var tRec = performance.now();
      /**
       * 按 2s 墙钟缩短实心白条宽度（左对齐，从右侧收回）。
       * @returns {void}
       */
      function tickRecProgress() {
        var p = Math.min(1, (performance.now() - tRec) / VIDEO_DURATION_MS);
        if (videoProgressBar) videoProgressBar.style.width = (1 - p) * 100 + '%';
        if (p < 1) recRaf = requestAnimationFrame(tickRecProgress);
      }
      recRaf = requestAnimationFrame(tickRecProgress);
      playVideoRecordSound();
      var vf;
      try {
        vf = await captureVideoAsciiFrames();
      } finally {
        cancelAnimationFrame(recRaf);
        if (videoProgressBar) videoProgressBar.style.width = '0%';
        if (useFlash && flashOutsideRoot) flashOutsideRoot.classList.remove('on');
      }
      if (animId != null) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      persistArg = {
        isAnimated: true,
        ascii: vf && vf.frames && vf.frames.length ? vf.frames[0] || '' : '',
        frames: vf && vf.frames ? vf.frames : [],
        frameLumas: vf && vf.frameLumas ? vf.frameLumas : [],
        previewCols: vf.cols,
        previewRows: vf.rows,
        frameCount: VIDEO_FRAME_COUNT,
        fps: VIDEO_FPS,
        durationMs: VIDEO_DURATION_MS
      };
    }

    AsciiCameraPreview.enterPreviewState(persistArg);
  } catch (err) {
    console.error(err);
    savedMsg.textContent = 'Capture failed: something went wrong.';
    savedMsg.style.color = '#ff4444';
    savedMsg.classList.add('show');
    await sleep(2500);
    savedMsg.classList.remove('show');
  } finally {
    if (flashOutsideRoot) flashOutsideRoot.classList.remove('on');
    snapCountdownActive = false;
    startBtn.disabled = false;
    ctl.forEach(function (el) {
      if (!el) return;
      if (AsciiCameraPreview.previewCaptureActive) {
        if (el === camTabPhoto || el === camTabVideo) el.disabled = true;
        else if (el === resPicker || el === aspectPicker) el.disabled = true;
        else el.disabled = false;
      } else {
        if (el === camTabPhoto || el === camTabVideo) el.disabled = false;
        else if (el === resPicker || el === aspectPicker) {
          el.disabled = videoMode;
        } else el.disabled = false;
      }
    });
    if (AsciiCameraPreview.previewCaptureActive) {
      AsciiCameraUi.syncVideoProgressBarForMode();
      syncAsciiLayout();
      snapBtn.textContent = videoMode ? SNAP_LABEL_RETAKE_VIDEO : SNAP_LABEL_RETAKE_PHOTO;
      snapBtn.disabled = false;
    } else {
      restartLiveAsciiPreview();
      AsciiCameraUi.syncVideoProgressBarForMode();
      syncAsciiLayout();
      snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
      snapBtn.disabled = !stream;
    }
  }
});

/**
 * 将当前预览作品提交至本机画廊 / 云端（与原先 `persistPhotoToGallery` 流程一致）。
 * @returns {Promise<void>}
 */
async function submitPreviewToGallery() {
  if (!AsciiCameraPreview.previewCaptureActive || AsciiCameraPreview.pendingGalleryPayload == null || !stream) return;
  var payload = AsciiCameraPreview.pendingGalleryPayload;
  AsciiCameraPreview.hideLoopCoverUi();
  if (submitGalleryBtn) submitGalleryBtn.disabled = true;
  snapBtn.disabled = true;
  snapBtn.textContent = SNAP_LABEL_SAVING;
  snapBtn.classList.add('snap-saving');
  snapBtn.setAttribute('aria-busy', 'true');
  var isVideoCapture =
    payload && typeof payload === 'object' && payload.isAnimated === true;
  savedMsg.textContent = SNAP_LABEL_SAVING;
  savedMsg.style.color = '#ffd700';
  savedMsg.classList.add('show');
  try {
    var ok = await persistPhotoToGallery(payload);
    if (ok) {
      if (isVideoCapture) {
        savedMsg.textContent = 'SAVED';
        savedMsg.style.color = '#ffd700';
        savedMsg.classList.add('show');
        await sleep(VIDEO_POST_RECORD_FREEZE_MS);
        savedMsg.classList.remove('show');
        await sleep(400);
        focusOpenerGalleryAfterSave();
        await sleep(1800);
      } else {
        savedMsg.classList.remove('show');
        savedMsg.textContent = 'SAVED';
        savedMsg.style.color = '#ffd700';
        savedMsg.classList.add('show');
        await sleep(400);
        focusOpenerGalleryAfterSave();
        await sleep(1800);
        savedMsg.classList.remove('show');
      }
      AsciiCameraPreview.exitPreviewAfterSuccessfulSubmit();
    } else {
      savedMsg.classList.remove('show');
      savedMsg.textContent = 'Save failed: storage full, unavailable, or disabled.';
      savedMsg.style.color = '#ff4444';
      savedMsg.classList.add('show');
      await sleep(2500);
      savedMsg.classList.remove('show');
      if (submitGalleryBtn) submitGalleryBtn.disabled = false;
      snapBtn.disabled = false;
      AsciiCameraPreview.restoreLoopCoverUiAfterFailedSubmit();
    }
  } catch (e) {
    console.error(e);
    savedMsg.textContent = 'Save failed: something went wrong.';
    savedMsg.style.color = '#ff4444';
    savedMsg.classList.add('show');
    await sleep(2500);
    savedMsg.classList.remove('show');
    if (submitGalleryBtn) submitGalleryBtn.disabled = false;
    snapBtn.disabled = false;
    AsciiCameraPreview.restoreLoopCoverUiAfterFailedSubmit();
  } finally {
    snapBtn.classList.remove('snap-saving');
    snapBtn.removeAttribute('aria-busy');
    if (AsciiCameraPreview.previewCaptureActive) {
      snapBtn.textContent = videoMode ? SNAP_LABEL_RETAKE_VIDEO : SNAP_LABEL_RETAKE_PHOTO;
    }
  }
}

if (submitGalleryBtn) {
  submitGalleryBtn.addEventListener('click', function () {
    void submitPreviewToGallery();
  });
}

if (loopCoverUi) {
  loopCoverUi.addEventListener('mouseenter', function () {
    if (!AsciiCameraPreview.previewCaptureActive || !AsciiCameraPreview.pendingGalleryPayload || !AsciiCameraPreview.pendingGalleryPayload.isAnimated) return;
    if (loopCoverUi.hidden) return;
    AsciiCameraPreview.loopCoverHoverLatch = true;
    AsciiCameraPreview.syncLoopCoverPreviewPlayback();
  });
  loopCoverUi.addEventListener('mouseleave', function () {
    AsciiCameraPreview.loopCoverHoverLatch = false;
    AsciiCameraPreview.syncLoopCoverPreviewPlayback();
  });
}
if (loopCoverSlider) {
  loopCoverSlider.addEventListener('input', function () {
    if (!AsciiCameraPreview.previewCaptureActive || !AsciiCameraPreview.pendingGalleryPayload || !AsciiCameraPreview.pendingGalleryPayload.isAnimated) return;
    AsciiCameraPreview.loopCoverFrameIndex = parseInt(loopCoverSlider.value, 10) || 0;
    AsciiCameraPreview.applyLoopCoverRotationFromCanonical();
  });
  loopCoverSlider.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return;
    if (!AsciiCameraPreview.previewCaptureActive || !AsciiCameraPreview.pendingGalleryPayload || !AsciiCameraPreview.pendingGalleryPayload.isAnimated) return;
    AsciiCameraPreview.loopCoverPointerDown = true;
    AsciiCameraPreview.syncLoopCoverPreviewPlayback();
  });
  window.addEventListener('mouseup', function () {
    if (!AsciiCameraPreview.loopCoverPointerDown) return;
    AsciiCameraPreview.loopCoverPointerDown = false;
    AsciiCameraPreview.loopCoverHoverLatch = false;
    AsciiCameraPreview.syncLoopCoverPreviewPlayback();
  });
  loopCoverSlider.addEventListener(
    'touchstart',
    function () {
      if (!AsciiCameraPreview.previewCaptureActive || !AsciiCameraPreview.pendingGalleryPayload || !AsciiCameraPreview.pendingGalleryPayload.isAnimated) return;
      AsciiCameraPreview.loopCoverPointerDown = true;
      AsciiCameraPreview.syncLoopCoverPreviewPlayback();
    },
    { passive: true }
  );
  window.addEventListener(
    'touchend',
    function () {
      if (!AsciiCameraPreview.loopCoverPointerDown) return;
      AsciiCameraPreview.loopCoverPointerDown = false;
      AsciiCameraPreview.loopCoverHoverLatch = false;
      AsciiCameraPreview.syncLoopCoverPreviewPlayback();
    },
    { passive: true }
  );
  window.addEventListener(
    'touchcancel',
    function () {
      if (!AsciiCameraPreview.loopCoverPointerDown) return;
      AsciiCameraPreview.loopCoverPointerDown = false;
      AsciiCameraPreview.loopCoverHoverLatch = false;
      AsciiCameraPreview.syncLoopCoverPreviewPlayback();
    },
    { passive: true }
  );
}

window.addEventListener(
  'resize',
  function () {
    if (!loopCoverUi || loopCoverUi.hidden) return;
    AsciiCameraPreview.updateLoopCoverLabelPosition();
  },
  { passive: true }
);

requestAnimationFrame(function () {
  applyCaptureModeUi();
  if (!stream) startRequestRainEffect();
});

/**
 * 在已配置 Supabase URL/anon key 时，用官方 JS client 建立或复用匿名 JWT（无 UI；失败静默）。
 * 将 client 挂到 `window.__ASCII_GALLERY_SUPABASE__`，与 gallery 页一致，供 `gallery-cloud-sync.js` 的 `insertPhotoRow` REST 写入使用 session JWT 与 `user_id`。
 * @returns {Promise<void>}
 */
async function ensureAnonymousSession() {
  try {
    var w = window;
    var url = (w.ASCII_CAMERA_SUPABASE_URL && String(w.ASCII_CAMERA_SUPABASE_URL).trim()) || '';
    var key = (w.ASCII_CAMERA_SUPABASE_ANON_KEY && String(w.ASCII_CAMERA_SUPABASE_ANON_KEY).trim()) || '';
    if (!url || !key) return;
    var existing = w.__ASCII_GALLERY_SUPABASE__;
    if (existing && existing.auth && typeof existing.auth.getSession === 'function') {
      var gotExisting = await existing.auth.getSession();
      if (gotExisting && gotExisting.data && gotExisting.data.session) return;
      if (typeof existing.auth.signInAnonymously === 'function') {
        await existing.auth.signInAnonymously();
      }
      return;
    }
    var mod = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.102.1/+esm');
    var createClient = mod && mod.createClient;
    if (typeof createClient !== 'function') return;
    var supabase = createClient(url, key);
    w.__ASCII_GALLERY_SUPABASE__ = supabase;
    var got = await supabase.auth.getSession();
    if (got && got.data && got.data.session) return;
    if (typeof supabase.auth.signInAnonymously === 'function') {
      await supabase.auth.signInAnonymously();
    }
  } catch (e) {
    /* 静默：离线、CSP、或未启用匿名登录等 */
  }
}

/**
 * 页面加载后异步触发一次 {@link ensureAnonymousSession}，不阻塞首屏渲染。
 * @returns {void}
 */
(function scheduleEnsureAnonymousSession() {
  function run() {
    setTimeout(function () {
      void ensureAnonymousSession();
    }, 0);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
})();
</script>
