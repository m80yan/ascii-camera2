<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASCII Camera</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #00ff41; font-family: monospace, ui-monospace, "Cascadia Code", "Courier New", monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 12px; }
  /* 设计稿 Frame 48091624：顶栏双按钮与底部四控件同宽、同间距 */
  #camera-shell {
    --cam-action-btn-w: 12.5rem;
    --cam-action-gap: 12px;
    /** 主内容列宽：顶栏双按钮行总宽，全页仅此一处定宽 */
    --cam-actions-row-w: calc(var(--cam-action-btn-w) * 2 + var(--cam-action-gap));
    /** 纯画幅区高度（3:4 竖幅基准）；不含其下进度条占位 */
    --ascii-vf-slot-h: calc(var(--cam-actions-row-w) * 4 / 3);
    /** 活动槽总高 = 画幅区 + 距画幅 10px + 条高 6px（进度条在槽内跟画幅走） */
    --ascii-vf-active-slot-total-h: calc(var(--ascii-vf-slot-h) + var(--ascii-vf-progress-band));
    /** 宽比例时活动列距外层取景器左右内边距 */
    --ascii-vf-side-inset: 16px;
    /** 与底栏 `select` 统一高度，供 Photo/Video 分段与下拉对齐 */
    --cam-ctl-select-h: 32px;
    /** 进度条区：距活动画幅 10px + 条高 6px */
    --ascii-vf-progress-band: 16px;
    /** `#ascii-wrap` 内垂直内边距（与下面 `padding: 12px` 一致） */
    --ascii-vf-wrap-pad-y: 12px;
    /**
     * 活动画幅与 overlay 下沿的间距 = 画幅下沿至取景器内底（进度占位 + 底 padding），
     * 使 3:4 等比例下上下留白对称。
     */
    --ascii-vf-active-balance-gap: calc(var(--ascii-vf-progress-band) + var(--ascii-vf-wrap-pad-y));
    /** Overlay 顶距取景器内顶（略下移） */
    --ascii-vf-overlay-top: 10px;
    --ascii-vf-overlay-row-h: var(--cam-ctl-select-h);
    /** Overlay 底距活动槽顶 = 与画幅下方至内底等长 */
    --ascii-vf-overlay-bottom-gap: var(--ascii-vf-active-balance-gap);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: calc(100vh - 48px);
    position: relative;
    z-index: 0;
  }
  /**
   * 主内容列：顶栏双钮 + 状态 + 底部四控件（与活动画幅同宽对齐）；不含外层取景器。
   */
  .camera-content {
    width: 100%;
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    box-sizing: border-box;
  }
  /**
   * 外层取景器（蓝框）：可宽于主列，承载 overlay；宽度不绑 `--cam-actions-row-w`。
   */
  .viewfinder-shell {
    width: 100%;
    max-width: min(560px, 100%);
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 4px;
    box-sizing: border-box;
    position: relative;
  }
  h1 { font-size: 14px; letter-spacing: normal; text-transform: uppercase; margin-bottom: 20px; opacity: 0.6; text-align: center; align-self: center; width: 100%; }
  h1 .cam-title-prefix { letter-spacing: 0.06em; }
  h1 .cam-title-name { letter-spacing: 4px; }
  .cam-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: var(--cam-action-gap);
    width: 100%;
    margin-bottom: 14px;
  }
  .cam-actions button {
    width: var(--cam-action-btn-w);
    max-width: 100%;
    box-sizing: border-box;
    text-align: center;
    min-height: 36px;
    height: 36px;
    padding: 0 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  /** 状态行：占满 `.camera-content` 宽 */
  .cam-status-below-actions {
    width: 100%;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    box-sizing: border-box;
  }
  /** Video 下禁用下拉：强不可交互样式（非仅半透明） */
  select.select-strong-disabled:disabled {
    opacity: 1;
    cursor: not-allowed;
    pointer-events: none;
    background: #070707;
    color: rgba(0, 255, 65, 0.28);
    border-color: rgba(0, 255, 65, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  .ctl-stack.select-locked .ctl-label {
    opacity: 0.35;
  }
  /* 自定义 Flash：与 #2AFD4F 一致；Overlay 在活动列内时右缘对齐活动画幅 */
  .flash-switch {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #2afd4f;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .flash-switch input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    margin: 0;
  }
  .flash-switch-box {
    display: inline-block;
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    border: 1px solid rgba(42, 253, 79, 0.55);
    border-radius: 1px;
    background: transparent;
    box-sizing: border-box;
  }
  .flash-switch input:checked + .flash-switch-box {
    background: #2afd4f;
    border-color: #2afd4f;
    box-shadow: inset 0 0 0 2px #0a0a0a;
  }
  .flash-switch input:focus-visible + .flash-switch-box {
    outline: 1px solid #2afd4f;
    outline-offset: 2px;
  }
  .flash-switch-label { line-height: 1; }
  .ctl-stack { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .ctl-stack .ctl-label { font-size: 11px; opacity: 0.5; letter-spacing: 1px; text-align: left; width: 100%; }
  .ctl-stack select { width: 100%; min-width: 0; }
  /* 底部 2×2：左列与 Stop Camera 同宽，右列与 Take Photo 同宽，与顶栏对齐居中（Frame 48091624） */
  .cam-controls-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--cam-action-gap);
    row-gap: 12px;
    width: 100%;
    margin-left: 0;
    margin-right: 0;
    margin-bottom: 0;
    margin-top: 12px;
    padding-top: 0;
    align-items: start;
    flex-shrink: 0;
    box-sizing: border-box;
    justify-items: stretch;
    position: relative;
    z-index: 40;
  }
  .cam-controls-grid > .ctl-stack {
    width: 100%;
    min-width: 0;
    max-width: 100%;
    align-items: stretch;
  }
  button { background: transparent; border: 1px solid #00ff41; color: #00ff41; font-family: monospace, ui-monospace, "Courier New", monospace; font-size: 11px; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: background 0.2s; }
  button:hover { background: rgba(0,255,65,0.1); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  #snapBtn { border-color: #ffd700; color: #ffd700; text-transform: none; letter-spacing: 1px; }
  #snapBtn:hover:not(:disabled) { background: rgba(255,215,0,0.1); }
  /* 保存中：保持 disabled；与 SAVED 同色便于状态一致 */
  #snapBtn.snap-saving:disabled { opacity: 0.85; cursor: not-allowed; color: #ffd700; border-color: #ffd700; }
  select {
    background: #111;
    border: 1px solid rgba(0,255,65,0.3);
    color: #00ff41;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
    min-height: var(--cam-ctl-select-h);
    box-sizing: border-box;
  }
  /** 仅取景框外闪白；叠在壳内多数内容下、`#ascii-viewer-stack` 下 */
  #flash-outside-root {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }
  .flash-strip {
    position: fixed;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s ease-out;
  }
  #flash-outside-root.on .flash-strip { opacity: 1; }
  #ascii-viewer-stack {
    position: relative;
    z-index: 60;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  /** 与主列同宽，避免在加宽的外层取景器里显得过宽 */
  #ascii-viewer-stack #saved-msg {
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
  }
  #status { font-size: 11px; letter-spacing: 2px; opacity: 0.5; min-height: 22px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; pointer-events: none; text-align: center; color: inherit; }
  #status.live { color: #00ff41; opacity: 1; }
  .status-live-suffix { display: none; align-items: center; flex-shrink: 0; }
  #status.live .status-live-suffix { display: inline-flex; }
  #status .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff41; box-shadow: 0 0 8px rgba(0,255,65,0.85); flex-shrink: 0; }
  /**
   * 外层取景器：固定总高，OFF/ON 一致；内层仅缩放，不撑高外壳。
   * 高度 = 上下 padding + overlay 带 + 活动槽总高（画幅 + 进度条带，同列内）。
   */
  #ascii-wrap {
    width: 100%;
    max-width: none;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    background: #000;
    border: 1px solid rgba(0,255,65,0.2);
    border-radius: 4px;
    padding: var(--ascii-vf-wrap-pad-y);
    box-sizing: border-box;
    height: calc(
      (2 * var(--ascii-vf-wrap-pad-y))
      + var(--ascii-vf-overlay-top)
      + var(--ascii-vf-overlay-row-h)
      + var(--ascii-vf-overlay-bottom-gap)
      + var(--ascii-vf-active-slot-total-h)
    );
    min-height: 0;
    margin-bottom: 4px;
    position: relative;
    overflow: hidden;
  }
  /**
   * Overlay：位于 `.ascii-active-column` 内，宽随活动列；Flash 与活动画幅右缘对齐。
   */
  .ascii-viewfinder-overlay {
    flex: 0 0 auto;
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: var(--ascii-vf-overlay-top);
    margin-bottom: var(--ascii-vf-overlay-bottom-gap);
    pointer-events: none;
  }
  .ascii-viewfinder-overlay * {
    pointer-events: auto;
  }
  .ascii-overlay-inner {
    width: 100%;
    min-height: var(--ascii-vf-overlay-row-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    box-sizing: border-box;
  }
  .ascii-overlay-side {
    min-width: 0;
  }
  .ascii-overlay-tabs {
    grid-column: 2;
    justify-self: center;
    max-width: 100%;
  }
  .ascii-overlay-flash {
    grid-column: 3;
    justify-self: end;
    min-width: 0;
  }
  /** Photo / Video：分段控件（共用外框、段间无空隙） */
  .cam-mode-tabs-wrap {
    display: inline-block;
    max-width: 100%;
  }
  .cam-mode-tabs {
    display: inline-flex;
    align-items: stretch;
    border: 1px solid rgba(42, 253, 79, 0.5);
    border-radius: 0;
    overflow: hidden;
    background: transparent;
    vertical-align: top;
    height: var(--cam-ctl-select-h);
    box-sizing: border-box;
  }
  .cam-mode-tab {
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 10px;
    height: 100%;
    min-height: 0;
    box-sizing: border-box;
    margin: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-right: 1px solid rgba(42, 253, 79, 0.5);
    border-radius: 0;
    background: transparent;
    color: rgba(42, 253, 79, 0.5);
    cursor: pointer;
    flex: 0 0 auto;
  }
  .cam-mode-tab:last-child {
    border-right: none;
  }
  .cam-mode-tab:hover:not(:disabled) {
    color: #2afd4f;
  }
  .cam-mode-tab.active {
    background: rgba(42, 253, 79, 0.5);
    color: #2afd4f;
    border-right-color: rgba(42, 253, 79, 0.5);
    box-shadow: none;
  }
  .cam-mode-tab.active:last-child {
    border-right: none;
  }
  .cam-mode-tab:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  /**
   * 取景器内容区：占满 `#ascii-wrap` 扣除 padding 后的高度。
   */
  .ascii-frame-body {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
  }
  /**
   * 活动列：默认与主按钮/底控件同宽；16:9、4:3 时加宽（仍留边距）。
   */
  .ascii-active-column {
    width: min(100%, var(--cam-actions-row-w));
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    flex: 1 1 auto;
    min-height: 0;
    box-sizing: border-box;
  }
  .ascii-active-column--wide {
    width: calc(100% - 2 * var(--ascii-vf-side-inset));
    max-width: 100%;
  }
  /**
   * 活动槽：含画幅 + 其下 10px + 6px 进度条；外层取景器总高不变。
   */
  .ascii-active-slot {
    width: 100%;
    height: var(--ascii-vf-active-slot-total-h);
    flex: 0 0 var(--ascii-vf-active-slot-total-h);
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    min-height: 0;
  }
  .ascii-slot-inner {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    height: 100%;
    min-height: 0;
  }
  /** Video 锁定的分辨率/比例行（底部网格内整行横跨） */
  .cam-mode-lock-strip {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--cam-action-gap);
    row-gap: 12px;
  }
  .ascii-inner {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  /** 画幅与进度条同宽、进度条距画幅底 10px，随画幅在槽内居中 */
  .ascii-frame-progress-stack {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    max-width: 100%;
    flex: 0 1 auto;
    min-height: 0;
  }
  /**
   * 活动画幅：宽 100% 贴齐 `.ascii-active-column`，高度随所选画面比例；分辨率只改密度。
   */
  .ascii-active-frame {
    width: 100%;
    max-width: 100%;
    position: relative;
    overflow: hidden;
    display: block;
    box-sizing: border-box;
  }
  /** 固定字格渲染后整体 `scale` 入画幅，不改变 `#ascii-out` 字号（保证采样与 `getAsciiCellMetrics` 一致） */
  .ascii-out-scale-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transform-origin: center center;
  }
  .ascii-frame-progress-stack .video-progress-root {
    flex: 0 0 6px;
    width: 100%;
    margin-top: 10px;
    padding-top: 0;
    height: 6px;
    box-sizing: border-box;
  }
  /** 不占布局的隐藏会顶动底栏；用 visibility 保留占位 */
  .video-progress-root.video-progress-root--inactive .video-progress-track {
    visibility: hidden;
    pointer-events: none;
  }
  /** 全宽轨道；实心条从左对齐、宽度 100%→0% 表示从右向左缩短；颜色由 JS 绑 `colorPicker` */
  .video-progress-track {
    position: relative;
    width: 100%;
    height: 6px;
    background: transparent;
    border-radius: 0;
  }
  .video-progress-bar {
    height: 100%;
    width: 100%;
    background: transparent;
    pointer-events: none;
  }
  /* 等宽字宽≠行高：行高与字号一致便于测量为「准方格」比例 */
  #ascii-out { font-family: monospace, ui-monospace, "Courier New", monospace; font-size: 6px; line-height: 6px; letter-spacing: 0; white-space: pre; display: inline-block; }
  /**
   * Camera OFF：提示文案相对 `#ascii-wrap` 整框垂直水平居中（非活动槽 / 非画幅）。
   * `pointer-events: none` 不挡 Photo/Video、Flash 点击。
   */
  .ascii-off-helper {
    display: none;
  }
  #ascii-wrap.ascii-wrap--offline .ascii-off-helper {
    display: flex;
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    bottom: 0;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding-left: 10px;
    padding-right: 10px;
    pointer-events: none;
    z-index: 25;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    line-height: 1.45;
    letter-spacing: 1px;
    color: inherit;
    opacity: 0.5;
    text-align: center;
    white-space: normal;
    overflow-wrap: break-word;
  }
  /** 文案仍写入 `#ascii-out` 供逻辑一致；可视由 `.ascii-off-helper` 承担，此处移出视口不占槽内居中 */
  #ascii-wrap.ascii-wrap--offline .ascii-out-scale-wrap {
    position: absolute;
    left: -9999px;
    top: 0;
    width: 1px;
    height: 1px;
    margin: 0;
    overflow: hidden;
    clip-path: inset(50%);
    transform: none;
  }
  #ascii-wrap.ascii-wrap--offline .ascii-active-frame {
    position: relative;
    width: 100%;
    height: auto;
    min-height: 0;
    flex: 0 0 auto;
    aspect-ratio: unset;
  }
  #ascii-wrap.ascii-wrap--offline #ascii-out {
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 0;
    white-space: pre;
  }
  /** 与实时取景 `#ascii-out` 同字格比例，专供 `getAsciiCellMetrics`，避免 OFF 态大字号撑歪最小高度 */
  .ascii-cell-probe {
    position: absolute;
    left: -9999px;
    top: 0;
    margin: 0;
    padding: 0;
    border: 0;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 0;
    white-space: pre;
    pointer-events: none;
    visibility: hidden;
  }
  #saved-msg { margin: 4px 0 0; font-size: 12px; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; color: #ffd700; min-height: 20px; text-align: center; width: 100%; }
  #saved-msg.show { opacity: 1; }
  video, canvas { display: none; }
  /* Notion 等 iframe 嵌入时提示：摄像头需在独立标签页使用 */
  .iframe-hint {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: var(--cam-actions-row-w);
    margin: -8px auto 14px;
    padding: 10px 12px;
    border: 1px solid rgba(255, 215, 0, 0.45);
    color: #ffd700;
    font-size: 11px;
    letter-spacing: 1px;
    line-height: 1.45;
    text-align: center;
    box-sizing: border-box;
  }
  .iframe-hint[hidden] { display: none !important; }
  .iframe-hint-link {
    color: #00ff41;
    border: 1px solid rgba(0, 255, 65, 0.5);
    padding: 4px 12px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 10px;
    font-family: monospace, ui-monospace, "Courier New", monospace;
  }
  .iframe-hint-link:hover { background: rgba(0, 255, 65, 0.1); }
</style>
</head>
<body>
<div id="camera-shell">
<h1><span class="cam-title-prefix">[◉”]</span> <span class="cam-title-name">ASCII CAMERA</span></h1>
<div id="iframe-hint" class="iframe-hint" hidden role="note">
  <span class="iframe-hint-text">Embedded preview blocks camera — use a full browser tab.</span>
  <a id="iframe-open-tab" class="iframe-hint-link" href="#">Open in new tab</a>
</div>
<div class="camera-content">
<div class="cam-actions">
  <button id="startBtn" type="button">Start Camera</button>
  <button id="snapBtn" type="button" disabled>📷 Take Photo</button>
</div>
<div class="cam-status-below-actions">
  <div id="status">
    <span class="status-text">CAMERA OFF</span>
    <span class="status-live-suffix" aria-hidden="true">
      <span class="status-dot"></span>
    </span>
  </div>
</div>
</div>
<div class="viewfinder-shell">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="flash-outside-root" aria-hidden="true">
  <div id="flash-strip-top" class="flash-strip"></div>

<script>
/** 由 `gallery-storage.js` 挂载 */
var AsciiCameraGalleryStorage = window.AsciiCameraGalleryStorage;

/** 测量失败时的字宽/行高比回退值 */
const CELL_ASPECT_FALLBACK = 0.55;
/** 分辨率列数上限（仅影响采样密度，不改变 `.camera-content` 定宽画幅）。 */
const MAX_RES_COLS = 120;
/** @type {{ cellAspect: number, lineHeightPx: number } | null} */
let asciiCellMetricsCache = null;
/** 使用块符与点阵，减轻笔画字符宽高差带来的形变 */
const CHAR_SETS = {
  detailed: '\u2588\u2593\u2592\u2591\u00B7 ',
  simple:   '\u2588\u2592\u00B7 ',
  blocks:   '\u2588\u2593\u2592\u2591 ',
  binary:   '\u2588\u2591 '
};
let stream = null, animId = null;
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d', { willReadFrequently: true });
const out      = document.getElementById('ascii-out');
const asciiOffHelper = document.getElementById('asciiOffHelper');
const asciiCellProbe = document.getElementById('ascii-cell-probe');
const asciiWrap = document.getElementById('ascii-wrap');
const startBtn = document.getElementById('startBtn');
const snapBtn  = document.getElementById('snapBtn');
const statusEl = document.getElementById('status');
const savedMsg = document.getElementById('saved-msg');
const colorPicker    = document.getElementById('colorPicker');
const densityPicker  = document.getElementById('densityPicker');
const resPicker      = document.getElementById('resPicker');
const aspectPicker   = document.getElementById('aspectPicker');
const flashOutsideRoot = document.getElementById('flash-outside-root');
const flashStripTop = document.getElementById('flash-strip-top');
const flashStripLeft = document.getElementById('flash-strip-left');
const flashStripRight = document.getElementById('flash-strip-right');
const flashStripBottom = document.getElementById('flash-strip-bottom');
const flashToggle    = document.getElementById('flashToggle');
const cameraShell    = document.getElementById('camera-shell');
const camTabPhoto    = document.getElementById('camTabPhoto');
const camTabVideo    = document.getElementById('camTabVideo');
const videoProgressRoot = document.getElementById('video-progress-root');
const videoProgressBar = document.getElementById('video-progress-bar');
const resPickerStack = document.getElementById('resPickerStack');
const aspectPickerStack = document.getElementById('aspectPickerStack');
const asciiActiveFrame = document.getElementById('asciiActiveFrame');
const asciiActiveColumn = document.getElementById('asciiActiveColumn');
const asciiOutScaleWrap = document.getElementById('asciiOutScaleWrap');
const iframeHint     = document.getElementById('iframe-hint');
const iframeOpenTab  = document.getElementById('iframe-open-tab');

/** 拍照按钮就绪文案（与 HTML 初始一致） */
const SNAP_LABEL_READY = '📷 Take Photo';
/** Video 模式就绪文案 */
const SNAP_LABEL_VIDEO = '🎥 Record';
/** 写入存储过程中按钮文案 */
const SNAP_LABEL_SAVING = 'Saving...';
/** 动画录制：列数、帧率、时长与 Supabase 约定一致 */
const VIDEO_COLS = 60;
const VIDEO_FRAME_COUNT = 12;
const VIDEO_FPS = 6;
const VIDEO_DURATION_MS = 2000;
/** Video：冻结帧上展示黄色「SAVED」的最短时长（ms） */
const VIDEO_POST_RECORD_FREEZE_MS = 1000;

/** @type {boolean} */
let videoMode = false;
/** Photo 模式下切到 Video 前记住的分辨率 / 比例 */
let savedPhotoResValue = '';
let savedPhotoAspectValue = '';

/**
 * 按 `#ascii-wrap` 在视口中的矩形，布置四块闪白条带（不覆盖取景内容）。
 * @returns {void}
 */
function layoutFlashOutsideStrips() {
  if (!flashStripTop || !asciiWrap) return;
  var r = asciiWrap.getBoundingClientRect();
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var topH = Math.max(0, r.top);
  var leftW = Math.max(0, r.left);
  var rightW = Math.max(0, vw - r.right);
  var bottomH = Math.max(0, vh - r.bottom);
  flashStripTop.style.left = '0px';
  flashStripTop.style.top = '0px';
  flashStripTop.style.width = vw + 'px';
  flashStripTop.style.height = topH + 'px';
  flashStripLeft.style.left = '0px';
  flashStripLeft.style.top = r.top + 'px';
  flashStripLeft.style.width = leftW + 'px';
  flashStripLeft.style.height = Math.max(0, r.height) + 'px';
  flashStripRight.style.left = r.right + 'px';
  flashStripRight.style.top = r.top + 'px';
  flashStripRight.style.width = rightW + 'px';
  flashStripRight.style.height = Math.max(0, r.height) + 'px';
  flashStripBottom.style.left = '0px';
  flashStripBottom.style.top = r.bottom + 'px';
  flashStripBottom.style.width = vw + 'px';
  flashStripBottom.style.height = bottomH + 'px';
}

/**
 * 同步 Photo / Video 标签高亮状态。
 * @returns {void}
 */
function updateModeTabsUi() {
  if (camTabPhoto && camTabVideo) {
    camTabPhoto.classList.toggle('active', !videoMode);
    camTabPhoto.setAttribute('aria-selected', videoMode ? 'false' : 'true');
    camTabVideo.classList.toggle('active', videoMode);
    camTabVideo.setAttribute('aria-selected', videoMode ? 'true' : 'false');
  }
}

/**
 * 根据当前模式更新 Video 锁定的分辨率 / 比例与按钮文案。
 * @returns {void}
 */
function applyCaptureModeUi() {
  if (cameraShell) cameraShell.classList.toggle('cam-video-mode', videoMode);
  aspectPicker.disabled = videoMode;
  resPicker.disabled = videoMode;
  resPicker.classList.toggle('select-strong-disabled', videoMode);
  aspectPicker.classList.toggle('select-strong-disabled', videoMode);
  if (resPickerStack) resPickerStack.classList.toggle('select-locked', videoMode);
  if (aspectPickerStack) aspectPickerStack.classList.toggle('select-locked', videoMode);
  if (videoMode) {
    resPicker.value = String(VIDEO_COLS);
    aspectPicker.value = '1:1';
    snapBtn.textContent = SNAP_LABEL_VIDEO;
  } else {
    if (savedPhotoResValue && resPicker.querySelector('option[value="' + savedPhotoResValue + '"]')) {
      resPicker.value = savedPhotoResValue;
    }
    if (savedPhotoAspectValue) aspectPicker.value = savedPhotoAspectValue;
    snapBtn.textContent = SNAP_LABEL_READY;
  }
  updateModeTabsUi();
  syncVideoProgressBarForMode();
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
  if (stream && animId == null) render();
}

/**
 * Video 且摄像头开时显示进度条；否则隐藏条但保留占位，避免顶动布局。
 * @returns {void}
 */
function syncVideoProgressBarForMode() {
  if (!videoProgressRoot || !videoProgressBar) return;
  if (videoMode && stream) {
    videoProgressRoot.classList.remove('video-progress-root--inactive');
    videoProgressRoot.setAttribute('aria-hidden', 'false');
    videoProgressBar.style.width = '100%';
  } else {
    videoProgressRoot.classList.add('video-progress-root--inactive');
    videoProgressRoot.setAttribute('aria-hidden', 'true');
    videoProgressBar.style.width = '100%';
  }
}

/**
 * 视频进度条填充色与当前「Color」下拉及 `#ascii-out` 一致。
 * @returns {void}
 */
function syncVideoProgressBarColor() {
  if (!videoProgressBar || !colorPicker) return;
  videoProgressBar.style.backgroundColor = colorPicker.value;
}

/**
 * @param {boolean} nextVideo 是否进入 Video
 * @returns {void}
 */
function setCaptureVideoMode(nextVideo) {
  if (nextVideo && !videoMode) {
    savedPhotoResValue = resPicker.value;
    savedPhotoAspectValue = aspectPicker.value;
  }
  videoMode = !!nextVideo;
  applyCaptureModeUi();
}

updateModeTabsUi();
syncVideoProgressBarForMode();
window.addEventListener('resize', function () {
  layoutFlashOutsideStrips();
});

/**
 * 是否在第三方 iframe 中（如 Notion embed）；跨域访问 `window.top` 会抛错，视为已嵌入。
 * @returns {boolean}
 */
function isEmbeddedInFrame() {
  try {
    return window.self !== window.top;
  } catch (e) {
    return true;
  }
}

/**
 * 在新标签页打开当前相机页，绕过嵌入页的摄像头限制（需在用户点击等手势中调用）。
 * @returns {Window | null}
 */
function openCameraInNewTab() {
  var name = AsciiCameraGalleryStorage.CAMERA_POPUP_WINDOW_NAME || 'ascii_camera_notion_embed';
  return window.open(window.location.href, name);
}

if (iframeHint && iframeOpenTab && isEmbeddedInFrame()) {
  iframeHint.hidden = false;
  iframeOpenTab.addEventListener('click', function (e) {
    e.preventDefault();
    openCameraInNewTab();
  });
}

/** @type {boolean} */
let snapCountdownActive = false;

if (camTabPhoto) {
  camTabPhoto.addEventListener('click', function () {
    if (snapCountdownActive) return;
    setCaptureVideoMode(false);
  });
}
if (camTabVideo) {
  camTabVideo.addEventListener('click', function () {
    if (snapCountdownActive) return;
    setCaptureVideoMode(true);
  });
}

/**
 * 测量 `#ascii-out` 实际单格宽高比（字宽÷行高），使采样列×行与屏幕像素块对齐；1:1 时画面呈正方形。
 * @returns {{ cellAspect: number, lineHeightPx: number }}
 */
function getAsciiCellMetrics() {
  if (asciiCellMetricsCache) return asciiCellMetricsCache;
  const probeEl = asciiCellProbe && asciiCellProbe.isConnected ? asciiCellProbe : out;
  const m = measureMonospaceCellFromElement(probeEl);
  asciiCellMetricsCache = m;
  return m;
}

/**
 * @param {HTMLElement} el 与 ASCII 输出使用相同样式的元素（如 `#ascii-out`）
 * @returns {{ cellAspect: number, lineHeightPx: number }}
 */
function measureMonospaceCellFromElement(el) {
  const cs = getComputedStyle(el);
  const fontSize = parseFloat(cs.fontSize) || 6;
  let lineHeightPx = parseFloat(cs.lineHeight);
  if (!Number.isFinite(lineHeightPx) || cs.lineHeight === 'normal' || String(cs.lineHeight).endsWith('%')) {
    lineHeightPx = fontSize;
  }
  const fontShorthand = cs.font && cs.font.length > 2 ? cs.font : [cs.fontStyle, cs.fontWeight, cs.fontSize, cs.fontFamily].filter(Boolean).join(' ');
  let charW = 0;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  if (ctx) {
    ctx.font = fontShorthand;
    charW = ctx.measureText('0').width;
  }
  if (!charW || charW <= 0) {
    const probe = document.createElement('span');
    probe.setAttribute('style', [
      'position:absolute', 'left:-9999px', 'visibility:hidden', 'white-space:pre',
      'font:' + fontShorthand, 'font-family:' + cs.fontFamily, 'font-size:' + cs.fontSize,
      'font-weight:' + cs.fontWeight, 'line-height:' + cs.lineHeight, 'letter-spacing:' + cs.letterSpacing
    ].join(';'));
    probe.textContent = '0';
    document.body.appendChild(probe);
    charW = probe.offsetWidth;
    document.body.removeChild(probe);
  }
  const cellAspect = charW > 0 && lineHeightPx > 0 ? charW / lineHeightPx : CELL_ASPECT_FALLBACK;
  return { cellAspect, lineHeightPx };
}

function invalidateAsciiCellMetrics() {
  asciiCellMetricsCache = null;
}

/** @type {number} */
let asciiScaleRaf = 0;

/**
 * 按当前 Photo/Video 与 Aspect 设置活动画幅的 `aspect-ratio`（宽恒为内容列 100%，高随比例）。
 * @returns {void}
 */
function syncAsciiActiveFrameAspect() {
  if (!asciiActiveFrame || !asciiWrap) return;
  if (asciiWrap.classList.contains('ascii-wrap--offline')) {
    asciiActiveFrame.style.aspectRatio = '';
    return;
  }
  var ar = videoMode ? 1 : getAspectRatio();
  asciiActiveFrame.style.aspectRatio = ar + ' / 1';
}

/**
 * 在固定字格下测量 `#ascii-out` 占位，整体 `scale` 以填入 `.ascii-active-frame`（contain，居中）。
 * Camera OFF（`.ascii-wrap--offline`）时清除内联 `left` / `top` / `transform`；可视提示由 `#ascii-wrap` 上的 `.ascii-off-helper` 负责。
 * @returns {void}
 */
function updateAsciiOutScale() {
  if (!asciiOutScaleWrap || !out || !asciiActiveFrame || !asciiWrap) return;
  if (asciiWrap.classList.contains('ascii-wrap--offline')) {
    asciiOutScaleWrap.style.transform = '';
    asciiOutScaleWrap.style.left = '';
    asciiOutScaleWrap.style.top = '';
    return;
  }
  var cw = asciiActiveFrame.clientWidth;
  var ch = asciiActiveFrame.clientHeight;
  if (cw < 2 || ch < 2) return;
  asciiOutScaleWrap.style.transform = 'translate(-50%, -50%)';
  void out.offsetWidth;
  var wi = out.offsetWidth;
  var hi = out.offsetHeight;
  if (wi < 1 || hi < 1) return;
  var s = Math.min(cw / wi, ch / hi);
  asciiOutScaleWrap.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
}

/**
 * 合并宽高比与缩放更新，下一帧执行缩放以避免与刚写入的 DOM 不同步。
 * @returns {void}
 */
function scheduleAsciiScale() {
  if (asciiScaleRaf) cancelAnimationFrame(asciiScaleRaf);
  asciiScaleRaf = requestAnimationFrame(function () {
    asciiScaleRaf = 0;
    updateAsciiOutScale();
  });
}

/**
 * 16:9 / 4:3 时加宽活动列；1:1、3:4、Video 保持与主按钮列同宽。
 * @returns {void}
 */
function syncAsciiActiveColumnWidthClass() {
  if (!asciiActiveColumn || !aspectPicker) return;
  var ap = aspectPicker.value;
  var wide = !videoMode && (ap === '16:9' || ap === '4:3');
  asciiActiveColumn.classList.toggle('ascii-active-column--wide', wide);
}

/**
 * 取景器内活动区布局同步：列宽、比例、缩放。
 * @returns {void}
 */
function syncAsciiLayout() {
  syncAsciiActiveColumnWidthClass();
  syncAsciiActiveFrameAspect();
  scheduleAsciiScale();
}

/**
 * @returns {number} 当前选取的列数，限制在 1 … MAX_RES_COLS（Video 模式固定 60）
 */
function getCols() {
  if (videoMode) return VIDEO_COLS;
  const n = parseInt(resPicker.value, 10);
  if (!Number.isFinite(n)) return 100;
  return Math.min(MAX_RES_COLS, Math.max(1, n));
}

colorPicker.addEventListener('change', function () {
  out.style.color = colorPicker.value;
  syncVideoProgressBarColor();
});
resPicker.addEventListener('change', function () {
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
});
aspectPicker.addEventListener('change', function () {
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
});
densityPicker.addEventListener('change', function () {
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
});
window.addEventListener('resize', function () {
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
});
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(function () {
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
  });
}
if (typeof ResizeObserver !== 'undefined') {
  var asciiFrameResizeObserver = new ResizeObserver(function () {
    scheduleAsciiScale();
  });
  if (asciiActiveFrame) asciiFrameResizeObserver.observe(asciiActiveFrame);
  if (asciiActiveColumn) asciiFrameResizeObserver.observe(asciiActiveColumn);
}
syncAsciiLayout();
syncVideoProgressBarColor();

/**
 * @param {number} ms
 * @returns {Promise<void>}
 */
function sleep(ms) {
  return new Promise(function (resolve) { setTimeout(resolve, ms); });
}

function getChars() {
  return CHAR_SETS[densityPicker.value] || CHAR_SETS.detailed;
}

function getAspectRatio() {
  const v = aspectPicker.value;
  if (v === '16:9') return 16 / 9;
  if (v === '4:3') return 4 / 3;
  if (v === '3:4') return 3 / 4;
  if (v === '1:1') return 1;
  return 1;
}

/**
 * 将当前视频帧转为 ASCII。行数 = cols×(字宽/行高)÷画面宽高比，使像素块与等宽字格对齐。
 * @param {number} cols 列数
 * @param {number | null | undefined} aspectOverride 指定画面宽高比（如 Video 1:1）；省略时用下拉框
 * @returns {string} ASCII 文本
 */
function toAscii(cols, aspectOverride) {
  if (!video.videoWidth || !video.videoHeight) return '';
  const chars = getChars();
  const { cellAspect } = getAsciiCellMetrics();
  const forcedAspect =
    aspectOverride != null && Number.isFinite(aspectOverride) ? aspectOverride : getAspectRatio();
  const nativeAspect = video.videoWidth / video.videoHeight;
  const aspect = forcedAspect || nativeAspect;
  const rows = Math.max(1, Math.round((cols * cellAspect) / aspect));
  canvas.width = cols; canvas.height = rows;
  ctx.save();
  ctx.translate(cols, 0); ctx.scale(-1, 1);
  if (forcedAspect) {
    let sx = 0, sy = 0, sw = video.videoWidth, sh = video.videoHeight;
    if (nativeAspect > forcedAspect) {
      sw = Math.round(video.videoHeight * forcedAspect);
      sx = Math.round((video.videoWidth - sw) / 2);
    } else {
      sh = Math.round(video.videoWidth / forcedAspect);
      sy = Math.round((video.videoHeight - sh) / 2);
    }
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cols, rows);
  } else {
    ctx.drawImage(video, 0, 0, cols, rows);
  }
  ctx.restore();
  const pixels = ctx.getImageData(0, 0, cols, rows).data;
  let result = '';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * cols + x) * 4;
      const b = (0.299*pixels[i] + 0.587*pixels[i+1] + 0.114*pixels[i+2]) / 255;
      result += chars[Math.max(0, Math.min(Math.floor((1-b)*(chars.length-1)), chars.length-1))];
    }
    result += '\n';
  }
  return result;
}

function render() {
  out.textContent = toAscii(getCols());
  animId = requestAnimationFrame(render);
}

/**
 * 保存成功后不关闭本窗口：由 Gallery 用固定 `window.open` 名打开的相机页可反复使用；仅尝试把焦点还给嵌入里的 Gallery。
 * @returns {void}
 */
function focusOpenerGalleryAfterSave() {
  try {
    var o = window.opener;
    if (o && o !== window && !o.closed) {
      try {
        o.focus();
      } catch (e) {
        /* 跨域或策略限制 */
      }
    }
  } catch (e2) {}
}

/**
 * 录制多帧 ASCII（6 FPS × 2s = 12 帧）；不停止实时取景 RAF。进度条由外部 rAF 按墙钟驱动。
 * @returns {Promise<string[]>}
 */
async function captureVideoAsciiFrames() {
  var frames = [];
  var t0 = performance.now();
  for (var i = 0; i < VIDEO_FRAME_COUNT; i++) {
    var targetMs = (i / VIDEO_FPS) * 1000;
    var now;
    for (;;) {
      now = performance.now() - t0;
      if (now >= targetMs - 0.5) break;
      var wait = Math.min(32, targetMs - now);
      if (wait > 1) await sleep(wait);
    }
    frames.push(toAscii(VIDEO_COLS, 1));
  }
  return frames;
}

/**
 * 将静态一帧或动画作品写入本机存储并同步 opener / 云端。
 * @param {string | { isAnimated: true, ascii: string, frames: string[], frameCount?: number, fps?: number, durationMs?: number }} payload 静态时为 ascii 字符串
 * @returns {Promise<boolean>} 持久化成功时为 true
 */
async function persistPhotoToGallery(payload) {
  try {
    var isAnim =
      payload &&
      typeof payload === 'object' &&
      payload.isAnimated === true &&
      Array.isArray(payload.frames) &&
      payload.frames.length > 0;
    var asciiStr = isAnim ? String(payload.ascii || payload.frames[0] || '') : String(payload || '');
    /** @type {{ ascii: string, color: string, time: number, isAnimated?: boolean, frameCount?: number, fps?: number, durationMs?: number }} */
    var photoPayload = {
      ascii: asciiStr,
      color: colorPicker.value,
      time: Date.now()
    };
    if (isAnim) {
      photoPayload.isAnimated = true;
      photoPayload.frameCount =
        typeof payload.frameCount === 'number' ? payload.frameCount : VIDEO_FRAME_COUNT;
      photoPayload.fps = typeof payload.fps === 'number' ? payload.fps : VIDEO_FPS;
      photoPayload.durationMs =
        typeof payload.durationMs === 'number' ? payload.durationMs : VIDEO_DURATION_MS;
    }
    AsciiCameraGalleryStorage.prependUserPhoto(photoPayload);
    var savedRow = AsciiCameraGalleryStorage.loadUserPhotos()[0];
    try {
      var o = window.opener;
      if (o && o !== window && !o.closed && AsciiCameraGalleryStorage.galleryOpenerNeedsPostMessage(o)) {
        var msgPhoto = {
          ascii: savedRow ? savedRow.ascii : photoPayload.ascii,
          color: savedRow ? savedRow.color : photoPayload.color,
          time: savedRow ? savedRow.time : photoPayload.time
        };
        if (savedRow && typeof savedRow.id === 'string' && savedRow.id) msgPhoto.id = savedRow.id;
        if (isAnim) {
          msgPhoto.isAnimated = true;
          msgPhoto.frameCount = photoPayload.frameCount;
          msgPhoto.fps = photoPayload.fps;
          msgPhoto.durationMs = photoPayload.durationMs;
          if (Array.isArray(payload.frames)) msgPhoto.frames = payload.frames;
        }
        o.postMessage(
          {
            type: AsciiCameraGalleryStorage.GALLERY_PREPEND_MESSAGE_TYPE,
            photo: msgPhoto
          },
          window.location.origin
        );
      }
    } catch (eOpener) { /* 跨域或策略限制 */ }
    if (window.AsciiCameraGalleryCloudSync && AsciiCameraGalleryCloudSync.isEnabled()) {
      var syncCam = AsciiCameraGalleryCloudSync;
      if (syncCam.getProvider() === 'supabase' && typeof syncCam.insertPhotoRow === 'function') {
        /** @type {{ ascii: string, color?: string, time?: number, id?: string, isAnimated?: boolean, frames?: string[], frameCount?: number, fps?: number, durationMs?: number }} */
        var insertPayload = Object.assign({}, savedRow || photoPayload);
        if (isAnim && payload.frames) insertPayload.frames = payload.frames;
        var camIns = await syncCam.insertPhotoRow(insertPayload);
        if (!camIns) {
          AsciiCameraGalleryStorage.deleteUserPhotoAt(0);
        }
      } else {
        syncCam.pushFromLocal().catch(function () {});
      }
    }
    return true;
  } catch (e) {
    console.error(e);
    return false;
  }
}

/**
 * 恢复实时取景 RAF（冻结结束后调用；避免重复循环）。
 * @returns {void}
 */
function restartLiveAsciiPreview() {
  if (!stream) return;
  if (animId != null) cancelAnimationFrame(animId);
  animId = null;
  out.style.color = colorPicker.value;
  syncVideoProgressBarColor();
  render();
}

function setStatusOffline() {
  statusEl.classList.remove('live');
  statusEl.querySelector('.status-text').textContent = 'CAMERA OFF';
}

function setStatusLive() {
  statusEl.classList.add('live');
  statusEl.querySelector('.status-text').textContent = 'CAMERA ON';
}

startBtn.addEventListener('click', async () => {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    if (animId != null) cancelAnimationFrame(animId);
    animId = null;
    startBtn.textContent = 'Start Camera';
    snapBtn.disabled = true;
    snapCountdownActive = false;
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
    setStatusOffline();
    if (asciiWrap) asciiWrap.classList.add('ascii-wrap--offline');
    out.textContent = 'Click "Start Camera" to begin';
    if (asciiOffHelper) asciiOffHelper.textContent = 'Click "Start Camera" to begin';
    out.setAttribute('aria-hidden', 'true');
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    syncVideoProgressBarForMode();
    return;
  }
  if (isEmbeddedInFrame()) {
    const opened = openCameraInNewTab();
    statusEl.querySelector('.status-text').textContent = opened
      ? 'Opened in new tab'
      : 'Allow pop-ups or use “Open in new tab” above';
    return;
  }
  try {
    statusEl.querySelector('.status-text').textContent = 'Requesting…';
    statusEl.classList.remove('live');
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
    video.srcObject = stream; await video.play();
    startBtn.textContent = 'Stop Camera';
    snapBtn.disabled = false;
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
    setStatusLive();
    if (asciiWrap) asciiWrap.classList.remove('ascii-wrap--offline');
    out.removeAttribute('aria-hidden');
    out.style.color = colorPicker.value;
    syncVideoProgressBarColor();
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    syncVideoProgressBarForMode();
    render();
    requestAnimationFrame(function () {
      requestAnimationFrame(syncAsciiLayout);
    });
  } catch (e) {
    setStatusOffline();
    statusEl.querySelector('.status-text').textContent = 'Access denied';
    out.textContent = 'Camera access denied';
    if (asciiOffHelper) asciiOffHelper.textContent = out.textContent;
    if (asciiWrap) asciiWrap.classList.add('ascii-wrap--offline');
    out.setAttribute('aria-hidden', 'true');
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
  }
});

/**
 * 3s 倒计时（按钮 3→2→1）。
 * Photo：最后一秒开闪，该秒结束后关闪再抓拍（行为不变）。
 * Video：最后一秒开始时开闪（比录制早 1s，作同步缓冲），常亮共 3s（1s 倒计时末 + 2s 录制），录制结束关闪。
 */
snapBtn.addEventListener('click', async () => {
  if (!stream || snapCountdownActive) return;
  const cols = getCols();
  const ctl = [densityPicker, colorPicker, resPicker, aspectPicker, camTabPhoto, camTabVideo];
  /** @type {number | null} Video 录制结束并冻结 `#ascii-out` 的时刻（用于区分 Photo / Video 保存提示流程） */
  var videoFreezeStartMs = null;
  snapCountdownActive = true;
  snapBtn.disabled = true;
  startBtn.disabled = true;
  ctl.forEach(function (el) {
    if (el) el.disabled = true;
  });
  const useFlash = flashToggle.checked;
  try {
    for (let n = 3; n >= 1; n--) {
      snapBtn.textContent = String(n);
      if (useFlash && n === 1) {
        layoutFlashOutsideStrips();
        if (flashOutsideRoot) flashOutsideRoot.classList.add('on');
      }
      await sleep(1000);
      if (useFlash && n === 1 && flashOutsideRoot && !videoMode) {
        flashOutsideRoot.classList.remove('on');
      }
    }

    var persistArg;
    if (!videoMode) {
      if (animId != null) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      var capturedAscii = toAscii(cols);
      out.textContent = capturedAscii;
      persistArg = capturedAscii;
    } else {
      if (videoProgressBar) videoProgressBar.style.width = '100%';
      var recRaf = 0;
      var tRec = performance.now();
      /**
       * 按 2s 墙钟缩短实心白条宽度（左对齐，从右侧收回）。
       * @returns {void}
       */
      function tickRecProgress() {
        var p = Math.min(1, (performance.now() - tRec) / VIDEO_DURATION_MS);
        if (videoProgressBar) videoProgressBar.style.width = (1 - p) * 100 + '%';
        if (p < 1) recRaf = requestAnimationFrame(tickRecProgress);
      }
      recRaf = requestAnimationFrame(tickRecProgress);
      var vf;
      try {
        vf = await captureVideoAsciiFrames();
      } finally {
        cancelAnimationFrame(recRaf);
        if (videoProgressBar) videoProgressBar.style.width = '0%';
        if (useFlash && flashOutsideRoot) flashOutsideRoot.classList.remove('on');
      }
      if (animId != null) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      var lastV = vf && vf.length ? vf[vf.length - 1] : '';
      out.textContent = lastV;
      videoFreezeStartMs = performance.now();
      persistArg = {
        isAnimated: true,
        ascii: vf[0] || '',
        frames: vf,
        frameCount: VIDEO_FRAME_COUNT,
        fps: VIDEO_FPS,
        durationMs: VIDEO_DURATION_MS
      };
    }

    snapBtn.textContent = SNAP_LABEL_SAVING;
    snapBtn.classList.add('snap-saving');
    snapBtn.setAttribute('aria-busy', 'true');
    var isVideoCapture = videoFreezeStartMs != null;
    if (!isVideoCapture) {
      savedMsg.textContent = SNAP_LABEL_SAVING;
      savedMsg.style.color = '#ffd700';
      savedMsg.classList.add('show');
    }

    var ok = await persistPhotoToGallery(persistArg);

    if (ok) {
      if (isVideoCapture) {
        savedMsg.textContent = 'SAVED';
        savedMsg.style.color = '#ffd700';
        savedMsg.classList.add('show');
        await sleep(VIDEO_POST_RECORD_FREEZE_MS);
        savedMsg.classList.remove('show');
        await sleep(400);
        focusOpenerGalleryAfterSave();
        await sleep(1800);
      } else {
        savedMsg.classList.remove('show');
        savedMsg.textContent = 'SAVED';
        savedMsg.style.color = '#ffd700';
        savedMsg.classList.add('show');
        await sleep(400);
        focusOpenerGalleryAfterSave();
        await sleep(1800);
        savedMsg.classList.remove('show');
      }
    } else {
      savedMsg.classList.remove('show');
      savedMsg.textContent = 'Save failed: storage full, unavailable, or disabled.';
      savedMsg.style.color = '#ff4444';
      savedMsg.classList.add('show');
      await sleep(2500);
      savedMsg.classList.remove('show');
    }
  } catch (err) {
    console.error(err);
    savedMsg.textContent = 'Save failed: something went wrong.';
    savedMsg.style.color = '#ff4444';
    savedMsg.classList.add('show');
    await sleep(2500);
    savedMsg.classList.remove('show');
  } finally {
    if (flashOutsideRoot) flashOutsideRoot.classList.remove('on');
    snapBtn.classList.remove('snap-saving');
    snapBtn.removeAttribute('aria-busy');
    snapCountdownActive = false;
    startBtn.disabled = false;
    ctl.forEach(function (el) {
      if (!el) return;
      if (el === camTabPhoto || el === camTabVideo) el.disabled = false;
      else if (el === resPicker || el === aspectPicker) {
        el.disabled = videoMode;
      } else el.disabled = false;
    });
    restartLiveAsciiPreview();
    syncVideoProgressBarForMode();
    syncAsciiLayout();
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
    snapBtn.disabled = !stream;
  }
});
</script>
</body>
