<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASCII Camera</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #00ff41; font-family: monospace, ui-monospace, "Cascadia Code", "Courier New", monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 12px; }
  /* 设计稿 Frame 48091624：顶栏双按钮与底部四控件同宽、同间距 */
  #camera-shell {
    --cam-action-btn-w: 12.5rem;
    --cam-action-gap: 12px;
    /** 主内容列宽：顶栏双按钮行总宽，全页仅此一处定宽 */
    --cam-actions-row-w: calc(var(--cam-action-btn-w) * 2 + var(--cam-action-gap));
    /** 纯画幅区高度（3:4 竖幅基准）；不含其下进度条占位 */
    --ascii-vf-slot-h: calc(var(--cam-actions-row-w) * 4 / 3);
    /** 活动槽总高 = 画幅区 + 距画幅 10px + 条高 6px（进度条在槽内跟画幅走） */
    --ascii-vf-active-slot-total-h: calc(var(--ascii-vf-slot-h) + var(--ascii-vf-progress-band));
    /** 宽比例时活动列距外层取景器左右内边距 */
    --ascii-vf-side-inset: 16px;
    /** 与底栏 `select` 统一高度，供 Photo/Video 分段与下拉对齐 */
    --cam-ctl-select-h: 32px;
    /** 进度条区：距活动画幅 10px + 条高 6px */
    --ascii-vf-progress-band: 16px;
    /** `#ascii-wrap` 内垂直内边距（与下面 `padding: 12px` 一致） */
    --ascii-vf-wrap-pad-y: 12px;
    /**
     * 活动画幅与 overlay 下沿的间距 = 画幅下沿至取景器内底（进度占位 + 底 padding），
     * 使 3:4 等比例下上下留白对称。
     */
    --ascii-vf-active-balance-gap: calc(var(--ascii-vf-progress-band) + var(--ascii-vf-wrap-pad-y));
    /** Overlay 顶距取景器内顶（略下移） */
    --ascii-vf-overlay-top: 10px;
    --ascii-vf-overlay-row-h: var(--cam-ctl-select-h);
    /** Overlay 底距活动槽顶 = 与画幅下方至内底等长 */
    --ascii-vf-overlay-bottom-gap: var(--ascii-vf-active-balance-gap);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: calc(100vh - 48px);
    position: relative;
    z-index: 0;
  }
  /**
   * 主内容列：顶栏双钮 + 状态 + 底部四控件（与活动画幅同宽对齐）；不含外层取景器。
   */
  .camera-content {
    width: 100%;
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    box-sizing: border-box;
  }
  /**
   * 外层取景器（蓝框）：可宽于主列，承载 overlay；宽度不绑 `--cam-actions-row-w`。
   */
  .viewfinder-shell {
    width: 100%;
    max-width: min(560px, 100%);
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 4px;
    box-sizing: border-box;
    position: relative;
  }
  h1 { font-size: 14px; letter-spacing: normal; text-transform: uppercase; margin-bottom: 20px; opacity: 0.6; text-align: center; align-self: center; width: 100%; }
  h1 .cam-title-prefix { letter-spacing: 0.06em; }
  h1 .cam-title-name { letter-spacing: 4px; }
  .cam-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: var(--cam-action-gap);
    width: 100%;
    margin-bottom: 14px;
  }
  .cam-actions button {
    width: var(--cam-action-btn-w);
    max-width: 100%;
    box-sizing: border-box;
    text-align: center;
    min-height: 36px;
    height: 36px;
    padding: 0 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  /**
   * 原 `#status` 已移至取景 overlay 行；保留空行占位，维持与原先一致的顶栏下间距（不改 Start / Snap 与下方控件间距）。
   */
  .cam-status-below-actions {
    width: 100%;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    box-sizing: border-box;
  }
  /**
   * 禁用下拉：统一与 Resolution / Aspect 的 `select-strong-disabled` 色值（Style 等凡 `disabled` 之下拉同效）。
   */
  select:disabled,
  select.select-strong-disabled:disabled {
    opacity: 1;
    cursor: not-allowed;
    pointer-events: none;
    background: #070707;
    color: rgba(0, 255, 65, 0.28);
    border-color: rgba(0, 255, 65, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  .ctl-stack.select-locked .ctl-label {
    opacity: 0.35;
  }
  /* 自定义 Flash：与 #2AFD4F 一致；Overlay 在活动列内时右缘对齐活动画幅 */
  .flash-switch {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #2afd4f;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .flash-switch input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    margin: 0;
  }
  .flash-switch-box {
    display: inline-block;
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    border: 1px solid rgba(42, 253, 79, 0.55);
    border-radius: 1px;
    background: transparent;
    box-sizing: border-box;
  }
  .flash-switch input:checked + .flash-switch-box {
    background: #2afd4f;
    border-color: #2afd4f;
    box-shadow: inset 0 0 0 2px #0a0a0a;
  }
  .flash-switch input:focus-visible + .flash-switch-box {
    outline: 1px solid #2afd4f;
    outline-offset: 2px;
  }
  .flash-switch-label { line-height: 1; }
  /**
   * 预览态：Flash 禁用外观对齐 `select:disabled`（低对比绿 + 暗底），保留 checked 视觉差异。
   */
  .flash-switch.flash-switch--disabled {
    opacity: 1;
    cursor: not-allowed;
    pointer-events: none;
    color: rgba(0, 255, 65, 0.28);
  }
  .flash-switch.flash-switch--disabled .flash-switch-box {
    background: #070707;
    border-color: rgba(0, 255, 65, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  .flash-switch.flash-switch--disabled input:checked + .flash-switch-box {
    background: rgba(0, 255, 65, 0.22);
    border-color: rgba(0, 255, 65, 0.18);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  .ctl-stack { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .ctl-stack .ctl-label { font-size: 11px; opacity: 0.5; letter-spacing: 1px; text-align: left; width: 100%; }
  .ctl-stack select { width: 100%; min-width: 0; }
  /* 底部 2×2：左列与 Stop Camera 同宽，右列与 Take Photo 同宽，与顶栏对齐居中（Frame 48091624） */
  .cam-controls-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--cam-action-gap);
    row-gap: 12px;
    width: 100%;
    margin-left: 0;
    margin-right: 0;
    margin-bottom: 0;
    margin-top: 12px;
    padding-top: 0;
    align-items: start;
    flex-shrink: 0;
    box-sizing: border-box;
    justify-items: stretch;
    position: relative;
    z-index: 40;
  }
  .cam-controls-grid > .ctl-stack {
    width: 100%;
    min-width: 0;
    max-width: 100%;
    align-items: stretch;
  }
  /**
   * 与顶栏 Start/Stop 同高、全宽 = 双主按钮 + 间距（`--cam-actions-row-w`）。
   * 与最后一行下拉间距 = 2×下拉高度（`--cam-ctl-select-h`）。
   */
  #submitGalleryBtn.cam-submit-gallery-btn {
    width: 100%;
    max-width: 100%;
    min-height: 36px;
    height: 36px;
    margin-top: 0;
    padding: 0 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    line-height: 1;
    background: transparent;
    border: 1px solid #00ff41;
    color: #00ff41;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  #submitGalleryBtn.cam-submit-gallery-btn:hover:not(:disabled) {
    background: rgba(0, 255, 65, 0.1);
  }
  /** Submit：disabled 与 Resolution/Aspect 禁用下拉同一绿透明度体系（不用整钮 opacity 0.3） */
  #submitGalleryBtn.cam-submit-gallery-btn:disabled {
    opacity: 1;
    cursor: not-allowed;
    pointer-events: none;
    background: #070707;
    color: rgba(0, 255, 65, 0.28);
    border-color: rgba(0, 255, 65, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  button { background: transparent; border: 1px solid #00ff41; color: #00ff41; font-family: monospace, ui-monospace, "Courier New", monospace; font-size: 11px; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: background 0.2s; }
  button:hover { background: rgba(0,255,65,0.1); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  #snapBtn { border-color: #ffd700; color: #ffd700; text-transform: none; letter-spacing: 1px; }
  #snapBtn:hover:not(:disabled) { background: rgba(255,215,0,0.1); }
  /* 保存中：保持 disabled；与 SAVED 同色便于状态一致 */
  #snapBtn.snap-saving:disabled { opacity: 0.85; cursor: not-allowed; color: #ffd700; border-color: #ffd700; }
  select {
    background: #111;
    border: 1px solid rgba(0,255,65,0.3);
    color: #00ff41;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
    min-height: var(--cam-ctl-select-h);
    box-sizing: border-box;
  }
  /** 仅取景框外闪白；叠在壳内多数内容下、`#ascii-viewer-stack` 下 */
  #flash-outside-root {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }
  .flash-strip {
    position: fixed;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s ease-out;
  }
  #flash-outside-root.on .flash-strip { opacity: 1; }
  #ascii-viewer-stack {
    position: relative;
    z-index: 60;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  /**
   * Submit 区域：不改变控件/按钮间距，只把原本按钮的 `margin-top` 间隔“容器化”，
   * 让 SAVING/SAVED 文案显示在该间隔中间。
   */
  /**
   * `z-index` 高于 `.cam-controls-grid`（40），避免 `#frameMaskSlot` 负 `margin-bottom` 与 Submit 区重叠时，
   * 整格控件层盖住 `#loop-cover-ui` / `#submitGalleryBtn` 导致 Loop 封面滑块无法点击。
   */
  .cam-submit-wrap {
    width: 100%;
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
    padding-top: calc(2 * var(--cam-ctl-select-h)); /* 与旧 Submit margin-top 等效 */
    position: relative;
    z-index: 45;
    box-sizing: border-box;
  }
  .cam-submit-status-slot {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: calc(2 * var(--cam-ctl-select-h));
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    pointer-events: none;
  }
  /**
   * Loop 预览封面滑块：与 Submit 同宽，仅占 status slot 内，不增加 `.cam-submit-wrap` 的 padding。
   */
  #loop-cover-ui {
    width: 100%;
    max-width: 100%;
    flex-shrink: 0;
    box-sizing: border-box;
    padding: 0 2px;
    pointer-events: auto;
  }
  #loop-cover-ui[hidden] {
    display: none !important;
  }
  .loop-cover-inner {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 2px;
  }
  /**
   * Loop 封面 range：白底直轨（与 `.video-progress-track` 同 6px 高）、与背景同色的 `#0A0A0A` 刻度画在轨内；绿色方形拇指。
   */
  #loopCoverSlider {
    width: 100%;
    max-width: 100%;
    height: 20px;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: pointer;
    background: transparent;
    -webkit-appearance: none;
    appearance: none;
    --loop-cover-n: 12;
  }
  #loopCoverSlider:focus {
    outline: 1px solid rgba(0, 255, 65, 0.45);
    outline-offset: 1px;
  }
  #loopCoverSlider:focus:not(:focus-visible) {
    outline: none;
  }
  #loopCoverSlider::-webkit-slider-runnable-track {
    width: 100%;
    height: 6px;
    border-radius: 0;
    border: none;
    background-color: #ffffff;
    background-image: repeating-linear-gradient(
      to right,
      #0a0a0a 0 1px,
      transparent 1px calc(100% / max(1, calc(var(--loop-cover-n) - 1)))
    );
  }
  /** 单帧：轨内居中一条与背景同色的竖线 */
  #loopCoverSlider.loop-cover-slider--single::-webkit-slider-runnable-track {
    background-image: linear-gradient(
      to right,
      #ffffff 0 calc(50% - 0.5px),
      #0a0a0a calc(50% - 0.5px) calc(50% + 0.5px),
      #ffffff calc(50% + 0.5px) 100%
    );
    background-color: #ffffff;
  }
  #loopCoverSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    margin-top: -3px;
    background: #00ff41;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
  #loopCoverSlider::-moz-range-track {
    width: 100%;
    height: 6px;
    border-radius: 0;
    border: none;
    background-color: #ffffff;
    background-image: repeating-linear-gradient(
      to right,
      #0a0a0a 0 1px,
      transparent 1px calc(100% / max(1, calc(var(--loop-cover-n) - 1)))
    );
  }
  #loopCoverSlider.loop-cover-slider--single::-moz-range-track {
    background-image: linear-gradient(
      to right,
      #ffffff 0 calc(50% - 0.5px),
      #0a0a0a calc(50% - 0.5px) calc(50% + 0.5px),
      #ffffff calc(50% + 0.5px) 100%
    );
    background-color: #ffffff;
  }
  #loopCoverSlider::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: #00ff41;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
  #loopCoverSlider::-moz-focus-outer {
    border: 0;
  }
  /** Distorting Mirror（Photo）：与 Loop 封面轨同视觉；十二档；无副文案；`[hidden]` 不占位 */
  #distortMirrorSliderWrap[hidden] {
    display: none !important;
  }
  /**
   * 与右侧 `#frameMaskRow` 首行 `.flash-switch` 同带：range 总高 20px、轨在盒内垂直居中，
   * 顶对齐时轨心略低于 12px 高的复选框行；小幅负 margin 仅上提本包，不改 `#frameMaskSlot` 外尺寸。
   */
  #distortMirrorSliderWrap {
    width: 100%;
    max-width: 100%;
    flex-shrink: 0;
    box-sizing: border-box;
    padding: 0 2px;
    margin-top: -4px;
  }
  #distortMirrorSlider {
    width: 100%;
    max-width: 100%;
    height: 20px;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: pointer;
    background: transparent;
    -webkit-appearance: none;
    appearance: none;
    --loop-cover-n: 12;
  }
  #distortMirrorSlider:focus {
    outline: 1px solid rgba(0, 255, 65, 0.45);
    outline-offset: 1px;
  }
  #distortMirrorSlider:focus:not(:focus-visible) {
    outline: none;
  }
  #distortMirrorSlider::-webkit-slider-runnable-track {
    width: 100%;
    height: 6px;
    border-radius: 0;
    border: none;
    background-color: #ffffff;
    background-image: repeating-linear-gradient(
      to right,
      #0a0a0a 0 1px,
      transparent 1px calc(100% / max(1, calc(var(--loop-cover-n) - 1)))
    );
  }
  #distortMirrorSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    margin-top: -3px;
    background: #00ff41;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
  #distortMirrorSlider::-moz-range-track {
    width: 100%;
    height: 6px;
    border-radius: 0;
    border: none;
    background-color: #ffffff;
    background-image: repeating-linear-gradient(
      to right,
      #0a0a0a 0 1px,
      transparent 1px calc(100% / max(1, calc(var(--loop-cover-n) - 1)))
    );
  }
  #distortMirrorSlider::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: #00ff41;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
  #distortMirrorSlider::-moz-focus-outer {
    border: 0;
  }
  .loop-cover-label-track {
    position: relative;
    width: 100%;
    height: 13px;
    margin-top: 0;
    pointer-events: none;
  }
  #loopCoverLabel {
    position: absolute;
    top: 0;
    left: 0%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(0, 255, 65, 0.85);
    white-space: nowrap;
    line-height: 1.2;
  }
  #status { font-size: 11px; letter-spacing: 2px; opacity: 0.5; min-height: 22px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; pointer-events: none; text-align: center; color: inherit; }
  #status.live { color: #00ff41; opacity: 1; }
  /** 取景中不显示「CAMERA ON」文案，仅保留绿点 */
  #status.live .status-text { display: none; }
  .status-live-suffix { display: none; align-items: center; flex-shrink: 0; }
  #status.live .status-live-suffix { display: inline-flex; }
  #status .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff41; box-shadow: 0 0 8px rgba(0,255,65,0.85); flex-shrink: 0; }
  /**
   * 外层取景器：固定总高，OFF/ON 一致；内层仅缩放，不撑高外壳。
   * 高度 = 上下 padding + overlay 带 + 活动槽总高（画幅 + 进度条带，同列内）。
   */
  #ascii-wrap {
    width: 100%;
    max-width: none;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    background: #000;
    border: 1px solid rgba(0,255,65,0.2);
    border-radius: 4px;
    padding: var(--ascii-vf-wrap-pad-y);
    box-sizing: border-box;
    height: calc(
      (2 * var(--ascii-vf-wrap-pad-y))
      + var(--ascii-vf-overlay-top)
      + var(--ascii-vf-overlay-row-h)
      + var(--ascii-vf-overlay-bottom-gap)
      + var(--ascii-vf-active-slot-total-h)
    );
    min-height: 0;
    margin-bottom: 4px;
    position: relative;
    overflow: hidden;
  }
  /**
   * Overlay：位于 `.ascii-active-column` 内，宽随活动列；Flash 与活动画幅右缘对齐。
   */
  .ascii-viewfinder-overlay {
    flex: 0 0 auto;
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: var(--ascii-vf-overlay-top);
    margin-bottom: var(--ascii-vf-overlay-bottom-gap);
    pointer-events: none;
  }
  .ascii-viewfinder-overlay * {
    pointer-events: auto;
  }
  .ascii-overlay-inner {
    position: relative;
    width: 100%;
    min-height: var(--ascii-vf-overlay-row-h);
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-sizing: border-box;
  }
  .ascii-overlay-side {
    display: none;
  }
  .ascii-overlay-tabs {
    max-width: 100%;
    flex-shrink: 0;
  }
  .ascii-overlay-flash {
    min-width: 0;
    flex-shrink: 0;
  }
  /**
   * 状态 `#status`：脱离 flex 中间列，相对 `.ascii-overlay-inner`（与下方 `#asciiActiveFrame` 同列同宽）水平居中；
   * 避免 Photo/Loop 与 Flash 不等宽时「中间列中心」与「画幅中心」错位导致绿点偏右。
   */
  .ascii-overlay-inner #status {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0;
    bottom: 0;
    flex: none;
    width: max-content;
    max-width: min(100%, calc(100% - 16px));
    margin: 0;
    padding: 0 8px;
    box-sizing: border-box;
    align-self: auto;
    min-height: 0;
    z-index: 2;
  }
  /** Photo / Video：分段控件（共用外框、段间无空隙） */
  .cam-mode-tabs-wrap {
    display: inline-block;
    max-width: 100%;
  }
  .cam-mode-tabs {
    display: inline-flex;
    align-items: stretch;
    border: 1px solid rgba(42, 253, 79, 0.5);
    border-radius: 0;
    overflow: hidden;
    background: transparent;
    vertical-align: top;
    height: var(--cam-ctl-select-h);
    box-sizing: border-box;
  }
  .cam-mode-tab {
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 10px;
    min-width: calc(5ch + 20px);
    height: 100%;
    min-height: 0;
    box-sizing: border-box;
    margin: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-right: 1px solid rgba(42, 253, 79, 0.5);
    border-radius: 0;
    background: transparent;
    color: rgba(42, 253, 79, 0.5);
    cursor: pointer;
    flex: 0 0 auto;
  }
  .cam-mode-tab:last-child {
    border-right: none;
  }
  .cam-mode-tab:hover:not(:disabled) {
    color: #2afd4f;
  }
  .cam-mode-tab.active {
    background: rgba(42, 253, 79, 0.5);
    color: #2afd4f;
    border-right-color: rgba(42, 253, 79, 0.5);
    box-shadow: none;
  }
  .cam-mode-tab.active:last-child {
    border-right: none;
  }
  .cam-mode-tab:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  /**
   * 取景器内容区：占满 `#ascii-wrap` 扣除 padding 后的高度。
   */
  .ascii-frame-body {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
  }
  /**
   * 活动列：默认与主按钮/底控件同宽；16:9、4:3 时加宽（仍留边距）。
   */
  .ascii-active-column {
    width: min(100%, var(--cam-actions-row-w));
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    flex: 1 1 auto;
    min-height: 0;
    box-sizing: border-box;
  }
  .ascii-active-column--wide {
    width: calc(100% - 2 * var(--ascii-vf-side-inset));
    max-width: 100%;
  }
  /**
   * 活动槽：含画幅 + 其下 10px + 6px 进度条；外层取景器总高不变。
   */
  .ascii-active-slot {
    width: 100%;
    height: var(--ascii-vf-active-slot-total-h);
    flex: 0 0 var(--ascii-vf-active-slot-total-h);
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    min-height: 0;
  }
  /**
   * 开屏 code-rain：仅 `.ascii-active-frame` 内（`overflow:hidden` 裁剪）；Start Camera 后淡出。
   * 与隐藏采样 canvas 区分：`video, canvas:not(.ascii-request-rain-canvas):not(.ascii-frame-mask-canvas)`。
   */
  .ascii-request-rain-canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    z-index: 4;
    pointer-events: none;
    display: none;
    opacity: 0;
    transition: opacity 0.65s ease-out;
  }
  .ascii-request-rain-canvas.ascii-request-rain-canvas--mounted {
    display: block;
  }
  .ascii-request-rain-canvas.ascii-request-rain-canvas--visible {
    opacity: 1;
  }
  /**
   * Photo 取景框遮罩画布：纯黑格、叠于雨效之上；不改动画幅尺寸与 ASCII 生成。
   */
  .ascii-frame-mask-canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
    display: none;
    opacity: 1;
  }
  .ascii-frame-mask-canvas.ascii-frame-mask-canvas--visible {
    display: block;
  }
  .ascii-slot-inner {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    height: 100%;
    min-height: 0;
  }
  /** Video 锁定的分辨率/比例行（底部网格内整行横跨） */
  .cam-mode-lock-strip {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--cam-action-gap);
    row-gap: 12px;
  }
  /**
   * 与锁定行同宽：1:1 左格占位、右列 Monocular + Iron（Aspect 列）；3:4 仅右格 Evil Queen。
   * `min-height` 固定为双行框线 + 4px gap，使 1:1/3:4/宽比例下槽高不变；`margin-bottom` 负值抵消多出来的一行+gap，
   * 与原先单行槽 + `-4px` 顶距相比，不抬高 `#cam-submit-wrap`（Submit 锚点不变）。
   */
  .frame-mask-slot {
    grid-column: 1 / -1;
    margin-top: -4px;
    margin-bottom: calc(-1 * (var(--cam-ctl-select-h) + 4px));
    padding-top: 0;
    min-height: calc(2 * var(--cam-ctl-select-h) + 4px);
    box-sizing: border-box;
  }
  .frame-mask-dual {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--cam-action-gap);
    align-items: start;
    width: 100%;
  }
  .frame-mask-dual.frame-mask-dual--oval-only .frame-mask-cell--iron {
    display: none !important;
  }
  /** 3:4 Evil Queen：左格默认隐藏；畸变镜滑块开启时需露出左格（与 Style 列同宽） */
  .frame-mask-dual.frame-mask-dual--oval-only .frame-mask-cell--iron.frame-mask-cell--iron--dm-visible {
    display: flex !important;
    flex-direction: column;
    align-items: stretch;
    min-width: 0;
  }
  .frame-mask-cell--iron {
    min-width: 0;
  }
  /** 3:4 Evil Queen：仅占 Aspect 列，左缘与 Aspect 控件对齐（不跨整行网格漂移） */
  .frame-mask-dual.frame-mask-dual--oval-only .frame-mask-cell--primary {
    grid-column: 2;
  }
  /**
   * 1:1：Monocular 与 Iron Bars 纵向叠在 Aspect 列下；`gap` 与 `.ctl-stack` 的 4px 一致。
   */
  .frame-mask-cell--primary {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: stretch;
    min-width: 0;
  }
  .frame-mask-row {
    min-height: 0;
  }
  /** 与 Flash 同款 `.flash-switch`，置于 Aspect 列内左对齐 */
  .frame-mask-row .frame-mask-flash-switch {
    width: 100%;
    justify-content: flex-start;
  }
  /**
   * `[hidden]` 默认 `display:none` 会被 `.ctl-stack { display:flex }`（同级选择器、后写）覆盖，导致 Loop 下行仍可见。
   * `#camera-shell.cam-video-mode` 作为双保险，保证 Video 下行不参与布局与点击。
   */
  #frameMaskRow[hidden],
  #frameMaskIronRow[hidden],
  #camera-shell.cam-video-mode #frameMaskRow,
  #camera-shell.cam-video-mode #frameMaskIronRow {
    display: none !important;
    pointer-events: none !important;
  }
  .ascii-inner {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  /** 画幅与进度条同宽、进度条距画幅底 10px，随画幅在槽内居中 */
  .ascii-frame-progress-stack {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    max-width: 100%;
    flex: 0 1 auto;
    min-height: 0;
  }
  /**
   * 活动画幅：宽 100% 贴齐 `.ascii-active-column`，高度随所选画面比例；分辨率只改密度。
   */
  .ascii-active-frame {
    width: 100%;
    max-width: 100%;
    position: relative;
    overflow: hidden;
    display: block;
    box-sizing: border-box;
  }
  /** 固定字格渲染后整体 `scale` 入画幅，不改变 `#ascii-out` 字号（保证采样与 `getAsciiCellMetrics` 一致） */
  .ascii-out-scale-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    z-index: 1;
  }
  .ascii-frame-progress-stack .video-progress-root {
    flex: 0 0 6px;
    width: 100%;
    margin-top: 10px;
    padding-top: 0;
    height: 6px;
    box-sizing: border-box;
  }
  /** 不占布局的隐藏会顶动底栏；用 visibility 保留占位 */
  .video-progress-root.video-progress-root--inactive .video-progress-track {
    visibility: hidden;
    pointer-events: none;
  }
  /** 全宽轨道；实心条从左对齐、宽度 100%→0% 表示从右向左缩短；颜色由 JS 绑 `colorPicker` */
  .video-progress-track {
    position: relative;
    width: 100%;
    height: 6px;
    background: transparent;
    border-radius: 0;
  }
  .video-progress-bar {
    height: 100%;
    width: 100%;
    background: transparent;
    pointer-events: none;
  }
  /* 等宽字宽≠行高：行高与字号一致便于测量为「准方格」比例 */
  #ascii-out { font-family: monospace, ui-monospace, "Courier New", monospace; font-size: 6px; line-height: 6px; letter-spacing: 0; white-space: pre; display: inline-block; }
  /**
   * Camera OFF：提示文案相对 `#ascii-wrap` 整框垂直水平居中（非活动槽 / 非画幅）。
   * `pointer-events: none` 不挡 Photo/Video、Flash 点击。
   */
  .ascii-off-helper {
    display: none;
  }
  #ascii-wrap.ascii-wrap--offline .ascii-off-helper {
    display: flex;
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    bottom: 0;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding-left: 10px;
    padding-right: 10px;
    pointer-events: none;
    z-index: 25;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    line-height: 1.45;
    letter-spacing: 1px;
    color: inherit;
    opacity: 1;
    text-align: center;
    white-space: normal;
    overflow-wrap: break-word;
  }
  /** 已点 Start Camera、等待权限/流就绪：立即隐藏 helper，雨效仍显示至摄像头就绪后再淡出 */
  #ascii-wrap.ascii-wrap--offline.ascii-wrap--startup-hide-helper .ascii-off-helper {
    display: none !important;
  }
  /** 文案仍写入 `#ascii-out` 供逻辑一致；可视由 `.ascii-off-helper` 承担，此处移出视口不占槽内居中 */
  #ascii-wrap.ascii-wrap--offline .ascii-out-scale-wrap {
    position: absolute;
    left: -9999px;
    top: 0;
    width: 1px;
    height: 1px;
    margin: 0;
    overflow: hidden;
    clip-path: inset(50%);
    transform: none;
  }
  #ascii-wrap.ascii-wrap--offline .ascii-active-frame {
    position: relative;
    width: 100%;
    height: auto;
    min-height: 0;
    flex: 0 0 auto;
    aspect-ratio: unset;
  }
  #ascii-wrap.ascii-wrap--offline #ascii-out {
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 0;
    white-space: pre;
  }
  /** 与实时取景 `#ascii-out` 同字格比例，专供 `getAsciiCellMetrics`，避免 OFF 态大字号撑歪最小高度 */
  .ascii-cell-probe {
    position: absolute;
    left: -9999px;
    top: 0;
    margin: 0;
    padding: 0;
    border: 0;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 0;
    white-space: pre;
    pointer-events: none;
    visibility: hidden;
  }
  #saved-msg { margin: 0; font-size: 12px; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; color: #ffd700; min-height: 20px; text-align: center; width: 100%; }
  /** Loop 封面条显示时隐藏 SAVING/SAVED 占位，避免叠层 */
  .cam-submit-status-slot.cam-submit-status-slot--loop-cover #saved-msg {
    display: none;
  }
  #saved-msg.show { opacity: 1; }
  video, canvas:not(.ascii-request-rain-canvas):not(.ascii-frame-mask-canvas) { display: none; }
  /* Notion 等 iframe 嵌入时提示：摄像头需在独立标签页使用 */
  .iframe-hint {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: var(--cam-actions-row-w);
    margin: -8px auto 14px;
    padding: 10px 12px;
    border: 1px solid rgba(255, 215, 0, 0.45);
    color: #ffd700;
    font-size: 11px;
    letter-spacing: 1px;
    line-height: 1.45;
    text-align: center;
    box-sizing: border-box;
  }
  .iframe-hint[hidden] { display: none !important; }
  .iframe-hint-link {
    color: #00ff41;
    border: 1px solid rgba(0, 255, 65, 0.5);
    padding: 4px 12px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 10px;
    font-family: monospace, ui-monospace, "Courier New", monospace;
  }
  .iframe-hint-link:hover { background: rgba(0, 255, 65, 0.1); }
</style>
</head>
<body>
<div id="camera-shell">
<h1><span class="cam-title-prefix">[◉”]</span> <span class="cam-title-name">ASCII CAMERA</span></h1>
<div id="iframe-hint" class="iframe-hint" hidden role="note">
  <span class="iframe-hint-text">Embedded preview blocks camera — use a full browser tab.</span>
  <a id="iframe-open-tab" class="iframe-hint-link" href="#">Open in new tab</a>
</div>
<div class="camera-content">
<div class="cam-actions">
  <button id="startBtn" type="button">Start Camera</button>
  <button id="snapBtn" type="button" disabled>📷 Take Photo</button>
</div>
<div class="cam-status-below-actions" aria-hidden="true"></div>
</div>
<div class="viewfinder-shell">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="flash-outside-root" aria-hidden="true">
  <div id="flash-strip-top" class="flash-strip"></div>
  <div id="flash-strip-left" class="flash-strip"></div>
  <div id="flash-strip-right" class="flash-strip"></div>
  <div id="flash-strip-bottom" class="flash-strip"></div>
</div>
<div id="ascii-viewer-stack">
<div id="ascii-wrap" class="ascii-wrap--offline">
  <pre id="ascii-cell-probe" class="ascii-cell-probe" aria-hidden="true">0</pre>
  <div class="ascii-frame-body">
    <div class="ascii-active-column" id="asciiActiveColumn">
      <div class="ascii-viewfinder-overlay" aria-hidden="false">
        <div class="ascii-overlay-inner">
          <div class="ascii-overlay-side" aria-hidden="true"></div>
          <div class="ascii-overlay-tabs">
            <div class="cam-mode-tabs-wrap" id="camModeTabsWrap">
              <div class="cam-mode-tabs" role="tablist" aria-label="Capture mode">
                <button type="button" class="cam-mode-tab active" role="tab" id="camTabPhoto" aria-selected="true">Photo</button>
                <button type="button" class="cam-mode-tab" role="tab" id="camTabVideo" aria-selected="false">Loop</button>
              </div>
            </div>
          </div>
          <div id="status" class="ascii-overlay-status" role="status">
            <span class="status-text">CAMERA OFF</span>
            <span class="status-live-suffix" aria-hidden="true">
              <span class="status-dot"></span>
            </span>
          </div>
          <div class="ascii-overlay-flash">
            <label class="flash-switch">
              <input type="checkbox" id="flashToggle" />
              <span class="flash-switch-box" aria-hidden="true"></span>
              <span class="flash-switch-label">Flash</span>
            </label>
          </div>
        </div>
      </div>
      <div class="ascii-active-slot">
        <div class="ascii-slot-inner">
          <div class="ascii-inner">
            <div class="ascii-frame-progress-stack">
              <div class="ascii-active-frame" id="asciiActiveFrame">
                <div class="ascii-out-scale-wrap" id="asciiOutScaleWrap">
                  <pre id="ascii-out" aria-hidden="true">Click &quot;START CAMERA&quot; to begin</pre>
                </div>
                <canvas id="requestRainCanvas" class="ascii-request-rain-canvas" width="1" height="1" aria-hidden="true"></canvas>
                <!-- Photo 取景预览专用：ASCII 格二值遮罩，不改变导出/提交；置于雨效之上 -->
                <canvas id="asciiFrameMaskCanvas" class="ascii-frame-mask-canvas" width="1" height="1" aria-hidden="true"></canvas>
              </div>
              <div id="video-progress-root" class="video-progress-root video-progress-root--inactive" aria-hidden="true">
                <div class="video-progress-track">
                  <div id="video-progress-bar" class="video-progress-bar"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="asciiOffHelper" class="ascii-off-helper" role="note" aria-live="polite">Click &quot;START CAMERA&quot; to begin</div>
</div>
</div>
</div>
<div class="camera-content">
<div class="cam-controls-grid">
  <label class="ctl-stack cc-left" id="resPickerStack">
    <span class="ctl-label">Resolution</span>
    <select id="resPicker">
      <option value="48">48 (Low)</option>
      <option value="72" selected>72 (Medium)</option>
      <option value="96">96 (High)</option>
      <option value="120">120 (Ultra)</option>
    </select>
  </label>
  <label class="ctl-stack cc-left">
    <span class="ctl-label">Color</span>
    <select id="colorPicker">
      <option value="#00ff41">Green</option>
      <option value="#ffffff">White</option>
      <option value="#ffd700">Amber</option>
      <option value="#00cfff">Cyan</option>
      <option value="#ff6b6b">Red</option>
      <option value="#cc99ff">Purple</option>
    </select>
  </label>
  <div class="cam-mode-lock-strip" id="camModeLockStrip">
  <label class="ctl-stack cc-left" id="densityPickerStack">
    <span class="ctl-label">Style</span>
    <select id="densityPicker">
      <option value="detailed">Detailed</option>
      <option value="simple">Simple</option>
      <option value="blocks">Blocks</option>
      <option value="binary">Binary</option>
      <option value="distortingMirror">Distorting Mirror</option>
    </select>
  </label>
  <label class="ctl-stack cc-left" id="aspectPickerStack">
    <span class="ctl-label">Aspect</span>
    <select id="aspectPicker">
      <option value="1:1">1:1</option>
      <option value="16:9">16:9</option>
      <option value="4:3">4:3</option>
      <option value="3:4" selected>3:4 (Portrait)</option>
    </select>
  </label>
  <!-- 1:1：左格占位（Style 列宽）；右列 Monocular + Iron Bars（Aspect 列，纵向）；3:4 仅右格 Evil Queen。畸变镜滑块占左格，与右侧框线同行，不撑高 Style/Aspect 行 -->
  <div class="frame-mask-slot" id="frameMaskSlot">
    <div class="frame-mask-dual" id="frameMaskDual">
      <div class="frame-mask-cell frame-mask-cell--iron" id="frameMaskIronCell" aria-hidden="true">
        <div id="distortMirrorSliderWrap" hidden aria-hidden="true">
          <input
            type="range"
            id="distortMirrorSlider"
            min="0"
            max="11"
            step="1"
            value="0"
            aria-label="Distorting mirror intensity"
          />
        </div>
      </div>
      <div class="frame-mask-cell frame-mask-cell--primary" id="frameMaskPrimaryCell">
        <div class="frame-mask-row ctl-stack cc-left" id="frameMaskRow" hidden>
          <label class="flash-switch frame-mask-flash-switch" id="frameMaskFlashLabel">
            <input type="checkbox" id="frameMaskCheckbox" autocomplete="off" />
            <span class="flash-switch-box" aria-hidden="true"></span>
            <span class="flash-switch-label" id="frameMaskLabelText">Evil Queen (Oval)</span>
          </label>
        </div>
        <div class="frame-mask-row ctl-stack cc-left" id="frameMaskIronRow" hidden>
          <label class="flash-switch frame-mask-flash-switch" id="frameMaskIronFlashLabel">
            <input type="checkbox" id="frameMaskIronCheckbox" autocomplete="off" />
            <span class="flash-switch-box" aria-hidden="true"></span>
            <span class="flash-switch-label">Iron Bars</span>
          </label>
        </div>
      </div>
    </div>
  </div>
  </div>
</div>
<div class="cam-submit-wrap">
  <div class="cam-submit-status-slot" id="camSubmitStatusSlot">
    <div id="loop-cover-ui" class="loop-cover-ui" hidden aria-hidden="true">
      <div class="loop-cover-inner">
        <input type="range" id="loopCoverSlider" min="0" max="0" value="0" step="1" aria-label="Choose Loop cover frame" />
        <div class="loop-cover-label-track">
          <span id="loopCoverLabel">Set as cover</span>
        </div>
      </div>
    </div>
    <div id="saved-msg" aria-live="polite"></div>
  </div>
  <button type="button" id="submitGalleryBtn" class="cam-submit-gallery-btn" disabled aria-label="Submit to gallery">Submit to Gallery</button>
</div>
</div>
</div>

<script>
(function () {
  var src =
    typeof location !== 'undefined' && location.protocol === 'file:'
      ? 'config.local.js'
      : '/config.local.js';
  document.write('<script src="' + src + '"><\/script>');
})();
</script>
<script src="gallery-storage.js"></script>
<script src="gallery-cloud-sync.js"></script>
<script src="scripts/camera-ui.js"></script>
<script src="scripts/camera-preview.js"></script>
<script src="scripts/camera-loop.js"></script>
<script>
/** 由 `gallery-storage.js` 挂载 */

}

function getAsciiMaskGridLayout() {
  var cols = getCols();
  var rows = getAsciiMaskRowCountForCols(cols);
  if (!asciiActiveFrame) {
    return {
      cols: cols,
      rows: rows,
      originX: 0,
      originY: 0,
      cellW: 1,
      cellH: 1,
      frameW: 1,
      frameH: 1,
      contentBottomY: 1,
      contentRightX: 1
    };
  }
  var fr = asciiActiveFrame.getBoundingClientRect();
  var frameW = fr.width;
  var frameH = fr.height;
  if (asciiWrap && asciiWrap.classList.contains('ascii-wrap--offline')) {
    return {
      cols: cols,
      rows: rows,
      originX: 0,
      originY: 0,
      cellW: frameW / cols,
      cellH: frameH / rows,
      frameW: frameW,
      frameH: frameH,
      contentBottomY: frameH,
      contentRightX: frameW
    };
  }
  if (!out) {
    return {
      cols: cols,
      rows: rows,
      originX: 0,
      originY: 0,
      cellW: frameW / cols,
      cellH: frameH / rows,
      frameW: frameW,
      frameH: frameH,
      contentBottomY: frameH,
      contentRightX: frameW
    };
  }
  var or = out.getBoundingClientRect();
  var ox = or.left - fr.left;
  var oy = or.top - fr.top;
  return {
    cols: cols,
    rows: rows,
    originX: ox,
    originY: oy,
    cellW: or.width / cols,
    cellH: or.height / rows,
    frameW: frameW,
    frameH: frameH,
    contentBottomY: or.bottom - fr.top,
    contentRightX: or.right - fr.left
  };
}

/**
 * ease-out cubic，与取景遮罩短过渡一致。
 * @param {number} t 0…1
 * @returns {number}
 */
function easeOutCubicPhotoMask(t) {
  var x = Math.min(1, Math.max(0, t));
  return 1 - Math.pow(1 - x, 3);
}

/**
 * 取消进行中的遮罩动画帧。
 * @returns {void}
 */
function cancelPhotoFrameMaskAnimation() {
  if (photoFrameMaskAnimRaf != null) {
    cancelAnimationFrame(photoFrameMaskAnimRaf);
    photoFrameMaskAnimRaf = null;
  }
}

/**
 * 按当前 ease 绘制取景遮罩（3:4 椭圆 / 1:1 Monocular 圆 / 1:1 Iron Bars 栅格）；不改变 `#ascii-out`。
 * @param {number} ease 0…1
 * @returns {void}
 */
function drawPhotoFrameMaskAtEase(ease) {
  if (!asciiFrameMaskCanvas || !asciiFrameMaskCtx || !asciiActiveFrame || !aspectPicker) return;
  var ap = aspectPicker.value;
  var showOval = ap === '3:4' && frameMaskCheckbox && frameMaskCheckbox.checked;
  var showRound = ap === '1:1' && frameMaskCheckbox && frameMaskCheckbox.checked;
  var showIron = ap === '1:1' && frameMaskIronCheckbox && frameMaskIronCheckbox.checked;
  /**
   * 1:1：取消勾选后仍播 Iron 向上退出；`photoFrameMaskIronRevealEase`→0 前须继续绘制（勿仅与 `showIron` 绑定）。与 gallery `drawIronBarsLayer` 对齐。
   * @type {boolean}
   */
  var drawIronBarsLayer =
    ap === '1:1' && (showIron || photoFrameMaskIronRevealEase > 0.0005);
  if (!showOval && !showRound && !drawIronBarsLayer) return;

  var layout = getAsciiMaskGridLayout();
  var W = layout.frameW;
  var H = layout.frameH;
  if (W < 2 || H < 2) return;

  var dpr = typeof window.devicePixelRatio === 'number' ? window.devicePixelRatio : 1;
  var cwPx = Math.max(1, Math.ceil(W * dpr));
  var chPx = Math.max(1, Math.ceil(H * dpr));
  asciiFrameMaskCanvas.width = cwPx;
  asciiFrameMaskCanvas.height = chPx;
  asciiFrameMaskCanvas.style.width = W + 'px';
  asciiFrameMaskCanvas.style.height = H + 'px';
  var ctx = asciiFrameMaskCtx;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  var t = Math.min(1, Math.max(0, ease));
  var cx0 = W * 0.5;
  var cy0 = H * 0.5;
  var big = Math.max(W, H) * 2;
  var a1;
  var b1;
  var shapeKind = showOval ? 'oval' : showRound ? 'round' : null;
  if (shapeKind === 'round') {
    var rf = Math.min(W, H) * 0.5;
    a1 = rf;
    b1 = rf;
  } else if (shapeKind === 'oval') {
    a1 = W * 0.5;
    b1 = H * 0.5;
  }
  var a;
  var b;
  var invA2;
  var invB2;
  if (showOval || showRound) {
    a = big + (a1 - big) * t;
    b = big + (b1 - big) * t;
    invA2 = 1 / (a * a);
    invB2 = 1 / (b * b);
  }

  /**
   * @param {number} x1
   * @param {number} y1
   * @param {number} x2
   * @param {number} y2
   * @returns {void}
   */
  function fillMaskCellIfOutsideEllipse(x1, y1, x2, y2) {
    var mcx = (x1 + x2) * 0.5;
    var mcy = (y1 + y2) * 0.5;
    var ddx = mcx - cx0;
    var ddy = mcy - cy0;
    if (ddx * ddx * invA2 + ddy * ddy * invB2 > 1) {
      var fx = Math.floor(x1);
      var fy = Math.floor(y1);
      var fw = Math.max(1, Math.ceil(x2) - fx);
      var fh = Math.max(1, Math.ceil(y2) - fy);
      ctx.fillRect(fx, fy, fw, fh);
    }
  }

  var col;
  var row;
  var x0 = layout.originX;
  var y0 = layout.originY;
  var cwCell = layout.cellW;
  var rhCell = layout.cellH;
  var contentBottomY = layout.contentBottomY;
  var contentRightX = layout.contentRightX;
  var x1;
  var y1;
  var x2;
  var y2;
  ctx.fillStyle = '#000000';

  if (showOval || showRound) {
    for (row = 0; row < layout.rows; row++) {
      y1 = y0 + row * rhCell;
      y2 = y0 + (row + 1) * rhCell;
      if (row === layout.rows - 1) {
        y2 = Math.min(y2, contentBottomY);
      }
      for (col = 0; col < layout.cols; col++) {
        x1 = x0 + col * cwCell;
        x2 = x0 + (col + 1) * cwCell;
        if (col === layout.cols - 1) {
          x2 = Math.min(x2, contentRightX);
        }
        fillMaskCellIfOutsideEllipse(x1, y1, x2, y2);
      }
    }
    var eps = 0.5;
    for (y1 = 0; y1 < y0 - eps; y1 += rhCell) {
      y2 = Math.min(y0, y1 + rhCell);
      for (x1 = 0; x1 < W - eps; x1 += cwCell) {
        x2 = Math.min(W, x1 + cwCell);
        fillMaskCellIfOutsideEllipse(x1, y1, x2, y2);
      }
    }
    for (y1 = contentBottomY; y1 < H - eps; y1 += rhCell) {
      y2 = Math.min(H, y1 + rhCell);
      for (x1 = 0; x1 < W - eps; x1 += cwCell) {
        x2 = Math.min(W, x1 + cwCell);
        fillMaskCellIfOutsideEllipse(x1, y1, x2, y2);
      }
    }
    for (x1 = 0; x1 < x0 - eps; x1 += cwCell) {
      x2 = Math.min(x0, x1 + cwCell);
      for (y1 = 0; y1 < H - eps; y1 += rhCell) {
        y2 = Math.min(H, y1 + rhCell);
        fillMaskCellIfOutsideEllipse(x1, y1, x2, y2);
      }
    }
    for (x1 = contentRightX; x1 < W - eps; x1 += cwCell) {
      x2 = Math.min(W, x1 + cwCell);
      for (y1 = 0; y1 < H - eps; y1 += rhCell) {
        y2 = Math.min(H, y1 + rhCell);
        fillMaskCellIfOutsideEllipse(x1, y1, x2, y2);
      }
    }
  }

  /**
   * 1:1 Iron Bars：整栅 `translateY`（非遮罩揭示）；进度为 `photoFrameMaskIronRevealEase`（与 Monocular 同 `IRON_BARS_ANIM_MS` / 同 tick 内 `easeOutCubicPhotoMask` 时间包络；仅 Iron 时 Monocular 的 `photoFrameMaskEase` 可能恒为 0，故位移用铁栅独立插值通道）。退场 1→0 持续绘制至 0。
   */
  var progress = photoFrameMaskIronRevealEase;
  var tIron = Math.min(1, Math.max(0, progress));
  if (drawIronBarsLayer && tIron > 0) {
    var frameH = layout.frameH;
    if (frameH > 0 && isLiveAsciiMaskLayoutValidForIron(layout)) {
      var eased = IRON_BARS_OVERSHOOT_ENABLED
        ? easeOutBack(tIron, IRON_BARS_OVERSHOOT_STRENGTH)
        : tIron;
      var offsetY = (1 - eased) * -frameH;
      var specIron = buildIronBarsSpec(layout.cols, layout.rows, getAsciiCellMetrics().cellAspect, getAspectRatio());
      ctx.save();
      ctx.translate(0, offsetY);
      /** 竖条向上延伸（仅列掩码），覆盖 `easeOutBack` 过冲时顶缘露亮；横条仍仅画在原有行上 */
      var ironTopExtendPx = frameH + Math.ceil(rhCell);
      var nUp = Math.max(1, Math.ceil(ironTopExtendPx / rhCell));
      var k;
      for (k = nUp; k >= 1; k--) {
        y1 = y0 - k * rhCell;
        y2 = y0 - (k - 1) * rhCell;
        for (col = 0; col < layout.cols; col++) {
          if (!isIronBarVerticalColumnFromSpec(col, specIron)) continue;
          x1 = x0 + col * cwCell;
          x2 = x0 + (col + 1) * cwCell;
          if (col === layout.cols - 1) {
            x2 = Math.min(x2, contentRightX);
          }
          ctx.fillRect(Math.floor(x1), Math.floor(y1), Math.max(1, Math.ceil(x2) - Math.floor(x1)), Math.max(1, Math.ceil(y2) - Math.floor(y1)));
        }
      }
      /** 与 `applyIronBarsMaskToLuma` / `isIronBarMaskCellFromSpec` 一致：按格填充，避免整条 fillRect 与离散 luma 厚度漂移 */
      for (row = 0; row < layout.rows; row++) {
        y1 = y0 + row * rhCell;
        y2 = y0 + (row + 1) * rhCell;
        if (row === layout.rows - 1) {
          y2 = Math.min(y2, contentBottomY);
        }
        for (col = 0; col < layout.cols; col++) {
          if (!isIronBarMaskCellFromSpec(col, row, specIron)) continue;
          x1 = x0 + col * cwCell;
          x2 = x0 + (col + 1) * cwCell;
          if (col === layout.cols - 1) {
            x2 = Math.min(x2, contentRightX);
          }
          ctx.fillRect(Math.floor(x1), Math.floor(y1), Math.max(1, Math.ceil(x2) - Math.floor(x1)), Math.max(1, Math.ceil(y2) - Math.floor(y1)));
        }
      }
      ctx.restore();
    }
  }
}

/**
 * @returns {void}
 */
function showPhotoFrameMaskCanvas() {
  if (!asciiFrameMaskCanvas) return;
  asciiFrameMaskCanvas.classList.add('ascii-frame-mask-canvas--visible');
  asciiFrameMaskCanvas.setAttribute('aria-hidden', 'false');
}

/**
 * @returns {void}
 */
function hidePhotoFrameMaskCanvas() {
  if (!asciiFrameMaskCanvas || !asciiFrameMaskCtx) return;
  asciiFrameMaskCtx.clearRect(0, 0, asciiFrameMaskCanvas.width, asciiFrameMaskCanvas.height);
  asciiFrameMaskCanvas.classList.remove('ascii-frame-mask-canvas--visible');
  asciiFrameMaskCanvas.setAttribute('aria-hidden', 'true');
}

/**
 * @param {number} fromEase
 * @param {number} toEase
 * @param {() => void} [onComplete] 动画正常结束（含 reduced-motion 即时完成）时调用；取消动画则不调用
 * @param {number} [ironFromOpt] 未传则 Iron 揭示进度在动画全程保持不变
 * @param {number} [ironToOpt]
 * @returns {void}
 */
function startPhotoFrameMaskAnimation(fromEase, toEase, onComplete, ironFromOpt, ironToOpt) {
  if (!asciiFrameMaskCanvas || !asciiFrameMaskCtx) return;
  cancelPhotoFrameMaskAnimation();
  var ironFromV = ironFromOpt !== undefined ? ironFromOpt : photoFrameMaskIronRevealEase;
  var ironToV = ironToOpt !== undefined ? ironToOpt : photoFrameMaskIronRevealEase;
  var reduceMotion =
    typeof window.matchMedia === 'function' && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) {
    photoFrameMaskEase = toEase;
    photoFrameMaskIronRevealEase = ironToV;
    if (photoFrameMaskEase <= 0 && photoFrameMaskIronRevealEase <= 0) {
      hidePhotoFrameMaskCanvas();
    } else {
      showPhotoFrameMaskCanvas();
      drawPhotoFrameMaskAtEase(toEase);
    }
    if (typeof onComplete === 'function') {
      onComplete();
    }
    return;
  }
  photoFrameMaskAnimFrom = fromEase;
  photoFrameMaskAnimTo = toEase;
  photoFrameMaskAnimIronFrom = ironFromV;
  photoFrameMaskAnimIronTo = ironToV;
  photoFrameMaskAnimStartMs =
    typeof performance !== 'undefined' && performance.now ? performance.now() : Date.now();
  showPhotoFrameMaskCanvas();

  /**
   * @param {number} now
   * @returns {void}
   */
  function tick(now) {
    var elapsed = now - photoFrameMaskAnimStartMs;
    var u = Math.min(1, elapsed / PHOTO_FRAME_MASK_ANIM_MS);
    var eased = easeOutCubicPhotoMask(u);
    photoFrameMaskEase = photoFrameMaskAnimFrom + (photoFrameMaskAnimTo - photoFrameMaskAnimFrom) * eased;
    photoFrameMaskIronRevealEase =
      photoFrameMaskAnimIronFrom + (photoFrameMaskAnimIronTo - photoFrameMaskAnimIronFrom) * eased;
    drawPhotoFrameMaskAtEase(photoFrameMaskEase);
    if (u < 1) {
      photoFrameMaskAnimRaf = requestAnimationFrame(tick);
    } else {
      photoFrameMaskAnimRaf = null;
      photoFrameMaskEase = photoFrameMaskAnimTo;
      photoFrameMaskIronRevealEase = photoFrameMaskAnimIronTo;
      if (photoFrameMaskEase <= 0 && photoFrameMaskIronRevealEase <= 0) {
        hidePhotoFrameMaskCanvas();
      } else {
        drawPhotoFrameMaskAtEase(photoFrameMaskEase);
      }
      if (typeof onComplete === 'function') {
        onComplete();
      }
    }
  }
  photoFrameMaskAnimRaf = requestAnimationFrame(tick);
}

/**
 * 布局变化时保持当前遮罩显示（无动画跳变）；双 rAF 以等待 `scheduleAsciiScale` 后的 `#ascii-out` 外接矩形。
 * @returns {void}
 */
function syncPhotoFrameMaskLayoutRedraw() {
  var should = !videoMode && anyPhotoFrameMaskControlActive();
  if (!should) return;
  if (!asciiFrameMaskCanvas || !asciiFrameMaskCanvas.classList.contains('ascii-frame-mask-canvas--visible')) return;
  window.requestAnimationFrame(function () {
    window.requestAnimationFrame(function () {
      if (
        !asciiFrameMaskCanvas ||
        !asciiFrameMaskCanvas.classList.contains('ascii-frame-mask-canvas--visible')
      ) {
        return;
      }
      drawPhotoFrameMaskAtEase(photoFrameMaskEase);
    });
  });
}

/**
 * Photo 取景：是否有任一可用遮罩勾选（用于布局重绘等）。
 * @returns {boolean}
 */
function anyPhotoFrameMaskControlActive() {
  if (!aspectPicker) return false;
  var ap = aspectPicker.value;
  if (ap === '3:4') {
    return !!(frameMaskCheckbox && frameMaskCheckbox.checked);
  }
  if (ap === '1:1') {
    return !!(
      (frameMaskCheckbox && frameMaskCheckbox.checked) ||
      (frameMaskIronCheckbox && frameMaskIronCheckbox.checked)
    );
  }
  return false;
}

/**
 * 同步 Evil Queen / Monocular / Iron Bars 显隐与文案。
 * @returns {void}
 */
function updateFrameMaskUi() {
  if (!frameMaskRow || !frameMaskCheckbox) return;
  var kind = getPhotoFrameMaskKind();
  var frameMaskFlashLabel = document.getElementById('frameMaskFlashLabel');

  if (!kind) {
    frameMaskRow.hidden = true;
    frameMaskCheckbox.disabled = true;
    frameMaskCheckbox.setAttribute('aria-hidden', 'true');
    if (frameMaskFlashLabel) {
      frameMaskFlashLabel.classList.add('flash-switch--disabled');
      frameMaskFlashLabel.setAttribute('aria-disabled', 'true');
    }
    if (frameMaskIronRow) frameMaskIronRow.hidden = true;
    if (frameMaskIronCheckbox) {
      frameMaskIronCheckbox.disabled = true;
      frameMaskIronCheckbox.setAttribute('aria-hidden', 'true');
    }
    if (frameMaskDual) frameMaskDual.classList.remove('frame-mask-dual--oval-only');
    syncPhotoFrameMaskOverlay();
    syncDistortMirrorSliderVisibility();
    return;
  }

  if (kind === 'oval') {
    if (frameMaskDual) frameMaskDual.classList.add('frame-mask-dual--oval-only');
    if (frameMaskIronRow) frameMaskIronRow.hidden = true;
    frameMaskRow.hidden = false;
    frameMaskCheckbox.disabled = false;
    frameMaskCheckbox.removeAttribute('aria-hidden');
    if (frameMaskFlashLabel) {
      frameMaskFlashLabel.classList.remove('flash-switch--disabled');
      frameMaskFlashLabel.removeAttribute('aria-disabled');
    }
    frameMaskCheckbox.checked = frameMaskCheckedOval;
    if (frameMaskLabelText) frameMaskLabelText.textContent = 'Evil Queen (Oval)';
  } else {
    if (frameMaskDual) frameMaskDual.classList.remove('frame-mask-dual--oval-only');
    if (frameMaskIronRow) frameMaskIronRow.hidden = false;
    frameMaskRow.hidden = false;
    frameMaskCheckbox.disabled = false;
    frameMaskCheckbox.removeAttribute('aria-hidden');
    if (frameMaskIronCheckbox) {
      frameMaskIronCheckbox.disabled = false;
      frameMaskIronCheckbox.removeAttribute('aria-hidden');
    }
    if (frameMaskFlashLabel) {
      frameMaskFlashLabel.classList.remove('flash-switch--disabled');
      frameMaskFlashLabel.removeAttribute('aria-disabled');
    }
    frameMaskCheckbox.checked = frameMaskCheckedRound;
    if (frameMaskLabelText) frameMaskLabelText.textContent = 'Monocular';
    if (frameMaskIronCheckbox) frameMaskIronCheckbox.checked = frameMaskCheckedIronBars;
  }
  syncPhotoFrameMaskOverlay();
  syncDistortMirrorSliderVisibility();
}

/**
 * 根据勾选状态驱动 Canvas 遮罩动画（不改变 ASCII 与导出）。
 * @returns {void}
 */
function syncPhotoFrameMaskOverlay() {
  if (!asciiFrameMaskCanvas) return;
  if (!frameMaskCheckbox && !frameMaskIronCheckbox) return;
  var kind = getPhotoFrameMaskKind();
  var should = !!kind && !videoMode && anyPhotoFrameMaskControlActive();
  /** 成片已写入暗角，避免与 Canvas 遮罩双重叠加 */
  if (
    should &&
    typeof AsciiCameraPreview !== 'undefined' &&
    AsciiCameraPreview.previewCaptureActive &&
    AsciiCameraPreview.pendingGalleryPayload &&
    AsciiCameraPreview.pendingGalleryPayload.isPhotoPreview === true &&
    AsciiCameraPreview.pendingGalleryPayload.bakedFrameMask === true
  ) {
    should = false;
  }

  if (!should) {
    cancelPhotoFrameMaskAnimation();
    if (photoFrameMaskEase > 0 || photoFrameMaskIronRevealEase > 0) {
      startPhotoFrameMaskAnimation(photoFrameMaskEase, 0, null, photoFrameMaskIronRevealEase, 0);
    } else {
      photoFrameMaskEase = 0;
      photoFrameMaskIronRevealEase = 0;
      hidePhotoFrameMaskCanvas();
    }
    photoPrevRound11 = false;
    photoPrevIron11 = false;
    return;
  }

  var ap = aspectPicker ? aspectPicker.value : '';
  var showOval = ap === '3:4' && frameMaskCheckbox && frameMaskCheckbox.checked;
  var showRound = ap === '1:1' && frameMaskCheckbox && frameMaskCheckbox.checked;
  var showIron = ap === '1:1' && frameMaskIronCheckbox && frameMaskIronCheckbox.checked;
  var round11 = showRound;
  var iron11 = showIron;
  var ironJustOn = iron11 && !photoPrevIron11;
  var ironJustOff = !iron11 && photoPrevIron11;
  var roundJustOff = !round11 && photoPrevRound11;

  if (photoFrameMaskAnimRaf != null) {
    photoPrevRound11 = round11;
    photoPrevIron11 = iron11;
    return;
  }

  /** Monocular 关 + Iron 开同一操作：先收起圆遮罩，再铁栅自上而下（两段各 400ms + easing，与 gallery 上传一致） */
  if (ironJustOn && roundJustOff) {
    cancelPhotoFrameMaskAnimation();
    photoFrameMaskIronRevealEase = 0;
    startPhotoFrameMaskAnimation(
      1,
      0,
      function () {
        startPhotoFrameMaskAnimation(0, 0, null, 0, 1);
      },
      0,
      0
    );
    photoPrevRound11 = round11;
    photoPrevIron11 = iron11;
    return;
  }

  if (ironJustOn) {
    cancelPhotoFrameMaskAnimation();
    photoFrameMaskIronRevealEase = 0;
    var pTo = showOval || showRound ? 1 : 0;
    startPhotoFrameMaskAnimation(photoFrameMaskEase, pTo, null, 0, 1);
    photoPrevRound11 = round11;
    photoPrevIron11 = iron11;
    return;
  }

  /** Iron 关闭：任意 Monocular 组合下均播 iron 1→0，避免仅 `round11` 分支导致无退场动画 */
  if (ironJustOff) {
    cancelPhotoFrameMaskAnimation();
    var pToIronOff = showOval || showRound ? 1 : 0;
    startPhotoFrameMaskAnimation(photoFrameMaskEase, pToIronOff, null, photoFrameMaskIronRevealEase, 0);
    photoPrevRound11 = round11;
    photoPrevIron11 = iron11;
    return;
  }

  var targetPhoto = showOval || showRound ? 1 : 0;
  var targetIron = iron11 ? 1 : 0;
  var eps = 0.001;
  var atPhoto = Math.abs(photoFrameMaskEase - targetPhoto) < eps;
  var atIron = Math.abs(photoFrameMaskIronRevealEase - targetIron) < eps;
  if (
    atPhoto &&
    atIron &&
    asciiFrameMaskCanvas.classList.contains('ascii-frame-mask-canvas--visible')
  ) {
    drawPhotoFrameMaskAtEase(photoFrameMaskEase);
    photoPrevRound11 = round11;
    photoPrevIron11 = iron11;
    return;
  }

  cancelPhotoFrameMaskAnimation();
  startPhotoFrameMaskAnimation(
    photoFrameMaskEase,
    targetPhoto,
    null,
    photoFrameMaskIronRevealEase,
    targetIron
  );
  photoPrevRound11 = round11;
  photoPrevIron11 = iron11;
}

/**
 * 根据当前模式更新 Video 锁定的分辨率 / 比例与按钮文案。
 * @returns {void}
 */
function applyCaptureModeUi() {
  if (cameraShell) cameraShell.classList.toggle('cam-video-mode', videoMode);
  /**
   * 未开摄像头：Style 禁用；Photo 下 Aspect/Resolution 可调；Video 下与已开摄像头时一致（1:1；Resolution 可选 60/80）。
   * 预览态：仅确认画面，不可改比例/分辨率。
   * 实时取景：Video 下锁定 Aspect（Resolution 可选 60/80）。
   */
  var flashSwitchLabel =
    flashToggle && flashToggle.parentElement && flashToggle.parentElement.classList.contains('flash-switch')
      ? flashToggle.parentElement
      : null;
  if (!stream) {
    if (densityPicker) densityPicker.disabled = true;
    if (colorPicker) colorPicker.disabled = false;
    if (flashToggle) flashToggle.disabled = false;
    if (flashSwitchLabel) {
      flashSwitchLabel.classList.remove('flash-switch--disabled');
      flashSwitchLabel.removeAttribute('aria-disabled');
    }
    if (videoMode) {
      if (resPicker) {
        resPicker.value = String(VIDEO_DEFAULT_COLS);
        resPicker.disabled = true;
        resPicker.classList.remove('select-strong-disabled');
      }
      if (aspectPicker) {
        aspectPicker.value = '1:1';
        aspectPicker.disabled = true;
        aspectPicker.classList.add('select-strong-disabled');
      }
      if (resPickerStack) resPickerStack.classList.remove('select-locked');
      if (aspectPickerStack) aspectPickerStack.classList.add('select-locked');
    } else {
      if (aspectPicker) {
        aspectPicker.disabled = false;
        aspectPicker.classList.remove('select-strong-disabled');
      }
      if (resPicker) {
        resPicker.disabled = false;
        resPicker.classList.remove('select-strong-disabled');
      }
      if (resPickerStack) resPickerStack.classList.remove('select-locked');
      if (aspectPickerStack) aspectPickerStack.classList.remove('select-locked');
      // 只在当前值为 Loop（Video）专用列数时回填 Photo 记忆值；避免覆盖用户在离线状态下手动选择的 Resolution。
      if (resPicker && resPicker.value === '72') {
        if (
          savedPhotoResValue &&
          resPicker.querySelector('option[value="' + savedPhotoResValue + '"]')
        ) {
          resPicker.value = savedPhotoResValue;
        } else {
          resPicker.value = '72';
        }
      }
      if (restorePhotoSettingsAfterVideo) {
        if (savedPhotoAspectValue) aspectPicker.value = savedPhotoAspectValue;
        else if (aspectPicker) aspectPicker.value = PHOTO_DEFAULT_ASPECT;
        restorePhotoSettingsAfterVideo = false;
      }
    }
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
  } else if (AsciiCameraPreview.previewCaptureActive) {
    var pPrev = AsciiCameraPreview.pendingGalleryPayload;
    var lockDm = pPrev && pPrev.usedDistortingMirror === true;
    if (densityPicker) {
      densityPicker.disabled = !!lockDm;
      if (lockDm) {
        densityPicker.classList.add('select-strong-disabled');
      } else {
        densityPicker.classList.remove('select-strong-disabled');
      }
    }
    if (colorPicker) colorPicker.disabled = false;
    /** 预览为非实时态：禁止 Flash（避免误触） */
    if (flashToggle) flashToggle.disabled = true;
    if (flashSwitchLabel) {
      flashSwitchLabel.classList.add('flash-switch--disabled');
      flashSwitchLabel.setAttribute('aria-disabled', 'true');
    }
    aspectPicker.disabled = true;
    resPicker.disabled = true;
    aspectPicker.classList.add('select-strong-disabled');
    resPicker.classList.add('select-strong-disabled');
    if (resPickerStack) resPickerStack.classList.add('select-locked');
    if (aspectPickerStack) aspectPickerStack.classList.add('select-locked');
  } else {
    if (densityPicker) {
      densityPicker.disabled = false;
      densityPicker.classList.remove('select-strong-disabled');
    }
    if (colorPicker) colorPicker.disabled = false;
    if (flashToggle) flashToggle.disabled = false;
    if (flashSwitchLabel) {
      flashSwitchLabel.classList.remove('flash-switch--disabled');
      flashSwitchLabel.removeAttribute('aria-disabled');
    }
    aspectPicker.disabled = videoMode;
    resPicker.disabled = false;
    resPicker.classList.remove('select-strong-disabled');
    aspectPicker.classList.toggle('select-strong-disabled', videoMode);
    if (resPickerStack) resPickerStack.classList.remove('select-locked');
    if (aspectPickerStack) aspectPickerStack.classList.toggle('select-locked', videoMode);
    if (videoMode) {
      if (resPicker) {
        resPicker.value = String(VIDEO_DEFAULT_COLS);
        resPicker.disabled = true;
      }
      aspectPicker.value = '1:1';
      snapBtn.textContent = SNAP_LABEL_VIDEO;
    } else {
      // 同上：仅在值无效（停留在 Video 的 60）时才恢复 Photo 的记忆值。
      if (resPicker && resPicker.value === '72') {
        if (
          savedPhotoResValue &&
          resPicker.querySelector('option[value="' + savedPhotoResValue + '"]')
        ) {
          resPicker.value = savedPhotoResValue;
        } else {
          resPicker.value = '72';
        }
      }
      if (restorePhotoSettingsAfterVideo) {
        if (savedPhotoAspectValue) aspectPicker.value = savedPhotoAspectValue;
        else if (aspectPicker) aspectPicker.value = PHOTO_DEFAULT_ASPECT;
        restorePhotoSettingsAfterVideo = false;
      }
      snapBtn.textContent = SNAP_LABEL_READY;
    }
  }
  AsciiCameraUi.syncResPickerOptionsVisibility();
  AsciiCameraUi.updateModeTabsUi();
  AsciiCameraUi.syncVideoProgressBarForMode();
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
  if (!stream) syncIntroRequestRain();
  if (stream && animId == null && !AsciiCameraPreview.previewCaptureActive) render();
  AsciiCameraPreview.syncLoopCoverUiVisibility();
  if (aspectPicker) lastAspectPickerValueForMask = aspectPicker.value;
  updateFrameMaskUi();
  window.requestAnimationFrame(function () {
    updateFrameMaskUi();
  });
  syncDistortMirrorSliderVisibility();
}

/**
 * @param {boolean} nextVideo 是否进入 Video
 * @param {boolean} [skipFrameMaskCheckboxSnapshot] 为 true 时不从当前勾选覆盖 `frameMaskChecked*`（Photo→Loop 先程序化取消勾选时保留记忆）
 * @returns {void}
 */
function setCaptureVideoMode(nextVideo, skipFrameMaskCheckboxSnapshot) {
  if (AsciiCameraPreview.previewCaptureActive) return;
  if (nextVideo && !videoMode) {
    savedPhotoResValue = resPicker.value;
    savedPhotoAspectValue = aspectPicker.value;
    if (!skipFrameMaskCheckboxSnapshot && frameMaskCheckbox && aspectPicker) {
      if (aspectPicker.value === '3:4') frameMaskCheckedOval = frameMaskCheckbox.checked;
      else if (aspectPicker.value === '1:1') {
        frameMaskCheckedRound = frameMaskCheckbox.checked;
        if (frameMaskIronCheckbox) frameMaskCheckedIronBars = frameMaskIronCheckbox.checked;
      }
    }
    restorePhotoSettingsAfterVideo = true;
  }
  if (!nextVideo && videoMode) {
    restorePhotoSettingsAfterVideo = true;
  }
  videoMode = !!nextVideo;
  applyCaptureModeUi();
}

/**
 * Photo→Loop：若为 1:1/3:4 且取景框开启，先播放遮罩收起再切 Loop；否则立即切换。
 * 程序化取消勾选期间用 `frameMaskMemorySuppress` 保留 `frameMaskChecked*`，返回 Photo 后 `updateFrameMaskUi` 仍恢复勾选。
 * @returns {void}
 */
function runPhotoFrameMaskExitThenToLoop() {
  if (videoMode || !aspectPicker || !frameMaskCheckbox) {
    setCaptureVideoMode(true);
    return;
  }
  var ap = aspectPicker.value;
  if (ap !== '1:1' && ap !== '3:4') {
    setCaptureVideoMode(true);
    return;
  }
  var hasFrame =
    (getPhotoFrameMaskKind() === 'oval' && frameMaskCheckbox && frameMaskCheckbox.checked) ||
    (aspectPicker &&
      aspectPicker.value === '1:1' &&
      ((frameMaskCheckbox && frameMaskCheckbox.checked) ||
        (frameMaskIronCheckbox && frameMaskIronCheckbox.checked)));
  if (!hasFrame) {
    setCaptureVideoMode(true);
    return;
  }
  frameMaskMemorySuppress = true;
  if (frameMaskCheckbox) frameMaskCheckbox.checked = false;
  if (frameMaskIronCheckbox) frameMaskIronCheckbox.checked = false;
  cancelPhotoFrameMaskAnimation();
  if (!asciiFrameMaskCanvas || !asciiFrameMaskCtx) {
    frameMaskMemorySuppress = false;
    setCaptureVideoMode(true, true);
    return;
  }
  if (photoFrameMaskEase > 0 || photoFrameMaskIronRevealEase > 0) {
    startPhotoFrameMaskAnimation(photoFrameMaskEase, 0, function () {
      frameMaskMemorySuppress = false;
      setCaptureVideoMode(true, true);
    }, photoFrameMaskIronRevealEase, 0);
  } else {
    hidePhotoFrameMaskCanvas();
    frameMaskMemorySuppress = false;
    setCaptureVideoMode(true, true);
  }
}

/**
 * 切换比例 **当下**：Evil Queen / Monocular 是否在屏上视为「开着」。
 * 依据 **旧比例** `oldAp`（即 `lastAspectPickerValueForMask`）与 **此时仍未被 `updateFrameMaskUi` 改写** 的主框勾选；仅 3:4/1:1 的 EQ/Mono 主勾选，Iron Bars 不参与。
 * @param {string} oldAp
 * @returns {boolean}
 */
function isSpecialFrameCurrentlyVisible(oldAp) {
  if (videoMode || !frameMaskCheckbox) return false;
  if (oldAp !== '3:4' && oldAp !== '1:1') return false;
  return !!frameMaskCheckbox.checked;
}

/**
 * 在 `onAspectPickerChange` 已把 **旧** 比例下的勾选写入 `frameMaskCheckedOval` / `frameMaskCheckedRound` 之后调用：
 * 切到 `newAp` 后 `updateFrameMaskUi` 会立刻恢复的主框是否会为开（即目标侧 Evil Queen / Monocular 是否 **马上** 可见）。
 * @param {string} newAp
 * @returns {boolean}
 */
function willNewAspectShowSpecialFrameImmediately(newAp) {
  if (newAp === '3:4') return frameMaskCheckedOval === true;
  if (newAp === '1:1') return frameMaskCheckedRound === true;
  return false;
}

/**
 * 是否先播收起再改比例：`oldVis && !newVis`。无旧框 / 新侧也将显示 EQ 或 Mono → 立即切换。
 * @param {string} oldAp
 * @param {string} newAp
 * @returns {boolean}
 */
function aspectChangeNeedsFrameExitFirst(oldAp, newAp) {
  if (oldAp === newAp) return false;
  var oldVis = isSpecialFrameCurrentlyVisible(oldAp);
  var newVis = willNewAspectShowSpecialFrameImmediately(newAp);
  if (!oldVis) return false;
  if (newVis) return false;
  return true;
}

/**
 * 将比例提交为 `newAp` 并刷新布局/框线 UI（与原先 `onAspectPickerChange` 后半段一致）。
 * @param {string} newAp
 * @returns {void}
 */
function commitAspectPickerValueAndLayout(newAp) {
  lastAspectPickerValueForMask = newAp;
  if (aspectPicker) aspectPicker.value = newAp;
  if (!videoMode && !AsciiCameraPreview.previewCaptureActive) {
    savedPhotoAspectValue = newAp;
  }
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
  syncIntroRequestRain();
  updateFrameMaskUi();
}

/**
 * Photo 下带活动取景框时切换比例：先把 `aspectPicker` 拉回 **旧** 比例并同步 `#ascii-out` 布局与雨，再播收起。
 * 否则 `change` 触发时选单已是新比例，`getAspectRatio`/`syncAsciiActiveFrameAspect` 会先按新画幅 reflow，而遮罩仍按旧圆几何绘制，出现 1:1 Monocular 与其它画幅叠影。
 * 双 rAF 与 `syncPhotoFrameMaskLayoutRedraw` 同节奏，待 `scheduleAsciiScale` 落地后再起遮罩动画；收起结束后再 `commitAspectPickerValueAndLayout(newAp)`。
 * @param {string} oldAp
 * @param {string} newAp
 * @returns {void}
 */
function runAspectChangeWithFrameExitPipeline(oldAp, newAp) {
  if (aspectPicker) aspectPicker.value = oldAp;
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
  syncIntroRequestRain();
  cancelPhotoFrameMaskAnimation();

  /**
   * @returns {void}
   */
  function afterExit() {
    commitAspectPickerValueAndLayout(newAp);
  }

  /**
   * @returns {void}
   */
  function startMaskExitAfterLayout() {
    if (!asciiFrameMaskCanvas || !asciiFrameMaskCtx) {
      afterExit();
      return;
    }
    /** 与 `syncPhotoFrameMaskOverlay` 一致：从当前 ease 或满遮罩起收；Iron 揭示同步收至 0 */
    var fromEase =
      photoFrameMaskEase > 0 && photoFrameMaskEase < 0.999 ? photoFrameMaskEase : 1;
    var fromIronExit = photoFrameMaskIronRevealEase;
    if (fromEase <= 0) {
      hidePhotoFrameMaskCanvas();
      photoFrameMaskEase = 0;
      photoFrameMaskIronRevealEase = 0;
      afterExit();
      return;
    }
    showPhotoFrameMaskCanvas();
    drawPhotoFrameMaskAtEase(fromEase);
    startPhotoFrameMaskAnimation(fromEase, 0, afterExit, fromIronExit, 0);
  }

  window.requestAnimationFrame(function () {
    window.requestAnimationFrame(startMaskExitAfterLayout);
  });
}

AsciiCameraUi.syncVideoProgressBarForMode();

/**
 * 是否在第三方 iframe 中（如 Notion embed）；跨域访问 `window.top` 会抛错，视为已嵌入。
 * @returns {boolean}
 */
function isEmbeddedInFrame() {
  try {
    return window.self !== window.top;
  } catch (e) {
    return true;
  }
}

/**
 * 在新标签页打开当前相机页，绕过嵌入页的摄像头限制（需在用户点击等手势中调用）。
 * @returns {Window | null}
 */
function openCameraInNewTab() {
  var name = AsciiCameraGalleryStorage.CAMERA_POPUP_WINDOW_NAME || 'ascii_camera_notion_embed';

}

/** @type {boolean} */
let snapCountdownActive = false;

/**
 * 测量 `#ascii-out` 实际单格宽高比（字宽÷行高），使采样列×行与屏幕像素块对齐；1:1 时画面呈正方形。
 * @returns {{ cellAspect: number, lineHeightPx: number }}
 */
function getAsciiCellMetrics() {
  if (asciiCellMetricsCache) return asciiCellMetricsCache;
  const probeEl = asciiCellProbe && asciiCellProbe.isConnected ? asciiCellProbe : out;
  const m = measureMonospaceCellFromElement(probeEl);
  asciiCellMetricsCache = m;
  return m;
}

/**
 * @param {HTMLElement} el 与 ASCII 输出使用相同样式的元素（如 `#ascii-out`）
 * @returns {{ cellAspect: number, lineHeightPx: number }}
 */
function measureMonospaceCellFromElement(el) {
  const cs = getComputedStyle(el);
  const fontSize = parseFloat(cs.fontSize) || 6;
  let lineHeightPx = parseFloat(cs.lineHeight);
  if (!Number.isFinite(lineHeightPx) || cs.lineHeight === 'normal' || String(cs.lineHeight).endsWith('%')) {
    lineHeightPx = fontSize;
  }
  const fontShorthand = cs.font && cs.font.length > 2 ? cs.font : [cs.fontStyle, cs.fontWeight, cs.fontSize, cs.fontFamily].filter(Boolean).join(' ');
  let charW = 0;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  if (ctx) {
    ctx.font = fontShorthand;
    charW = ctx.measureText('0').width;
  }
  if (!charW || charW <= 0) {
    const probe = document.createElement('span');
    probe.setAttribute('style', [
      'position:absolute', 'left:-9999px', 'visibility:hidden', 'white-space:pre',
      'font:' + fontShorthand, 'font-family:' + cs.fontFamily, 'font-size:' + cs.fontSize,
      'font-weight:' + cs.fontWeight, 'line-height:' + cs.lineHeight, 'letter-spacing:' + cs.letterSpacing
    ].join(';'));
    probe.textContent = '0';
    document.body.appendChild(probe);
    charW = probe.offsetWidth;
    document.body.removeChild(probe);
  }
  const cellAspect = charW > 0 && lineHeightPx > 0 ? charW / lineHeightPx : CELL_ASPECT_FALLBACK;
  return { cellAspect, lineHeightPx };
}

function invalidateAsciiCellMetrics() {
  asciiCellMetricsCache = null;
}

/** @type {number} */
let asciiScaleRaf = 0;

/**
 * 按当前 Photo/Video 与 Aspect 设置活动画幅的 `aspect-ratio`（宽恒为内容列 100%，高随比例）。
 * @returns {void}
 */
function syncAsciiActiveFrameAspect() {
  if (!asciiActiveFrame || !asciiWrap) return;
  /** 含 Camera OFF：开屏雨与 live 共用同一活动画幅比例 */
  var ar = videoMode ? 1 : getAspectRatio();
  asciiActiveFrame.style.aspectRatio = ar + ' / 1';
}

/**
 * 在固定字格下测量 `#ascii-out` 占位，整体 `scale` 以填入 `.ascii-active-frame`（contain，居中）。
 * Camera OFF（`.ascii-wrap--offline`）时清除内联 `left` / `top` / `transform`；可视提示由 `#ascii-wrap` 上的 `.ascii-off-helper` 负责。
 * @returns {void}
 */
function updateAsciiOutScale() {
  if (!asciiOutScaleWrap || !out || !asciiActiveFrame || !asciiWrap) return;
  if (asciiWrap.classList.contains('ascii-wrap--offline')) {
    asciiOutScaleWrap.style.transform = '';
    asciiOutScaleWrap.style.left = '';
    asciiOutScaleWrap.style.top = '';
    return;
  }
  var cw = asciiActiveFrame.clientWidth;
  var ch = asciiActiveFrame.clientHeight;
  if (cw < 2 || ch < 2) return;
  asciiOutScaleWrap.style.transform = 'translate(-50%, -50%)';
  void out.offsetWidth;
  var wi = out.offsetWidth;
  var hi = out.offsetHeight;
  if (wi < 1 || hi < 1) return;
  var s = Math.min(cw / wi, ch / hi);
  asciiOutScaleWrap.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
}

/**
 * 合并宽高比与缩放更新，下一帧执行缩放以避免与刚写入的 DOM 不同步。
 * @returns {void}
 */
function scheduleAsciiScale() {
  if (asciiScaleRaf) cancelAnimationFrame(asciiScaleRaf);
  asciiScaleRaf = requestAnimationFrame(function () {
    asciiScaleRaf = 0;
    updateAsciiOutScale();
  });
}

/**
 * 16:9 / 4:3 时加宽活动列；1:1、3:4、Video 保持与主按钮列同宽。
 * @returns {void}
 */
function syncAsciiActiveColumnWidthClass() {
  if (!asciiActiveColumn || !aspectPicker) return;
  var ap = aspectPicker.value;
  var wide = !videoMode && (ap === '16:9' || ap === '4:3');
  asciiActiveColumn.classList.toggle('ascii-active-column--wide', wide);
}

/**
 * 取景器内活动区布局同步：列宽、比例、缩放。
 * @returns {void}
 */
function syncAsciiLayout() {
  syncAsciiActiveColumnWidthClass();
  syncAsciiActiveFrameAspect();
  scheduleAsciiScale();
}

/**
 * @returns {number} 当前选取的列数，限制在 1 … MAX_RES_COLS（Video 模式固定 60）
 */
function getCols() {
  const n = parseInt(resPicker.value, 10);
  if (!Number.isFinite(n)) return 80;
  return Math.min(MAX_RES_COLS, Math.max(1, n));
}

AsciiCameraUi.wireEventBindings({
  /**
   * 更新 ASCII / 离线 helper / 视频进度条色。不调用 `syncIntroRequestRain`，以免重建 Matrix 雨列；雨色由 `requestRainTick` 每帧读取 `colorPicker`。
   * @returns {void}
   */
  onColorPickerChange: function () {
    out.style.color = colorPicker.value;
    if (!stream && asciiOffHelper) {
      asciiOffHelper.style.color = colorPicker.value;
    }
    AsciiCameraUi.syncVideoProgressBarColor();
  },
  onResPickerChange: function () {
    if (!videoMode && !AsciiCameraPreview.previewCaptureActive) {
      savedPhotoResValue = resPicker.value;
    }
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    syncIntroRequestRain();
    syncPhotoFrameMaskLayoutRedraw();
  },
  onAspectPickerChange: function () {
    if (videoMode) {
      lastAspectPickerValueForMask = aspectPicker.value;
      invalidateAsciiCellMetrics();
      syncAsciiLayout();
      syncIntroRequestRain();
      updateFrameMaskUi();
      return;
    }
    var oldAp = lastAspectPickerValueForMask;
    var newAp = aspectPicker.value;
    if (!AsciiCameraPreview.previewCaptureActive) {
      if (oldAp === '3:4') frameMaskCheckedOval = frameMaskCheckbox.checked;
      else if (oldAp === '1:1') {
        frameMaskCheckedRound = frameMaskCheckbox.checked;
        if (frameMaskIronCheckbox) frameMaskCheckedIronBars = frameMaskIronCheckbox.checked;
      }
    }
    if (AsciiCameraPreview.previewCaptureActive) {
      lastAspectPickerValueForMask = newAp;
      invalidateAsciiCellMetrics();
      syncAsciiLayout();
      syncIntroRequestRain();
      updateFrameMaskUi();
      return;
    }
    if (!aspectChangeNeedsFrameExitFirst(oldAp, newAp)) {
      commitAspectPickerValueAndLayout(newAp);
      return;
    }
    runAspectChangeWithFrameExitPipeline(oldAp, newAp);
  },
  onDensityPickerChange: function () {
    invalidateAsciiCellMetrics();
    if (AsciiCameraPreview.previewCaptureActive) {
      applyPreviewStyleFromDensity();
    } else {
      syncAsciiLayout();
    }
    syncPhotoFrameMaskLayoutRedraw();
    syncDistortMirrorSliderVisibility();
  },
  onCamTabPhotoClick: function () {
    if (snapCountdownActive || AsciiCameraPreview.previewCaptureActive) return;
    setCaptureVideoMode(false);
  },
  onCamTabVideoClick: function () {
    if (snapCountdownActive || AsciiCameraPreview.previewCaptureActive) return;
    runPhotoFrameMaskExitThenToLoop();
  },
  onWindowResize: function () {
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    syncIntroRequestRain();
  },
  onFontsReady: function () {
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    syncIntroRequestRain();
  },
  onAsciiFrameResizeObserved: function () {
    scheduleAsciiScale();
    syncIntroRequestRain();
    syncPhotoFrameMaskLayoutRedraw();
  }
});
if (frameMaskCheckbox) {
  frameMaskCheckbox.addEventListener('change', function () {
    if (frameMaskMemorySuppress) {
      return;
    }
    var k = getPhotoFrameMaskKind();
    if (k === 'oval') frameMaskCheckedOval = frameMaskCheckbox.checked;
    else if (k === 'round') frameMaskCheckedRound = frameMaskCheckbox.checked;
    if (
      typeof AsciiCameraPreview !== 'undefined' &&
      AsciiCameraPreview.previewCaptureActive &&
      AsciiCameraPreview.pendingGalleryPayload &&
      AsciiCameraPreview.pendingGalleryPayload.isPhotoPreview === true &&
      AsciiCameraPreview.pendingGalleryPayload.lumaCanonical &&
      AsciiCameraPreview.pendingGalleryPayload.lumaCanonical.length > 0
    ) {
      regeneratePhotoPreviewFromCanonical();
    } else {
      syncPhotoFrameMaskOverlay();
    }
  });
}
if (frameMaskIronCheckbox) {
  frameMaskIronCheckbox.addEventListener('change', function () {
    if (frameMaskMemorySuppress) {
      return;
    }
    if (getPhotoFrameMaskKind() === 'round') {
      frameMaskCheckedIronBars = frameMaskIronCheckbox.checked;
    }
    if (
      typeof AsciiCameraPreview !== 'undefined' &&
      AsciiCameraPreview.previewCaptureActive &&
      AsciiCameraPreview.pendingGalleryPayload &&
      AsciiCameraPreview.pendingGalleryPayload.isPhotoPreview === true &&
      AsciiCameraPreview.pendingGalleryPayload.lumaCanonical &&
      AsciiCameraPreview.pendingGalleryPayload.lumaCanonical.length > 0
    ) {
      regeneratePhotoPreviewFromCanonical();
    } else {
      syncPhotoFrameMaskOverlay();
    }
  });
}
syncAsciiLayout();
AsciiCameraUi.syncVideoProgressBarColor();
out.style.color = colorPicker.value;
if (!stream && asciiOffHelper) asciiOffHelper.style.color = colorPicker.value;
if (distortMirrorSlider) {
  distortMirrorSlider.addEventListener('input', function () {
    invalidateAsciiCellMetrics();
    if (AsciiCameraPreview.previewCaptureActive) {

    syncPhotoFrameMaskLayoutRedraw();
  });
}
syncDistortMirrorSliderVisibility();

/**
 * @param {number} ms
 * @returns {Promise<void>}
 */
function sleep(ms) {
  return new Promise(function (resolve) { setTimeout(resolve, ms); });
}

function getChars() {
  var v = densityPicker.value;
  if (v === STYLE_DISTORTING_MIRROR) {
