}

/** @type {number | null} */
let requestRainRaf = null;
/** 与 `stopRequestRainEffectFade` 的 transition 回调代数对齐，避免 abort 后误卸画布 */
let requestRainFadeGen = 0;
/** Phase 3.1：开屏雨由稀到密的 build-up 强度（0..1） */
let requestRainIntensity = 1;
/** @type {number} */
let requestRainBuildStartMs = 0;
/** @type {number} */
const REQUEST_RAIN_BUILD_MS = 2300;
/** @type {number} */
const REQUEST_RAIN_BUILD_START_INTENSITY = 0.32;
/**
 * @typedef {{
 *   x: number,
 *   headY: number,
 *   speed: number,
 *   trailLen: number,
 *   glyphs: string[],
 *   glyphMirror: boolean[],
 *   gaps: boolean[],
 *   glyphRows: number,
 *   pauseFrames: number,
 *   mutJ: number,
 *   actSeed: number,
 *   microHoldFrames: number[],
 *   microHoldRows: number[],
 *   recentGlyphs: string[],
 *   motif: string[],
 *   motifIdx: number,
 *   actBias: number,
 *   actBiasTarget: number,
 *   actBiasTtl: number,
 *   alphaMul: number
 * }} RequestRainColumn
 */
/** @type {RequestRainColumn[]} */
let requestRainColumns = [];
/** Phase 3.1：背景暗列（深度层，仅渲染用途，独立于前景列） */
/** @type {RequestRainColumn[]} */
let requestRainBgColumns = [];
/** @type {number} */
let requestRainCssW = 0;
/** @type {number} */
let requestRainCssH = 0;
/** @type {number} */
let requestRainLineHeight = 11;
/** @type {string} */
let requestRainFontSpec = '';
/** 尾迹长度随机区间（随 intro 分辨率档更新，强化颗粒感差异） */
let requestRainTrailMin = 18;
/** @type {number} */
let requestRainTrailSpan = 15;

/** 离散档 intro 雨基准字号（px，再乘画幅系数） */
const INTRO_RAIN_FONT_BASE = {
  48: 16.0,
  72: 12.5,
  96: 10.0,
  120: 8.6
};
/** 列距乘子：低分辨率更疏、高分辨率更密 */
const INTRO_RAIN_SPACING_MUL = {
  48: 0.88,
  72: 0.88,
  96: 0.88,
  120: 0.88
};
/**
 * Matrix 雨：开屏雨行高系数（全分辨率统一，保证竖向密度一致）。
 * @type {number}
 */
const INTRO_RAIN_LINE_HEIGHT_MUL_UNIFIED = 1;

/**
 * 列内赋字时避免与上下邻格同字：随机重试次数上限。
 * @type {number}
 */
const RAIN_GLYPH_ADJ_DUP_MAX_ATTEMPTS = 8;

/**
 * Matrix 雨：半角片假名单格水平镜像概率。
 * @type {number}
 */
const MATRIX_RAIN_MIRROR_KATAKANA_PROB = 0.78;

/**
 * Matrix 雨：数字单格水平镜像概率（电影中数字亦常呈镜像感）。
 * @type {number}
 */
const MATRIX_RAIN_MIRROR_NUMBER_PROB = 0.4;

/**
 * Matrix 雨：符号单格水平镜像概率。
 * @type {number}
 */
const MATRIX_RAIN_MIRROR_SYMBOL_PROB = 0.48;

/**
 * Matrix 雨：大写拉丁字母镜像概率（池内已无小写）。
 * @type {number}
 */
const MATRIX_RAIN_MIRROR_UPPER_LETTERS_PROB = 0.28;

/**
 * 半角片假名 + 数字 + 精选大写拉丁 + 用户指定符号 + 取景器 `CHAR_SETS` 块符并集（无小写）。
 * @returns {{
 *   katakana: string[],
 *   numbers: string[],
 *   letters: string[],
 *   symbols: string[],
 *   katakanaSet: Set<string>,
 *   numberSet: Set<string>,
 *   lettersSet: Set<string>,
 *   symbolsSet: Set<string>
 * }}
 */
function buildMatrixIntroCharPool() {
  var katakana =
    'ｱｲｳｴｵ' +
    'ｶｷｸｹｺ' +
    'ｻｼｽｾｿ' +
    'ﾀﾁﾂﾃﾄ' +
    'ﾅﾆﾇﾈﾉ' +
    'ﾊﾋﾌﾍﾎ' +
    'ﾏﾐﾑﾒﾓ' +
    'ﾔﾕﾖ' +
    'ﾗﾘﾙﾚﾛ' +
    'ﾜｦﾝ';
  var numbers = '0123456789';
  /** 用户精选大写子集（无 A H I M O T U V W X Y） */
  var letters = 'BCDEFGJKLNOPQRSZ';
  /**
   * 用户指定符号：ASCII 运算符/标点、`·•…` 与弯引号、逻辑符、破折号与省略号（再与 `CHAR_SETS` 块符并集合并）。
   */
  var symbols =
    '+-*/\\|=<>:;.,_~!@#$%^&()`' +
    '·•…:;\u2018\u2019\u201c\u201d' +
    '\u2200\u2208\u2227\u2228\u00ac' +
    '\u2014\u2015\u2026';

  /** 既有密度/块字符：至少包含 ·░▒▓；并继续并入 CHAR_SETS 的块字符 */
  var blockSeen = new Set();
  var blocks = '·░▒▓';
  for (var b = 0; b < blocks.length; b++) blockSeen.add(blocks[b]);
  Object.keys(CHAR_SETS).forEach(function (key) {
    var str = CHAR_SETS[key];
    for (var i = 0; i < str.length; i++) {
      var ch = str[i];
      if (ch === '\n' || ch === '\r') continue;
      if (!blockSeen.has(ch)) {
        blockSeen.add(ch);
        blocks += ch;
      }
    }
  });

  var katakanaArr = katakana.split('');
  var numbersArr = numbers.split('');
  var lettersArr = letters.split('');
  var symbolsArr = (symbols + blocks).split('');
  var symbolsSetOut = new Set(symbolsArr);
  return {
    katakana: katakanaArr,
    numbers: numbersArr,
    letters: lettersArr,
    symbols: symbolsArr,
    katakanaSet: new Set(katakanaArr),
    numberSet: new Set(numbersArr),
    lettersSet: new Set(lettersArr),
    symbolsSet: symbolsSetOut
  };
}

/**
 * @type {{
 *   katakana: string[],
 *   numbers: string[],
 *   letters: string[],
 *   symbols: string[],
 *   katakanaSet: Set<string>,
 *   numberSet: Set<string>,
 *   lettersSet: Set<string>,
 *   symbolsSet: Set<string>
 * } | null}
 */
let matrixIntroPoolCache = null;

/**
 * Matrix 开屏雨字符池（缓存；`CHAR_SETS` 为常量）。
 * @returns {{
 *   katakana: string[],
 *   numbers: string[],
 *   letters: string[],
 *   symbols: string[],
 *   katakanaSet: Set<string>,
 *   numberSet: Set<string>,
 *   lettersSet: Set<string>,
 *   symbolsSet: Set<string>
 * }}
 */
function getMatrixIntroCharPool() {
  if (matrixIntroPoolCache == null) {
    matrixIntroPoolCache = buildMatrixIntroCharPool();
  }
  return matrixIntroPoolCache;
}

/**
 * 为单格字符决定是否水平镜像（仅在 glyph 赋值时调用，非每帧；与 `glyphs[i]` 同步）。
 * 片假名 / 数字 / 符号 / 大写字母各有可调概率。
 * @param {string} ch
 * @param {{
 *   katakanaSet?: Set<string>,
 *   numberSet?: Set<string>,
 *   lettersSet?: Set<string>,
 *   symbolsSet?: Set<string>
 * }} pool
 * @returns {boolean}
 */
function assignGlyphMirror(ch, pool) {
  if (!ch || !pool) return false;
  if (pool.katakanaSet && pool.katakanaSet.has(ch)) {
    return Math.random() < MATRIX_RAIN_MIRROR_KATAKANA_PROB;
  }
  if (pool.numberSet && pool.numberSet.has(ch)) {
    return Math.random() < MATRIX_RAIN_MIRROR_NUMBER_PROB;
  }
  if (pool.symbolsSet && pool.symbolsSet.has(ch)) {
    return Math.random() < MATRIX_RAIN_MIRROR_SYMBOL_PROB;
  }
  if (pool.lettersSet && pool.lettersSet.has(ch)) {
    return Math.random() < MATRIX_RAIN_MIRROR_UPPER_LETTERS_PROB;
  }
  return false;
}

/**
 * 偏电影感：约 38% 片假名 / 12% 数字 / 5% 大写 / 45% 符号与块符（非均匀随机）。
 * @param {{ katakana: string[], numbers: string[], letters: string[], symbols: string[] }} pool
 * @returns {string}
 */
function pickMatrixIntroChar(pool) {
  if (!pool) return '·';
  var r = Math.random();
  /** @type {string[]} */
  var arr;
  if (r < 0.38) arr = pool.katakana;
  else if (r < 0.5) arr = pool.numbers;
  else if (r < 0.55) arr = pool.letters;
  else arr = pool.symbols;
  if (!arr || arr.length < 1) return '·';
  return arr[Math.floor(Math.random() * arr.length)] || '·';
}

/**
 * 若 `candidate` 或与随机重试得到的字与上下邻（同列 `glyphs`）相同则再选；尽量不破坏邻格镜像状态。
 * @param {{ katakana: string[], numbers: string[], letters: string[], symbols: string[] }} pool
 * @param {{ glyphs: string[] }} col
 * @param {number} row
 * @param {number} rows
 * @param {string} candidate
 * @returns {string}
 */
function resolveGlyphAvoidVertAdjacent(pool, col, row, rows, candidate) {
  var up = row > 0 ? col.glyphs[row - 1] : null;
  var dn = row < rows - 1 ? col.glyphs[row + 1] : null;
  /**
   * @param {string} ch
   * @returns {boolean}
   */
  function conflicts(ch) {
    if (!ch) return true;
    if (up != null && ch === up) return true;
    if (dn != null && ch === dn) return true;
    return false;
  }
  if (!conflicts(candidate)) return candidate;
  var k;
  var ch;
  for (k = 0; k < RAIN_GLYPH_ADJ_DUP_MAX_ATTEMPTS; k++) {
    ch = pickMatrixIntroChar(pool);
    if (!conflicts(ch)) return ch;
  }
  return candidate;
}

/**
 * @param {number} x
 * @param {number} h
 * @param {number} lh
 * @param {string} pool
 * @param {number} alphaMul
 * @returns {RequestRainColumn}
 */
function createRequestRainColumn(x, h, lh, pool, alphaMul) {
  // Phase 1（安全）：每列长度随机化到稳定可控区间（约 6–20 个可见字符）。
  var trailLen = 6 + Math.floor(Math.random() * 15);
  var rows = Math.max(6, Math.ceil(h / Math.max(1, lh)) + 4);
  var glyphs = new Array(rows);
  /** @type {boolean[]} */
  var gaps = new Array(trailLen);
  var pauseFrames = 0;
  /** @type {boolean[]} */
  var glyphMirror = new Array(rows);
  var colGlyphRef = { glyphs: glyphs };
  for (var gi = 0; gi < rows; gi++) {
    glyphs[gi] = resolveGlyphAvoidVertAdjacent(pool, colGlyphRef, gi, rows, pickMatrixIntroChar(pool));
    glyphMirror[gi] = assignGlyphMirror(glyphs[gi], pool);
  }
  for (var i = 0; i < trailLen; i++) {
    // 10–20% 稀疏留白：固定在尾迹位置（不是每帧重新随机）。
    gaps[i] = Math.random() < 0.14;
  }
  return {
    x: x,
    headY:
      Math.random() < 0.35
        ? Math.random() * h
        : Math.random() * (h + trailLen * lh) - trailLen * lh,
    speed: 2.2 + Math.random() * 4.2,
    trailLen: trailLen,
    glyphs: glyphs,
    glyphMirror: glyphMirror,
    gaps: gaps,
    glyphRows: rows,
    pauseFrames: pauseFrames,
    mutJ: 0.85 + Math.random() * 0.3,
    actSeed: Math.random(),
    microHoldFrames: [0, 0, 0, 0, 0],
    microHoldRows: [0, 0, 0, 0, 0],
    recentGlyphs: [],
    motif: [],
    motifIdx: 0,
    actBias: 0,
    actBiasTarget: 0,
    actBiasTtl: 0,
    alphaMul: alphaMul
  };
}

/**
 * 背景暗列：更短尾迹、更低活性、更慢一些；字首为白芯辉光，alpha 与 `alphaMul` 及尾迹一致。
 * @param {number} x
 * @param {number} h
 * @param {number} lh
 * @param {{ katakana: string[], numbers: string[], letters: string[], symbols: string[] }} pool
 * @param {number} alphaMul
 * @returns {RequestRainColumn}
 */
function createRequestRainBgColumn(x, h, lh, pool, alphaMul) {
  var trailLen = 4 + Math.floor(Math.random() * 9); // 4–12
  var rows = Math.max(6, Math.ceil(h / Math.max(1, lh)) + 4);
  var glyphs = new Array(rows);
  /** @type {boolean[]} */
  var glyphMirrorBg = new Array(rows);
  var gaps = new Array(trailLen);
  var colGlyphRefBg = { glyphs: glyphs };
  for (var gi = 0; gi < rows; gi++) {
    glyphs[gi] = resolveGlyphAvoidVertAdjacent(pool, colGlyphRefBg, gi, rows, pickMatrixIntroChar(pool));
    glyphMirrorBg[gi] = assignGlyphMirror(glyphs[gi], pool);
  }
  for (var i = 0; i < trailLen; i++) gaps[i] = Math.random() < 0.16;
  return {
    x: x,
    headY:
      Math.random() < 0.55
        ? Math.random() * h
        : Math.random() * (h + trailLen * lh) - trailLen * lh,
    speed: (2.2 + Math.random() * 4.2) * 0.82,
    trailLen: trailLen,
    glyphs: glyphs,
    glyphMirror: glyphMirrorBg,
    gaps: gaps,
    glyphRows: rows,
    pauseFrames: 0,
    mutJ: 0.55 + Math.random() * 0.25,
    actSeed: Math.random(),
    microHoldFrames: [0, 0, 0, 0, 0],
    microHoldRows: [0, 0, 0, 0, 0],
    recentGlyphs: [],
    motif: [],
    motifIdx: 0,
    actBias: 0,
    actBiasTarget: 0,
    actBiasTtl: 0,
    alphaMul: alphaMul
  };
}

/**
 * Phase 2：列内 glyph buffer 持久化 + 受控突变（减少 TV noise）。
 * - 基础突变：约 10–15%
 * - 尾迹近头：约 40–60%
 * - 尾迹外：约 5–10%
 * - 突变时 30–40% 复制上一行，形成纵向纹理
 * @param {RequestRainColumn} col
 * @param {number} h
 * @param {number} lh
 * @param {{ katakana: string[], numbers: string[], letters: string[], symbols: string[] }} pool
 * @param {boolean} paused
 * @returns {void}
 */
function evolveRequestRainColumnGlyphs(col, h, lh, pool, paused) {
  if (!col || !col.glyphs || col.glyphs.length < 1) return;
  var rows = col.glyphs.length;
  if (!col.glyphMirror || col.glyphMirror.length !== rows) {
    col.glyphMirror = new Array(rows);
    for (var syncM = 0; syncM < rows; syncM++) {
      col.glyphMirror[syncM] = assignGlyphMirror(col.glyphs[syncM], pool);
    }
  }
  var headRow = Math.floor(col.headY / Math.max(1, lh));
  var tlen = Math.max(1, col.trailLen);
  var mj = col.mutJ != null ? col.mutJ : 1;
  var mhF = col.microHoldFrames;
  var mhR = col.microHoldRows;
  // burtsy activity：列级活跃偏置缓慢变化（让突变呈现“段落感”而非均匀噪声）
  if (col.actBiasTtl == null) col.actBiasTtl = 0;
  if (col.actBias == null) col.actBias = 0;
  if (col.actBiasTarget == null) col.actBiasTarget = 0;
  if (col.actBiasTtl <= 0) {
    col.actBiasTtl = 30 + Math.floor(Math.random() * 120); // ~0.5–2.5s@60fps
    var r0 = Math.random();
    // 多数时间偏稳定，少数时间短暂更“健谈”
    col.actBiasTarget = r0 < 0.75 ? (-0.22 + Math.random() * 0.18) : (0.05 + Math.random() * 0.55);
  } else {
    col.actBiasTtl--;
  }
  col.actBias += (col.actBiasTarget - col.actBias) * 0.06;
  var biasMul = Math.max(0.55, Math.min(1.65, 1 + col.actBias));

  if (!col.recentGlyphs) col.recentGlyphs = [];
  if (!col.motif) col.motif = [];
  if (col.motifIdx == null) col.motifIdx = 0;

  /**
   * @param {number} row
   * @returns {string}
   */
  function pickMutatedGlyph(row) {
    // 35–45%：复制上方
    if (Math.random() < 0.4 && row > 0) {
      return col.glyphs[row - 1] || pickMatrixIntroChar(pool);
    }
    // 20–30%：复用本列近期 glyph（局部惯性/碎片感）
    if (col.recentGlyphs.length && Math.random() < 0.25) {
      return col.recentGlyphs[Math.floor(Math.random() * col.recentGlyphs.length)];
    }
    // 可选 motif：极轻量（2–4 字）短暂回声；避免可读词
    if (col.motif.length && Math.random() < 0.18) {
      var m = col.motif[col.motifIdx % col.motif.length];
      col.motifIdx = (col.motifIdx + 1) % col.motif.length;
      return m || pickMatrixIntroChar(pool);
    }
    // 剩余：新随机
    return pickMatrixIntroChar(pool);
  }

  // 偶尔生成短 motif（更偏向符号/数字/片假名混合）
  if (col.motif.length < 1 && Math.random() < 0.008) {
    var ml = 2 + Math.floor(Math.random() * 3);
    col.motif = new Array(ml);
    col.motifIdx = 0;
    for (var mi = 0; mi < ml; mi++) col.motif[mi] = pickMatrixIntroChar(pool);
  } else if (col.motif.length && Math.random() < 0.0035) {
    // motif 自然消退，避免全屏过度模式化
    col.motif = [];
    col.motifIdx = 0;
  }

  for (var r = 0; r < rows; r++) {
    var d = headRow - r; // 0=head, 正数在尾迹内，负数在头下方
    var rate;
    if (d >= 0 && d < tlen) {
      if (d === 0) rate = paused ? 0.62 : 0.56; // head
      else if (d <= 2) rate = paused ? 0.48 : 0.44; // immediate trail
      else if (d <= Math.floor(tlen * 0.68)) rate = 0.12; // mid trail
      else rate = 0.07; // tail end
    } else {
      rate = 0.03; // outside illuminated zone：很低，保持“定格网格”感
    }
    // micro-hold：被挂住的局部 glyph 在原地更“活”（略增突变率）
    if (mhF && mhR) {
      for (var k = 0; k < 5; k++) {
        if (mhF[k] > 0 && mhR[k] === r) {
          rate *= 1.35;
          break;
        }
      }
    }
    rate *= mj;
    rate *= biasMul;
    if (Math.random() < rate) {
      var candMut = pickMutatedGlyph(r);
      col.glyphs[r] = resolveGlyphAvoidVertAdjacent(pool, col, r, rows, candMut);
      // 记录近期片段（限制长度，避免内存增长）
      if (col.glyphs[r]) {
        col.recentGlyphs.push(col.glyphs[r]);
        if (col.recentGlyphs.length > 7) col.recentGlyphs.shift();
      }
      var newCh = col.glyphs[r];
      if (r > 0 && newCh === col.glyphs[r - 1]) {
        col.glyphMirror[r] = col.glyphMirror[r - 1];
      } else {
        col.glyphMirror[r] = assignGlyphMirror(newCh, pool);
      }
    }
  }
}

/**
 * @param {RequestRainColumn} col
 * @param {number} h
 * @param {number} lh
 * @param {string} pool
 * @returns {void}
 */
function stepRequestRainColumn(col, h, lh, pool) {
  if (col.pauseFrames == null) col.pauseFrames = 0;
  if (!col.microHoldFrames) col.microHoldFrames = [0, 0, 0, 0, 0];
  if (!col.microHoldRows) col.microHoldRows = [0, 0, 0, 0, 0];
  var pauseChance = 0.0035;
  if (col.pauseFrames < 1 && Math.random() < pauseChance) {
    col.pauseFrames = 10 + Math.floor(Math.random() * 31); // 10–40 帧
  }
  if (col.pauseFrames > 0) {
    col.pauseFrames--;
    evolveRequestRainColumnGlyphs(col, h, lh, pool, true);
    return;
  }

  col.headY += col.speed;
  // micro-hold：仅 head 附近 0..4 槽位，短暂挂住；head 继续前进不受阻。
  var headRow = Math.floor(col.headY / Math.max(1, lh));
  var activeHolds = 0;
  for (var kk = 0; kk < 5; kk++) if (col.microHoldFrames[kk] > 0) activeHolds++;
  for (var k = 0; k < 5; k++) {
    if (col.microHoldFrames[k] > 0) {
      col.microHoldFrames[k]--;
      continue;
    }
    if (activeHolds >= 2) continue;
    if (Math.random() < 0.14) {
      col.microHoldFrames[k] = 4 + Math.floor(Math.random() * 9); // 4–12 帧
      col.microHoldRows[k] = headRow - k;
      activeHolds++;
    }
  }
  var resetAt = h + col.trailLen * lh + 30;
  var forceReset = Math.random() < 0.00025;
  if (forceReset || col.headY > resetAt) {
    col.headY =
      Math.random() < 0.35
        ? Math.random() * h
        : -Math.random() * h * 0.9 - col.trailLen * lh;
    col.speed = 2.2 + Math.random() * 4.2;
    col.trailLen = 6 + Math.floor(Math.random() * 15);
    var rows = Math.max(6, Math.ceil(h / Math.max(1, lh)) + 4);
    col.glyphs = new Array(rows);
    col.glyphMirror = new Array(rows);
    col.glyphRows = rows;
    col.gaps = new Array(col.trailLen);
    col.pauseFrames = 0;
    col.mutJ = 0.85 + Math.random() * 0.3;
    col.microHoldFrames = [0, 0, 0, 0, 0];
    col.microHoldRows = [0, 0, 0, 0, 0];
    col.recentGlyphs = [];
    col.motif = [];
    col.motifIdx = 0;
    col.actBias = 0;
    col.actBiasTarget = 0;
    col.actBiasTtl = 0;
    var colGlyphRefReset = { glyphs: col.glyphs };
    for (var gi = 0; gi < rows; gi++) {
      col.glyphs[gi] = resolveGlyphAvoidVertAdjacent(pool, colGlyphRefReset, gi, rows, pickMatrixIntroChar(pool));
      col.glyphMirror[gi] = assignGlyphMirror(col.glyphs[gi], pool);
    }
    for (var r = 0; r < col.trailLen; r++) col.gaps[r] = Math.random() < 0.14;
    return;
  }
  evolveRequestRainColumnGlyphs(col, h, lh, pool, false);
}

/**
 * 开屏雨用分辨率列数（与 Resolution 下拉一致）。
 * @returns {number}
 */
function getRainResolutionCols() {
  var n = parseInt(resPicker.value, 10);
  if (!Number.isFinite(n)) return 72;
  return Math.min(MAX_RES_COLS, Math.max(1, n));
}

/**
 * 将任意列数映射到五档表（32/60/80/100/120）的最近档，用于查表。
 * @param {number} resCols
 * @returns {number}
 */
function snapIntroRainResTier(resCols) {
  var tiers = [48, 72, 96, 120];
  var r = Math.min(MAX_RES_COLS, Math.max(1, resCols));
  var best = tiers[0];
  var d;
  var i;
  for (i = 0; i < tiers.length; i++) {
    d = Math.abs(r - tiers[i]);
    if (d < Math.abs(r - best)) best = tiers[i];
  }
  return best;
}

/**
 * Intro code-rain：按离散分辨率档查表 + 画幅缩放，档与档之间明显可分。
 * @param {number} resCols
 * @param {number} frameW
 * @returns {number}
 */
function getIntroRainFontPx(resCols, frameW) {
  var tier = snapIntroRainResTier(resCols);
  var base = INTRO_RAIN_FONT_BASE[tier];
  if (base == null) {
    base = 10;
  }
  var frameScale = Math.max(0.76, Math.min(1.12, frameW / 380));
  var fontPx = base * frameScale;
  return Math.max(6.5, Math.min(23, fontPx));
}

/**
 * @param {number} resCols
 * @returns {number}
 */
function getIntroRainColumnSpacingMul(resCols) {
  var tier = snapIntroRainResTier(resCols);
  var m = INTRO_RAIN_SPACING_MUL[tier];
  return m != null ? m : 1;
}

/**
 * 开屏雨行高系数：全分辨率档位统一为 {@link INTRO_RAIN_LINE_HEIGHT_MUL_UNIFIED}。
 * @param {number} _resCols 保留与调用方一致；未再按档区分行高。
 * @returns {number}
 */
function getIntroRainLineHeightMul(_resCols) {
  return INTRO_RAIN_LINE_HEIGHT_MUL_UNIFIED;
}

/**
 * 尾迹长度区间：低分辨率更长尾（更「松」），高分辨率更短（更「密」）。
 * @param {number} resCols
 * @returns {{ min: number, max: number }}
 */
function getIntroRainTrailBounds(resCols) {
  var tier = snapIntroRainResTier(resCols);
  switch (tier) {
    case 32:
      return { min: 24, max: 42 };
    case 60:
      return { min: 20, max: 38 };
    case 80:
      return { min: 17, max: 33 };
    case 100:
      return { min: 14, max: 28 };
    case 120:
      return { min: 12, max: 24 };
    default:
      return { min: 16, max: 30 };
  }
}

/**
 * @param {string} hex
 * @returns {{ r: number, g: number, b: number }}
 */
function hexToRgbForRain(hex) {
  var v = String(hex || '').trim();
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    return {
      r: parseInt(v.slice(1, 3), 16),
      g: parseInt(v.slice(3, 5), 16),
      b: parseInt(v.slice(5, 7), 16)
    };
  }
  return { r: 0, g: 255, b: 65 };
}

/**
 * 摄像头未开时：分辨率/比例/布局或字格变化后重算雨画布与列（不含仅改 Color；颜色由 `requestRainTick` 每帧读取）。
 * @returns {void}
 */
function syncIntroRequestRain() {
  if (stream) return;
  if (!requestRainCanvas || !requestRainCanvas.classList.contains('ascii-request-rain-canvas--visible')) return;
  resizeRequestRainCanvas();
  if (requestRainRaf == null) {
    requestRainRaf = requestAnimationFrame(requestRainTick);
  }
}

/**
 * 按 `#asciiActiveFrame` 与当前 Resolution 设置雨效画布（字号/列距由 `getIntroRainFontPx` 等映射，避免 60/100 被压成同档）。
 * @returns {void}
 */
function resizeRequestRainCanvas() {
  if (!requestRainCanvas || !requestRainCtx || !asciiActiveFrame) return;
  var rect = asciiActiveFrame.getBoundingClientRect();
  var w = Math.max(1, Math.floor(rect.width));
  var h = Math.max(1, Math.floor(rect.height));
  if (w < 2 || h < 2) return;
  requestRainCssW = w;
  requestRainCssH = h;
  var dpr = window.devicePixelRatio || 1;
  requestRainCanvas.width = Math.max(1, Math.floor(w * dpr));
  requestRainCanvas.height = Math.max(1, Math.floor(h * dpr));
  requestRainCanvas.style.width = w + 'px';
  requestRainCanvas.style.height = h + 'px';
  requestRainCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var resCols = getRainResolutionCols();
  var fontPx = getIntroRainFontPx(resCols, w);
  requestRainLineHeight = fontPx * getIntroRainLineHeightMul(resCols);
  requestRainFontSpec =
    fontPx +
    'px monospace, ui-monospace, "Cascadia Code", "Courier New", monospace';
  requestRainCtx.font = requestRainFontSpec;
  var rawCell = Math.max(
    7,
    Math.ceil(requestRainCtx.measureText('M').width || fontPx * 0.62)
  );
  var cellW = Math.ceil(rawCell * getIntroRainColumnSpacingMul(resCols));
  var trailB = getIntroRainTrailBounds(resCols);
  requestRainTrailMin = trailB.min;
  requestRainTrailSpan = Math.max(1, trailB.max - trailB.min);
  initRequestRainColumns(w, h, cellW, requestRainLineHeight);
}

/**
 * 高密度：等宽列栅格 + 三层错开叠化。
 * @param {number} w
 * @param {number} h
 * @param {number} cellW
 * @param {number} lh
 * @returns {void}
 */
function initRequestRainColumns(w, h, cellW, lh) {
  var pool = getMatrixIntroCharPool();
  var colCount = Math.ceil(w / cellW) + 2;
  requestRainColumns = [];
  requestRainBgColumns = [];
  var xInset = cellW * 0.5;
  for (var i = 0; i < colCount + 4; i++) {
    if (((i + 0) % 4) === 0) continue;
    var x = i * cellW + xInset;
    var a = 1;
    var band = i % 3;
    if (band === 1) a = 0.52;
    else if (band === 2) a = 0.3;
    requestRainColumns.push(createRequestRainColumn(x, h, lh, pool, a));
  }
  // 背景暗列：使用同一列网格，但选择与前景不重叠的槽位（被前景跳过的 1/4），并再稀疏化到约 30–50%。
  for (var bi = 0; bi < colCount + 4; bi++) {
    if (((bi + 0) % 4) !== 0) continue; // 与前景列槽位互斥
    if ((bi % 2) !== 0) continue; // 再稀疏到约一半
    var bx = bi * cellW + xInset;
    requestRainBgColumns.push(createRequestRainBgColumn(bx, h, lh, pool, 0.55));
  }
}

/**
 * 在 `textAlign:center` / `textBaseline:top` 下绘制单字；`mirror` 时水平镜像（Matrix 雨）。
 * @param {CanvasRenderingContext2D} ctx
 * @param {string} ch
 * @param {number} x
 * @param {number} yy
 * @param {boolean} mirror
 * @returns {void}
 */
function fillRequestRainGlyph(ctx, ch, x, yy, mirror) {
  if (!mirror) {
    ctx.fillText(ch, x, yy);
    return;
  }
  ctx.save();
  ctx.translate(x, yy);
  ctx.scale(-1, 1);
  ctx.fillText(ch, 0, 0);
  ctx.restore();
}

/**
 * 等宽列绘制：绿分层透明度 + 白头；字符每帧流变 + 随机突变。
 * @param {number} w
 * @param {number} h
 * @returns {void}
 */
function drawRequestRainFrame(w, h) {
  if (!requestRainCtx) return;
  requestRainCtx.clearRect(0, 0, w, h);
  requestRainCtx.font = requestRainFontSpec;
  requestRainCtx.textAlign = 'center';
  requestRainCtx.textBaseline = 'top';
  var pool = getMatrixIntroCharPool();
  var lh = requestRainLineHeight;
  var rgb = hexToRgbForRain(colorPicker.value);
  var c;
  // 背景暗列：先更新
  for (c = 0; c < requestRainBgColumns.length; c++) {
    stepRequestRainColumn(requestRainBgColumns[c], h, lh, pool);
  }
  for (c = 0; c < requestRainColumns.length; c++) {
    stepRequestRainColumn(requestRainColumns[c], h, lh, pool);
  }
  // 背景暗列：先画（更暗、更弱，且受 build-up 强度影响更大）
  var bgI = Math.max(0, Math.min(1, requestRainIntensity * 0.85));
  var bgR = Math.max(0, Math.min(255, Math.floor(rgb.r * 0.62)));
  var bgG = Math.max(0, Math.min(255, Math.floor(rgb.g * 0.7)));
  var bgB = Math.max(0, Math.min(255, Math.floor(rgb.b * 0.62)));
  for (c = 0; c < requestRainBgColumns.length; c++) {
    var bcol = requestRainBgColumns[c];
    if (bcol.actSeed != null && bcol.actSeed > bgI) continue;
    var btlen = bcol.trailLen;
    var bHeadRow = Math.floor(bcol.headY / Math.max(1, lh));
    for (var bd = 0; bd < btlen; bd++) {
      var brow = bHeadRow - bd;
      var byy = brow * lh;
      if (byy < -lh * 2 || byy > h + lh) continue;
      if (bcol.gaps && bcol.gaps[bd]) continue;
      if (!bcol.glyphs || bcol.glyphs.length < 1) continue;
      var bidx =
        ((brow % bcol.glyphs.length) + bcol.glyphs.length) % bcol.glyphs.length;
      var bch = bcol.glyphs[bidx];
      if (!bch) bch = pickMatrixIntroChar(pool);
      var bmir = !!(bcol.glyphMirror && bcol.glyphMirror[bidx]);
      var bmul = bcol.alphaMul;
      if (bd === 0) {
        /* 与前景白头同结构；各层 alpha 乘 bmul，与暗列尾迹共用 alphaMul */
        var blur1Bg = Math.max(10, Math.min(28, lh * 1.35));
        var blur2Bg = Math.max(6, Math.min(18, lh * 0.95));
        var blurCoreBg = Math.max(8, Math.min(24, lh * 0.9));
        var wm = Math.max(0, Math.min(1, bmul));
        requestRainCtx.save();
        requestRainCtx.shadowColor = 'rgba(255,255,255,' + Math.min(1, 0.88 * wm).toFixed(3) + ')';
        requestRainCtx.shadowBlur = blur1Bg;
        requestRainCtx.fillStyle = 'rgba(255,255,255,' + Math.min(1, 0.24 * wm).toFixed(3) + ')';
        fillRequestRainGlyph(requestRainCtx, bch, bcol.x, byy, bmir);
        requestRainCtx.shadowColor = 'rgba(255,255,255,' + Math.min(1, 0.82 * wm).toFixed(3) + ')';
        requestRainCtx.shadowBlur = blur2Bg;
        requestRainCtx.fillStyle = 'rgba(255,255,255,' + Math.min(1, 0.42 * wm).toFixed(3) + ')';
        fillRequestRainGlyph(requestRainCtx, bch, bcol.x, byy, bmir);
        requestRainCtx.shadowColor = 'rgba(255,255,255,' + Math.min(1, 0.95 * wm).toFixed(3) + ')';
        requestRainCtx.shadowBlur = blurCoreBg;
        requestRainCtx.fillStyle = 'rgba(255,255,255,' + Math.min(1, 0.98 * wm).toFixed(3) + ')';
        fillRequestRainGlyph(requestRainCtx, bch, bcol.x, byy, bmir);
        requestRainCtx.restore();
        continue;
      }
      var ba;
      if (bd <= 2) ba = 0.34 * bmul;
      else if (bd <= Math.floor(btlen * 0.68)) ba = 0.24 * bmul;
      else ba = 0.14 * bmul;
      requestRainCtx.fillStyle =
        'rgba(' + bgR + ',' + bgG + ',' + bgB + ',' + ba.toFixed(3) + ')';
      fillRequestRainGlyph(requestRainCtx, bch, bcol.x, byy, bmir);
    }
  }
  for (c = 0; c < requestRainColumns.length; c++) {
    var col = requestRainColumns[c];
    if (col.actSeed != null && col.actSeed > requestRainIntensity) continue;
    var tlen = col.trailLen;
    var headRow = Math.floor(col.headY / Math.max(1, lh));
    for (var d = 0; d < tlen; d++) {
      var row = headRow - d;
      // micro-hold：仅 head 附近小段挂住（保持 y 不变），不影响 head 前进
      if (d < 5 && col.microHoldFrames && col.microHoldRows && col.microHoldFrames[d] > 0) {
        row = col.microHoldRows[d];
      }
      var yy = row * lh;
      if (yy < -lh * 2 || yy > h + lh) continue;
      if (col.gaps && col.gaps[d]) continue;
      if (!col.glyphs || col.glyphs.length < 1) continue;
      var idx = ((row % col.glyphs.length) + col.glyphs.length) % col.glyphs.length;
      var ch = col.glyphs[idx];
      if (!ch) ch = pickMatrixIntroChar(pool);
      var mir = !!(col.glyphMirror && col.glyphMirror[idx]);
      var mul = col.alphaMul;
      if (d === 0) {
        // 头部：三层均在同一 save 栈内完成；若在 restore 之后再画亮芯，shadow 会被清空，辉光几乎看不见。
        var blur1 = Math.max(10, Math.min(28, lh * 1.35));
        var blur2 = Math.max(6, Math.min(18, lh * 0.95));
        var blurCore = Math.max(8, Math.min(24, lh * 0.9));
        requestRainCtx.save();
        requestRainCtx.shadowColor = 'rgba(255,255,255,0.88)';
        requestRainCtx.shadowBlur = blur1;
        requestRainCtx.fillStyle = 'rgba(255,255,255,0.24)';
        fillRequestRainGlyph(requestRainCtx, ch, col.x, yy, mir);
        requestRainCtx.shadowColor = 'rgba(255,255,255,0.82)';
        requestRainCtx.shadowBlur = blur2;
        requestRainCtx.fillStyle = 'rgba(255,255,255,0.42)';
        fillRequestRainGlyph(requestRainCtx, ch, col.x, yy, mir);
        requestRainCtx.shadowColor = 'rgba(255,255,255,0.95)';
        requestRainCtx.shadowBlur = blurCore;
        requestRainCtx.fillStyle = 'rgba(255,255,255,0.98)';
        fillRequestRainGlyph(requestRainCtx, ch, col.x, yy, mir);
        requestRainCtx.restore();
      } else {
        // 前景主体：尽量统一强度（不做明显列内阶梯），仅在极尾端轻微淡出
        var a = 0.52 * mul;
        if (d >= tlen - 2) a = 0.34 * mul;
        else if (d >= tlen - 4) a = 0.44 * mul;
        requestRainCtx.fillStyle =
          'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + a.toFixed(3) + ')';
      }
      if (d !== 0) {
        fillRequestRainGlyph(requestRainCtx, ch, col.x, yy, mir);
      }
    }
  }
}

/**
 * rAF：仅 `--visible` 时继续。
 * @returns {void}
 */
function requestRainTick() {
  if (!requestRainCanvas || !requestRainCanvas.classList.contains('ascii-request-rain-canvas--visible')) {
    requestRainRaf = null;
    return;
  }
  if (!asciiActiveFrame) {
    requestRainRaf = null;
    return;
  }
  if (requestRainBuildStartMs > 0 && requestRainIntensity < 1) {
    var now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
    var t = (now - requestRainBuildStartMs) / REQUEST_RAIN_BUILD_MS;
    if (t >= 1) {
      requestRainIntensity = 1;
    } else if (t <= 0) {
      requestRainIntensity = REQUEST_RAIN_BUILD_START_INTENSITY;
    } else {
      var ease = 1 - Math.pow(1 - t, 2);
      requestRainIntensity =
        REQUEST_RAIN_BUILD_START_INTENSITY +
        (1 - REQUEST_RAIN_BUILD_START_INTENSITY) * ease;
    }
  }
  var rect = asciiActiveFrame.getBoundingClientRect();
  var w = Math.max(1, Math.floor(rect.width));
  var h = Math.max(1, Math.floor(rect.height));
  if (w < 2 || h < 2) {
    requestRainRaf = requestAnimationFrame(requestRainTick);
    return;
  }
  if (Math.abs(w - requestRainCssW) > 2 || Math.abs(h - requestRainCssH) > 2) {
    resizeRequestRainCanvas();
    w = requestRainCssW;
    h = requestRainCssH;
  }
  drawRequestRainFrame(w, h);
  requestRainRaf = requestAnimationFrame(requestRainTick);
}

/**
 * 页面开屏 / Stop Camera 后：无 `stream` 时在 `#asciiActiveFrame` 内启动 code-rain。
 * @returns {void}
 */
function startRequestRainEffect() {
  if (!requestRainCanvas || !requestRainCtx) return;
  if (stream) return;
  requestRainIntensity = REQUEST_RAIN_BUILD_START_INTENSITY;
  requestRainBuildStartMs =
    (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
  resizeRequestRainCanvas();
  requestRainCanvas.classList.add('ascii-request-rain-canvas--mounted');
  requestRainCanvas.classList.add('ascii-request-rain-canvas--visible');
  if (requestRainRaf != null) cancelAnimationFrame(requestRainRaf);
  requestRainRaf = requestAnimationFrame(requestRainTick);
  startMatrixRainAmbiencePlay();
}

/**
 * Start Camera 点击：淡出开屏层（可与 getUserMedia 并行）。
 * @returns {void}
 */
function stopRequestRainEffectFade() {
  if (!requestRainCanvas) return;
  var gen = ++requestRainFadeGen;
  stopMatrixRainAmbience();
  if (requestRainRaf != null) {
    cancelAnimationFrame(requestRainRaf);
    requestRainRaf = null;
  }
  requestRainCanvas.classList.remove('ascii-request-rain-canvas--visible');
  if (!requestRainCanvas.classList.contains('ascii-request-rain-canvas--mounted')) return;
  var settled = false;
  /**
   * @param {{ propertyName?: string } | TransitionEvent} ev
   * @returns {void}
   */
  function onFadeEnd(ev) {
    if (gen !== requestRainFadeGen) return;
    if (settled) return;
    if (ev && 'propertyName' in ev && ev.propertyName && ev.propertyName !== 'opacity') return;
    settled = true;
    requestRainCanvas.removeEventListener('transitionend', onFadeEnd);
    requestRainCanvas.classList.remove('ascii-request-rain-canvas--mounted');
    if (requestRainCtx && requestRainCanvas.width > 0) {
      requestRainCtx.save();
      requestRainCtx.setTransform(1, 0, 0, 1, 0, 0);
      requestRainCtx.clearRect(0, 0, requestRainCanvas.width, requestRainCanvas.height);
      requestRainCtx.restore();
    }
  }
  requestRainCanvas.addEventListener('transitionend', onFadeEnd);
  setTimeout(function () {
    onFadeEnd({ propertyName: 'opacity' });
  }, 800);
}

/**
 * 立即关闭雨效（无 transition 等待）。
 * @returns {void}
 */
function abortRequestRainEffect() {
  requestRainFadeGen++;
  stopMatrixRainAmbience();
  if (!requestRainCanvas) return;
  if (requestRainRaf != null) {
    cancelAnimationFrame(requestRainRaf);
    requestRainRaf = null;
  }
  requestRainCanvas.classList.remove(
    'ascii-request-rain-canvas--visible',
    'ascii-request-rain-canvas--mounted'
  );
  if (requestRainCtx && requestRainCanvas.width > 0) {
    requestRainCtx.save();
    requestRainCtx.setTransform(1, 0, 0, 1, 0, 0);
    requestRainCtx.clearRect(0, 0, requestRainCanvas.width, requestRainCanvas.height);
    requestRainCtx.restore();
  }
}

/**
 * Photo 成片：在物理显示空间（字格宽高比 cellAspect）下按格心判定椭圆/圆内，外区置为最暗亮度（与 `luminanceToAscii` 中 b=0 对应）。
 * 归一化坐标取字宽为 `cellAspect`、字高为 1，使圆在屏幕上为圆、椭圆与取景意图一致。
 * @param {Float32Array} luma 行优先，原地修改
 * @param {number} cols
 * @param {number} rows
 * @param {'oval' | 'round'} kind 3:4 内接竖椭圆 / 1:1 内接圆
 * @param {number} [cellAspect] 与 `getAsciiCellMetrics().cellAspect`（字宽÷行高）一致；省略时按 1
 * @returns {void}
 */
function applyPhotoFrameMaskToLuma(luma, cols, rows, kind, cellAspect) {
  if (!luma || cols < 1 || rows < 1) return;
  var n = cols * rows;
  if (luma.length < n) return;
  var ca = cellAspect != null && Number.isFinite(cellAspect) && cellAspect > 0 ? cellAspect : 1;
  var cx = cols * ca * 0.5;
  var cy = rows * 0.5;
  var x;
  var y;
  var dx;
  var dy;
  if (kind === 'round') {
    var r = Math.min(cols * ca, rows) * 0.5;
    var r2 = r * r;
    for (y = 0; y < rows; y++) {
      for (x = 0; x < cols; x++) {
        dx = (x + 0.5) * ca - cx;
        dy = (y + 0.5) - cy;
        if (dx * dx + dy * dy > r2) {
          luma[y * cols + x] = 0;
        }
      }
    }
    return;
  }
  var a = cols * ca * 0.5;
  var b = rows * 0.5;
  if (a <= 0 || b <= 0) return;
  var invA2 = 1 / (a * a);
  var invB2 = 1 / (b * b);
  for (y = 0; y < rows; y++) {
    for (x = 0; x < cols; x++) {
      dx = (x + 0.5) * ca - cx;
      dy = (y + 0.5) - cy;
      if (dx * dx * invA2 + dy * dy * invB2 > 1) {
        luma[y * cols + x] = 0;
      }
    }
  }
}

/**
 * 铁栅横线行号：保留原 5 等分中第 1、第 4 条横线位置（去掉中间两条）。
 * @param {number} rows
 * @returns {{ h1: number, h2: number }}
 */
function getIronBarHorizontalRowIndices(rows) {
  var h1 = Math.min(Math.max(0, rows - 1), Math.round((1 * rows) / 5));
  var h2 = Math.min(Math.max(0, rows - 1), Math.round((4 * rows) / 5));
  return { h1: h1, h2: h2 };
}

/**
 * 竖条三等分留白（与 `getIronVerticalThreeBarsLayoutPx` 同式），宽度以「格宽」为单位。
 * @param {number} contentWidthCells
 * @param {number} barThicknessCells
 * @returns {{ t: number, g: number, Wc: number }}
 */
function getIronVerticalThreeBarsLayoutCellUnits(contentWidthCells, barThicknessCells) {
  var Wc = Math.max(0, contentWidthCells);
  var t = Math.max(0, barThicknessCells);
  var g = (Wc - 3 * t) / 4;
  if (g < 0 && Wc > 0) {
    t = Wc / 3;
    g = 0;
  }
  return { t: t, g: g, Wc: Wc };
}

/**
 * 1:1 铁栅几何 SSOT：仅依赖 cols、rows、cellAspect、画幅比；DOM 仅用于把本 spec 映射到像素。
 * 竖条厚度：以 72 列为基准的连续厚度 `(4/72)*cols` 格宽，再 **向下取整** 格数后重算 g，避免 96/120 下分数厚度 + 整格重叠导致竖条过宽、与横条视觉趋同。
 * @param {number} cols
 * @param {number} rows
 * @param {number} cellAspect
 * @param {number} aspectRatio 画幅 W/H（与 `getAspectRatio()` 一致）
 * @returns {{
 *   cols: number,
 *   rows: number,
 *   rows72: number,
 *   tVerticalInCells: number,
 *   gInCells: number,
 *   tHorizontalInRows: number,
 *   h1: number,
 *   h2: number,
 *   centerVerticalExtraCols: number,
 *   horizontalThicknessDeltaRows: number
 * }}
 */
function buildIronBarsSpec(cols, rows, cellAspect, aspectRatio) {
  var rows72 = getAsciiMaskRowCountForColsExplicit(IRON_BARS_REF_RES_COLS, cellAspect, aspectRatio);
  var Wc = Math.max(0, cols);
  var tFloat = (4 * Wc) / IRON_BARS_REF_RES_COLS;
  var tV = Math.max(1, Math.floor(tFloat));
  var lay = getIronVerticalThreeBarsLayoutCellUnits(Wc, tV);
  var tH = rows / Math.max(1, rows72);
  var h = getIronBarHorizontalRowIndices(rows);
  /**
   * 横条厚度微调（行单位）：96 为参考档 `IRON_BAR_HORIZ_DELTA_AT_REF`（保持不变）。
   * 120：`delta_ref × (cols / 96)`，在更密网格上略加强横条变薄，使与 96 的竖/横观感比例接近（相对 96 的自然 upscale，非固定 +1 列/行）。
   * 竖条不加列；48/72 与其余档为 0。
   */
  var IRON_BAR_HORIZ_REF_RES = 96;
  var IRON_BAR_HORIZ_DELTA_AT_REF = -1;
  var centerVerticalExtraCols = 0;
  var horizontalThicknessDeltaRows = 0;
  if (cols === IRON_BAR_HORIZ_REF_RES) {
    horizontalThicknessDeltaRows = IRON_BAR_HORIZ_DELTA_AT_REF;
  } else if (cols === 120) {
    horizontalThicknessDeltaRows = IRON_BAR_HORIZ_DELTA_AT_REF * (cols / IRON_BAR_HORIZ_REF_RES);
  }
  return {
    cols: cols,
    rows: rows,
    rows72: rows72,
    tVerticalInCells: lay.t,
    gInCells: lay.g,
    tHorizontalInRows: tH,
    h1: h.h1,
    h2: h.h2,
    centerVerticalExtraCols: centerVerticalExtraCols,
    horizontalThicknessDeltaRows: horizontalThicknessDeltaRows
  };
}

/**
 * 1:1 铁栅竖条：3 条等间距留白，中间条几何中心落在内容区水平中心（像素，用于仅 px 场景）。
 * @param {number} contentWidthPx 取景 ASCII 内容区宽度（px）
 * @param {number} barThicknessPx 竖条厚度（px）
 * @returns {{ t: number, g: number, Wc: number }}
 */
function getIronVerticalThreeBarsLayoutPx(contentWidthPx, barThicknessPx) {
  return getIronVerticalThreeBarsLayoutCellUnits(contentWidthPx, barThicknessPx);
}

/**
 * @param {number} a0
 * @param {number} a1
 * @param {number} b0
 * @param {number} b1
 * @returns {boolean}
 */
function segmentsOverlapPx(a0, a1, b0, b1) {
  return Math.max(a0, b0) < Math.min(a1, b1);
}

/**
 * 仅 48 列：左缘仍与 SSOT 的 `gInCells` / `tVerticalInCells` 一致（`floor(g)`、`floor(2g+t)`、`floor(3g+2t)`），每条竖条掩码宽度为 `t + 1` 列（在 SSOT 等宽 `t` 列基础上整体 +1 列，三条同等加粗）。
 * @param {number} col
 * @param {number} g
 * @param {number} t
 * @returns {boolean}
 */
function ironBarVert48EqualWidthCol(col, g, t) {
  var w = Math.max(1, Math.floor(t) + 1);
  var s0 = Math.floor(g);
  var s1 = Math.floor(2 * g + t);
  var s2 = Math.floor(3 * g + 2 * t);
  return (
    (col >= s0 && col <= s0 + w - 1) ||
    (col >= s1 && col <= s1 + w - 1) ||
    (col >= s2 && col <= s2 + w - 1)
  );
}

/**
 * 仅 120 列：先按格心落在 `[2g+t, 2g+2t]` 数出中间竖条列数 `w` 与首列 `s1`，左右用同宽 `w` 与 SSOT 的 `floor(g)` / `floor(3g+2t)` 起笔，使左右加宽对齐中间（不缩中间）。
 * @param {number} col
 * @param {number} g
 * @param {number} t
 * @param {number} cols
 * @returns {boolean}
 */
function ironBarVert120EqualWidthCol(col, g, t, cols) {
  var w = 0;
  var s1 = -1;
  var c;
  var cx;
  for (c = 0; c < cols; c++) {
    cx = c + 0.5;
    if (cx >= 2 * g + t && cx <= 2 * g + 2 * t) {
      if (s1 < 0) {
        s1 = c;
      }
      w++;
    }
  }
  w = Math.max(1, w);
  if (s1 < 0) {
    s1 = Math.floor(2 * g + t);
  }
  var s0 = Math.floor(g);
  var s2 = Math.floor(3 * g + 2 * t);
  return (
    (col >= s0 && col <= s0 + w - 1) ||
    (col >= s1 && col <= s1 + w - 1) ||
    (col >= s2 && col <= s2 + w - 1)
  );
}

/**
 * 格心是否在铁栅区域内（与 72 基准下的竖粗/横细比例一致，避免整格 overlap 在高分辨率把两向都撑满）。
 * @param {number} col
 * @param {number} row
 * @param {*} spec `buildIronBarsSpec` 返回值
 * @returns {boolean}
 */
function isIronBarMaskCellFromSpec(col, row, spec) {
  var cx = col + 0.5;
  var cy = row + 0.5;
  var dH = spec.horizontalThicknessDeltaRows != null ? spec.horizontalThicknessDeltaRows : 0;
  var tH = Math.max(1e-6, spec.tHorizontalInRows + dH);
  /** 120 列：两条横条各加厚 1 字符行（行向单位 +1） */
  if (spec.cols === 120) {
    tH += 1;
  }
  if (tH >= 0.5) {
    function horizCenterInBand(barIdx) {
      var c = barIdx + 0.5;
      return cy >= c - tH * 0.5 && cy <= c + tH * 0.5;
    }
    if (horizCenterInBand(spec.h1) || horizCenterInBand(spec.h2)) return true;
  } else {
    function horizOverlapThin(barIdx) {
      var c = barIdx + 0.5;
      return segmentsOverlapPx(row, row + 1, c - tH * 0.5, c + tH * 0.5);
    }
    if (horizOverlapThin(spec.h1) || horizOverlapThin(spec.h2)) return true;
  }
  var g = spec.gInCells;
  var t = spec.tVerticalInCells;
  if (spec.cols === 120) {
    return ironBarVert120EqualWidthCol(col, g, t, spec.cols);
  }
  if (spec.cols === 48) {
    return ironBarVert48EqualWidthCol(col, g, t);
  }
  var extra = spec.centerVerticalExtraCols != null ? spec.centerVerticalExtraCols : 0;
  function vertCenterInBarAt(x0, tw) {
    return cx >= x0 && cx <= x0 + tw;
  }
  if (vertCenterInBarAt(g, t)) return true;
  var xMid = 2 * g + t - 0.5 * extra;
  var wMid = t + extra;
  if (vertCenterInBarAt(xMid, wMid)) return true;
  if (vertCenterInBarAt(3 * g + 2 * t, t)) return true;
  return false;
}

/**
 * 是否落在三条竖条之一（仅列几何，不含横条行判定）；用于遮罩绘制时向上延伸竖条，不落横条 Y。
 * @param {number} col
 * @param {*} spec `buildIronBarsSpec` 返回值
 * @returns {boolean}
 */
function isIronBarVerticalColumnFromSpec(col, spec) {
  var g = spec.gInCells;
  var t = spec.tVerticalInCells;
  if (spec.cols === 120) {
    return ironBarVert120EqualWidthCol(col, g, t, spec.cols);
  }
  if (spec.cols === 48) {
    return ironBarVert48EqualWidthCol(col, g, t);
  }
  var extra = spec.centerVerticalExtraCols != null ? spec.centerVerticalExtraCols : 0;
  var cx = col + 0.5;
  function vertCenterInBarAt(x0, tw) {
    return cx >= x0 && cx <= x0 + tw;
  }
  if (vertCenterInBarAt(g, t)) return true;
  var xMid = 2 * g + t - 0.5 * extra;
  var wMid = t + extra;
  if (vertCenterInBarAt(xMid, wMid)) return true;
  if (vertCenterInBarAt(3 * g + 2 * t, t)) return true;
  return false;
}

/**
 * 1:1 铁栅：与取景 Canvas 共用 `buildIronBarsSpec`（可选传入与成片一致的 spec）。
 * @param {Float32Array} luma 行优先
 * @param {number} cols
 * @param {number} rows
 * @param {*} [specOrNull] `buildIronBarsSpec` 返回值；省略时按当前 metrics + 画幅比构建
 * @returns {void}
 */
function applyIronBarsMaskToLuma(luma, cols, rows, specOrNull) {
  if (!luma || cols < 1 || rows < 1) return;
  var n = cols * rows;
  if (luma.length < n) return;
  var spec =
    specOrNull != null
      ? specOrNull
      : buildIronBarsSpec(cols, rows, getAsciiCellMetrics().cellAspect, getAspectRatio());
  var x;
  var y;
  for (y = 0; y < rows; y++) {
    for (x = 0; x < cols; x++) {
      if (isIronBarMaskCellFromSpec(x, y, spec)) {
        luma[y * cols + x] = 0;
      }
    }
  }
}

/**
 * 由每格亮度（0…1，与 `toAscii` 采样一致）与当前字符集生成 ASCII。
 * @param {Float32Array} luma 行优先，长度 `cols * rows`
 * @param {number} cols
 * @param {number} rows
 * @param {string} chars
 * @returns {string}
 */
function luminanceToAscii(luma, cols, rows, chars) {
  const n = Math.max(1, chars.length - 1);
  let result = '';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const b = luma[y * cols + x];
      result += chars[Math.max(0, Math.min(Math.floor((1 - b) * n), n))];
    }
    result += '\n';
  }
  return result;
}

/**
 * Photo 预览：自 `lumaCanonical` 复制、按当前勾选施加帧遮罩并重算 ASCII（不修改规范亮度源）。
 * @returns {void}
 */
function regeneratePhotoPreviewFromCanonical() {
  var p = AsciiCameraPreview.pendingGalleryPayload;
  if (!p || p.isPhotoPreview !== true || !p.lumaCanonical || !p.cols || !p.rows) return;
  var cols = p.cols;
  var rows = p.rows;
  var n = cols * rows;
  if (p.lumaCanonical.length < n) return;
  if (!p.luma || p.luma.length !== n) {
    p.luma = new Float32Array(n);
  }
  p.luma.set(p.lumaCanonical);
  var metrics = getAsciiCellMetrics();
  var ap = aspectPicker ? aspectPicker.value : '';
  var maskKind = getPhotoFrameMaskKind();
  var baked = false;
  if (ap === '3:4' && maskKind === 'oval' && frameMaskCheckbox && frameMaskCheckbox.checked) {
    applyPhotoFrameMaskToLuma(p.luma, cols, rows, 'oval', metrics.cellAspect);
    baked = true;
  } else if (ap === '1:1') {
    if (frameMaskCheckbox && frameMaskCheckbox.checked) {
      applyPhotoFrameMaskToLuma(p.luma, cols, rows, 'round', metrics.cellAspect);
      baked = true;
    }
    if (frameMaskIronCheckbox && frameMaskIronCheckbox.checked) {
      var ironSpec = p.ironBarsSpec;
      if (
        ironSpec == null ||
        ironSpec.cols !== cols ||
        ironSpec.rows !== rows
      ) {
        ironSpec = buildIronBarsSpec(cols, rows, metrics.cellAspect, getAspectRatio());
      }
      applyIronBarsMaskToLuma(p.luma, cols, rows, ironSpec);
      baked = true;
    }
  }
  p.bakedFrameMask = baked;
  p.ascii = luminanceToAscii(p.luma, cols, rows, getChars());
  out.textContent = p.ascii;
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
  syncPhotoFrameMaskOverlay();
}

/**
 * 畸变镜强度 0…11（Photo / Loop 取景共用 `#distortMirrorSlider`）。
 * @returns {number}
 */
function getDistortMirrorLevel() {
  if (!distortMirrorSlider) return 0;
  var v = parseInt(distortMirrorSlider.value, 10);
  if (!Number.isFinite(v)) return 0;
  return Math.min(11, Math.max(0, v));
}

/**
 * 水平方向镜面反射，将任意实数 x 映射到 [0, width-1]（三角折返，非截断、非取模环绕）。
 * @param {number} x 采样横坐标（可非整数）
 * @param {number} width 像素宽度（列数）
 * @returns {number}
 */
function mirrorSampleXIntoRange(x, width) {
  if (width <= 1) return 0;
  var max = width - 1;
  var t = x;
  var i = 0;
  while ((t < 0 || t > max) && i < 64) {
    if (t < 0) {
      t = -t;
    } else {
      t = 2 * max - t;
    }
    i++;
  }
  if (t < 0) t = 0;
  if (t > max) t = max;
  return t;
}

/**
 * @param {Uint8ClampedArray} d
 * @param {number} w
 * @param {number} h
 * @param {number} sx
 * @param {number} sy
 * @param {number} cOff
 * @returns {number}
 */
function sampleBilinearDistort(d, w, h, sx, sy, cOff) {
  if (sx < 0 || sy < 0 || sx >= w - 1e-6 || sy >= h - 1e-6) return 0;
  var x0 = Math.floor(sx);
  var y0 = Math.floor(sy);
  var x1 = Math.min(x0 + 1, w - 1);
  var y1 = Math.min(y0 + 1, h - 1);
  var fx = sx - x0;
  var fy = sy - y0;
  var i00 = (y0 * w + x0) * 4 + cOff;
  var i10 = (y0 * w + x1) * 4 + cOff;
  var i01 = (y1 * w + x0) * 4 + cOff;
  var i11 = (y1 * w + x1) * 4 + cOff;
  return (
    d[i00] * (1 - fx) * (1 - fy) +
    d[i10] * fx * (1 - fy) +
    d[i01] * (1 - fx) * fy +
    d[i11] * fx * fy
  );
}

/**
 * 纵向镜面波纹：各行水平位移 `offsetX(y)=amplitude*sin(freq*y+phase)`，无径向/桶形。
 * 采样横坐标经 `mirrorSampleXIntoRange` 做水平镜面折返，避免越界变黑。
 * 固定整幅高度内约 `DISTORT_MIRROR_WAVE_CYCLES` 个周期；振幅由滑块 1…11 映射（0 档跳过）。
 *
 * 振幅映射（相对列宽 `cols` 的峰值水平位移比例，再乘以 `cols` 得像素）：
 * `u = (lv - 1) / 10`，`ampRel = AMP_MIN_REL + (AMP_MAX_REL - AMP_MIN_REL) * u^AMP_CURVE_EXP`。
 * - 旧版 6 档满档（及此前 12 档顶档）约 `0.10 * cols`，现故意落在约 **第 8 档** 附近，第 9–11 档再明显加强。
 * - 第 11 档峰值约 `AMP_MAX_REL * cols`（高于旧版最大值）。
 *
 * 近似表（`ampRel`，即 `ampPx/cols`）：1→0.012，2→0.016，3→0.023，4→0.034，5→0.047，6→0.062，
 * 7→0.080，8→0.100，9→0.121，10→0.145，11→0.170。
 *
 * @param {CanvasRenderingContext2D} c2d
 * @param {number} cols
 * @param {number} rows
 * @param {number} level 0…11
 * @returns {void}
 */
function applyDistortingMirrorToCanvas2d(c2d, cols, rows, level) {
  if (level <= 0) return;
  var lv = Math.min(11, Math.max(1, level));
  /** 整幅高度内正弦周期数（固定，不调 UI） */
  var DISTORT_MIRROR_WAVE_CYCLES = 2;
  var phase = 0;
  var freq = (DISTORT_MIRROR_WAVE_CYCLES * 2 * Math.PI) / Math.max(rows - 1, 1);
  /**
   * 相对列宽的最小/最大峰值位移（第 1 / 第 11 档）；`AMP_MAX_REL` 高于旧版 `0.10` 以使顶档明显更强。
   * @type {number}
   */
  var AMP_MAX_REL = 0.17;
  /** @type {number} */
  var AMP_MIN_REL = 0.012;
  var ampMinPx = cols * AMP_MIN_REL;
  var ampMaxPx = cols * AMP_MAX_REL;
  /** @type {number} */
  var u = (lv - 1) / 10;
  /**
   * 幂次 > 1：低档 u 小、相邻档差别细；高档 u 大、增幅更陡。与 `AMP_MAX_REL` 一起标定使旧版满档约在第 8 档。
   * @type {number}
   */
  var AMP_CURVE_EXP = 1.65;
  var ampPx = ampMinPx + (ampMaxPx - ampMinPx) * Math.pow(u, AMP_CURVE_EXP);
  var img = c2d.getImageData(0, 0, cols, rows);
  var d = img.data;
  var out = new Uint8ClampedArray(d.length);
  var y;
  var x;
  for (y = 0; y < rows; y++) {
    var offsetX = ampPx * Math.sin(freq * y + phase);
    for (x = 0; x < cols; x++) {
      var sx = mirrorSampleXIntoRange(x + offsetX, cols);
      var sy = y;
      var o = (y * cols + x) * 4;
      out[o] = sampleBilinearDistort(d, cols, rows, sx, sy, 0);
      out[o + 1] = sampleBilinearDistort(d, cols, rows, sx, sy, 1);
      out[o + 2] = sampleBilinearDistort(d, cols, rows, sx, sy, 2);
      out[o + 3] = sampleBilinearDistort(d, cols, rows, sx, sy, 3);
    }
  }
  img.data.set(out);
  c2d.putImageData(img, 0, 0);
}

/**
 * Stop Camera / 回到 matrix rain idle：Style→Detailed、清畸变强度、去掉预览锁定样式类。
 * @returns {void}
 */
function resetDistortingMirrorForIdle() {
  if (densityPicker) {
    densityPicker.value = 'detailed';
    densityPicker.classList.remove('select-strong-disabled');
  }
  if (distortMirrorSlider) {
    distortMirrorSlider.value = '0';
  }
  if (frameMaskIronCell) {
    frameMaskIronCell.classList.remove('frame-mask-cell--iron--dm-visible');
  }
}

/**
 * 3:4 `oval-only` 时左格默认 `display:none`；畸变镜滑块显示时用 `--dm-visible` 露出左格。
 * @returns {void}
 */
function updateDistortMirrorIronCellClass() {
  if (!frameMaskIronCell || !frameMaskDual || !distortMirrorSliderWrap) return;
  var visible =
    !distortMirrorSliderWrap.hidden &&
    distortMirrorSliderWrap.getAttribute('aria-hidden') !== 'true';
  if (visible && frameMaskDual.classList.contains('frame-mask-dual--oval-only')) {
    frameMaskIronCell.classList.add('frame-mask-cell--iron--dm-visible');
  } else {
    frameMaskIronCell.classList.remove('frame-mask-cell--iron--dm-visible');
  }
}

/**
 * Distorting Mirror：滑块显隐；预览锁定且 `usedDistortingMirror` 时强制隐藏（Photo / Loop 一致）。
 * Live：Style 为畸变镜时显示（含 Loop）；非畸变镜或预览锁定则隐藏。
 * @returns {void}
 */
function syncDistortMirrorSliderVisibility() {
  if (!distortMirrorSliderWrap || !distortMirrorSlider || !densityPicker) return;
  var p = AsciiCameraPreview.pendingGalleryPayload;
  var previewLockDm =
    AsciiCameraPreview.previewCaptureActive &&
    p &&
    p.usedDistortingMirror === true;
  if (previewLockDm) {
    distortMirrorSliderWrap.hidden = true;
    distortMirrorSliderWrap.setAttribute('aria-hidden', 'true');
    distortMirrorSlider.disabled = true;
    updateDistortMirrorIronCellClass();
    return;
  }
  var isDm = densityPicker.value === STYLE_DISTORTING_MIRROR;
  if (isDm) {
    distortMirrorSliderWrap.hidden = false;
    distortMirrorSliderWrap.setAttribute('aria-hidden', 'false');
    distortMirrorSlider.disabled = densityPicker.disabled;
  } else {
    distortMirrorSliderWrap.hidden = true;
    distortMirrorSliderWrap.setAttribute('aria-hidden', 'true');
    distortMirrorSlider.disabled = true;
  }
  updateDistortMirrorIronCellClass();
}

/**
 * 采样当前视频帧为亮度格 + ASCII（用于预览态按 Style 重算，不重新访问摄像头像素逻辑外路径）。
 * @param {number} cols
 * @param {number | null | undefined} aspectOverride
 * @returns {{ ascii: string, luma: Float32Array, cols: number, rows: number }}
 */
function toAsciiWithLuminance(cols, aspectOverride) {
  if (!video.videoWidth || !video.videoHeight) {
    return { ascii: '', luma: new Float32Array(0), cols: 0, rows: 0 };
  }
  const chars = getChars();
  const { cellAspect } = getAsciiCellMetrics();
  const forcedAspect =
    aspectOverride != null && Number.isFinite(aspectOverride) ? aspectOverride : getAspectRatio();
  const nativeAspect = video.videoWidth / video.videoHeight;
  const aspect = forcedAspect || nativeAspect;
  const rows = Math.max(1, Math.round((cols * cellAspect) / aspect));
  canvas.width = cols;
  canvas.height = rows;
  ctx.save();
  ctx.translate(cols, 0);
  ctx.scale(-1, 1);
  if (forcedAspect) {
    let sx = 0,
      sy = 0,
      sw = video.videoWidth,
      sh = video.videoHeight;
    if (nativeAspect > forcedAspect) {
      sw = Math.round(video.videoHeight * forcedAspect);
      sx = Math.round((video.videoWidth - sw) / 2);
    } else {
      sh = Math.round(video.videoWidth / forcedAspect);
      sy = Math.round((video.videoHeight - sh) / 2);
    }
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cols, rows);
  } else {
    ctx.drawImage(video, 0, 0, cols, rows);
  }
  ctx.restore();
  if (densityPicker && densityPicker.value === STYLE_DISTORTING_MIRROR) {
    var dmLv = getDistortMirrorLevel();
    if (dmLv > 0) {
      applyDistortingMirrorToCanvas2d(ctx, cols, rows, dmLv);
    }
  }
  const pixels = ctx.getImageData(0, 0, cols, rows).data;
  const luma = new Float32Array(cols * rows);
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * cols + x) * 4;
      const b = (0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2]) / 255;
      luma[y * cols + x] = b;
    }
  }
  const ascii = luminanceToAscii(luma, cols, rows, chars);
  return { ascii, luma, cols, rows };
}

/**
 * 预览态下切换 Style：按已保存的亮度格重算 ASCII/GIF，并写回 `pendingGalleryPayload`（提交时即最新样式）。
 * @returns {void}
 */
function applyPreviewStyleFromDensity() {
  AsciiCameraPreview.applyPreviewStyleFromDensity();
}

function getAspectRatio() {
  const v = aspectPicker.value;
  if (v === '16:9') return 16 / 9;
  if (v === '4:3') return 4 / 3;
  if (v === '3:4') return 3 / 4;
  if (v === '1:1') return 1;
  return 1;
}

/**
 * 将当前视频帧转为 ASCII。行数 = cols×(字宽/行高)÷画面宽高比，使像素块与等宽字格对齐。
 * @param {number} cols 列数
 * @param {number | null | undefined} aspectOverride 指定画面宽高比（如 Video 1:1）；省略时用下拉框
 * @returns {string} ASCII 文本
 */
function toAscii(cols, aspectOverride) {
  return toAsciiWithLuminance(cols, aspectOverride).ascii;
}

function render() {
  out.textContent = toAscii(getCols());
  animId = requestAnimationFrame(render);
}

/**
 * 保存成功后不关闭本窗口：由 Gallery 用固定 `window.open` 名打开的相机页可反复使用；仅尝试把焦点还给嵌入里的 Gallery。
 * @returns {void}
 */
function focusOpenerGalleryAfterSave() {
  try {
    var o = window.opener;
    if (o && o !== window && !o.closed) {
      try {
        o.focus();
      } catch (e) {
        /* 跨域或策略限制 */
      }
    }
  } catch (e2) {}
}

/**
 * 录制多帧 ASCII（6 FPS × 2s = 12 帧）及每帧亮度格，供预览态换 Style 重算；不停止实时取景 RAF。
 * @returns {Promise<{ frames: string[], frameLumas: Float32Array[], cols: number, rows: number }>}
 */
async function captureVideoAsciiFrames() {
  return AsciiCameraLoop.captureVideoAsciiFrames();
}

/**
 * 将静态一帧或动画作品写入本机存储并同步 opener / 云端。
 * @param {string | { isPhotoPreview?: true, ascii?: string, isAnimated?: true, frames?: string[], frameCount?: number, fps?: number, durationMs?: number }} payload 静态时为 ascii 字符串或带 `isPhotoPreview` 的对象
 * @returns {Promise<boolean>} 持久化成功时为 true
 */
async function persistPhotoToGallery(payload) {
  try {
    var isAnim =
      payload &&
      typeof payload === 'object' &&
      payload.isAnimated === true &&
      Array.isArray(payload.frames) &&
      payload.frames.length > 0;
    if (isAnim && typeof payload === 'object') {
      payload.coverFrameIndex = AsciiCameraPreview.loopCoverFrameIndex;
    }
    var asciiStr = '';
    if (isAnim) {
      asciiStr = String(payload.ascii || payload.frames[0] || '');
    } else if (payload && typeof payload === 'object' && payload.isPhotoPreview === true) {
      asciiStr = String(payload.ascii || '');
    } else {
      asciiStr = String(payload || '');
    }
    /** @type {{ ascii: string, color: string, time: number, isAnimated?: boolean, frameCount?: number, fps?: number, durationMs?: number }} */
    var photoPayload = {
      ascii: asciiStr,
      color: colorPicker.value,
      time: Date.now()
    };
    if (isAnim) {
      photoPayload.isAnimated = true;
      photoPayload.frameCount =
        typeof payload.frameCount === 'number' ? payload.frameCount : VIDEO_FRAME_COUNT;
      photoPayload.fps = typeof payload.fps === 'number' ? payload.fps : VIDEO_FPS;
      photoPayload.durationMs =
        typeof payload.durationMs === 'number' ? payload.durationMs : VIDEO_DURATION_MS;
    }
    AsciiCameraGalleryStorage.prependUserPhoto(photoPayload);
    var savedRow = AsciiCameraGalleryStorage.loadUserPhotos()[0];
    try {
      var o = window.opener;
      if (o && o !== window && !o.closed && AsciiCameraGalleryStorage.galleryOpenerNeedsPostMessage(o)) {
        var msgPhoto = {
          ascii: savedRow ? savedRow.ascii : photoPayload.ascii,
          color: savedRow ? savedRow.color : photoPayload.color,
          time: savedRow ? savedRow.time : photoPayload.time
        };
        if (savedRow && typeof savedRow.id === 'string' && savedRow.id) msgPhoto.id = savedRow.id;
        if (isAnim) {
          msgPhoto.isAnimated = true;
          msgPhoto.frameCount = photoPayload.frameCount;
          msgPhoto.fps = photoPayload.fps;
          msgPhoto.durationMs = photoPayload.durationMs;
          if (Array.isArray(payload.frames)) msgPhoto.frames = payload.frames;
        }
        o.postMessage(
          {
            type: AsciiCameraGalleryStorage.GALLERY_PREPEND_MESSAGE_TYPE,
            photo: msgPhoto
          },
          window.location.origin
        );
      }
    } catch (eOpener) { /* 跨域或策略限制 */ }
    if (window.AsciiCameraGalleryCloudSync && AsciiCameraGalleryCloudSync.isEnabled()) {
      var syncCam = AsciiCameraGalleryCloudSync;
      if (syncCam.getProvider() === 'supabase' && typeof syncCam.insertPhotoRow === 'function') {
        await ensureAnonymousSession();
        /** @type {{ ascii: string, color?: string, time?: number, id?: string, isAnimated?: boolean, frames?: string[], frameCount?: number, fps?: number, durationMs?: number }} */
        var insertPayload = Object.assign({}, savedRow || photoPayload);
        if (isAnim && payload.frames) insertPayload.frames = payload.frames;
        if (isAnim) insertPayload.coverFrameIndex = AsciiCameraPreview.loopCoverFrameIndex;
        var camIns = await syncCam.insertPhotoRow(insertPayload);
        if (!camIns) {
          AsciiCameraGalleryStorage.deleteUserPhotoAt(0);
        }
      } else {
        syncCam.pushFromLocal().catch(function () {});
      }
    }
    return true;
  } catch (e) {
    console.error(e);
    return false;
  }
}

/**
 * 恢复实时取景 RAF（冻结结束后调用；避免重复循环）。
 * @returns {void}
 */
function restartLiveAsciiPreview() {
  if (!stream) return;
  if (animId != null) cancelAnimationFrame(animId);
  animId = null;
  out.style.color = colorPicker.value;
  AsciiCameraUi.syncVideoProgressBarColor();
  render();
}

AsciiCameraLoop.bindLoopCapture({

startBtn.addEventListener('click', async () => {
  if (stream) {
    abortRequestRainEffect();
    AsciiCameraPreview.clearPreviewAnimLoop();
    AsciiCameraPreview.previewCaptureActive = false;
    AsciiCameraPreview.pendingGalleryPayload = null;
    if (cameraShell) cameraShell.classList.remove('cam-preview-capture');
    if (submitGalleryBtn) submitGalleryBtn.disabled = true;
    if (camTabPhoto) camTabPhoto.disabled = false;
    if (camTabVideo) camTabVideo.disabled = false;
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    resetDistortingMirrorForIdle();
    if (animId != null) cancelAnimationFrame(animId);
    animId = null;
    startBtn.textContent = 'Start Camera';
    snapBtn.disabled = true;
    snapCountdownActive = false;
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
    AsciiCameraUi.setStatusOffline();
    if (asciiWrap) {
      asciiWrap.classList.add('ascii-wrap--offline');
      asciiWrap.classList.remove('ascii-wrap--startup-hide-helper');
    }
    out.textContent = 'Click "START CAMERA" to begin';
    if (asciiOffHelper) asciiOffHelper.textContent = 'Click "START CAMERA" to begin';
    if (asciiOffHelper) asciiOffHelper.style.color = colorPicker.value;
    out.setAttribute('aria-hidden', 'true');
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    AsciiCameraUi.syncVideoProgressBarForMode();
    applyCaptureModeUi();
    startRequestRainEffect();
    return;
  }
  if (isEmbeddedInFrame()) {
    const opened = openCameraInNewTab();
    statusEl.querySelector('.status-text').textContent = opened
      ? 'Opened in new tab'
      : 'Allow pop-ups or use “Open in new tab” above';
    return;
  }
  try {
    startBtn.disabled = true;
    if (asciiWrap) asciiWrap.classList.add('ascii-wrap--startup-hide-helper');
    statusEl.querySelector('.status-text').textContent = 'Requesting…';
    statusEl.classList.remove('live');
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
    video.srcObject = stream; await video.play();
    startBtn.textContent = 'Stop Camera';
    snapBtn.disabled = false;
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
    if (submitGalleryBtn) submitGalleryBtn.disabled = true;
    AsciiCameraUi.setStatusLive();
    if (asciiWrap) asciiWrap.classList.remove('ascii-wrap--offline', 'ascii-wrap--startup-hide-helper');
    out.removeAttribute('aria-hidden');
    // 摄像头已开启：同步控件可用态（Photo 下 Style 应恢复可用）
    applyCaptureModeUi();
    out.style.color = colorPicker.value;
    AsciiCameraUi.syncVideoProgressBarColor();
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    AsciiCameraUi.syncVideoProgressBarForMode();
    if (animId == null && !AsciiCameraPreview.previewCaptureActive) render();
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        syncAsciiLayout();
        stopRequestRainEffectFade();
        syncPhotoFrameMaskOverlay();
      });
    });
  } catch (e) {
    AsciiCameraUi.setStatusOffline();
    statusEl.querySelector('.status-text').textContent = 'Access denied';
    out.textContent = 'Camera access denied';
    if (asciiOffHelper) asciiOffHelper.textContent = out.textContent;
    if (asciiOffHelper) asciiOffHelper.style.color = colorPicker.value;
    if (asciiWrap) {
      asciiWrap.classList.add('ascii-wrap--offline');
      asciiWrap.classList.remove('ascii-wrap--startup-hide-helper');
    }
    out.setAttribute('aria-hidden', 'true');
    invalidateAsciiCellMetrics();
    syncAsciiLayout();
    abortRequestRainEffect();
    startRequestRainEffect();
  } finally {
    startBtn.disabled = false;
  }
});

/**
 * 倒计时：按钮 3（静音 1s）→2→1→0（显示「2」时起播整段 3s 倒计时音，三拍对齐 2/1/0）→抓拍。
 * 完成后进入本地预览，不自动上传。
 * Photo：最后一整秒（显示「0」）开闪，该秒结束后关闪再快门。
 * Video：最后一整秒（「0」）开始时开闪，常亮共 3s（1s 倒计时末 + 2s 录制），录制结束关闪。
 */
snapBtn.addEventListener('click', async () => {
  if (!stream || snapCountdownActive) return;
  /** Retake：先退出预览恢复实时取景，再与同一次点击走同一套倒计时与拍摄（不再要求用户再点一次主按钮）。 */
  if (AsciiCameraPreview.previewCaptureActive) {
    AsciiCameraPreview.retakeFromPreview();
  }
  const cols = getCols();
  const ctl = [densityPicker, colorPicker, resPicker, aspectPicker, camTabPhoto, camTabVideo];
  snapCountdownActive = true;
  snapBtn.disabled = true;
  startBtn.disabled = true;
  if (submitGalleryBtn) submitGalleryBtn.disabled = true;
  ctl.forEach(function (el) {
    if (el) el.disabled = true;
  });
  const useFlash = flashToggle.checked;
  if (!videoMode) primePhotoShutterAudioInUserGesture();
  else primeVideoRecordAudioInUserGesture();
  primeCountdownBeepAudioInUserGesture();
  try {
    for (let n = 3; n >= 0; n--) {
      snapBtn.textContent = String(n);
      if (n === 2) {
        playCountdownSequenceAudioFromStart();
      }
      if (useFlash && n === 0) {
        AsciiCameraUi.layoutFlashOutsideStrips();
        if (flashOutsideRoot) flashOutsideRoot.classList.add('on');
      }
      await sleep(1000);
      if (useFlash && n === 0 && flashOutsideRoot && !videoMode) {
        flashOutsideRoot.classList.remove('on');
      }
    }

    var persistArg;
    if (!videoMode) {
      if (animId != null) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      playPhotoShutterSound();
      var photoPack = toAsciiWithLuminance(cols);
      var bakedFrameMask = false;
      var maskKind = getPhotoFrameMaskKind();
      var nCell = photoPack.cols * photoPack.rows;
      var lumaCanonical =
        photoPack.luma && photoPack.luma.length === nCell
          ? new Float32Array(photoPack.luma)
          : new Float32Array(0);
      var apShot = aspectPicker ? aspectPicker.value : '';
      /** @type {null | { cols: number, rows: number, rows72: number, tVerticalInCells: number, gInCells: number, tHorizontalInRows: number, h1: number, h2: number }} */
      var ironBarsSpecForPayload = null;
      if (photoPack.luma && photoPack.luma.length === nCell) {
        var cellM = getAsciiCellMetrics();
        if (apShot === '3:4' && maskKind === 'oval' && frameMaskCheckbox && frameMaskCheckbox.checked) {
          applyPhotoFrameMaskToLuma(photoPack.luma, photoPack.cols, photoPack.rows, 'oval', cellM.cellAspect);
          bakedFrameMask = true;
        } else if (apShot === '1:1') {
          if (frameMaskCheckbox && frameMaskCheckbox.checked) {
            applyPhotoFrameMaskToLuma(photoPack.luma, photoPack.cols, photoPack.rows, 'round', cellM.cellAspect);
            bakedFrameMask = true;
          }
          if (frameMaskIronCheckbox && frameMaskIronCheckbox.checked) {
            ironBarsSpecForPayload = buildIronBarsSpec(photoPack.cols, photoPack.rows, cellM.cellAspect, getAspectRatio());
            applyIronBarsMaskToLuma(photoPack.luma, photoPack.cols, photoPack.rows, ironBarsSpecForPayload);
            bakedFrameMask = true;
          }
        }
      }
      persistArg = {
        isPhotoPreview: true,
        ascii: bakedFrameMask
          ? luminanceToAscii(photoPack.luma, photoPack.cols, photoPack.rows, getChars())
          : photoPack.ascii,
        luma: photoPack.luma,
        lumaCanonical: lumaCanonical,
        cols: photoPack.cols,
        rows: photoPack.rows,
        bakedFrameMask: bakedFrameMask,
        ironBarsSpec: ironBarsSpecForPayload,
        usedDistortingMirror:
          !!(densityPicker && densityPicker.value === STYLE_DISTORTING_MIRROR),
        distortMirrorLevel:
          densityPicker && densityPicker.value === STYLE_DISTORTING_MIRROR
            ? getDistortMirrorLevel()
            : 0
      };
    } else {
      if (videoProgressBar) videoProgressBar.style.width = '100%';
      var recRaf = 0;
      var tRec = performance.now();
      /**
       * 按 2s 墙钟缩短实心白条宽度（左对齐，从右侧收回）。
       * @returns {void}
       */
      function tickRecProgress() {
        var p = Math.min(1, (performance.now() - tRec) / VIDEO_DURATION_MS);
        if (videoProgressBar) videoProgressBar.style.width = (1 - p) * 100 + '%';
        if (p < 1) recRaf = requestAnimationFrame(tickRecProgress);
      }
      recRaf = requestAnimationFrame(tickRecProgress);
      playVideoRecordSound();
      var vf;
      try {
        vf = await captureVideoAsciiFrames();
      } finally {
        cancelAnimationFrame(recRaf);
        if (videoProgressBar) videoProgressBar.style.width = '0%';
        if (useFlash && flashOutsideRoot) flashOutsideRoot.classList.remove('on');
      }
      if (animId != null) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      persistArg = {
        isAnimated: true,
        ascii: vf && vf.frames && vf.frames.length ? vf.frames[0] || '' : '',
        frames: vf && vf.frames ? vf.frames : [],
        frameLumas: vf && vf.frameLumas ? vf.frameLumas : [],
        previewCols: vf.cols,
        previewRows: vf.rows,
        frameCount: VIDEO_FRAME_COUNT,
        fps: VIDEO_FPS,
        durationMs: VIDEO_DURATION_MS,
        usedDistortingMirror:
          !!(densityPicker && densityPicker.value === STYLE_DISTORTING_MIRROR),
        distortMirrorLevel:
          densityPicker && densityPicker.value === STYLE_DISTORTING_MIRROR
            ? getDistortMirrorLevel()
            : 0
      };
    }

    AsciiCameraPreview.enterPreviewState(persistArg);
  } catch (err) {
    console.error(err);
    savedMsg.textContent = 'Capture failed: something went wrong.';
    savedMsg.style.color = '#ff4444';
    savedMsg.classList.add('show');
    await sleep(2500);
    savedMsg.classList.remove('show');
  } finally {
    if (flashOutsideRoot) flashOutsideRoot.classList.remove('on');
    snapCountdownActive = false;
    startBtn.disabled = false;
    ctl.forEach(function (el) {
      if (!el) return;
      if (AsciiCameraPreview.previewCaptureActive) {
        if (el === camTabPhoto || el === camTabVideo) el.disabled = true;
        else if (el === resPicker || el === aspectPicker) el.disabled = true;
        else el.disabled = false;
      } else {
        if (el === camTabPhoto || el === camTabVideo) el.disabled = false;
        else if (el === resPicker || el === aspectPicker) {
          el.disabled = videoMode;
        } else el.disabled = false;
      }
    });
    if (AsciiCameraPreview.previewCaptureActive) {
      AsciiCameraUi.syncVideoProgressBarForMode();
      syncAsciiLayout();
      snapBtn.textContent = videoMode ? SNAP_LABEL_RETAKE_VIDEO : SNAP_LABEL_RETAKE_PHOTO;
      snapBtn.disabled = false;
    } else {
      restartLiveAsciiPreview();
      AsciiCameraUi.syncVideoProgressBarForMode();
      syncAsciiLayout();
      snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
      snapBtn.disabled = !stream;
    }
  }
});

/**
 * 将当前预览作品提交至本机画廊 / 云端（与原先 `persistPhotoToGallery` 流程一致）。
 * @returns {Promise<void>}
 */
async function submitPreviewToGallery() {
  if (!AsciiCameraPreview.previewCaptureActive || AsciiCameraPreview.pendingGalleryPayload == null || !stream) return;
  var payload = AsciiCameraPreview.pendingGalleryPayload;
  /**
   * Photo：画廊保存串与当前预览一致（含取景框开/关）。仅拷贝 `out.textContent`，不重算亮度或二次烘焙遮罩。
   */
  if (payload && typeof payload === 'object' && payload.isPhotoPreview === true) {
    payload.ascii = out.textContent;
  }
  AsciiCameraPreview.hideLoopCoverUi();
  if (submitGalleryBtn) submitGalleryBtn.disabled = true;
  snapBtn.disabled = true;
  snapBtn.textContent = SNAP_LABEL_SAVING;
  snapBtn.classList.add('snap-saving');
  snapBtn.setAttribute('aria-busy', 'true');
  var isVideoCapture =
    payload && typeof payload === 'object' && payload.isAnimated === true;
  savedMsg.textContent = SNAP_LABEL_SAVING;
  savedMsg.style.color = '#ffd700';
  savedMsg.classList.add('show');
  try {
    var ok = await persistPhotoToGallery(payload);
    if (ok) {
      if (isVideoCapture) {
        savedMsg.textContent = 'SAVED';
        savedMsg.style.color = '#ffd700';
        savedMsg.classList.add('show');
        await sleep(VIDEO_POST_RECORD_FREEZE_MS);
        savedMsg.classList.remove('show');
        await sleep(400);
        focusOpenerGalleryAfterSave();
        await sleep(1800);
      } else {
        savedMsg.classList.remove('show');
        savedMsg.textContent = 'SAVED';
        savedMsg.style.color = '#ffd700';
        savedMsg.classList.add('show');
        await sleep(400);
        focusOpenerGalleryAfterSave();
        await sleep(1800);
        savedMsg.classList.remove('show');
      }
      AsciiCameraPreview.exitPreviewAfterSuccessfulSubmit();
    } else {
      savedMsg.classList.remove('show');
      savedMsg.textContent = 'Save failed: storage full, unavailable, or disabled.';
      savedMsg.style.color = '#ff4444';
      savedMsg.classList.add('show');
      await sleep(2500);
      savedMsg.classList.remove('show');
      if (submitGalleryBtn) submitGalleryBtn.disabled = false;
      snapBtn.disabled = false;
      AsciiCameraPreview.restoreLoopCoverUiAfterFailedSubmit();
    }
  } catch (e) {
    console.error(e);
    savedMsg.textContent = 'Save failed: something went wrong.';
    savedMsg.style.color = '#ff4444';
    savedMsg.classList.add('show');
    await sleep(2500);
    savedMsg.classList.remove('show');
    if (submitGalleryBtn) submitGalleryBtn.disabled = false;
    snapBtn.disabled = false;
    AsciiCameraPreview.restoreLoopCoverUiAfterFailedSubmit();
  } finally {
    snapBtn.classList.remove('snap-saving');
    snapBtn.removeAttribute('aria-busy');
    if (AsciiCameraPreview.previewCaptureActive) {
      snapBtn.textContent = videoMode ? SNAP_LABEL_RETAKE_VIDEO : SNAP_LABEL_RETAKE_PHOTO;
    }
  }
}

if (submitGalleryBtn) {
  submitGalleryBtn.addEventListener('click', function () {
    void submitPreviewToGallery();
  });
}

if (loopCoverUi) {
  loopCoverUi.addEventListener('mouseenter', function () {
    if (!AsciiCameraPreview.previewCaptureActive || !AsciiCameraPreview.pendingGalleryPayload || !AsciiCameraPreview.pendingGalleryPayload.isAnimated) return;
    if (loopCoverUi.hidden) return;
    AsciiCameraPreview.loopCoverHoverLatch = true;
    AsciiCameraPreview.syncLoopCoverPreviewPlayback();
  });
  loopCoverUi.addEventListener('mouseleave', function () {
    AsciiCameraPreview.loopCoverHoverLatch = false;
    AsciiCameraPreview.syncLoopCoverPreviewPlayback();
  });
}
if (loopCoverSlider) {
  loopCoverSlider.addEventListener('input', function () {
    if (!AsciiCameraPreview.previewCaptureActive || !AsciiCameraPreview.pendingGalleryPayload || !AsciiCameraPreview.pendingGalleryPayload.isAnimated) return;
    AsciiCameraPreview.loopCoverFrameIndex = parseInt(loopCoverSlider.value, 10) || 0;
    AsciiCameraPreview.applyLoopCoverRotationFromCanonical();
  });
  loopCoverSlider.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return;
    if (!AsciiCameraPreview.previewCaptureActive || !AsciiCameraPreview.pendingGalleryPayload || !AsciiCameraPreview.pendingGalleryPayload.isAnimated) return;
    AsciiCameraPreview.loopCoverPointerDown = true;
    AsciiCameraPreview.syncLoopCoverPreviewPlayback();
  });
  window.addEventListener('mouseup', function () {
    if (!AsciiCameraPreview.loopCoverPointerDown) return;
    AsciiCameraPreview.loopCoverPointerDown = false;
    AsciiCameraPreview.loopCoverHoverLatch = false;
    AsciiCameraPreview.syncLoopCoverPreviewPlayback();
  });
  loopCoverSlider.addEventListener(
    'touchstart',
    function () {
      if (!AsciiCameraPreview.previewCaptureActive || !AsciiCameraPreview.pendingGalleryPayload || !AsciiCameraPreview.pendingGalleryPayload.isAnimated) return;
      AsciiCameraPreview.loopCoverPointerDown = true;
      AsciiCameraPreview.syncLoopCoverPreviewPlayback();
    },
    { passive: true }
  );
  window.addEventListener(
    'touchend',
    function () {
      if (!AsciiCameraPreview.loopCoverPointerDown) return;
      AsciiCameraPreview.loopCoverPointerDown = false;
      AsciiCameraPreview.loopCoverHoverLatch = false;
      AsciiCameraPreview.syncLoopCoverPreviewPlayback();
    },
    { passive: true }
  );
  window.addEventListener(
    'touchcancel',
    function () {
      if (!AsciiCameraPreview.loopCoverPointerDown) return;
      AsciiCameraPreview.loopCoverPointerDown = false;
      AsciiCameraPreview.loopCoverHoverLatch = false;
      AsciiCameraPreview.syncLoopCoverPreviewPlayback();
    },
    { passive: true }
  );
}

window.addEventListener(
  'resize',
  function () {
    if (!loopCoverUi || loopCoverUi.hidden) return;
    AsciiCameraPreview.updateLoopCoverLabelPosition();
  },
  { passive: true }
);

requestAnimationFrame(function () {
  applyCaptureModeUi();
  if (!stream) startRequestRainEffect();
});

/**
 * 在已配置 Supabase URL/anon key 时，用官方 JS client 建立或复用匿名 JWT（无 UI；失败静默）。
 * 将 client 挂到 `window.__ASCII_GALLERY_SUPABASE__`，与 gallery 页一致，供 `gallery-cloud-sync.js` 的 `insertPhotoRow` REST 写入使用 session JWT 与 `user_id`。
 * @returns {Promise<void>}
 */
async function ensureAnonymousSession() {
  try {
    var w = window;
    var url = (w.ASCII_CAMERA_SUPABASE_URL && String(w.ASCII_CAMERA_SUPABASE_URL).trim()) || '';
    var key = (w.ASCII_CAMERA_SUPABASE_ANON_KEY && String(w.ASCII_CAMERA_SUPABASE_ANON_KEY).trim()) || '';
    if (!url || !key) return;
    var existing = w.__ASCII_GALLERY_SUPABASE__;
    if (existing && existing.auth && typeof existing.auth.getSession === 'function') {
      var gotExisting = await existing.auth.getSession();
      if (gotExisting && gotExisting.data && gotExisting.data.session) return;
      if (typeof existing.auth.signInAnonymously === 'function') {
        await existing.auth.signInAnonymously();
      }
      return;
    }
    var mod = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.102.1/+esm');
    var createClient = mod && mod.createClient;
    if (typeof createClient !== 'function') return;
    var supabase = createClient(url, key);
    w.__ASCII_GALLERY_SUPABASE__ = supabase;
    var got = await supabase.auth.getSession();
    if (got && got.data && got.data.session) return;
    if (typeof supabase.auth.signInAnonymously === 'function') {
      await supabase.auth.signInAnonymously();
    }
  } catch (e) {
    /* 静默：离线、CSP、或未启用匿名登录等 */
  }
}

/**
 * 页面加载后异步触发一次 {@link ensureAnonymousSession}，不阻塞首屏渲染。
 * @returns {void}
 */
(function scheduleEnsureAnonymousSession() {
  function run() {
    setTimeout(function () {
      void ensureAnonymousSession();
    }, 0);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
})();
</script>
