<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASCII Camera</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #00ff41; font-family: monospace, ui-monospace, "Cascadia Code", "Courier New", monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 12px; }
  /* 设计稿 Frame 48091624：顶栏双按钮与底部四控件同宽、同间距 */
  #camera-shell {
    --cam-action-btn-w: 12.5rem;
    --cam-action-gap: 12px;
    /** 主内容列宽：顶栏双按钮行总宽，全页仅此一处定宽 */
    --cam-actions-row-w: calc(var(--cam-action-btn-w) * 2 + var(--cam-action-gap));
    /** 纯画幅区高度（3:4 竖幅基准）；不含其下进度条占位 */
    --ascii-vf-slot-h: calc(var(--cam-actions-row-w) * 4 / 3);
    /** 活动槽总高 = 画幅区 + 距画幅 10px + 条高 6px（进度条在槽内跟画幅走） */
    --ascii-vf-active-slot-total-h: calc(var(--ascii-vf-slot-h) + var(--ascii-vf-progress-band));
    /** 宽比例时活动列距外层取景器左右内边距 */
    --ascii-vf-side-inset: 16px;
    /** 与底栏 `select` 统一高度，供 Photo/Video 分段与下拉对齐 */
    --cam-ctl-select-h: 32px;
    /** 进度条区：距活动画幅 10px + 条高 6px */
    --ascii-vf-progress-band: 16px;
    /** `#ascii-wrap` 内垂直内边距（与下面 `padding: 12px` 一致） */
    --ascii-vf-wrap-pad-y: 12px;
    /**
     * 活动画幅与 overlay 下沿的间距 = 画幅下沿至取景器内底（进度占位 + 底 padding），
     * 使 3:4 等比例下上下留白对称。
     */
    --ascii-vf-active-balance-gap: calc(var(--ascii-vf-progress-band) + var(--ascii-vf-wrap-pad-y));
    /** Overlay 顶距取景器内顶（略下移） */
    --ascii-vf-overlay-top: 10px;
    --ascii-vf-overlay-row-h: var(--cam-ctl-select-h);
    /** Overlay 底距活动槽顶 = 与画幅下方至内底等长 */
    --ascii-vf-overlay-bottom-gap: var(--ascii-vf-active-balance-gap);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: calc(100vh - 48px);
    position: relative;
    z-index: 0;
  }
  /**
   * 主内容列：顶栏双钮 + 状态 + 底部四控件（与活动画幅同宽对齐）；不含外层取景器。
   */
  .camera-content {
    width: 100%;
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    box-sizing: border-box;
  }
  /**
   * 外层取景器（蓝框）：可宽于主列，承载 overlay；宽度不绑 `--cam-actions-row-w`。
   */
  .viewfinder-shell {
    width: 100%;
    max-width: min(560px, 100%);
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 4px;
    box-sizing: border-box;
    position: relative;
  }
  h1 { font-size: 14px; letter-spacing: normal; text-transform: uppercase; margin-bottom: 20px; opacity: 0.6; text-align: center; align-self: center; width: 100%; }
  h1 .cam-title-prefix { letter-spacing: 0.06em; }
  h1 .cam-title-name { letter-spacing: 4px; }
  .cam-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: var(--cam-action-gap);
    width: 100%;
    margin-bottom: 14px;
  }
  .cam-actions button {
    width: var(--cam-action-btn-w);
    max-width: 100%;
    box-sizing: border-box;
    text-align: center;
    min-height: 36px;
    height: 36px;
    padding: 0 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  /**
   * 原 `#status` 已移至取景 overlay 行；保留空行占位，维持与原先一致的顶栏下间距（不改 Start / Snap 与下方控件间距）。
   */
  .cam-status-below-actions {
    width: 100%;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    box-sizing: border-box;
  }
  /**
   * 禁用下拉：统一与 Resolution / Aspect 的 `select-strong-disabled` 色值（Style 等凡 `disabled` 之下拉同效）。
   */
  select:disabled,
  select.select-strong-disabled:disabled {
    opacity: 1;
    cursor: not-allowed;
    pointer-events: none;
    background: #070707;
    color: rgba(0, 255, 65, 0.28);
    border-color: rgba(0, 255, 65, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  .ctl-stack.select-locked .ctl-label {
    opacity: 0.35;
  }
  /* 自定义 Flash：与 #2AFD4F 一致；Overlay 在活动列内时右缘对齐活动画幅 */
  .flash-switch {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #2afd4f;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .flash-switch input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    margin: 0;
  }
  .flash-switch-box {
    display: inline-block;
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    border: 1px solid rgba(42, 253, 79, 0.55);
    border-radius: 1px;
    background: transparent;
    box-sizing: border-box;
  }
  .flash-switch input:checked + .flash-switch-box {
    background: #2afd4f;
    border-color: #2afd4f;
    box-shadow: inset 0 0 0 2px #0a0a0a;
  }
  .flash-switch input:focus-visible + .flash-switch-box {
    outline: 1px solid #2afd4f;
    outline-offset: 2px;
  }
  .flash-switch-label { line-height: 1; }
  /**
   * 预览态：Flash 禁用外观对齐 `select:disabled`（低对比绿 + 暗底），保留 checked 视觉差异。
   */
  .flash-switch.flash-switch--disabled {
    opacity: 1;
    cursor: not-allowed;
    pointer-events: none;
    color: rgba(0, 255, 65, 0.28);
  }
  .flash-switch.flash-switch--disabled .flash-switch-box {
    background: #070707;
    border-color: rgba(0, 255, 65, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  .flash-switch.flash-switch--disabled input:checked + .flash-switch-box {
    background: rgba(0, 255, 65, 0.22);
    border-color: rgba(0, 255, 65, 0.18);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  .ctl-stack { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .ctl-stack .ctl-label { font-size: 11px; opacity: 0.5; letter-spacing: 1px; text-align: left; width: 100%; }
  .ctl-stack select { width: 100%; min-width: 0; }
  /* 底部 2×2：左列与 Stop Camera 同宽，右列与 Take Photo 同宽，与顶栏对齐居中（Frame 48091624） */
  .cam-controls-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--cam-action-gap);
    row-gap: 12px;
    width: 100%;
    margin-left: 0;
    margin-right: 0;
    margin-bottom: 0;
    margin-top: 12px;
    padding-top: 0;
    align-items: start;
    flex-shrink: 0;
    box-sizing: border-box;
    justify-items: stretch;
    position: relative;
    z-index: 40;
  }
  .cam-controls-grid > .ctl-stack {
    width: 100%;
    min-width: 0;
    max-width: 100%;
    align-items: stretch;
  }
  /**
   * 与顶栏 Start/Stop 同高、全宽 = 双主按钮 + 间距（`--cam-actions-row-w`）。
   * 与最后一行下拉间距 = 2×下拉高度（`--cam-ctl-select-h`）。
   */
  #submitGalleryBtn.cam-submit-gallery-btn {
    width: 100%;
    max-width: 100%;
    min-height: 36px;
    height: 36px;
    margin-top: 0;
    padding: 0 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    line-height: 1;
    background: transparent;
    border: 1px solid #00ff41;
    color: #00ff41;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  #submitGalleryBtn.cam-submit-gallery-btn:hover:not(:disabled) {
    background: rgba(0, 255, 65, 0.1);
  }
  /** Submit：disabled 与 Resolution/Aspect 禁用下拉同一绿透明度体系（不用整钮 opacity 0.3） */
  #submitGalleryBtn.cam-submit-gallery-btn:disabled {
    opacity: 1;
    cursor: not-allowed;
    pointer-events: none;
    background: #070707;
    color: rgba(0, 255, 65, 0.28);
    border-color: rgba(0, 255, 65, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
  }
  button { background: transparent; border: 1px solid #00ff41; color: #00ff41; font-family: monospace, ui-monospace, "Courier New", monospace; font-size: 11px; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: background 0.2s; }
  button:hover { background: rgba(0,255,65,0.1); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  #snapBtn { border-color: #ffd700; color: #ffd700; text-transform: none; letter-spacing: 1px; }
  #snapBtn:hover:not(:disabled) { background: rgba(255,215,0,0.1); }
  /* 保存中：保持 disabled；与 SAVED 同色便于状态一致 */
  #snapBtn.snap-saving:disabled { opacity: 0.85; cursor: not-allowed; color: #ffd700; border-color: #ffd700; }
  select {
    background: #111;
    border: 1px solid rgba(0,255,65,0.3);
    color: #00ff41;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
    min-height: var(--cam-ctl-select-h);
    box-sizing: border-box;
  }
  /** 仅取景框外闪白；叠在壳内多数内容下、`#ascii-viewer-stack` 下 */
  #flash-outside-root {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }
  .flash-strip {
    position: fixed;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s ease-out;
  }
  #flash-outside-root.on .flash-strip { opacity: 1; }
  #ascii-viewer-stack {
    position: relative;
    z-index: 60;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  /**
   * Submit 区域：不改变控件/按钮间距，只把原本按钮的 `margin-top` 间隔“容器化”，
   * 让 SAVING/SAVED 文案显示在该间隔中间。
   */
  .cam-submit-wrap {
    width: 100%;
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
    padding-top: calc(2 * var(--cam-ctl-select-h)); /* 与旧 Submit margin-top 等效 */
    position: relative;
    box-sizing: border-box;
  }
  .cam-submit-status-slot {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    height: calc(2 * var(--cam-ctl-select-h));
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    pointer-events: none;
  }
  /**
   * Loop 预览封面滑块：与 Submit 同宽，仅占 status slot 内，不增加 `.cam-submit-wrap` 的 padding。
   */
  #loop-cover-ui {
    width: 100%;
    max-width: 100%;
    flex-shrink: 0;
    box-sizing: border-box;
    padding: 0 2px;
    pointer-events: auto;
  }
  #loop-cover-ui[hidden] {
    display: none !important;
  }
  .loop-cover-inner {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 2px;
  }
  /**
   * Loop 封面 range：白底直轨（与 `.video-progress-track` 同 6px 高）、与背景同色的 `#0A0A0A` 刻度画在轨内；绿色方形拇指。
   */
  #loopCoverSlider {
    width: 100%;
    max-width: 100%;
    height: 20px;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: pointer;
    background: transparent;
    -webkit-appearance: none;
    appearance: none;
    --loop-cover-n: 12;
  }
  #loopCoverSlider:focus {
    outline: 1px solid rgba(0, 255, 65, 0.45);
    outline-offset: 1px;
  }
  #loopCoverSlider:focus:not(:focus-visible) {
    outline: none;
  }
  #loopCoverSlider::-webkit-slider-runnable-track {
    width: 100%;
    height: 6px;
    border-radius: 0;
    border: none;
    background-color: #ffffff;
    background-image: repeating-linear-gradient(
      to right,
      #0a0a0a 0 1px,
      transparent 1px calc(100% / max(1, calc(var(--loop-cover-n) - 1)))
    );
  }
  /** 单帧：轨内居中一条与背景同色的竖线 */
  #loopCoverSlider.loop-cover-slider--single::-webkit-slider-runnable-track {
    background-image: linear-gradient(
      to right,
      #ffffff 0 calc(50% - 0.5px),
      #0a0a0a calc(50% - 0.5px) calc(50% + 0.5px),
      #ffffff calc(50% + 0.5px) 100%
    );
    background-color: #ffffff;
  }
  #loopCoverSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    margin-top: -3px;
    background: #00ff41;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
  #loopCoverSlider::-moz-range-track {
    width: 100%;
    height: 6px;
    border-radius: 0;
    border: none;
    background-color: #ffffff;
    background-image: repeating-linear-gradient(
      to right,
      #0a0a0a 0 1px,
      transparent 1px calc(100% / max(1, calc(var(--loop-cover-n) - 1)))
    );
  }
  #loopCoverSlider.loop-cover-slider--single::-moz-range-track {
    background-image: linear-gradient(
      to right,
      #ffffff 0 calc(50% - 0.5px),
      #0a0a0a calc(50% - 0.5px) calc(50% + 0.5px),
      #ffffff calc(50% + 0.5px) 100%
    );
    background-color: #ffffff;
  }
  #loopCoverSlider::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: #00ff41;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
  #loopCoverSlider::-moz-focus-outer {
    border: 0;
  }
  .loop-cover-label-track {
    position: relative;
    width: 100%;
    height: 13px;
    margin-top: 0;
    pointer-events: none;
  }
  #loopCoverLabel {
    position: absolute;
    top: 0;
    left: 0%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(0, 255, 65, 0.85);
    white-space: nowrap;
    line-height: 1.2;
  }
  #status { font-size: 11px; letter-spacing: 2px; opacity: 0.5; min-height: 22px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px; pointer-events: none; text-align: center; color: inherit; }
  #status.live { color: #00ff41; opacity: 1; }
  /** 取景中不显示「CAMERA ON」文案，仅保留绿点 */
  #status.live .status-text { display: none; }
  .status-live-suffix { display: none; align-items: center; flex-shrink: 0; }
  #status.live .status-live-suffix { display: inline-flex; }
  #status .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff41; box-shadow: 0 0 8px rgba(0,255,65,0.85); flex-shrink: 0; }
  /**
   * 外层取景器：固定总高，OFF/ON 一致；内层仅缩放，不撑高外壳。
   * 高度 = 上下 padding + overlay 带 + 活动槽总高（画幅 + 进度条带，同列内）。
   */
  #ascii-wrap {
    width: 100%;
    max-width: none;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    background: #000;
    border: 1px solid rgba(0,255,65,0.2);
    border-radius: 4px;
    padding: var(--ascii-vf-wrap-pad-y);
    box-sizing: border-box;
    height: calc(
      (2 * var(--ascii-vf-wrap-pad-y))
      + var(--ascii-vf-overlay-top)
      + var(--ascii-vf-overlay-row-h)
      + var(--ascii-vf-overlay-bottom-gap)
      + var(--ascii-vf-active-slot-total-h)
    );
    min-height: 0;
    margin-bottom: 4px;
    position: relative;
    overflow: hidden;
  }
  /**
   * Overlay：位于 `.ascii-active-column` 内，宽随活动列；Flash 与活动画幅右缘对齐。
   */
  .ascii-viewfinder-overlay {
    flex: 0 0 auto;
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: var(--ascii-vf-overlay-top);
    margin-bottom: var(--ascii-vf-overlay-bottom-gap);
    pointer-events: none;
  }
  .ascii-viewfinder-overlay * {
    pointer-events: auto;
  }
  .ascii-overlay-inner {
    position: relative;
    width: 100%;
    min-height: var(--ascii-vf-overlay-row-h);
    max-width: var(--cam-actions-row-w);
    margin-left: auto;
    margin-right: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-sizing: border-box;
  }
  .ascii-overlay-side {
    display: none;
  }
  .ascii-overlay-tabs {
    max-width: 100%;
    flex-shrink: 0;
  }
  .ascii-overlay-flash {
    min-width: 0;
    flex-shrink: 0;
  }
  /**
   * 状态 `#status`：脱离 flex 中间列，相对 `.ascii-overlay-inner`（与下方 `#asciiActiveFrame` 同列同宽）水平居中；
   * 避免 Photo/Loop 与 Flash 不等宽时「中间列中心」与「画幅中心」错位导致绿点偏右。
   */
  .ascii-overlay-inner #status {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0;
    bottom: 0;
    flex: none;
    width: max-content;
    max-width: min(100%, calc(100% - 16px));
    margin: 0;
    padding: 0 8px;
    box-sizing: border-box;
    align-self: auto;
    min-height: 0;
    z-index: 2;
  }
  /** Photo / Video：分段控件（共用外框、段间无空隙） */
  .cam-mode-tabs-wrap {
    display: inline-block;
    max-width: 100%;
  }
  .cam-mode-tabs {
    display: inline-flex;
    align-items: stretch;
    border: 1px solid rgba(42, 253, 79, 0.5);
    border-radius: 0;
    overflow: hidden;
    background: transparent;
    vertical-align: top;
    height: var(--cam-ctl-select-h);
    box-sizing: border-box;
  }
  .cam-mode-tab {
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 10px;
    min-width: calc(5ch + 20px);
    height: 100%;
    min-height: 0;
    box-sizing: border-box;
    margin: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-right: 1px solid rgba(42, 253, 79, 0.5);
    border-radius: 0;
    background: transparent;
    color: rgba(42, 253, 79, 0.5);
    cursor: pointer;
    flex: 0 0 auto;
  }
  .cam-mode-tab:last-child {
    border-right: none;
  }
  .cam-mode-tab:hover:not(:disabled) {
    color: #2afd4f;
  }
  .cam-mode-tab.active {
    background: rgba(42, 253, 79, 0.5);
    color: #2afd4f;
    border-right-color: rgba(42, 253, 79, 0.5);
    box-shadow: none;
  }
  .cam-mode-tab.active:last-child {
    border-right: none;
  }
  .cam-mode-tab:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  /**
   * 取景器内容区：占满 `#ascii-wrap` 扣除 padding 后的高度。
   */
  .ascii-frame-body {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
  }
  /**
   * 活动列：默认与主按钮/底控件同宽；16:9、4:3 时加宽（仍留边距）。
   */
  .ascii-active-column {
    width: min(100%, var(--cam-actions-row-w));
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    flex: 1 1 auto;
    min-height: 0;
    box-sizing: border-box;
  }
  .ascii-active-column--wide {
    width: calc(100% - 2 * var(--ascii-vf-side-inset));
    max-width: 100%;
  }
  /**
   * 活动槽：含画幅 + 其下 10px + 6px 进度条；外层取景器总高不变。
   */
  .ascii-active-slot {
    width: 100%;
    height: var(--ascii-vf-active-slot-total-h);
    flex: 0 0 var(--ascii-vf-active-slot-total-h);
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    min-height: 0;
  }
  /**
   * 开屏 code-rain：仅 `.ascii-active-frame` 内（`overflow:hidden` 裁剪）；Start Camera 后淡出。
   * 与隐藏采样 canvas 区分：`video, canvas:not(.ascii-request-rain-canvas)`。
   */
  .ascii-request-rain-canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    z-index: 4;
    pointer-events: none;
    display: none;
    opacity: 0;
    transition: opacity 0.65s ease-out;
  }
  .ascii-request-rain-canvas.ascii-request-rain-canvas--mounted {
    display: block;
  }
  .ascii-request-rain-canvas.ascii-request-rain-canvas--visible {
    opacity: 1;
  }
  .ascii-slot-inner {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    height: 100%;
    min-height: 0;
  }
  /** Video 锁定的分辨率/比例行（底部网格内整行横跨） */
  .cam-mode-lock-strip {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: var(--cam-action-gap);
    row-gap: 12px;
  }
  .ascii-inner {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  /** 画幅与进度条同宽、进度条距画幅底 10px，随画幅在槽内居中 */
  .ascii-frame-progress-stack {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    max-width: 100%;
    flex: 0 1 auto;
    min-height: 0;
  }
  /**
   * 活动画幅：宽 100% 贴齐 `.ascii-active-column`，高度随所选画面比例；分辨率只改密度。
   */
  .ascii-active-frame {
    width: 100%;
    max-width: 100%;
    position: relative;
    overflow: hidden;
    display: block;
    box-sizing: border-box;
  }
  /** 固定字格渲染后整体 `scale` 入画幅，不改变 `#ascii-out` 字号（保证采样与 `getAsciiCellMetrics` 一致） */
  .ascii-out-scale-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    z-index: 1;
  }
  .ascii-frame-progress-stack .video-progress-root {
    flex: 0 0 6px;
    width: 100%;
    margin-top: 10px;
    padding-top: 0;
    height: 6px;
    box-sizing: border-box;
  }
  /** 不占布局的隐藏会顶动底栏；用 visibility 保留占位 */
  .video-progress-root.video-progress-root--inactive .video-progress-track {
    visibility: hidden;
    pointer-events: none;
  }
  /** 全宽轨道；实心条从左对齐、宽度 100%→0% 表示从右向左缩短；颜色由 JS 绑 `colorPicker` */
  .video-progress-track {
    position: relative;
    width: 100%;
    height: 6px;
    background: transparent;
    border-radius: 0;
  }
  .video-progress-bar {
    height: 100%;
    width: 100%;
    background: transparent;
    pointer-events: none;
  }
  /* 等宽字宽≠行高：行高与字号一致便于测量为「准方格」比例 */
  #ascii-out { font-family: monospace, ui-monospace, "Courier New", monospace; font-size: 6px; line-height: 6px; letter-spacing: 0; white-space: pre; display: inline-block; }
  /**
   * Camera OFF：提示文案相对 `#ascii-wrap` 整框垂直水平居中（非活动槽 / 非画幅）。
   * `pointer-events: none` 不挡 Photo/Video、Flash 点击。
   */
  .ascii-off-helper {
    display: none;
  }
  #ascii-wrap.ascii-wrap--offline .ascii-off-helper {
    display: flex;
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    bottom: 0;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding-left: 10px;
    padding-right: 10px;
    pointer-events: none;
    z-index: 25;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 11px;
    line-height: 1.45;
    letter-spacing: 1px;
    color: inherit;
    opacity: 1;
    text-align: center;
    white-space: normal;
    overflow-wrap: break-word;
  }
  /** 已点 Start Camera、等待权限/流就绪：立即隐藏 helper，雨效仍显示至摄像头就绪后再淡出 */
  #ascii-wrap.ascii-wrap--offline.ascii-wrap--startup-hide-helper .ascii-off-helper {
    display: none !important;
  }
  /** 文案仍写入 `#ascii-out` 供逻辑一致；可视由 `.ascii-off-helper` 承担，此处移出视口不占槽内居中 */
  #ascii-wrap.ascii-wrap--offline .ascii-out-scale-wrap {
    position: absolute;
    left: -9999px;
    top: 0;
    width: 1px;
    height: 1px;
    margin: 0;
    overflow: hidden;
    clip-path: inset(50%);
    transform: none;
  }
  #ascii-wrap.ascii-wrap--offline .ascii-active-frame {
    position: relative;
    width: 100%;
    height: auto;
    min-height: 0;
    flex: 0 0 auto;
    aspect-ratio: unset;
  }
  #ascii-wrap.ascii-wrap--offline #ascii-out {
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 0;
    white-space: pre;
  }
  /** 与实时取景 `#ascii-out` 同字格比例，专供 `getAsciiCellMetrics`，避免 OFF 态大字号撑歪最小高度 */
  .ascii-cell-probe {
    position: absolute;
    left: -9999px;
    top: 0;
    margin: 0;
    padding: 0;
    border: 0;
    font-family: monospace, ui-monospace, "Courier New", monospace;
    font-size: 6px;
    line-height: 6px;
    letter-spacing: 0;
    white-space: pre;
    pointer-events: none;
    visibility: hidden;
  }
  #saved-msg { margin: 0; font-size: 12px; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; color: #ffd700; min-height: 20px; text-align: center; width: 100%; }
  /** Loop 封面条显示时隐藏 SAVING/SAVED 占位，避免叠层 */
  .cam-submit-status-slot.cam-submit-status-slot--loop-cover #saved-msg {
    display: none;
  }
  #saved-msg.show { opacity: 1; }
  video, canvas:not(.ascii-request-rain-canvas) { display: none; }
  /* Notion 等 iframe 嵌入时提示：摄像头需在独立标签页使用 */
  .iframe-hint {
    display: flex;
    flex-wrap: wrap;
    align-items: center;

<script>

const PHOTO_DEFAULT_ASPECT = '3:4';
AsciiCameraUi.setCaptureConstants({ VIDEO_DEFAULT_COLS: VIDEO_DEFAULT_COLS });
const VIDEO_FRAME_COUNT = AsciiCameraLoop.VIDEO_FRAME_COUNT;

const VIDEO_POST_RECORD_FREEZE_MS = 1000;

/** Photo 快门音效（站点根路径，如 `/public/sounds/shutter.mp3`） */
const PHOTO_SHUTTER_SOUND_URL = '/public/sounds/shutter.mp3';
/** Video 录制同期音效（单文件，与约 `VIDEO_DURATION_MS` 同期自然播放） */
const VIDEO_RECORD_SOUND_URL = '/public/sounds/record.mp3';

const PHOTO_SHUTTER_VOLUME = 0.5;
const VIDEO_RECORD_VOLUME = 0.5;

/** @type {HTMLAudioElement | null} */
let photoShutterAudio = null;
/** @type {HTMLAudioElement | null} */
let videoRecordAudio = null;

/**
 * 懒创建并复用快门 `Audio`，`preload` 预加载。
 * @returns {HTMLAudioElement | null}
 */
function getPhotoShutterAudio() {
  if (!photoShutterAudio) {
    try {
      photoShutterAudio = new Audio(PHOTO_SHUTTER_SOUND_URL);
      photoShutterAudio.preload = 'auto';
      photoShutterAudio.volume = PHOTO_SHUTTER_VOLUME;
    } catch (e) {
      return null;
    }
  }
  return photoShutterAudio;
}

/**
 * 懒创建并复用 Video 录制音效 `Audio`。
 * @returns {HTMLAudioElement | null}
 */
function getVideoRecordAudio() {
  if (!videoRecordAudio) {
    try {
      videoRecordAudio = new Audio(VIDEO_RECORD_SOUND_URL);
      videoRecordAudio.preload = 'auto';
      videoRecordAudio.volume = VIDEO_RECORD_VOLUME;
    } catch (e) {
      return null;
    }
  }
  return videoRecordAudio;
}

/**
 * 在「拍照」按钮点击的同步栈内短暂静音 play 再 pause，避免约 3s 倒计时后 `play()` 因用户激活过期被浏览器拒绝。

 */
function primePhotoShutterAudioInUserGesture() {
  var a = getPhotoShutterAudio();
  if (!a) return;
  try {
    var v = a.volume;
    a.volume = 0;
    a.currentTime = 0;
    var p = a.play();
    if (p && typeof p.then === 'function') {
      p.then(function () {
        try {
          a.pause();
          a.currentTime = 0;
          a.volume = v;
        } catch (e2) {}
      }).catch(function () {
        try {
          a.volume = v;
        } catch (e3) {}
      });
    } else {
      try {
        a.volume = v;
      } catch (e4) {}
    }
  } catch (e) {
    try {
      a.volume = PHOTO_SHUTTER_VOLUME;
    } catch (e5) {}
  }
}

/**
 * 在用户手势内预热 Video 录制音效，避免倒计时结束时 `play()` 被拒。
 * @returns {void}
 */
function primeVideoRecordAudioInUserGesture() {
  var a = getVideoRecordAudio();
  if (!a) return;
  try {
    var v = a.volume;
    a.volume = 0;
    a.currentTime = 0;
    var p = a.play();
    if (p && typeof p.then === 'function') {
      p.then(function () {
        try {
          a.pause();
          a.currentTime = 0;
          a.volume = v;
        } catch (e2) {}
      }).catch(function () {
        try {
          a.volume = v;
        } catch (e3) {}
      });
    } else {
      try {
        a.volume = v;
      } catch (e4) {}
    }
  } catch (e) {
    try {
      a.volume = VIDEO_RECORD_VOLUME;
    } catch (e5) {}
  }
}

/**
 * Photo 抓拍瞬间播放快门音；`play()` 失败不抛、不影响抓拍。

function playPhotoShutterSound() {
  var a = getPhotoShutterAudio();
  if (!a) return;
  try {
    a.currentTime = 0;
    var p = a.play();
    if (p && typeof p.then === 'function') {
      p.catch(function () {});

  }

/**
 * Video 开始录制时播放录制音效；失败不抛、不影响录制。

 */
function playVideoRecordSound() {
  var a = getVideoRecordAudio();
  if (!a) return;
  try {
    a.currentTime = 0;
    var p = a.play();
    if (p && typeof p.then === 'function') p.catch(function () {});

/** @type {boolean} */
let videoMode = false;
/** Photo 模式下切到 Video 前记住的分辨率 / 比例 */
let savedPhotoResValue = '';
let savedPhotoAspectValue = '';
/** @type {boolean} 从 Loop/Video 切回 Photo 时需恢复一次 */
let restorePhotoSettingsAfterVideo = false;

AsciiCameraUi.initStateAccess({
  get videoMode() {
    return videoMode;
  },
  get stream() {
    return stream;
  },
  get previewCaptureActive() {
    return AsciiCameraPreview.previewCaptureActive;
  }
});

/**
 * 根据当前模式更新 Video 锁定的分辨率 / 比例与按钮文案。
 * @returns {void}
 */
function applyCaptureModeUi() {
  if (cameraShell) cameraShell.classList.toggle('cam-video-mode', videoMode);
  /**
   * 未开摄像头：Style 禁用；Photo 下 Aspect/Resolution 可调；Video 下与已开摄像头时一致（1:1；Resolution 可选 60/80）。
   * 预览态：仅确认画面，不可改比例/分辨率。
   * 实时取景：Video 下锁定 Aspect（Resolution 可选 60/80）。
   */
  var flashSwitchLabel =
    flashToggle && flashToggle.parentElement && flashToggle.parentElement.classList.contains('flash-switch')
      ? flashToggle.parentElement
      : null;
  if (!stream) {
    if (densityPicker) densityPicker.disabled = true;
    if (colorPicker) colorPicker.disabled = false;
    if (flashToggle) flashToggle.disabled = false;
    if (flashSwitchLabel) {
      flashSwitchLabel.classList.remove('flash-switch--disabled');
      flashSwitchLabel.removeAttribute('aria-disabled');
    }
    if (videoMode) {
      if (resPicker) {
        resPicker.value = String(VIDEO_DEFAULT_COLS);
        resPicker.disabled = true;
        resPicker.classList.remove('select-strong-disabled');
      }
      if (aspectPicker) {
        aspectPicker.value = '1:1';
        aspectPicker.disabled = true;
        aspectPicker.classList.add('select-strong-disabled');
      }
      if (resPickerStack) resPickerStack.classList.remove('select-locked');
      if (aspectPickerStack) aspectPickerStack.classList.add('select-locked');
    } else {
      if (aspectPicker) {
        aspectPicker.disabled = false;
        aspectPicker.classList.remove('select-strong-disabled');
      }
      if (resPicker) {
        resPicker.disabled = false;
        resPicker.classList.remove('select-strong-disabled');
      }
      if (resPickerStack) resPickerStack.classList.remove('select-locked');
      if (aspectPickerStack) aspectPickerStack.classList.remove('select-locked');
      // 只在当前值为 Loop（Video）专用列数时回填 Photo 记忆值；避免覆盖用户在离线状态下手动选择的 Resolution。
      if (resPicker && resPicker.value === '72') {
        if (
          savedPhotoResValue &&
          resPicker.querySelector('option[value="' + savedPhotoResValue + '"]')
        ) {
          resPicker.value = savedPhotoResValue;
        } else {
          resPicker.value = '72';
        }
      }
      if (restorePhotoSettingsAfterVideo) {
        if (savedPhotoAspectValue) aspectPicker.value = savedPhotoAspectValue;
        else if (aspectPicker) aspectPicker.value = PHOTO_DEFAULT_ASPECT;
        restorePhotoSettingsAfterVideo = false;
      }
    }
    snapBtn.textContent = videoMode ? SNAP_LABEL_VIDEO : SNAP_LABEL_READY;
  } else if (AsciiCameraPreview.previewCaptureActive) {
    if (densityPicker) densityPicker.disabled = false;
    if (colorPicker) colorPicker.disabled = false;
    /** 预览为非实时态：禁止 Flash（避免误触） */
    if (flashToggle) flashToggle.disabled = true;
    if (flashSwitchLabel) {
      flashSwitchLabel.classList.add('flash-switch--disabled');
      flashSwitchLabel.setAttribute('aria-disabled', 'true');
    }
    aspectPicker.disabled = true;
    resPicker.disabled = true;
    aspectPicker.classList.add('select-strong-disabled');
    resPicker.classList.add('select-strong-disabled');
    if (resPickerStack) resPickerStack.classList.add('select-locked');
    if (aspectPickerStack) aspectPickerStack.classList.add('select-locked');
  } else {
    if (densityPicker) densityPicker.disabled = false;
    if (colorPicker) colorPicker.disabled = false;
    if (flashToggle) flashToggle.disabled = false;
    if (flashSwitchLabel) {
      flashSwitchLabel.classList.remove('flash-switch--disabled');
      flashSwitchLabel.removeAttribute('aria-disabled');
    }
    aspectPicker.disabled = videoMode;
    resPicker.disabled = false;
    resPicker.classList.remove('select-strong-disabled');
    aspectPicker.classList.toggle('select-strong-disabled', videoMode);
    if (resPickerStack) resPickerStack.classList.remove('select-locked');
    if (aspectPickerStack) aspectPickerStack.classList.toggle('select-locked', videoMode);
    if (videoMode) {
      if (resPicker) {
        resPicker.value = String(VIDEO_DEFAULT_COLS);
        resPicker.disabled = true;
      }
      aspectPicker.value = '1:1';
      snapBtn.textContent = SNAP_LABEL_VIDEO;
    } else {
      // 同上：仅在值无效（停留在 Video 的 60）时才恢复 Photo 的记忆值。
      if (resPicker && resPicker.value === '72') {
        if (
          savedPhotoResValue &&
          resPicker.querySelector('option[value="' + savedPhotoResValue + '"]')
        ) {
          resPicker.value = savedPhotoResValue;
        } else {
          resPicker.value = '72';
        }
      }
      if (restorePhotoSettingsAfterVideo) {
        if (savedPhotoAspectValue) aspectPicker.value = savedPhotoAspectValue;
        else if (aspectPicker) aspectPicker.value = PHOTO_DEFAULT_ASPECT;
        restorePhotoSettingsAfterVideo = false;
      }
      snapBtn.textContent = SNAP_LABEL_READY;
    }
  }
  AsciiCameraUi.syncResPickerOptionsVisibility();
  AsciiCameraUi.updateModeTabsUi();
  AsciiCameraUi.syncVideoProgressBarForMode();
  invalidateAsciiCellMetrics();
  syncAsciiLayout();
  if (!stream) syncIntroRequestRain();
  if (stream && animId == null && !AsciiCameraPreview.previewCaptureActive) render();
  AsciiCameraPreview.syncLoopCoverUiVisibility();
}

/**
 * @param {boolean} nextVideo 是否进入 Video
 * @returns {void}
 */
function setCaptureVideoMode(nextVideo) {
  if (AsciiCameraPreview.previewCaptureActive) return;
  if (nextVideo && !videoMode) {
    savedPhotoResValue = resPicker.value;
    savedPhotoAspectValue = aspectPicker.value;
    restorePhotoSettingsAfterVideo = true;
  }
  if (!nextVideo && videoMode) {
    restorePhotoSettingsAfterVideo = true;
  }
  videoMode = !!nextVideo;
  applyCaptureModeUi();
}

AsciiCameraUi.updateModeTabsUi();
AsciiCameraUi.syncVideoProgressBarForMode();

/**
 * 测量 `#ascii-out` 实际单格宽高比（字宽÷行高），使采样列×行与屏幕像素块对齐；1:1 时画面呈正方形。
 * @returns {{ cellAspect: number, lineHeightPx: number }}
 */
function getAsciiCellMetrics() {
  if (asciiCellMetricsCache) return asciiCellMetricsCache;
  const probeEl = asciiCellProbe && asciiCellProbe.isConnected ? asciiCellProbe : out;
  const m = measureMonospaceCellFromElement(probeEl);
  asciiCellMetricsCache = m;
  return m;
}

/**
 * @param {HTMLElement} el 与 ASCII 输出使用相同样式的元素（如 `#ascii-out`）
 * @returns {{ cellAspect: number, lineHeightPx: number }}
 */
function measureMonospaceCellFromElement(el) {
  const cs = getComputedStyle(el);
  const fontSize = parseFloat(cs.fontSize) || 6;
  let lineHeightPx = parseFloat(cs.lineHeight);
  if (!Number.isFinite(lineHeightPx) || cs.lineHeight === 'normal' || String(cs.lineHeight).endsWith('%')) {
    lineHeightPx = fontSize;
  }
  const fontShorthand = cs.font && cs.font.length > 2 ? cs.font : [cs.fontStyle, cs.fontWeight, cs.fontSize, cs.fontFamily].filter(Boolean).join(' ');
  let charW = 0;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  if (ctx) {
    ctx.font = fontShorthand;
    charW = ctx.measureText('0').width;
  }
  if (!charW || charW <= 0) {
    const probe = document.createElement('span');
    probe.setAttribute('style', [
      'position:absolute', 'left:-9999px', 'visibility:hidden', 'white-space:pre',
      'font:' + fontShorthand, 'font-family:' + cs.fontFamily, 'font-size:' + cs.fontSize,
      'font-weight:' + cs.fontWeight, 'line-height:' + cs.lineHeight, 'letter-spacing:' + cs.letterSpacing
    ].join(';'));
    probe.textContent = '0';
    document.body.appendChild(probe);
    charW = probe.offsetWidth;
    document.body.removeChild(probe);
  }
  const cellAspect = charW > 0 && lineHeightPx > 0 ? charW / lineHeightPx : CELL_ASPECT_FALLBACK;
  return { cellAspect, lineHeightPx };
}

function invalidateAsciiCellMetrics() {
  asciiCellMetricsCache = null;
}

/** @type {number} */
let asciiScaleRaf = 0;

/**
 * 按当前 Photo/Video 与 Aspect 设置活动画幅的 `aspect-ratio`（宽恒为内容列 100%，高随比例）。
 * @returns {void}
 */
function syncAsciiActiveFrameAspect() {
  if (!asciiActiveFrame || !asciiWrap) return;
  /** 含 Camera OFF：开屏雨与 live 共用同一活动画幅比例 */
  var ar = videoMode ? 1 : getAspectRatio();
  asciiActiveFrame.style.aspectRatio = ar + ' / 1';
}

/**
 * 在固定字格下测量 `#ascii-out` 占位，整体 `scale` 以填入 `.ascii-active-frame`（contain，居中）。
 * Camera OFF（`.ascii-wrap--offline`）时清除内联 `left` / `top` / `transform`；可视提示由 `#ascii-wrap` 上的 `.ascii-off-helper` 负责。
 * @returns {void}
 */
function updateAsciiOutScale() {
  if (!asciiOutScaleWrap || !out || !asciiActiveFrame || !asciiWrap) return;
  if (asciiWrap.classList.contains('ascii-wrap--offline')) {
    asciiOutScaleWrap.style.transform = '';
    asciiOutScaleWrap.style.left = '';
    asciiOutScaleWrap.style.top = '';
    return;
  }
  var cw = asciiActiveFrame.clientWidth;
  var ch = asciiActiveFrame.clientHeight;
  if (cw < 2 || ch < 2) return;
  asciiOutScaleWrap.style.transform = 'translate(-50%, -50%)';
  void out.offsetWidth;
  var wi = out.offsetWidth;
  var hi = out.offsetHeight;
  if (wi < 1 || hi < 1) return;
  var s = Math.min(cw / wi, ch / hi);
  asciiOutScaleWrap.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
}

/**
 * 合并宽高比与缩放更新，下一帧执行缩放以避免与刚写入的 DOM 不同步。
 * @returns {void}
 */
function scheduleAsciiScale() {
  if (asciiScaleRaf) cancelAnimationFrame(asciiScaleRaf);
  asciiScaleRaf = requestAnimationFrame(function () {
    asciiScaleRaf = 0;
    updateAsciiOutScale();
  });
}

/**
 * 16:9 / 4:3 时加宽活动列；1:1、3:4、Video 保持与主按钮列同宽。
 * @returns {void}
 */
function syncAsciiActiveColumnWidthClass() {
  if (!asciiActiveColumn || !aspectPicker) return;
  var ap = aspectPicker.value;
  var wide = !videoMode && (ap === '16:9' || ap === '4:3');
  asciiActiveColumn.classList.toggle('ascii-active-column--wide', wide);
}

/**
 * 取景器内活动区布局同步：列宽、比例、缩放。
 * @returns {void}
 */
function syncAsciiLayout() {
  syncAsciiActiveColumnWidthClass();
  syncAsciiActiveFrameAspect();
  scheduleAsciiScale();
}

/**
 * @returns {number} 当前选取的列数，限制在 1 … MAX_RES_COLS（Video 模式固定 60）
 */
function getCols() {
  const n = parseInt(resPicker.value, 10);
  if (!Number.isFinite(n)) return 80;
  return Math.min(MAX_RES_COLS, Math.max(1, n));
}

/**
 * 半角片假名 + 数字 + 精选大写拉丁 + 用户指定符号 + 取景器 `CHAR_SETS` 块符并集（无小写）。
 * @returns {{
 *   katakana: string[],
 *   numbers: string[],
 *   letters: string[],
 *   symbols: string[],
 *   katakanaSet: Set<string>,
 *   numberSet: Set<string>,
 *   lettersSet: Set<string>,
 *   symbolsSet: Set<string>

  var katakana =
    'ｱｲｳｴｵ' +
    'ｶｷｸｹｺ' +
    'ｻｼｽｾｿ' +
    'ﾀﾁﾂﾃﾄ' +
    'ﾅﾆﾇﾈﾉ' +
    'ﾊﾋﾌﾍﾎ' +
    'ﾏﾐﾑﾒﾓ' +
    'ﾔﾕﾖ' +
    'ﾗﾘﾙﾚﾛ' +
    'ﾜｦﾝ';
  var numbers = '0123456789';
  /** 用户精选大写子集（无 A H I M O T U V W X Y） */
  var letters = 'BCDEFGJKLNOPQRSZ';
  /**
   * 用户指定符号：ASCII 运算符/标点、`·•…` 与弯引号、逻辑符、破折号与省略号（再与 `CHAR_SETS` 块符并集合并）。
   */
  var symbols =
    '+-*/\\|=<>:;.,_~!@#$%^&()`' +
    '·•…:;\u2018\u2019\u201c\u201d' +
    '\u2200\u2208\u2227\u2228\u00ac' +
    '\u2014\u2015\u2026';

  /** 既有密度/块字符：至少包含 ·░▒▓；并继续并入 CHAR_SETS 的块字符 */
  var blockSeen = new Set();
  var blocks = '·░▒▓';
  for (var b = 0; b < blocks.length; b++) blockSeen.add(blocks[b]);
  Object.keys(CHAR_SETS).forEach(function (key) {
    var str = CHAR_SETS[key];
    for (var i = 0; i < str.length; i++) {
      var ch = str[i];
      if (ch === '\n' || ch === '\r') continue;
      if (!blockSeen.has(ch)) {
        blockSeen.add(ch);
        blocks += ch;
      }
    }
  });

  var katakanaArr = katakana.split('');
  var numbersArr = numbers.split('');
  var lettersArr = letters.split('');
  var symbolsArr = (symbols + blocks).split('');
  var symbolsSetOut = new Set(symbolsArr);
  // #region agent log
  (function () {
    fetch('http://127.0.0.1:7520/ingest/be823198-74c3-4055-9412-4c580ba8a956', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '67cfc6' },
      body: JSON.stringify({
        sessionId: '67cfc6',
        location: 'camera.html:buildMatrixIntroCharPool',
        message: 'Matrix symbolsSet probe (removed geo+CJK segments)',
        data: {
          hypothesisId: 'H1',
          symbolsSetSize: symbolsSetOut.size,
          hasU25CF: symbolsSetOut.has('\u25cf'),
          hasU3001: symbolsSetOut.has('\u3001'),
          hasU00AB: symbolsSetOut.has('\u00ab'),
          hasU2660: symbolsSetOut.has('\u2660'),
          hasU221E: symbolsSetOut.has('\u221e'),
          runId: 'pool-trim-verify'
        },
        timestamp: Date.now()

    }).catch(function () {});
  })();
  // #endregion
  return {
    katakana: katakanaArr,
    numbers: numbersArr,
    letters: lettersArr,
    symbols: symbolsArr,
    katakanaSet: new Set(katakanaArr),
    numberSet: new Set(numbersArr),
    lettersSet: new Set(lettersArr),
    symbolsSet: symbolsSetOut
  };
}

/**
 * @type {{
 *   katakana: string[],
 *   numbers: string[],
 *   letters: string[],
 *   symbols: string[],
 *   katakanaSet: Set<string>,
 *   numberSet: Set<string>,
 *   lettersSet: Set<string>,
 *   symbolsSet: Set<string>
 * } | null}
 */
let matrixIntroPoolCache = null;

/**
 * Matrix 开屏雨字符池（缓存；`CHAR_SETS` 为常量）。
 * @returns {{
 *   katakana: string[],
 *   numbers: string[],
 *   letters: string[],
 *   symbols: string[],
 *   katakanaSet: Set<string>,
 *   numberSet: Set<string>,
 *   lettersSet: Set<string>,
 *   symbolsSet: Set<string>
 * }}
 */
function getMatrixIntroCharPool() {
  if (matrixIntroPoolCache == null) {
    matrixIntroPoolCache = buildMatrixIntroCharPool();
  }
  return matrixIntroPoolCache;
}

/**
 * 为单格字符决定是否水平镜像（仅在 glyph 赋值时调用，非每帧；与 `glyphs[i]` 同步）。
 * 片假名 / 数字 / 符号 / 大写字母各有可调概率。
 * @param {string} ch
 * @param {{
 *   katakanaSet?: Set<string>,
 *   numberSet?: Set<string>,
 *   lettersSet?: Set<string>,
 *   symbolsSet?: Set<string>
 * }} pool
 * @returns {boolean}
 */
function assignGlyphMirror(ch, pool) {
  if (!ch || !pool) return false;
  if (pool.katakanaSet && pool.katakanaSet.has(ch)) {
    return Math.random() < MATRIX_RAIN_MIRROR_KATAKANA_PROB;
  }
  if (pool.numberSet && pool.numberSet.has(ch)) {
    return Math.random() < MATRIX_RAIN_MIRROR_NUMBER_PROB;
  }
  if (pool.symbolsSet && pool.symbolsSet.has(ch)) {
    return Math.random() < MATRIX_RAIN_MIRROR_SYMBOL_PROB;
  }
  if (pool.lettersSet && pool.lettersSet.has(ch)) {
    return Math.random() < MATRIX_RAIN_MIRROR_UPPER_LETTERS_PROB;
  }
  return false;
}

/**
 * 偏电影感：约 38% 片假名 / 12% 数字 / 5% 大写 / 45% 符号与块符（非均匀随机）。
 * @param {{ katakana: string[], numbers: string[], letters: string[], symbols: string[] }} pool
 * @returns {string}
 */
function pickMatrixIntroChar(pool) {
  if (!pool) return '·';
  var r = Math.random();
  /** @type {string[]} */
  var arr;
  if (r < 0.38) arr = pool.katakana;
  else if (r < 0.5) arr = pool.numbers;
  else if (r < 0.55) arr = pool.letters;
  else arr = pool.symbols;
  if (!arr || arr.length < 1) return '·';
  return arr[Math.floor(Math.random() * arr.length)] || '·';
}

/**
 * 若 `candidate` 或与随机重试得到的字与上下邻（同列 `glyphs`）相同则再选；尽量不破坏邻格镜像状态。
 * @param {{ katakana: string[], numbers: string[], letters: string[], symbols: string[] }} pool
 * @param {{ glyphs: string[] }} col
 * @param {number} row
 * @param {number} rows
 * @param {string} candidate
 * @returns {string}
 */
function resolveGlyphAvoidVertAdjacent(pool, col, row, rows, candidate) {
  var up = row > 0 ? col.glyphs[row - 1] : null;
  var dn = row < rows - 1 ? col.glyphs[row + 1] : null;
  /**
   * @param {string} ch
   * @returns {boolean}
   */
  function conflicts(ch) {
    if (!ch) return true;
    if (up != null && ch === up) return true;
    if (dn != null && ch === dn) return true;
    return false;
  }
  if (!conflicts(candidate)) return candidate;
  var k;
  var ch;
  for (k = 0; k < RAIN_GLYPH_ADJ_DUP_MAX_ATTEMPTS; k++) {
    ch = pickMatrixIntroChar(pool);
    if (!conflicts(ch)) return ch;
  }
  return candidate;
}

/**
 * @param {number} x
 * @param {number} h
 * @param {number} lh
 * @param {string} pool
 * @param {number} alphaMul
 * @returns {RequestRainColumn}
 */
function createRequestRainColumn(x, h, lh, pool, alphaMul) {
  // Phase 1（安全）：每列长度随机化到稳定可控区间（约 6–20 个可见字符）。
  var trailLen = 6 + Math.floor(Math.random() * 15);
  var rows = Math.max(6, Math.ceil(h / Math.max(1, lh)) + 4);
  var glyphs = new Array(rows);
  /** @type {boolean[]} */
  var gaps = new Array(trailLen);
  var pauseFrames = 0;
  /** @type {boolean[]} */
  var glyphMirror = new Array(rows);
  var colGlyphRef = { glyphs: glyphs };
  for (var gi = 0; gi < rows; gi++) {
    glyphs[gi] = resolveGlyphAvoidVertAdjacent(pool, colGlyphRef, gi, rows, pickMatrixIntroChar(pool));
    glyphMirror[gi] = assignGlyphMirror(glyphs[gi], pool);
  }
  for (var i = 0; i < trailLen; i++) {
    // 10–20% 稀疏留白：固定在尾迹位置（不是每帧重新随机）。
    gaps[i] = Math.random() < 0.14;
  }
  return {
    x: x,
    headY:
      Math.random() < 0.35
        ? Math.random() * h
        : Math.random() * (h + trailLen * lh) - trailLen * lh,
    speed: 2.2 + Math.random() * 4.2,
    trailLen: trailLen,
    glyphs: glyphs,
    glyphMirror: glyphMirror,
    gaps: gaps,
    glyphRows: rows,
    pauseFrames: pauseFrames,
    mutJ: 0.85 + Math.random() * 0.3,
    actSeed: Math.random(),
    microHoldFrames: [0, 0, 0, 0, 0],
    microHoldRows: [0, 0, 0, 0, 0],
    recentGlyphs: [],
    motif: [],
    motifIdx: 0,
    actBias: 0,
    actBiasTarget: 0,
    actBiasTtl: 0,
    alphaMul: alphaMul
  };
}

/**
 * 背景暗列：更短尾迹、更低活性、更慢一些；字首为白芯辉光，alpha 与 `alphaMul` 及尾迹一致。
 * @param {number} x
 * @param {number} h
 * @param {number} lh
 * @param {{ katakana: string[], numbers: string[], letters: string[], symbols: string[] }} pool
 * @param {number} alphaMul
 * @returns {RequestRainColumn}
 */
function createRequestRainBgColumn(x, h, lh, pool, alphaMul) {
  var trailLen = 4 + Math.floor(Math.random() * 9); // 4–12
  var rows = Math.max(6, Math.ceil(h / Math.max(1, lh)) + 4);
  var glyphs = new Array(rows);
  /** @type {boolean[]} */
  var glyphMirrorBg = new Array(rows);
  var gaps = new Array(trailLen);
  var colGlyphRefBg = { glyphs: glyphs };
  for (var gi = 0; gi < rows; gi++) {
    glyphs[gi] = resolveGlyphAvoidVertAdjacent(pool, colGlyphRefBg, gi, rows, pickMatrixIntroChar(pool));
    glyphMirrorBg[gi] = assignGlyphMirror(glyphs[gi], pool);
  }
  for (var i = 0; i < trailLen; i++) gaps[i] = Math.random() < 0.16;
  return {
    x: x,
    headY:
      Math.random() < 0.55
        ? Math.random() * h
        : Math.random() * (h + trailLen * lh) - trailLen * lh,
    speed: (2.2 + Math.random() * 4.2) * 0.82,
    trailLen: trailLen,
    glyphs: glyphs,
    glyphMirror: glyphMirrorBg,
    gaps: gaps,
    glyphRows: rows,
    pauseFrames: 0,
    mutJ: 0.55 + Math.random() * 0.25,
    actSeed: Math.random(),
    microHoldFrames: [0, 0, 0, 0, 0],
    microHoldRows: [0, 0, 0, 0, 0],
    recentGlyphs: [],
    motif: [],
    motifIdx: 0,
    actBias: 0,
    actBiasTarget: 0,
    actBiasTtl: 0,
    alphaMul: alphaMul
  };
}

/**
 * Phase 2：列内 glyph buffer 持久化 + 受控突变（减少 TV noise）。
 * - 基础突变：约 10–15%
 * - 尾迹近头：约 40–60%
 * - 尾迹外：约 5–10%
 * - 突变时 30–40% 复制上一行，形成纵向纹理
 * @param {RequestRainColumn} col
 * @param {number} h
 * @param {number} lh
 * @param {{ katakana: string[], numbers: string[], letters: string[], symbols: string[] }} pool
 * @param {boolean} paused
 * @returns {void}
 */
function evolveRequestRainColumnGlyphs(col, h, lh, pool, paused) {
  if (!col || !col.glyphs || col.glyphs.length < 1) return;
  var rows = col.glyphs.length;
  if (!col.glyphMirror || col.glyphMirror.length !== rows) {
    col.glyphMirror = new Array(rows);
    for (var syncM = 0; syncM < rows; syncM++) {
      col.glyphMirror[syncM] = assignGlyphMirror(col.glyphs[syncM], pool);
    }
  }
  var headRow = Math.floor(col.headY / Math.max(1, lh));
  var tlen = Math.max(1, col.trailLen);
  var mj = col.mutJ != null ? col.mutJ : 1;
  var mhF = col.microHoldFrames;
  var mhR = col.microHoldRows;
  // burtsy activity：列级活跃偏置缓慢变化（让突变呈现“段落感”而非均匀噪声）
  if (col.actBiasTtl == null) col.actBiasTtl = 0;
  if (col.actBias == null) col.actBias = 0;
  if (col.actBiasTarget == null) col.actBiasTarget = 0;
  if (col.actBiasTtl <= 0) {
    col.actBiasTtl = 30 + Math.floor(Math.random() * 120); // ~0.5–2.5s@60fps
    var r0 = Math.random();
    // 多数时间偏稳定，少数时间短暂更“健谈”
    col.actBiasTarget = r0 < 0.75 ? (-0.22 + Math.random() * 0.18) : (0.05 + Math.random() * 0.55);
  } else {
    col.actBiasTtl--;
  }
  col.actBias += (col.actBiasTarget - col.actBias) * 0.06;
  var biasMul = Math.max(0.55, Math.min(1.65, 1 + col.actBias));

  if (!col.recentGlyphs) col.recentGlyphs = [];
  if (!col.motif) col.motif = [];
  if (col.motifIdx == null) col.motifIdx = 0;

  /**
   * @param {number} row
   * @returns {string}
   */
  function pickMutatedGlyph(row) {
    // 35–45%：复制上方
    if (Math.random() < 0.4 && row > 0) {
      return col.glyphs[row - 1] || pickMatrixIntroChar(pool);
    }
    // 20–30%：复用本列近期 glyph（局部惯性/碎片感）
    if (col.recentGlyphs.length && Math.random() < 0.25) {
      return col.recentGlyphs[Math.floor(Math.random() * col.recentGlyphs.length)];
    }
    // 可选 motif：极轻量（2–4 字）短暂回声；避免可读词
    if (col.motif.length && Math.random() < 0.18) {
      var m = col.motif[col.motifIdx % col.motif.length];
      col.motifIdx = (col.motifIdx + 1) % col.motif.length;
      return m || pickMatrixIntroChar(pool);
    }
    // 剩余：新随机
    return pickMatrixIntroChar(pool);
  }

  // 偶尔生成短 motif（更偏向符号/数字/片假名混合）
  if (col.motif.length < 1 && Math.random() < 0.008) {
    var ml = 2 + Math.floor(Math.random() * 3);
    col.motif = new Array(ml);
    col.motifIdx = 0;
    for (var mi = 0; mi < ml; mi++) col.motif[mi] = pickMatrixIntroChar(pool);
  } else if (col.motif.length && Math.random() < 0.0035) {
    // motif 自然消退，避免全屏过度模式化
    col.motif = [];
    col.motifIdx = 0;
  }

  for (var r = 0; r < rows; r++) {
    var d = headRow - r; // 0=head, 正数在尾迹内，负数在头下方
    var rate;
    if (d >= 0 && d < tlen) {
      if (d === 0) rate = paused ? 0.62 : 0.56; // head
      else if (d <= 2) rate = paused ? 0.48 : 0.44; // immediate trail
      else if (d <= Math.floor(tlen * 0.68)) rate = 0.12; // mid trail
      else rate = 0.07; // tail end
    } else {
      rate = 0.03; // outside illuminated zone：很低，保持“定格网格”感
    }
    // micro-hold：被挂住的局部 glyph 在原地更“活”（略增突变率）
    if (mhF && mhR) {
      for (var k = 0; k < 5; k++) {
        if (mhF[k] > 0 && mhR[k] === r) {
          rate *= 1.35;
          break;
        }
      }
    }
    rate *= mj;
    rate *= biasMul;
    if (Math.random() < rate) {
      var candMut = pickMutatedGlyph(r);
      col.glyphs[r] = resolveGlyphAvoidVertAdjacent(pool, col, r, rows, candMut);
      // 记录近期片段（限制长度，避免内存增长）
      if (col.glyphs[r]) {
        col.recentGlyphs.push(col.glyphs[r]);
        if (col.recentGlyphs.length > 7) col.recentGlyphs.shift();
      }
      var newCh = col.glyphs[r];
      if (r > 0 && newCh === col.glyphs[r - 1]) {
        col.glyphMirror[r] = col.glyphMirror[r - 1];
      } else {
        col.glyphMirror[r] = assignGlyphMirror(newCh, pool);
      }
    }
  }
}

/**
 * @param {RequestRainColumn} col
 * @param {number} h
 * @param {number} lh
 * @param {string} pool
 * @returns {void}
 */
function stepRequestRainColumn(col, h, lh, pool) {
  if (col.pauseFrames == null) col.pauseFrames = 0;
  if (!col.microHoldFrames) col.microHoldFrames = [0, 0, 0, 0, 0];
  if (!col.microHoldRows) col.microHoldRows = [0, 0, 0, 0, 0];
  var pauseChance = 0.0035;
  if (col.pauseFrames < 1 && Math.random() < pauseChance) {
    col.pauseFrames = 10 + Math.floor(Math.random() * 31); // 10–40 帧
  }
  if (col.pauseFrames > 0) {
    col.pauseFrames--;
    evolveRequestRainColumnGlyphs(col, h, lh, pool, true);
    return;
  }

  col.headY += col.speed;
  // micro-hold：仅 head 附近 0..4 槽位，短暂挂住；head 继续前进不受阻。
  var headRow = Math.floor(col.headY / Math.max(1, lh));
  var activeHolds = 0;
  for (var kk = 0; kk < 5; kk++) if (col.microHoldFrames[kk] > 0) activeHolds++;
  for (var k = 0; k < 5; k++) {
    if (col.microHoldFrames[k] > 0) {
      col.microHoldFrames[k]--;
      continue;
    }
    if (activeHolds >= 2) continue;
    if (Math.random() < 0.14) {
      col.microHoldFrames[k] = 4 + Math.floor(Math.random() * 9); // 4–12 帧
      col.microHoldRows[k] = headRow - k;
      activeHolds++;
    }
  }
  var resetAt = h + col.trailLen * lh + 30;
  var forceReset = Math.random() < 0.00025;
  if (forceReset || col.headY > resetAt) {
    col.headY =
      Math.random() < 0.35
        ? Math.random() * h
        : -Math.random() * h * 0.9 - col.trailLen * lh;
    col.speed = 2.2 + Math.random() * 4.2;
    col.trailLen = 6 + Math.floor(Math.random() * 15);
    var rows = Math.max(6, Math.ceil(h / Math.max(1, lh)) + 4);
    col.glyphs = new Array(rows);
    col.glyphMirror = new Array(rows);
    col.glyphRows = rows;
    col.gaps = new Array(col.trailLen);
    col.pauseFrames = 0;
    col.mutJ = 0.85 + Math.random() * 0.3;
    col.microHoldFrames = [0, 0, 0, 0, 0];
    col.microHoldRows = [0, 0, 0, 0, 0];
    col.recentGlyphs = [];
    col.motif = [];
    col.motifIdx = 0;
    col.actBias = 0;
    col.actBiasTarget = 0;
    col.actBiasTtl = 0;
    var colGlyphRefReset = { glyphs: col.glyphs };
    for (var gi = 0; gi < rows; gi++) {
      col.glyphs[gi] = resolveGlyphAvoidVertAdjacent(pool, colGlyphRefReset, gi, rows, pickMatrixIntroChar(pool));
      col.glyphMirror[gi] = assignGlyphMirror(col.glyphs[gi], pool);
    }
    for (var r = 0; r < col.trailLen; r++) col.gaps[r] = Math.random() < 0.14;
    return;
  }
  evolveRequestRainColumnGlyphs(col, h, lh, pool, false);
}

/**
 * 开屏雨用分辨率列数（与 Resolution 下拉一致）。
 * @returns {number}
 */
function getRainResolutionCols() {
  var n = parseInt(resPicker.value, 10);
  if (!Number.isFinite(n)) return 72;
  return Math.min(MAX_RES_COLS, Math.max(1, n));
}

/**
 * 将任意列数映射到五档表（32/60/80/100/120）的最近档，用于查表。
 * @param {number} resCols
 * @returns {number}
 */
function snapIntroRainResTier(resCols) {
  var tiers = [48, 72, 96, 120];
  var r = Math.min(MAX_RES_COLS, Math.max(1, resCols));
  var best = tiers[0];
  var d;
  var i;
  for (i = 0; i < tiers.length; i++) {
    d = Math.abs(r - tiers[i]);
    if (d < Math.abs(r - best)) best = tiers[i];
  }
  return best;
}

/**
 * Intro code-rain：按离散分辨率档查表 + 画幅缩放，档与档之间明显可分。
 * @param {number} resCols
 * @param {number} frameW
 * @returns {number}
 */
function getIntroRainFontPx(resCols, frameW) {
  var tier = snapIntroRainResTier(resCols);
  var base = INTRO_RAIN_FONT_BASE[tier];
  if (base == null) {
    base = 10;
  }
  var frameScale = Math.max(0.76, Math.min(1.12, frameW / 380));
  var fontPx = base * frameScale;
  return Math.max(6.5, Math.min(23, fontPx));
}

/**
 * @param {number} resCols
 * @returns {number}
 */
function getIntroRainColumnSpacingMul(resCols) {
  var tier = snapIntroRainResTier(resCols);
  var m = INTRO_RAIN_SPACING_MUL[tier];
  return m != null ? m : 1;
}

/**
 * 开屏雨行高系数：全分辨率档位统一为 {@link INTRO_RAIN_LINE_HEIGHT_MUL_UNIFIED}。
 * @param {number} _resCols 保留与调用方一致；未再按档区分行高。
 * @returns {number}
 */
function getIntroRainLineHeightMul(_resCols) {
  return INTRO_RAIN_LINE_HEIGHT_MUL_UNIFIED;
}

/**
 * 尾迹长度区间：低分辨率更长尾（更「松」），高分辨率更短（更「密」）。
 * @param {number} resCols
 * @returns {{ min: number, max: number }}
 */
function getIntroRainTrailBounds(resCols) {
  var tier = snapIntroRainResTier(resCols);
  switch (tier) {
    case 32:
      return { min: 24, max: 42 };
    case 60:
      return { min: 20, max: 38 };
    case 80:
      return { min: 17, max: 33 };
    case 100:
      return { min: 14, max: 28 };
    case 120:
      return { min: 12, max: 24 };
    default:
      return { min: 16, max: 30 };
  }
}

/**
 * @param {string} hex
 * @returns {{ r: number, g: number, b: number }}
 */
function hexToRgbForRain(hex) {
  var v = String(hex || '').trim();
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    return {
      r: parseInt(v.slice(1, 3), 16),
      g: parseInt(v.slice(3, 5), 16),
      b: parseInt(v.slice(5, 7), 16)
    };
  }
  return { r: 0, g: 255, b: 65 };
}

/**
 * 摄像头未开时：分辨率/比例/颜色变更后重算雨效。
 * @returns {void}
 */
function syncIntroRequestRain() {
  if (stream) return;
  if (!requestRainCanvas || !requestRainCanvas.classList.contains('ascii-request-rain-canvas--visible')) return;
  resizeRequestRainCanvas();
  if (requestRainRaf == null) {
    requestRainRaf = requestAnimationFrame(requestRainTick);
  }
}

/**
 * 按 `#asciiActiveFrame` 与当前 Resolution 设置雨效画布（字号/列距由 `getIntroRainFontPx` 等映射，避免 60/100 被压成同档）。
 * @returns {void}
 */
function resizeRequestRainCanvas() {
  if (!requestRainCanvas || !requestRainCtx || !asciiActiveFrame) return;
  var rect = asciiActiveFrame.getBoundingClientRect();
  var w = Math.max(1, Math.floor(rect.width));
  var h = Math.max(1, Math.floor(rect.height));
  if (w < 2 || h < 2) return;
  requestRainCssW = w;
  requestRainCssH = h;
  var dpr = window.devicePixelRatio || 1;
  requestRainCanvas.width = Math.max(1, Math.floor(w * dpr));
  requestRainCanvas.height = Math.max(1, Math.floor(h * dpr));
  requestRainCanvas.style.width = w + 'px';
  requestRainCanvas.style.height = h + 'px';
  requestRainCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var resCols = getRainResolutionCols();
  var fontPx = getIntroRainFontPx(resCols, w);
  requestRainLineHeight = fontPx * getIntroRainLineHeightMul(resCols);
  requestRainFontSpec =
    fontPx +
    'px monospace, ui-monospace, "Cascadia Code", "Courier New", monospace';
  requestRainCtx.font = requestRainFontSpec;
  var rawCell = Math.max(
    7,
    Math.ceil(requestRainCtx.measureText('M').width || fontPx * 0.62)
  );
  var cellW = Math.ceil(rawCell * getIntroRainColumnSpacingMul(resCols));
  var trailB = getIntroRainTrailBounds(resCols);
  requestRainTrailMin = trailB.min;
  requestRainTrailSpan = Math.max(1, trailB.max - trailB.min);
  initRequestRainColumns(w, h, cellW, requestRainLineHeight);
}

/**
 * 高密度：等宽列栅格 + 三层错开叠化。
 * @param {number} w
 * @param {number} h
 * @param {number} cellW
 * @param {number} lh
 * @returns {void}
 */
function initRequestRainColumns(w, h, cellW, lh) {
  var pool = getMatrixIntroCharPool();
  var colCount = Math.ceil(w / cellW) + 2;
  requestRainColumns = [];
  requestRainBgColumns = [];
  var xInset = cellW * 0.5;
  for (var i = 0; i < colCount + 4; i++) {
    if (((i + 0) % 4) === 0) continue;
    var x = i * cellW + xInset;
    var a = 1;
    var band = i % 3;
    if (band === 1) a = 0.52;
    else if (band === 2) a = 0.3;
    requestRainColumns.push(createRequestRainColumn(x, h, lh, pool, a));
  }
  // 背景暗列：使用同一列网格，但选择与前景不重叠的槽位（被前景跳过的 1/4），并再稀疏化到约 30–50%。
  for (var bi = 0; bi < colCount + 4; bi++) {
    if (((bi + 0) % 4) !== 0) continue; // 与前景列槽位互斥
    if ((bi % 2) !== 0) continue; // 再稀疏到约一半
    var bx = bi * cellW + xInset;
    requestRainBgColumns.push(createRequestRainBgColumn(bx, h, lh, pool, 0.55));
  }
}

/**
 * 在 `textAlign:center` / `textBaseline:top` 下绘制单字；`mirror` 时水平镜像（Matrix 雨）。
 * @param {CanvasRenderingContext2D} ctx
 * @param {string} ch
 * @param {number} x
 * @param {number} yy
 * @param {boolean} mirror
 * @returns {void}
 */
function fillRequestRainGlyph(ctx, ch, x, yy, mirror) {
  if (!mirror) {
    ctx.fillText(ch, x, yy);
    return;
  }
  ctx.save();
  ctx.translate(x, yy);
  ctx.scale(-1, 1);
  ctx.fillText(ch, 0, 0);
  ctx.restore();
  // #region agent log
  if (typeof window.__dbgMirroredFills !== 'number') window.__dbgMirroredFills = 0;
  window.__dbgMirroredFills++;
  // #endregion
}

/**
 * 等宽列绘制：绿分层透明度 + 白头；字符每帧流变 + 随机突变。
 * @param {number} w
 * @param {number} h
 * @returns {void}
 */

  requestRainCtx.textAlign = 'center';
  requestRainCtx.textBaseline = 'top';
  var pool = getMatrixIntroCharPool();
  var lh = requestRainLineHeight;
  var rgb = hexToRgbForRain(colorPicker.value);
  var c;
  // 背景暗列：先更新
  for (c = 0; c < requestRainBgColumns.length; c++) {
    stepRequestRainColumn(requestRainBgColumns[c], h, lh, pool);
  }
  for (c = 0; c < requestRainColumns.length; c++) {
    stepRequestRainColumn(requestRainColumns[c], h, lh, pool);
  }
  // 背景暗列：先画（更暗、更弱，且受 build-up 强度影响更大）

  var bgR = Math.max(0, Math.min(255, Math.floor(rgb.r * 0.62)));
  var bgG = Math.max(0, Math.min(255, Math.floor(rgb.g * 0.7)));
  var bgB = Math.max(0, Math.min(255, Math.floor(rgb.b * 0.62)));
  for (c = 0; c < requestRainBgColumns.length; c++) {
    var bcol = requestRainBgColumns[c];
    if (bcol.actSeed != null && bcol.actSeed > bgI) continue;
    var btlen = bcol.trailLen;
    var bHeadRow = Math.floor(bcol.headY / Math.max(1, lh));
    for (var bd = 0; bd < btlen; bd++) {
      var brow = bHeadRow - bd;
      var byy = brow * lh;
      if (byy < -lh * 2 || byy > h + lh) continue;
      if (bcol.gaps && bcol.gaps[bd]) continue;
      if (!bcol.glyphs || bcol.glyphs.length < 1) continue;
      var bidx =
        ((brow % bcol.glyphs.length) + bcol.glyphs.length) % bcol.glyphs.length;
      var bch = bcol.glyphs[bidx];
      if (!bch) bch = pickMatrixIntroChar(pool);
      var bmir = !!(bcol.glyphMirror && bcol.glyphMirror[bidx]);
      var bmul = bcol.alphaMul;
      if (bd === 0) {

        var blur2Bg = Math.max(6, Math.min(18, lh * 0.95));

        requestRainCtx.shadowColor = 'rgba(255,255,255,' + Math.min(1, 0.88 * wm).toFixed(3) + ')';
        requestRainCtx.shadowBlur = blur1Bg;
        requestRainCtx.fillStyle = 'rgba(255,255,255,' + Math.min(1, 0.24 * wm).toFixed(3) + ')';
        fillRequestRainGlyph(requestRainCtx, bch, bcol.x, byy, bmir);
        requestRainCtx.shadowColor = 'rgba(255,255,255,' + Math.min(1, 0.82 * wm).toFixed(3) + ')';
        requestRainCtx.shadowBlur = blur2Bg;
        requestRainCtx.fillStyle = 'rgba(255,255,255,' + Math.min(1, 0.42 * wm).toFixed(3) + ')';
        fillRequestRainGlyph(requestRainCtx, bch, bcol.x, byy, bmir);
        requestRainCtx.shadowColor = 'rgba(255,255,255,' + Math.min(1, 0.95 * wm).toFixed(3) + ')';
        requestRainCtx.shadowBlur = blurCoreBg;
        requestRainCtx.fillStyle = 'rgba(255,255,255,' + Math.min(1, 0.98 * wm).toFixed(3) + ')';

      if (bd <= 2) ba = 0.34 * bmul;

        row = col.microHoldRows[d];
      }
      var yy = row * lh;
      if (yy < -lh * 2 || yy > h + lh) continue;
      if (col.gaps && col.gaps[d]) continue;
      if (!col.glyphs || col.glyphs.length < 1) continue;
      var idx = ((row % col.glyphs.length) + col.glyphs.length) % col.glyphs.length;
      var ch = col.glyphs[idx];
      if (!ch) ch = pickMatrixIntroChar(pool);
      var mir = !!(col.glyphMirror && col.glyphMirror[idx]);
      var mul = col.alphaMul;
      if (d === 0) {
        // 头部：三层均在同一 save 栈内完成；若在 restore 之后再画亮芯，shadow 会被清空，辉光几乎看不见。
        var blur1 = Math.max(10, Math.min(28, lh * 1.35));
        var blur2 = Math.max(6, Math.min(18, lh * 0.95));
        var blurCore = Math.max(8, Math.min(24, lh * 0.9));
        requestRainCtx.save();
        requestRainCtx.shadowColor = 'rgba(255,255,255,0.88)';
        requestRainCtx.shadowBlur = blur1;
        requestRainCtx.fillStyle = 'rgba(255,255,255,0.24)';
        fillRequestRainGlyph(requestRainCtx, ch, col.x, yy, mir);
        requestRainCtx.shadowColor = 'rgba(255,255,255,0.82)';
        requestRainCtx.shadowBlur = blur2;
        requestRainCtx.fillStyle = 'rgba(255,255,255,0.42)';
        fillRequestRainGlyph(requestRainCtx, ch, col.x, yy, mir);
        requestRainCtx.shadowColor = 'rgba(255,255,255,0.95)';
        requestRainCtx.shadowBlur = blurCore;
        requestRainCtx.fillStyle = 'rgba(255,255,255,0.98)';
        fillRequestRainGlyph(requestRainCtx, ch, col.x, yy, mir);
        requestRainCtx.restore();
        // #region agent log
        if (typeof window.__dbgHeadGlowFrame === 'undefined') window.__dbgHeadGlowFrame = 0;
        window.__dbgHeadGlowFrame++;
        if (window.__dbgHeadGlowFrame % 75 === 0) {
          fetch('http://127.0.0.1:7520/ingest/be823198-74c3-4055-9412-4c580ba8a956', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '67cfc6' },
            body: JSON.stringify({
              sessionId: '67cfc6',
              location: 'camera.html:drawRequestRainFrame',
              message: 'head glow: 3 passes inside save, restore clears shadow',
              data: {
                hypothesisId: 'H1',
                blurCore: blurCore,
                lh: lh,
                mir: mir,
                runId: 'head-glow-post-fix'
              },
              timestamp: Date.now()
            })

        }
        // #endregion
      } else {
        // 前景主体：尽量统一强度（不做明显列内阶梯），仅在极尾端轻微淡出
        var a = 0.52 * mul;

        else if (d >= tlen - 4) a = 0.44 * mul;

          'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + a.toFixed(3) + ')';
      }
      if (d !== 0) {
        fillRequestRainGlyph(requestRainCtx, ch, col.x, yy, mir);
      }
    }
  }
  // #region agent log
  (function dbgRainMirrorVerify() {
    if (typeof window.__dbgRainFrameIdx === 'undefined') window.__dbgRainFrameIdx = 0;
    window.__dbgRainFrameIdx++;
    if (window.__dbgRainFrameIdx % 90 !== 0) return;
    var col0 = requestRainColumns[0];
    var mt = 0;
    var gl = 0;
    if (col0 && col0.glyphMirror && col0.glyphs) {
      gl = col0.glyphs.length;
      for (var di = 0; di < gl; di++) if (col0.glyphMirror[di]) mt++;
    }
    fetch('http://127.0.0.1:7520/ingest/be823198-74c3-4055-9412-4c580ba8a956', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '67cfc6' },
      body: JSON.stringify({
        sessionId: '67cfc6',
        location: 'camera.html:drawRequestRainFrame',
        message: 'rain mirror: state vs mirrored fill count',
        data: {
          hypothesisId: 'H1',
          glyphRows: gl,
          mirrorTrueInCol0: mt,
          mirroredFillsThisFrame: typeof window.__dbgMirroredFills === 'number' ? window.__dbgMirroredFills : 0
        },
        timestamp: Date.now(),
        runId: 'mirror-draw-verify'
      })

  })();
  // #endregion
}

/**
 * rAF：仅 `--visible` 时继续。
 * @returns {void}
 */
function requestRainTick() {
  if (!requestRainCanvas || !requestRainCanvas.classList.contains('ascii-request-rain-canvas--visible')) {
    requestRainRaf = null;
    return;
  }
  if (!asciiActiveFrame) {
    requestRainRaf = null;
    return;
  }
  if (requestRainBuildStartMs > 0 && requestRainIntensity < 1) {
    var now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
    var t = (now - requestRainBuildStartMs) / REQUEST_RAIN_BUILD_MS;
    if (t >= 1) {
      requestRainIntensity = 1;
    } else if (t <= 0) {
      requestRainIntensity = REQUEST_RAIN_BUILD_START_INTENSITY;
    } else {
      var ease = 1 - Math.pow(1 - t, 2);
      requestRainIntensity =
        REQUEST_RAIN_BUILD_START_INTENSITY +
        (1 - REQUEST_RAIN_BUILD_START_INTENSITY) * ease;
    }
  }
  var rect = asciiActiveFrame.getBoundingClientRect();
  var w = Math.max(1, Math.floor(rect.width));
  var h = Math.max(1, Math.floor(rect.height));
  if (w < 2 || h < 2) {
    requestRainRaf = requestAnimationFrame(requestRainTick);
    return;
  }
  if (Math.abs(w - requestRainCssW) > 2 || Math.abs(h - requestRainCssH) > 2) {
    resizeRequestRainCanvas();
    w = requestRainCssW;
    h = requestRainCssH;
  }
  drawRequestRainFrame(w, h);
  requestRainRaf = requestAnimationFrame(requestRainTick);
}

/**
 * 页面开屏 / Stop Camera 后：无 `stream` 时在 `#asciiActiveFrame` 内启动 code-rain。
 * @returns {void}
 */
function startRequestRainEffect() {
  if (!requestRainCanvas || !requestRainCtx) return;
  if (stream) return;
  requestRainIntensity = REQUEST_RAIN_BUILD_START_INTENSITY;
  requestRainBuildStartMs =
    (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
  resizeRequestRainCanvas();
  requestRainCanvas.classList.add('ascii-request-rain-canvas--mounted');
  requestRainCanvas.classList.add('ascii-request-rain-canvas--visible');
  if (requestRainRaf != null) cancelAnimationFrame(requestRainRaf);
  requestRainRaf = requestAnimationFrame(requestRainTick);
}

/**
 * Start Camera 点击：淡出开屏层（可与 getUserMedia 并行）。
 * @returns {void}
 */
function stopRequestRainEffectFade() {
  if (!requestRainCanvas) return;
  var gen = ++requestRainFadeGen;
  if (requestRainRaf != null) {
    cancelAnimationFrame(requestRainRaf);
    requestRainRaf = null;
  }
  requestRainCanvas.classList.remove('ascii-request-rain-canvas--visible');
  if (!requestRainCanvas.classList.contains('ascii-request-rain-canvas--mounted')) return;
  var settled = false;
  /**
   * @param {{ propertyName?: string } | TransitionEvent} ev
   * @returns {void}
   */
  function onFadeEnd(ev) {
    if (gen !== requestRainFadeGen) return;
    if (settled) return;
    if (ev && 'propertyName' in ev && ev.propertyName && ev.propertyName !== 'opacity') return;
    settled = true;
    requestRainCanvas.removeEventListener('transitionend', onFadeEnd);
    requestRainCanvas.classList.remove('ascii-request-rain-canvas--mounted');
    if (requestRainCtx && requestRainCanvas.width > 0) {
      requestRainCtx.save();
      requestRainCtx.setTransform(1, 0, 0, 1, 0, 0);
      requestRainCtx.clearRect(0, 0, requestRainCanvas.width, requestRainCanvas.height);
      requestRainCtx.restore();
    }
  }
  requestRainCanvas.addEventListener('transitionend', onFadeEnd);
  setTimeout(function () {
    onFadeEnd({ propertyName: 'opacity' });
  }, 800);
}

/**
 * 由每格亮度（0…1，与 `toAscii` 采样一致）与当前字符集生成 ASCII。
 * @param {Float32Array} luma 行优先，长度 `cols * rows`
 * @param {number} cols
 * @param {number} rows
 * @param {string} chars
 * @returns {string}
 */
function luminanceToAscii(luma, cols, rows, chars) {
  const n = Math.max(1, chars.length - 1);
  let result = '';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const b = luma[y * cols + x];
      result += chars[Math.max(0, Math.min(Math.floor((1 - b) * n), n))];
    }
    result += '\n';
  }
  return result;
}

/**
 * 采样当前视频帧为亮度格 + ASCII（用于预览态按 Style 重算，不重新访问摄像头像素逻辑外路径）。
 * @param {number} cols
 * @param {number | null | undefined} aspectOverride
 * @returns {{ ascii: string, luma: Float32Array, cols: number, rows: number }}
 */
function toAsciiWithLuminance(cols, aspectOverride) {
  if (!video.videoWidth || !video.videoHeight) {
    return { ascii: '', luma: new Float32Array(0), cols: 0, rows: 0 };
  }
  const chars = getChars();
  const { cellAspect } = getAsciiCellMetrics();
  const forcedAspect =
    aspectOverride != null && Number.isFinite(aspectOverride) ? aspectOverride : getAspectRatio();
  const nativeAspect = video.videoWidth / video.videoHeight;
  const aspect = forcedAspect || nativeAspect;
  const rows = Math.max(1, Math.round((cols * cellAspect) / aspect));
  canvas.width = cols;
  canvas.height = rows;
  ctx.save();
  ctx.translate(cols, 0);
  ctx.scale(-1, 1);
  if (forcedAspect) {
    let sx = 0,
      sy = 0,
      sw = video.videoWidth,
      sh = video.videoHeight;
    if (nativeAspect > forcedAspect) {
      sw = Math.round(video.videoHeight * forcedAspect);
      sx = Math.round((video.videoWidth - sw) / 2);
    } else {
      sh = Math.round(video.videoWidth / forcedAspect);
      sy = Math.round((video.videoHeight - sh) / 2);
    }
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cols, rows);
  } else {
    ctx.drawImage(video, 0, 0, cols, rows);
  }
  ctx.restore();
  const pixels = ctx.getImageData(0, 0, cols, rows).data;
  const luma = new Float32Array(cols * rows);
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * cols + x) * 4;
      const b = (0.299 * pixels[i] + 0.587 * pixels[i + 1] + 0.114 * pixels[i + 2]) / 255;
      luma[y * cols + x] = b;
    }
  }
  const ascii = luminanceToAscii(luma, cols, rows, chars);
  return { ascii, luma, cols, rows };
}

/**
 * 将当前视频帧转为 ASCII。行数 = cols×(字宽/行高)÷画面宽高比，使像素块与等宽字格对齐。

        runId: 'gallery-save-debug',
        hypothesisId: 'H2',
        location: 'camera.html:persistPhotoToGallery:ok',
        message: 'persist ok',
        data: {
          topPhotoId: (savedRow && savedRow.id) ? String(savedRow.id) : null,
          userCount: (window.AsciiCameraGalleryStorage && window.AsciiCameraGalleryStorage.loadUserPhotos) ? window.AsciiCameraGalleryStorage.loadUserPhotos().length : null
        },
        timestamp: Date.now()
      })
    }).catch(function () {});
    // #endregion
    return true;
  } catch (e) {
    console.error(e);
    // #region agent log
    fetch('http://127.0.0.1:7520/ingest/be823198-74c3-4055-9412-4c580ba8a956', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '67cfc6' },
      body: JSON.stringify({
        sessionId: '67cfc6',
        runId: 'gallery-save-debug',
        hypothesisId: 'H3',
        location: 'camera.html:persistPhotoToGallery:catch',
        message: 'persist threw',
        data: { name: e && e.name, message: e && e.message },

      })

    // #endregion
